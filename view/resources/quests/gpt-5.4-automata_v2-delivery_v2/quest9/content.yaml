quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь из Деревни Речных Лугов. Она существует
        в мире, отличается от персонажа, выдавшего задание, что строго обязательно
        по условию, и тематически подходит как получатель угля для лечебных нужд в
        фентэзийном средневековье.
      dialogs: Диалогов 6, что соответствует требованию от 5 до 10. В репликах Лиры
        Лекаря подтверждается получение груза, смысл доставки и выдача награды. Используются
        только существующие персонаж, предмет и локация.
    enemy_to_face:
      amount: Количество противников равно 1, так как это минимально допустимое значение
        и наиболее сбалансированный вариант для стартового персонажа с оружием, наносящим
        2 урона одной цели.
      dialogs: Диалогов 5, что соответствует требованию от 5 до 10. Все реплики принадлежат
        выбранному противнику и отражают засаду на дороге после добычи ресурса, что
        подходит для квеста типа доставки.
      enemy: Выбран Гоблин-вор, потому что это противник 1 ранга, существующий в мире.
        Он безопаснее и уместнее для игрока с Деревянным мечом, 100 здоровья и отсутствием
        брони, чем более сильные враги.
    resource_to_deliver:
      amount: Количество 6 выбрано как умеренное стартовое значение для игрока 1 уровня
        без брони. Объём достаточен для ощущения задания, но не выглядит чрезмерным
        для первого этапа прогрессии.
      character: Выбран Гаррик Кузнец из Королевской столицы, потому что он присутствует
        в списке персонажей мира и может принимать для доставки или сбора ресурс Уголь.
        Это также логично для стартового игрока, так как персонаж находится в начальной
        зоне мира и даёт задания низкой сложности.
      dialogs: Диалогов 6, что соответствует требованию от 5 до 10. Реплики принадлежат
        только Гаррику Кузнецу, который существует в мире и может принимать задания,
        связанные с углём. Содержание диалога объясняет задачу на добычу и последующую
        доставку, не выходя за рамки доступных сущностей и сеттинга.
      resource: Выбран ресурс Уголь, потому что он существует в мире как руда, принимается
        Гарриком Кузнецом, требует кирку минимум 1 ранга, а у игрока уже есть Деревянная
        кирка ранга 1. Это строго соответствует текущим возможностям игрока.
  objective_description: Получить у Гаррика Кузнеца поручение, добыть 6 кусков угля
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Так вот кто пришёл от Гаррика. Я уже ждала эту поставку.
        speaker: Лира Лекарь
      - remark: Уголь нужен мне для варки настоев и подогрева лечебных камней.
        speaker: Лира Лекарь
      - remark: Вижу, ты добыл всё, что просили, и донёс груз в целости.
        speaker: Лира Лекарь
      - remark: Для первого поручения это хорошая работа.
        speaker: Лира Лекарь
      - remark: Возьми это с собой. Каменный меч послужит тебе лучше твоего нынешнего
          оружия.
        speaker: Лира Лекарь
      - remark: Передай Гаррику, что его поставка пришла вовремя.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Человек, бросай добычу!
        speaker: Гоблин-вор
      - remark: Уголь можно продать, а тебя можно оставить в канаве!
        speaker: Гоблин-вор
      - remark: Не упрямься, я работаю быстро!
        speaker: Гоблин-вор
      - remark: Кто таскает добро один, тот сам зовёт беду!
        speaker: Гоблин-вор
      - remark: Сейчас этот груз станет моим!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, подойди. Мне нужен простой и полезный груз для срочной
          работы.
        speaker: Гаррик Кузнец
      - remark: В столице сейчас не хватает хорошего топлива для кузни, а у тебя как
          раз есть деревянная кирка.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков угля. Такой ресурс тебе по силам, и залежи есть совсем
          рядом.
        speaker: Гаррик Кузнец
      - remark: Когда соберёшь уголь, не неси его мне обратно.
        speaker: Гаррик Кузнец
      - remark: Отправляйся к Лире Лекарю в Деревню Речных Лугов. Её очагу и котлам
          тоже нужно топливо.
        speaker: Гаррик Кузнец
      - remark: Скажи, что это поставка по моей просьбе. Если справишься, без награды
          не останешься.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
