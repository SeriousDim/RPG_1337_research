quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что она существует в мире,
        отличается от Гаррика Кузнеца, находится в другой основной локации и логично
        нуждается в угле для варки настоев. В качестве награды у нее есть Каменный
        меч, которого нет у игрока в инвентаре или экипировке.
      dialogs: Диалоги в третьей части содержат 6 реплик, что соответствует требованию
        от 5 до 10. Они подтверждают завершение доставки, сюжетно оправдывают передачу
        груза и вручение награды.
    enemy_to_face:
      amount: Выбрано 1 существо, так как у игрока начальное оружие с уроном по 1
        противнику и отсутствует броня. Это делает столкновение напряженным, но реалистичным
        для стартового квеста.
      dialogs: Диалоги во второй части содержат 6 реплик, что соответствует требованию
        от 5 до 10. Реплики построены вокруг попытки противника отобрать уже добытый
        ресурс, что подходит для этапа после добычи.
      enemy: Выбран Гоблин-вор, потому что это противник ранга 1, уместный для игрока
        с Деревянным мечом ранга 1, без брони и с полным здоровьем. Более сильные
        враги создавали бы неоправданный риск.
    resource_to_deliver:
      amount: Количество 6 выбрано как стартовый, посильный объем для игрока 1 уровня
        с базовым инструментом, чтобы квест оставался выполнимым и соответствовал
        ранней стадии прогрессии.
      character: Выбран Гаррик Кузнец, потому что он существует в игровом мире, находится
        в Королевской столице и может принимать ресурс Уголь для заданий на сбор или
        доставку.
      dialogs: Диалоги в первой части содержат 6 реплик, что соответствует требованию
        от 5 до 10. Содержание реплик объясняет задачу, путь игрока и причину доставки
        ресурса другому персонажу.
      resource: Выбран Уголь, потому что игрок уже имеет Деревянную кирку ранга 1,
        а Уголь требует min_instrument_rank 1, значит ресурс доступен игроку без нарушения
        логики мира.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков угля
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты, должно быть, от Гаррика? Я уже ждала поставку.
        speaker: Лира Лекарь
      - remark: Да. Я принес 6 кусков угля для твоих отваров.
        speaker: Игрок
      - remark: Отлично. С таким топливом котел будет держать ровный жар.
        speaker: Лира Лекарь
      - remark: Ты справился лучше, чем многие бывалые посыльные.
        speaker: Лира Лекарь
      - remark: Прими от меня каменный меч. Он надежнее твоего деревянного.
        speaker: Лира Лекарь
      - remark: Спасибо. Он точно пригодится в дороге.
        speaker: Игрок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестящие камушки? Нет, это мое!
        speaker: Гоблин-вор
      - remark: Путник с киркой всегда тащит что-нибудь ценное.
        speaker: Гоблин-вор
      - remark: С дороги. Этот уголь нужен для важного дела.
        speaker: Игрок
      - remark: Тогда оставь мешок и, может быть, уйдешь целым!
        speaker: Гоблин-вор
      - remark: Не отдам ни куска.
        speaker: Игрок
      - remark: Тогда заберу силой!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, вижу у тебя есть деревянная кирка. Мне нужен уголь для
          горна.
        speaker: Гаррик Кузнец
      - remark: Без него я не смогу поддерживать жар в кузнице Королевской столицы.
        speaker: Гаррик Кузнец
      - remark: Сходи к Одуванчиковой Поляне. Там рядом есть угольные жилы, которые
          тебе по силам.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков угля и неси их не мне, а Лире Лекарю в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Она ждет топливо для варки настоев и целебных отваров.
        speaker: Гаррик Кузнец
      - remark: Понял. Добуду 6 кусков угля и доставлю их Лире.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Каменный меч
