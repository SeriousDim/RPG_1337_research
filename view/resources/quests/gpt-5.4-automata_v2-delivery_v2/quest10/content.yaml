quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что это существующий персонаж,
        отличный от выдающего задание персонажа, как того требует условие. Она логично
        связана с использованием трав и находится в существующей локации Деревня Речных
        Лугов.
      dialogs: Диалоги содержат 6 реплик, что соответствует требованию от 5 до 10.
        Они оформляют завершение доставки и подтверждают получение нужного ресурса
        без добавления несуществующих сюжетных элементов.
    enemy_to_face:
      amount: Количество противников установлено в 1, так как оружие игрока наносит
        2 урона по 1 врагу за удар, а отсутствие брони делает столкновения с несколькими
        противниками менее безопасными для стартового персонажа.
      dialogs: Диалоги содержат 6 реплик, что соответствует ограничению от 5 до 10.
        Реплики принадлежат существующему противнику и тематически описывают засаду
        после добычи ресурса, что соответствует структуре квеста.
      enemy: Выбран Гоблин-вор, потому что это противник ранга 1 с умеренными характеристиками,
        подходящий игроку с Деревянным мечом, 100 здоровья и отсутствием брони.
    resource_to_deliver:
      amount: Количество 5 выбрано как безопасный и уместный объем для игрока 1 уровня
        без брони, чтобы квест оставался стартовым и не перегружал игрока.
      character: Выбран Гаррик Кузнец, потому что он существует в игровом мире и может
        принимать Одуванчик для заданий. Он подходит для стартового квеста, так как
        находится среди персонажей раннего этапа прогрессии.
      dialogs: Диалоги даны от существующего персонажа Гаррик Кузнец из Королевской
        столицы. Количество реплик равно 6, что строго попадает в требуемый диапазон
        от 5 до 10. Содержание реплик объясняет задачу, маршрут и получателя доставки,
        не выходя за рамки сущностей мира.
      resource: Выбран ресурс Одуванчик, потому что он существует в мире, имеет минимальное
        требование min_instrument_rank 1 и может быть добыт игроком имеющейся Деревянной
        лопатой ранга 1.
  objective_description: Получить поручение у Гаррика Кузнеца, собрать 5 Одуванчиков
    с помощью деревянной лопаты и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты пришел от Гаррика Кузнеца?
        speaker: Лира Лекарь
      - remark: Да, это тот самый Одуванчик, которого мне не хватало.
        speaker: Лира Лекарь
      - remark: Для первых настоев нужна именно свежая трава, собранная без промедления.
        speaker: Лира Лекарь
      - remark: Вижу, ты добрался с грузом в целости. Это хороший знак.
        speaker: Лира Лекарь
      - remark: Передай Гаррику, что его просьба выполнена.
        speaker: Лира Лекарь
      - remark: А это твоя награда за доставку.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе, вижу, ты несешь что-то ценное!
        speaker: Гоблин-вор
      - remark: Отдавай травы, и, может быть, уйдешь целым!
        speaker: Гоблин-вор
      - remark: Лира обойдется без них, а вот мне они нужнее!
        speaker: Гоблин-вор
      - remark: Попробуй отбиться своим деревянным мечом!
        speaker: Гоблин-вор
      - remark: Парни, окружай его!
        speaker: Гоблин-вор
      - remark: Либо сумка твоя, либо дорога твоя — выбирай!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, подойди. Мне нужен надежный человек для простой доставки.
        speaker: Гаррик Кузнец
      - remark: В Одуванчиковой Поляне сейчас легко собрать Одуванчик, а твоя деревянная
          лопата как раз подходит для такой работы.
        speaker: Гаррик Кузнец
      - remark: Собери 5 пучков Одуванчика. Это несложное дело даже для воина первого
          уровня.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь, не неси их обратно мне. Отправляйся в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Передай Одуванчик Лире Лекарю. Она знает, что с ним делать.
        speaker: Гаррик Кузнец
      - remark: Справишься быстро и аккуратно — получишь достойную награду.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Каменный меч
