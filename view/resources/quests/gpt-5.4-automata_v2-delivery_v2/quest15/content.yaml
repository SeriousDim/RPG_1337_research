quest:
  explanation:
    destination:
      character_to_deliver: Выбран Гном Брок, потому что он существует в мире, может
        принимать Железо и Олово, связан с горным ремеслом и тематически подходит
        как получатель угля. Он отличается от персонажа, выдавшего поручение, как
        и требуется правилами.
      dialogs: Диалоги доставки используют существующего персонажа Гном Брок. Реплики
        подтверждают получение груза, связывают квест с Гарриком Кузнецом и естественно
        подводят к награде. Количество реплик соответствует требованию от 5 до 10.
    enemy_to_face:
      amount: Количество противников равно 1, чтобы столкновение оставалось честным
        и выполнимым для героя с оружием, наносящим 2 урона по одной цели за удар.
      dialogs: Диалоги принадлежат только существующему противнику Гоблин-вор и происходят
        как засада после добычи ресурса. Реплики короткие, агрессивные и тематически
        связаны с попыткой отобрать уголь. Количество реплик соответствует требованию
        от 5 до 10.
      enemy: Выбран Гоблин-вор, потому что это противник ранга 1, соответствующий
        текущему уровню игрока, его полному отсутствию брони и наличию только Деревянного
        меча.
    resource_to_deliver:
      amount: Количество 6 выбрано как умеренное и посильное для стартового персонажа,
        чтобы квест ощущался содержательным, но не перегружал игрока на первом уровне.
      character: Выбран Гаррик Кузнец, потому что он существует в мире, принимает
        Уголь для поручений и логично выдает стартовое задание игроку начального этапа.
      dialogs: Диалоги построены вокруг простого и понятного поручения для героя 1
        уровня. Источник задания — существующий персонаж Гаррик Кузнец из Королевской
        столицы. Реплики объясняют цель, место добычи, причину выбора героя и конечного
        получателя. Количество реплик соответствует требованию от 5 до 10.
      resource: Выбран ресурс Уголь, потому что он доступен при минимальном ранге
        кирки 1, а у игрока есть Деревянная кирка ранга 1.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков угля
    и доставить их Гному Броку в Гномьи Копи.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: Так-так, от Гаррика? Вижу, ты добрался без пустых рук.
        speaker: Гном Брок
      - remark: Уголь хороший, сухой и ровный. Для кузни сгодится отлично.
        speaker: Гном Брок
      - remark: Гаррик не стал бы посылать кого попало, значит ты уже заслужил немного
          доверия.
        speaker: Гном Брок
      - remark: За такую доставку я не отпущу тебя с пустыми руками.
        speaker: Гном Брок
      - remark: Держи каменный меч. С ним тебе будет куда проще в следующих вылазках.
        speaker: Гном Брок
      - remark: Если снова понадобится руда или крепкая сталь, заглядывай в Гномьи
          Копи.
        speaker: Гном Брок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, человек! Блестящие камешки и черные куски — всё это теперь мое!
        speaker: Гоблин-вор
      - remark: Ты слишком громко стучал киркой. Я давно ждал, когда ты наберешь добычу.
        speaker: Гоблин-вор
      - remark: Оставляй уголь и уходи, если не хочешь проблем.
        speaker: Гоблин-вор
      - remark: Не отдашь сам — заберу после драки!
        speaker: Гоблин-вор
      - remark: Ну что, проверим, чего стоит твой деревянный меч?
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, подойди. Мне нужен надежный человек для простой доставки.
        speaker: Гаррик Кузнец
      - remark: Я собираю припасы для мастеров столицы и хочу отправить немного угля
          в Гномьи Копи.
        speaker: Гаррик Кузнец
      - remark: У тебя есть деревянная кирка, а значит ты сможешь добыть нужный материал
          без лишних хитростей.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну и добудь 6 кусков угля.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь всё, отнеси уголь Гному Броку. Он знает, что груз придет
          от меня.
        speaker: Гаррик Кузнец
      - remark: Работа несложная, но полезная. Заодно покажешь, что на тебя можно
          положиться.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
