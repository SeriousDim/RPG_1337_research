quest:
  explanation:
    destination:
      character_to_deliver: Выбран Лорд Дрейк, потому что он существует в игровом
        мире и может принимать Уголь. Он отличается от Гаррика Кузнеца, что строго
        соответствует условию о разных отправителе и получателе.
      dialogs: Диалоги содержат 5 реплик, что соответствует требованию от 5 до 10.
        В них подтверждается получение груза и выдача награды за успешную доставку.
    enemy_to_face:
      amount: Выбрано 1 противник, чтобы столкновение было посильным для игрока первого
        уровня и не делало квест чрезмерно опасным.
      dialogs: Диалоги содержат 5 реплик, что соответствует требованию от 5 до 10.
        Реплики оформлены от лица противника и описывают засаду на дороге после добычи
        ресурса.
      enemy: Выбран Гоблин-вор ранга 1, потому что это противник стартовой сложности,
        подходящий игроку с Деревянным мечом, 100 здоровья и без брони.
    resource_to_deliver:
      amount: Выбрано количество 4, так как для стартового игрока 1 уровня без брони
        это умеренный и реалистичный объем для первого квеста доставки.
      character: Выбран Гаррик Кузнец, потому что он существует в игровом мире, находится
        в Королевской столице и может принимать для поручений ресурс Уголь.
      dialogs: 'Диалоги содержат 6 реплик, что соответствует требованию от 5 до 10.
        В них логично объясняется задача на доставку: Гаррик Кузнец просит сначала
        добыть ресурс, а затем отнести его другому персонажу.'
      resource: Выбран ресурс Уголь, потому что он доступен персонажу Гаррик Кузнец,
        а для его добычи нужен инструмент ранга 1. У игрока уже есть Деревянная кирка
        ранга 1, значит задание выполнимо.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 4 куска угля
    с помощью кирки и доставить груз Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Так это ты доставил груз от столичного кузнеца?
        speaker: Лорд Дрейк
      - remark: Уголь прибыл вовремя. Без него замковая кузня встала бы до ночи.
        speaker: Лорд Дрейк
      - remark: Вижу, путь был не совсем спокойным, но ты справился.
        speaker: Лорд Дрейк
      - remark: За такую службу награда будет честной.
        speaker: Лорд Дрейк
      - remark: Прими это оружие. Для следующей дороги оно послужит тебе лучше дерева.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Человек тащит полезное!
        speaker: Гоблин-вор
      - remark: Отдавай уголь, пока цел!
        speaker: Гоблин-вор
      - remark: Мы заберем груз и продадим его!
        speaker: Гоблин-вор
      - remark: Мелкий путник, тебе не пройти!
        speaker: Гоблин-вор
      - remark: Парни, окружай!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 4
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, мне нужен простой, но полезный груз для дела.
        speaker: Гаррик Кузнец
      - remark: В столице всегда не хватает топлива для горнов, а хороший уголь сейчас
          на вес серебра.
        speaker: Гаррик Кузнец
      - remark: Возьми свою деревянную кирку и добудь немного угля.
        speaker: Гаррик Кузнец
      - remark: Мне не нужно много — всего 4 куска, чтобы растопить печь и закончить
          работу.
        speaker: Гаррик Кузнец
      - remark: Но не неси его обратно мне.
        speaker: Гаррик Кузнец
      - remark: Отнеси уголь Лорду Дрейку в Высокий Замок. Ему нужен срочный запас
          для замковой кузни.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
