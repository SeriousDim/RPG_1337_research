quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран потому, что он существует в Высоком
        Замке и может принимать Уголь. Он отличается от Гаррика Кузнеца, что строго
        удовлетворяет требованию о разных персонажах отправителя и получателя.
      dialogs: Диалоги содержат 5 реплик, что соответствует требованию от 5 до 10.
        В них участвует только существующий персонаж Лорд Дрейк, а содержание связано
        именно с приемом угля и выдачей награды.
    enemy_to_face:
      amount: Количество противников установлено в 1, так как у игрока базовое оружие
        с уроном по 1 врагу и отсутствует броня. Это делает встречу опасной, но реалистично
        проходимой.
      dialogs: Диалоги содержат 5 реплик, что соответствует требованию от 5 до 10.
        Все реплики принадлежат существующему противнику Гоблин-вор и тематически
        связаны с попыткой перехватить груз после добычи.
      enemy: 'Гоблин-вор выбран как противник ранга 1. Это строго согласуется с силой
        игрока: у него деревянный меч ранга 1 и нет брони, поэтому враг стартового
        ранга является уместным.'
    resource_to_deliver:
      amount: Количество 6 выбрано как стартовое и посильное для игрока 1 уровня без
        брони, чтобы квест оставался доступным и не перегружал начальный прогресс.
      character: Гаррик Кузнец выбран потому, что он существует в Королевской столице
        и может принимать Уголь для доставки или сбора. Это полностью соответствует
        данным мира.
      dialogs: 'Диалоги содержат 6 реплик, что соответствует требованию от 5 до 10.
        В репликах используется только существующий персонаж Гаррик Кузнец, существующий
        ресурс Уголь и логичная для мира мотивация: кузнечное дело и поставка топлива.'
      resource: Уголь выбран потому, что это существующий ресурс типа руда с min_instrument_rank
        1. У игрока есть Деревянная кирка ранга 1, значит он действительно может добыть
        этот ресурс.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков угля
    и доставить их Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Так это ты доставил уголь от Гаррика?
        speaker: Лорд Дрейк
      - remark: Вовремя. В замке нельзя допустить, чтобы кузни остыли.
        speaker: Лорд Дрейк
      - remark: Вижу, груз цел и ничего не потеряно.
        speaker: Лорд Дрейк
      - remark: За такую службу я распоряжусь выдать тебе оружие получше.
        speaker: Лорд Дрейк
      - remark: Прими награду и продолжай служить королевству так же исправно.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай уголь, человек!
        speaker: Гоблин-вор
      - remark: Мы видели, как ты вышел с добычей!
        speaker: Гоблин-вор
      - remark: Уголь можно продать, а тебя оставить в канаве!
        speaker: Гоблин-вор
      - remark: Парни, окружайте его!
        speaker: Гоблин-вор
      - remark: Либо бросай мешок, либо получишь ножом!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. Мне нужен уголь для кузни, а подмастерья опять где-то
          пропали.
        speaker: Гаррик Кузнец
      - remark: С твоей деревянной киркой ты как раз справишься с такой работой.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков угля. Этого хватит, чтобы разжечь горн на весь день.
        speaker: Гаррик Кузнец
      - remark: Но сам уголь не мне неси.
        speaker: Гаррик Кузнец
      - remark: Отнеси добычу Лорду Дрейку в Высокий Замок. Ему срочно нужен запас
          для замковых кузнецов.
        speaker: Гаррик Кузнец
      - remark: Работа несложная, но дорога длинная. Не растеряй груз по пути.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Меч с бриллиантом
