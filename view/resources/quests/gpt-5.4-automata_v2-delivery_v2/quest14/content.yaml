quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь из Деревни Речных Лугов, потому что
        она существует в мире, отличается от Гаррика Кузнеца, и тематически правдоподобно
        использует уголь для котлов и сушилен. Награда Каменный меч доступна у неё
        в списке выдаваемых предметов и отсутствует у игрока в инвентаре, поэтому
        выдача строго допустима.
      dialogs: Диалогов 5, что соответствует требованию. Они логично завершают именно
        доставку ресурса и вручение награды.
    enemy_to_face:
      amount: Количество противников равно 1, так как у игрока слабое стартовое оружие
        без брони, и один противник ранга 1 сохраняет честный баланс.
      dialogs: Диалогов 5, что соответствует ограничению. Использован только допустимый
        противник из мира. Реплики описывают засаду после добычи ресурса, что соответствует
        структуре квеста.
      enemy: Выбран Гоблин-вор, потому что это противник ранга 1. Игрок имеет 100
        здоровья и Деревянный меч ранга 1, поэтому столкновение остаётся уместным
        для стартового персонажа.
    resource_to_deliver:
      amount: Выбрано количество 6 как стартовое, посильное для игрока 1 уровня задание
        на доставку без перегруза сложности.
      character: Выбран Гаррик Кузнец из Королевской столицы, потому что он существует
        в списке персонажей и может работать с ресурсом Уголь, доступным игроку на
        старте.
      dialogs: Диалоги построены вокруг персонажа Гаррик Кузнец, который существует
        в мире и принимает/отправляет задания, связанные с углём. Количество реплик
        равно 6, что укладывается в требование от 5 до 10. Реплики объясняют задачу,
        место добычи и маршрут доставки без нарушения логики мира.
      resource: Выбран ресурс Уголь, так как игрок уже имеет Деревянную кирку ранга
        1, а Уголь требует min_instrument_rank 1. Это строго соответствует возможностям
        игрока.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков угля
    киркой и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Так вот откуда Гаррик прислал помощь. Вижу, уголь действительно свежедобытый.
        speaker: Лира Лекарь
      - remark: Мои печи почти остыли, а без жара не сварить ни настои, ни лечебные
          отвары.
        speaker: Лира Лекарь
      - remark: Ты проделал путь не зря. Передай Гаррику, что я помню его услугу.
        speaker: Лира Лекарь
      - remark: А тебе дам надёжный клинок. С ним в дороге будет куда безопаснее.
        speaker: Лира Лекарь
      - remark: Держи Каменный меч и возвращайся, если захочешь работы посерьёзнее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Шур-шур, добытчик! Тащи сюда мешок, блестящий камень теперь мой!
        speaker: Гоблин-вор
      - remark: Уголь тоже можно выгодно сбыть, а ты выглядишь слишком зелёным, чтобы
          спорить.
        speaker: Гоблин-вор
      - remark: Бросай груз и, может быть, уйдёшь без синяков!
        speaker: Гоблин-вор
      - remark: Это груз по поручению. Дорогу не уступлю.
        speaker: Игрок
      - remark: Тогда кошелька не получу, зато меч твой заберу!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, вижу при тебе деревянная кирка. Как раз есть дело по
          твоей руке.
        speaker: Гаррик Кузнец
      - remark: Мне нужен уголь для кузни, а мои подмастерья разбежались по столице.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков угля и неси их не мне, а Лире Лекарю в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Она просила топливо для своих котлов и сушилен, а у меня с ней старый
          уговор.
        speaker: Гаррик Кузнец
      - remark: Уголь можно добыть киркой в Одуванчиковой Поляне. С твоим инструментом
          ты справишься.
        speaker: Гаррик Кузнец
      - remark: Сделаешь всё как надо — получишь вещь получше стартового снаряжения.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
