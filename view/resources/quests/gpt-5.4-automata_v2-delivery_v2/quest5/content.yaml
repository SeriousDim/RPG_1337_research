quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что она существует в Деревне
        Речных Лугов и логично подходит как получатель травы. Она отличается от персонажа,
        выдавшего поручение, что соответствует обязательному требованию структуры.
        Награда Каменный меч допустима, так как такого предмета у игрока еще нет в
        инвентаре и броне.
      dialogs: Диалоги состоят из 5 реплик, что соответствует ограничению от 5 до
        10. Все реплики принадлежат Лире Лекарю, существующему персонажу мира. Диалог
        завершает именно доставку ресурса и вручение награды.
    enemy_to_face:
      amount: Количество 1 выбрано из соображений баланса. У игрока нет брони, поэтому
        один противник ранга 1 создает напряжение, но не делает квест чрезмерно опасным.
      dialogs: Диалоги состоят из 5 реплик, что соответствует ограничению от 5 до
        10. Противник говорит реплики сам, без добавления несуществующих персонажей.
        Реплики подходят для случайной стычки после сбора ресурса.
      enemy: 'Выбран Гоблин-вор, потому что это противник ранга 1 с умеренными характеристиками.
        Он согласован с силой игрока: у игрока 100 здоровья и деревянный меч ранга
        1, поэтому встреча с одним противником такого уровня допустима.'
    resource_to_deliver:
      amount: Количество 5 выбрано как стартовый, безопасный и уместный объем для
        игрока 1 уровня с базовым инструментом и без брони.
      character: Выбран Гаррик Кузнец, потому что он может принимать задания, связанные
        с ресурсом Одуванчик ранга 1, который доступен игроку с текущей деревянной
        лопатой ранга 1.
      dialogs: Диалоги состоят из 6 реплик, что соответствует ограничению от 5 до
        10. Все реплики принадлежат Гаррику Кузнецу, который существует в игровом
        мире и находится в Королевской столице. Содержание диалога объясняет задачу
        на сбор и доставку без нарушения логики мира.
      resource: Выбран ресурс Одуванчик, потому что он существует в мире, доступен
        для сбора лопатой, требует минимальный ранг инструмента 1 и подходит текущему
        снаряжению игрока.
  objective_description: Получить поручение у Гаррика Кузнеца, собрать 5 одуванчиков
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Так это ты принес одуванчики от Гаррика?
        speaker: Лира Лекарь
      - remark: Отлично, именно свежих стеблей мне и не хватало.
        speaker: Лира Лекарь
      - remark: Вижу, дорога была не совсем спокойной.
        speaker: Лира Лекарь
      - remark: Но груз цел, а значит ты справился.
        speaker: Лира Лекарь
      - remark: Возьми это в награду. Для начинающего путника вещь полезная.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай добычу!
        speaker: Гоблин-вор
      - remark: Мелкий сборщик, тебе это не нужно!
        speaker: Гоблин-вор
      - remark: Сейчас заберу траву и меч заодно!
        speaker: Гоблин-вор
      - remark: Попробуй отбиться, если сможешь!
        speaker: Гоблин-вор
      - remark: Речных Лугов тебе не видать!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, мне нужен небольшой груз для мастерской.
        speaker: Гаррик Кузнец
      - remark: Сходи на Одуванчиковую Поляну и собери 5 одуванчиков.
        speaker: Гаррик Кузнец
      - remark: Твоя деревянная лопата подойдет для такой работы.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь, не неси их обратно мне.
        speaker: Гаррик Кузнец
      - remark: Отнеси одуванчики Лире Лекарю в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Она ждет свежую траву для своих снадобий.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Каменный меч
