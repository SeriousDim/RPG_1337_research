quest:
  explanation:
    destination:
      character_to_deliver: Выбран Кузнец Роган, потому что он существует в Королевской
        столице, отличается от Гаррика Кузнеца, и также связан с Углем через список
        допустимых ресурсов для получения. Это делает квест именно доставкой между
        двумя разными персонажами, как и требуется.
      dialogs: Финальные реплики подтверждают прием доставки и выдачу награды. Все
        реплики принадлежат существующему персонажу мира. Количество реплик равно
        5, что соответствует требованию по числу диалоговых вхождений.
    enemy_to_face:
      amount: Количество врагов равно 1, чтобы столкновение оставалось посильным для
        персонажа без брони и с базовым оружием.
      dialogs: Диалоги противника оформлены как короткая дорожная стычка после добычи
        ресурса. Реплики принадлежат только существующему врагу и не вводят новых
        сущностей. Всего 5 реплик, что строго укладывается в требование.
      enemy: 'Выбран Гоблин-вор, потому что это противник ранга 1 с умеренными характеристиками,
        соответствующий силе игрока: у игрока 100 здоровья и Деревянный меч ранга
        1, а бой с одним врагом ранга 1 не выбивается из стартового баланса.'
    resource_to_deliver:
      amount: 'Количество 6 выбрано как безопасный и уместный объем для стартового
        квеста доставки: задача не слишком мала, чтобы быть пустой, и не слишком велика
        для новичка без брони.'
      character: Выбран Гаррик Кузнец, потому что он существует в Королевской столице
        и может принимать Уголь для заданий на сбор или доставку. Это полностью согласуется
        с данными мира.
      dialogs: Диалоги построены вокруг простого и логичного стартового поручения
        для игрока 1 уровня. В них прямо указано, что нужен Уголь, что текущая Деревянная
        кирка подходит для добычи, и что ресурс нужно не возвращать заказчику, а доставить
        другому персонажу. Количество реплик равно 6, что соответствует ограничению
        от 5 до 10.
      resource: 'Выбран ресурс Уголь, потому что он доступен игроку уже сейчас: для
        него требуется кирка минимального ранга 1, а у игрока есть Деревянная кирка
        ранга 1.'
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков Угля
    и доставить их Кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Так вот где моя поставка. Гаррик не подвел.
        speaker: Кузнец Роган
      - remark: Уголь хорошего качества. Из такого жар выходит ровный.
        speaker: Кузнец Роган
      - remark: Для первого поручения ты справился достойно.
        speaker: Кузнец Роган
      - remark: Возьми это. Инструмент получше всегда полезнее лишних слов.
        speaker: Кузнец Роган
      - remark: Если продолжишь в том же духе, тебе скоро доверят работу сложнее.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай добычу, человек!
        speaker: Гоблин-вор
      - remark: Уголь тоже ценность. Продам его и куплю нож!
        speaker: Гоблин-вор
      - remark: Не хочешь по-хорошему — придется отобрать!
        speaker: Гоблин-вор
      - remark: Ты медленный. Я быстрее и хитрее!
        speaker: Гоблин-вор
      - remark: Мешок оставь, а сам можешь идти!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, подойди ближе. Мне нужен надежный человек для простой
          доставки.
        speaker: Гаррик Кузнец
      - remark: В Королевской столице с углем сейчас туго, а без него кузня быстро
          стынет.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков Угля. Твоя Деревянная кирка для такого дела годится.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь все, не неси ко мне обратно.
        speaker: Гаррик Кузнец
      - remark: Отнеси уголь Кузнецу Рогану в Королевской столице. Он ждет поставку
          для важной работы.
        speaker: Гаррик Кузнец
      - remark: Дело не слишком опасное, но на дорогах держи меч наготове.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
