quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что она существует в мире,
        отличается от Гаррика Кузнеца, находится в другой основной локации и сюжетно
        подходит как получатель угля для печей и отваров.
      dialogs: Диалогов 5, что соответствует требованию от 5 до 10. Реплики подтверждают
        доставку именно запрошенного ресурса и завершают квест наградой.
    enemy_to_face:
      amount: 'Количество 1 выбрано для баланса: у игрока 100 здоровья, нет брони,
        и один противник ранга 1 делает встречу опасной, но посильной.'
      dialogs: Диалогов 5, что соответствует требованию от 5 до 10. Реплики отражают
        засаду после добычи ресурса и не вводят сущности вне игрового мира.
      enemy: Выбран Гоблин-вор ранга 1, потому что это стартовый противник, согласованный
        с текущим оружием игрока — Деревянным мечом ранга 1.
    resource_to_deliver:
      amount: Количество 5 делает квест стартового уровня умеренным и подходящим для
        игрока 1 уровня без брони.
      character: Выбран Гаррик Кузнец, потому что он существует в мире, находится
        в Королевской столице и может принимать Уголь ранга 1, доступный игроку с
        Деревянной киркой ранга 1.
      dialogs: Диалогов 6, что соответствует требованию от 5 до 10. Реплики объясняют
        задачу, указывают доступный для игрока ресурс и логично подводят к доставке.
      resource: Выбран Уголь, так как это руда с требованием min_instrument_rank 1,
        а у игрока есть Деревянная кирка ранга 1. Ресурс существует в мире и связан
        с Одуванчиковой Поляной.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 5 кусков угля
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты от Гаррика? Я уже начала думать, что уголь до меня не дойдет.
        speaker: Лира Лекарь
      - remark: Вот 5 кусков угля. Дорога оказалась беспокойной, но груз цел.
        speaker: Игрок
      - remark: Прекрасно. Этого хватит, чтобы поддерживать огонь и готовить отвары.
        speaker: Лира Лекарь
      - remark: Гаррик не ошибся, отправив именно тебя.
        speaker: Лира Лекарь
      - remark: Возьми это в награду. Более крепкая лопата тебе скоро пригодится.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай добычу!
        speaker: Гоблин-вор
      - remark: Уголь можно продать, а тебя оставить в канаве!
        speaker: Гоблин-вор
      - remark: Ха, с деревянным мечом далеко не уйдешь!
        speaker: Гоблин-вор
      - remark: С дороги. Этот груз уже обещан.
        speaker: Игрок
      - remark: Тогда проверим, насколько крепко ты держишь слово!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, мне как раз нужен надежный человек для простой доставки.
        speaker: Гаррик Кузнец
      - remark: В окрестностях Одуванчиковой Поляны легко найти уголь, и твоя деревянная
          кирка для этого подходит.
        speaker: Гаррик Кузнец
      - remark: Добудь 5 кусков угля и неси их не мне, а Лире Лекарю в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Лира ждет топливо для своих печей и сушильных горшков.
        speaker: Гаррик Кузнец
      - remark: Работа несложная, но дорогу все равно держи крепко.
        speaker: Гаррик Кузнец
      - remark: Если справишься, получишь достойный инструмент вместо твоего нынешнего.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
