quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что она существует в мире,
        находится в Деревне Речных Лугов и может принимать Железо и Подорожник как
        ресурсы для собственных заданий, а по сюжету текущего квеста выступает получателем
        поставки от Гаррика. Она отличается от персонажа, который выдал поручение,
        что обязательно по условиям. Награда Каменный меч допустима, потому что такой
        предмет есть среди возможных наград мира, он соответствует ранней прогрессии
        и отсутствует у игрока в инвентаре и экипировке.
      dialogs: 'Диалог доставки содержит 5 реплик, что соответствует требованию. Он
        логически завершает цепочку: Гаррик отправляет ресурс не себе, а Лире. В тексте
        не вводятся новые сущности вне предоставленного набора.'
    enemy_to_face:
      amount: Выбрано 1 существо, потому что у игрока стартовое оружие с уроном 2
        по одной цели, нет брони и нулевая сессионная статистика. Большее число врагов
        сделало бы квест слишком затяжным и рискованным для начального состояния персонажа.
      dialogs: Диалоги содержат 5 реплик, что укладывается в ограничение от 5 до 10.
        Реплики принадлежат только существующему противнику из мира и тематически
        объясняют нападение после добычи ресурса, что соответствует структуре квеста.
      enemy: 'Выбран Гоблин-вор, потому что это противник ранга 1 с умеренными характеристиками:
        24 здоровья и 3 урона за ход. Для игрока с 100 здоровья, деревянным мечом
        и без брони это опасный, но реалистично преодолимый враг.'
    resource_to_deliver:
      amount: Выбрано количество 6 как стартовое, умеренное и логичное для игрока
        1 уровня без брони. Объем задания достаточно ощутимый для квеста доставки,
        но не выглядит чрезмерным для начального этапа прогрессии.
      character: Выбран Гаррик Кузнец, потому что он существует в мире, находится
        в Королевской столице и может принимать для доставки или сбора Уголь. Это
        строго согласуется с его описанием.
      dialogs: Диалоги построены вокруг простого стартового поручения и соответствуют
        сеттингу фэнтезийного средневековья. Количество реплик находится в допустимом
        диапазоне от 5 до 10. В репликах нет сущностей, отсутствующих в игровом мире.
        Упомянуты только Гаррик Кузнец, Лира Лекарь, уголь, Одуванчиковая Поляна и
        доступные игроку инструменты.
      resource: Выбран ресурс Уголь, потому что он доступен персонажу Гаррик Кузнец,
        существует в списке ресурсов мира и требует кирку ранга 1. У игрока есть Деревянная
        кирка ранга 1, значит добыча возможна.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 6 кусков угля
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Так вот где моя поставка от Гаррика.
        speaker: Лира Лекарь
      - remark: Уголь мне нужен для жаровен, на которых я сушу травы и грею отвары.
        speaker: Лира Лекарь
      - remark: Шесть кусков на месте, все верно.
        speaker: Лира Лекарь
      - remark: Для первого поручения ты справился очень надежно.
        speaker: Лира Лекарь
      - remark: Возьми это в награду. С каменным мечом дорога станет куда безопаснее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай камни, человек!
        speaker: Гоблин-вор
      - remark: Мы давно следим за тропой от Поляны!
        speaker: Гоблин-вор
      - remark: Уголь тоже сойдет, продадим в ночи!
        speaker: Гоблин-вор
      - remark: Не хочешь по-хорошему — снимем мешок с тебя сами!
        speaker: Гоблин-вор
      - remark: Парни, окружай его!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, вижу у тебя есть деревянная кирка. Как раз нужен человек
          для простой доставки.
        speaker: Гаррик Кузнец
      - remark: Мне не хватает угля для горнов, а самому отлучаться из кузницы нельзя.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков угля в Одуванчиковой Поляне. Для такой руды твоей
          деревянной кирки хватит.
        speaker: Гаррик Кузнец
      - remark: Но не неси их обратно мне. Отвези груз сразу Лире Лекарю в Деревню
          Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Лира меня уже ждет с поставкой для своих жаровен и настоек.
        speaker: Гаррик Кузнец
      - remark: Справишься с дорогой и доставкой — получишь достойный инструмент.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
