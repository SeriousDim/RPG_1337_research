quest:
  explanation:
    destination:
      character_to_deliver: Кузнец Роган выбран получателем, потому что он отличается
        от Гаррика Кузнеца, находится в том же существующем мире и тематически связан
        с обработкой угля как кузнец. Это строго соответствует требованию, что отправитель
        и получатель должны различаться.
      dialogs: Финальный диалог подтверждает передачу ресурса, завершение логистической
        части задания и вручение награды. Используется только существующий персонаж
        Кузнец Роган. Количество реплик равно 5, что соответствует требованию.
    enemy_to_face:
      amount: Указан 1 противник, поскольку у игрока стартовое оружие с уроном по
        1 врагу, нет брони, и квест не должен быть чрезмерно сложным на первом уровне.
      dialogs: Диалоги врага сделаны короткими и звериными, чтобы соответствовать
        Пещерной крысе как существу без развитой речи. Количество реплик равно 5,
        что укладывается в требуемый диапазон.
      enemy: Выбрана Пещерная крыса, потому что это противник ранга 1 с минимальным
        уроном 2 и здоровьем 20. Для игрока с 100 здоровья и Деревянным мечом это
        безопасная и логичная встреча после добычи ресурса.
    resource_to_deliver:
      amount: 'Количество 5 выбрано как стартовый объем для первого уровня игрока:
        задача остается посильной, не перегружает ранний прогресс и подходит для квеста
        доставки.'
      character: Гаррик Кузнец выбран как начальный квестодатель, потому что он находится
        в Королевской столице и может принимать уголь ранга 1, который доступен игроку
        с деревянной киркой ранга 1.
      dialogs: 'Диалоги построены вокруг простой и понятной для стартового этапа задачи
        доставки. В них используется только существующий персонаж Гаррик Кузнец, а
        также упоминаются только доступные игроку сущности: уголь, деревянная кирка,
        Королевская столица и Одуванчиковая Поляна. Количество реплик равно 6, что
        соответствует требованию от 5 до 10.'
      resource: Выбран ресурс Уголь, потому что он требует кирку минимум 1 ранга,
        а у игрока уже есть Деревянная кирка ранга 1. Это полностью согласуется с
        логикой мира.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 5 кусков угля
    и доставить их Кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Так это ты принес поставку от Гаррика?
        speaker: Кузнец Роган
      - remark: Хм, уголь хороший, сухой и ровный. Для печей сгодится отлично.
        speaker: Кузнец Роган
      - remark: Вижу, поручение ты выполнил без обмана и потерь.
        speaker: Кузнец Роган
      - remark: Королевской столице нужны такие надежные руки.
        speaker: Кузнец Роган
      - remark: Держи награду. Этот щит тебе сейчас пригодится больше всего.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Скриии!
        speaker: Пещерная крыса
      - remark: Скррр... уголь... скрии!
        speaker: Пещерная крыса
      - remark: Шшшрр!
        speaker: Пещерная крыса
      - remark: Скриии!
        speaker: Пещерная крыса
      - remark: Шррр!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, у меня есть мирное дело, как раз по твоим силам.
        speaker: Гаррик Кузнец
      - remark: Мне нужен уголь для горна, а запасы в столице почти вышли.
        speaker: Гаррик Кузнец
      - remark: С твоей деревянной киркой ты сможешь добыть его без лишнего риска.
        speaker: Гаррик Кузнец
      - remark: Сходи в Одуванчиковую Поляну и принеси 5 кусков угля.
        speaker: Гаррик Кузнец
      - remark: Когда добудешь, отнеси уголь не мне, а Кузнецу Рогану в Королевской
          столице.
        speaker: Гаррик Кузнец
      - remark: Скажи, что это срочная поставка для королевских мастерских.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
