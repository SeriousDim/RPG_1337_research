quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь из Деревни Речных Лугов, потому что
        она существует в мире, отличается от персонажа-отправителя, а также тематически
        подходит для получения угля как топлива для настоев. Это соблюдает обязательное
        требование различия между выдающим и принимающим персонажем.
      dialogs: Диалоги в пункте назначения подтверждают получение груза, связывают
        сюжетно Гаррика и Лиру и вручают награду. Количество реплик равно 5, что строго
        соответствует требованию.
    enemy_to_face:
      amount: Количество противников равно 2, чтобы встреча ощущалась как событие
        на маршруте доставки, но при этом не была чрезмерной для персонажа 1 уровня
        без брони.
      dialogs: Диалоги врагов отражают засаду после добычи ресурса и не выходят за
        рамки мира. Использованы только реплики Гоблина-вора. Количество реплик равно
        5, что соответствует требованию от 5 до 10.
      enemy: Выбран Гоблин-вор, потому что это противник 1 ранга, существующий в мире.
        Для игрока с Деревянным мечом это опасный, но уместный ранний враг.
    resource_to_deliver:
      amount: Количество 6 выбрано как стартовое и посильное для игрока без брони
        и с начальными инструментами. Объем достаточно заметный для квеста доставки,
        но не чрезмерный для раннего этапа.
      character: Выбран Гаррик Кузнец из Королевской столицы, потому что он присутствует
        в списке персонажей мира и может выдавать задания, связанные с Углем. Это
        логично для стартового игрока первого уровня.
      dialogs: Диалоги построены вокруг поручения на добычу и последующую доставку
        ресурса. Использован персонаж Гаррик Кузнец, который существует в мире и может
        принимать Уголь. Количество реплик равно 6, что строго попадает в допустимый
        диапазон от 5 до 10.
      resource: Выбран ресурс Уголь, потому что он существует в мире, принимается
        Гарриком Кузнецом, и для его добычи требуется кирка минимум 1 ранга. У игрока
        уже есть Деревянная кирка 1 ранга, значит требование полностью соблюдено.
  objective_description: Добудьте 6 кусков угля для Гаррика Кузнеца в Королевской
    столице и доставьте их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты пришел из столицы? Гаррик все-таки прислал уголь?
        speaker: Лира Лекарь
      - remark: Отлично. Без ровного жара мои отвары теряют силу.
        speaker: Лира Лекарь
      - remark: Вижу, ты сберег груз по дороге. Это уже говорит о сноровке.
        speaker: Лира Лекарь
      - remark: Прими от меня каменный меч. Он надежнее твоего нынешнего оружия.
        speaker: Лира Лекарь
      - remark: С таким клинком тебе будет легче справляться с будущими поручениями.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Блестит кирка, звенит мешок! Отдавай добычу!
        speaker: Гоблин-вор
      - remark: Путник с углем идет один, легкая нажива!
        speaker: Гоблин-вор
      - remark: Хватай мешки, пока он не дошел до деревни!
        speaker: Гоблин-вор
      - remark: Если хочешь пройти, сначала попробуй нас остановить!
        speaker: Гоблин-вор
      - remark: Уголь теперь наш!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. В столице уголь уходит быстрее, чем я успеваю разжигать
          горн.
        speaker: Гаррик Кузнец
      - remark: Мне нужен простой, но надежный запас топлива для работы.
        speaker: Гаррик Кузнец
      - remark: Возьми свою деревянную кирку и добудь 6 кусков угля.
        speaker: Гаррик Кузнец
      - remark: Такого ранга инструмента тебе хватит, а дело как раз по силам начинающему.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь уголь, неси его не мне.
        speaker: Гаррик Кузнец
      - remark: Доставь добычу Лире Лекарю в Деревню Речных Лугов. Ей нужен жар для
          варки настоев.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
