quest:
  explanation:
    destination:
      character_to_deliver: Выбран Кузнец Роган, потому что он существует в мире,
        отличается от Гаррика Кузнеца, находится в той же основной локации и логично
        связан с поставкой угля для кузницы.
      dialogs: Диалоги состоят из 5 реплик, что соответствует ограничению. В них подтверждается
        получение груза и выдача награды.
    enemy_to_face:
      amount: Количество противников равно 1, чтобы бой оставался проходимым для персонажа
        без брони и с оружием начального ранга.
      dialogs: Диалоги состоят из 5 реплик, что укладывается в обязательный диапазон.
        Они описывают нападение после добычи ресурса и не вводят никаких несуществующих
        сущностей.
      enemy: Выбран Гоблин-вор ранга 1, потому что это противник начального уровня,
        подходящий игроку с Деревянным мечом и полным запасом здоровья.
    resource_to_deliver:
      amount: Количество 5 выбрано как стартовое и реалистичное для игрока 1 уровня
        без брони и с базовым снаряжением.
      character: Выбран Гаррик Кузнец, потому что он существует в мире, находится
        в Королевской столице и может принимать Уголь ранга 1, доступный игроку.
      dialogs: Диалоги состоят из 6 реплик, что соответствует требованию от 5 до 10.
        В них прямо и логично объясняется задача на добычу и дальнейшую доставку ресурса
        без нарушения структуры мира.
      resource: Выбран Уголь, потому что игрок уже имеет Деревянную кирку ранга 1,
        а для добычи Угля требуется кирка минимум ранга 1.
  objective_description: Получить поручение у Гаррика Кузнеца, добыть 5 кусков угля
    и доставить их Кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Так вот и поставка. Вижу, уголь доставлен в срок.
        speaker: Кузнец Роган
      - remark: Для хорошего огня нужен надёжный уголь, а не сырые ветки.
        speaker: Кузнец Роган
      - remark: Гаррик не ошибся, поручив дело тебе.
        speaker: Кузнец Роган
      - remark: Возьми каменный меч. Он послужит тебе лучше деревянного клинка.
        speaker: Кузнец Роган
      - remark: Возвращайся, когда будешь готов к более серьёзным поручениям.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестящий мешок! Человек, оставь добычу и беги!
        speaker: Гоблин-вор
      - remark: Уголь можно выгодно сменять, а ты выглядишь слишком слабым, чтобы
          спорить.
        speaker: Гоблин-вор
      - remark: Отдавай мешок!
        speaker: Гоблин-вор
      - remark: Этот груз уже обещан. Дорогу я не уступлю.
        speaker: Игрок
      - remark: Тогда кошель и уголь будут моими после драки!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. Мне нужен простой, но полезный груз для столичных дел.
        speaker: Гаррик Кузнец
      - remark: Сходи на Одуванчиковую Поляну и добудь 5 кусков угля своей деревянной
          киркой.
        speaker: Гаррик Кузнец
      - remark: Уголь там обычный, ранга первого. Твоя кирка с такой работой справится.
        speaker: Гаррик Кузнец
      - remark: Когда соберёшь всё, не неси мне обратно.
        speaker: Гаррик Кузнец
      - remark: Отнеси уголь сразу Кузнецу Рогану в Королевской столице. Он ждёт поставку
          для горна.
        speaker: Гаррик Кузнец
      - remark: Работа несложная, но важная. Справишься — без награды не останешься.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
