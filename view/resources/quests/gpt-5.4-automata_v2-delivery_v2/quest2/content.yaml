quest:
  explanation:
    destination:
      character_to_deliver: Выбран Кузнец Роган, потому что он существует в Королевской
        столице и отличается от персонажа, выдавшего задание. Это строго соблюдает
        требование, что отправитель и получатель должны быть разными персонажами.
      dialogs: Диалоги в третьей части содержат 5 реплик, что соответствует требованию
        от 5 до 10. В них подтверждается доставка именно того ресурса, который был
        запрошен в первой части.
    enemy_to_face:
      amount: Количество врагов установлено в 1, так как у игрока стартовое оружие
        с уроном по 1 цели и отсутствует броня. Это сохраняет честный баланс и делает
        квест реалистично проходимым.
      dialogs: Диалоги во второй части содержат 5 реплик, что соответствует требованию
        от 5 до 10. Они описывают засаду после добычи ресурса и не вводят никаких
        сущностей вне заданного мира.
      enemy: Выбран Гоблин-вор, потому что это противник ранга 1 из списка врагов
        мира. Для игрока с Деревянным мечом, 100 здоровья и без брони это подходящий
        по сложности противник.
    resource_to_deliver:
      amount: Количество 6 выбрано как стартовое и безопасное для игрока 1 уровня
        без брони. Это делает квест выполнимым и не перегружает начальную сессию.
      character: Выбран Гаррик Кузнец, потому что он существует в мире игры, находится
        в Королевской столице и может принимать для заданий ресурс Уголь.
      dialogs: Диалоги в первой части содержат 6 реплик, что соответствует требованию
        от 5 до 10. Они логично объясняют задачу на доставку, указывают ресурс, адресата
        и подчеркивают, что у игрока уже есть подходящий инструмент — Деревянная кирка
        ранга 1.
      resource: Выбран Уголь, потому что это допустимый ресурс у Гаррика Кузнеца,
        а для его добычи требуется кирка минимум 1 ранга. У игрока есть Деревянная
        кирка ранга 1, значит задание строго совместимо с его текущими возможностями.
  objective_description: Получить у Гаррика Кузнеца задание, добыть 6 кусков Угля
    с помощью Деревянной кирки и доставить их Кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Так, вижу следы шахтной пыли. Ты от Гаррика?
        speaker: Кузнец Роган
      - remark: Да. Я принес 6 кусков Угля по его поручению.
        speaker: Игрок
      - remark: Отлично. Именно этого мне не хватало для работы у горна.
        speaker: Кузнец Роган
      - remark: Гаррик умеет выбирать людей. Даже после дороги груз в порядке.
        speaker: Кузнец Роган
      - remark: За такую службу держи награду. Щит тебе сейчас пригодится больше всего.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Блестит мешок! Отдавай добычу, человек!
        speaker: Гоблин-вор
      - remark: Уголь можно выгодно сменять, а мне как раз нечем платить.
        speaker: Гоблин-вор
      - remark: Если не отдашь сам, мы заберем силой!
        speaker: Гоблин-вор
      - remark: Я несу этот груз по поручению. Отойдите с дороги.
        speaker: Игрок
      - remark: Поздно говорить. Сейчас проверим твой деревянный меч!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок, подойди ближе. Мне нужен надежный человек для простой
          доставки.
        speaker: Гаррик Кузнец
      - remark: В столице уголь уходит быстро, а мои запасы почти опустели.
        speaker: Гаррик Кузнец
      - remark: Добудь 6 кусков Угля. Твоя Деревянная кирка для такой работы подходит.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь все, отнеси уголь Рогану, он тоже работает в Королевской
          столице.
        speaker: Гаррик Кузнец
      - remark: Не перепутай адресата. Мне нужна именно доставка, не возврат сюда.
        speaker: Гаррик Кузнец
      - remark: Справишься с этим делом аккуратно — получишь достойную вещь для следующего
          похода.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
