quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь (Деревня Речных Лугов) выбрана как получатель;
        она отличается от выдающего квест Гаррика, как требуется, и находится в существующей
        локации мира.
      dialogs: Лира Лекарь тематически оправдывает потребность в угле (очаг/прогрев),
        подтверждает, что игрок принёс нужное, и завершает квест выдачей награды.
    enemy_to_face:
      amount: 1 противник — минимальная обязательная встреча, чтобы не перегрузить
        новичка без брони.
      dialogs: 'Реплики противника мотивируют засаду после добычи (логично: добыча
        привлекает вора) и не вводят сущностей вне списка.'
      enemy: Гоблин-вор выбран из списка врагов ранга 1 — это соответствует уровню
        игрока и его Деревянному мечу.
    resource_to_deliver:
      amount: Количество 8 задано как ощутимая, но стартовая норма для обучающего
        квеста доставки, без выхода за рамки раннего прогресса.
      character: Выбран Гаррик Кузнец (Королевская столица) — он принимает Уголь и
        Одуванчик при min_instrument_rank 1, что соответствует экипировке игрока (Деревянная
        кирка ранга 1).
      dialogs: 'Диалог выстроен вокруг запроса на уголь и логично объясняет, почему
        игроку (1 уровень, без брони) дают безопасную задачу добычи: ресурс доступен
        при ранге инструмента 1. Также явно задано, что доставка идёт не обратно к
        заказчику, а другому NPC.'
      resource: Уголь — руда с min_instrument_rank 1; присутствует в мире и в списках
        принимаемых ресурсов у Гаррика.
  objective_description: Добыть 8 единиц Угля в Одуванчиковой Поляне и доставить их
    Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Тише… не пугай людей в доме исцеления. Ты от Гаррика?
        speaker: Лира Лекарь
      - remark: Уголь? Отлично. Нам нужен ровный жар — для прогрева трав и облегчения
          боли.
        speaker: Лира Лекарь
      - remark: Положи мешок у очага. Я проверю — сухой, как надо.
        speaker: Лира Лекарь
      - remark: Скажи Гаррику, что столица может ковать, а мы — лечить. И то, и другое
          держит королевство.
        speaker: Лира Лекарь
      - remark: Держи награду. С таким клинком ты быстрее расчистишь себе путь, если
          дорога снова станет злой.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о, чёрные камушки! Давай сюда — гоблину нужнее!
        speaker: Гоблин-вор
      - remark: Ты один? Тогда проще простого!
        speaker: Гоблин-вор
      - remark: Отдай мешок — уйдёшь целым!
        speaker: Гоблин-вор
      - remark: Не отдаёшь? Тогда я сам возьму!
        speaker: Гоблин-вор
      - remark: Гоблин быстрый, гоблин ловкий!
        speaker: Гоблин-вор
      - remark: Ладно-ладно… но я ещё вернусь!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник. В столице металл на вес слова, а мне нужен жар — много
          жара.
        speaker: Гаррик Кузнец
      - remark: 'Сходи в Одуванчиковую Поляну: там уголь залегает неглубоко, кирки
          хватит и деревянной.'
        speaker: Гаррик Кузнец
      - remark: Добывай аккуратно — мне важен сухой уголь, без грязи и каменной крошки.
        speaker: Гаррик Кузнец
      - remark: Соберёшь — не тащи сюда. Отнеси сразу Лире Лекарю в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Она ждёт уголь для прогревов и настоев. Скажи, что это от Гаррика.
        speaker: Гаррик Кузнец
      - remark: Принесёшь — я не забуду. Вещь получше дерева тебе пригодится.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
