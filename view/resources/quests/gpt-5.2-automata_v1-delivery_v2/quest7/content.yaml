quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как отличающийся от Гаррика получатель
        (обязательное условие). Она существует в мире и связана с практическим использованием
        жара, что делает доставку правдоподобной.
      dialogs: Диалог у Лиры Лекаря (существующий персонаж в Деревне Речных Лугов)
        логично объясняет, зачем ей нужен уголь, и завершает доставку. 6 реплик —
        в допустимом диапазоне.
    enemy_to_face:
      amount: 1 противник — минимум по требованиям и адекватно силе игрока с Деревянным
        мечом (урон 2) и без брони.
      dialogs: Реплики противника добавляют напряжение сразу после добычи (типичный
        момент уязвимости при доставке), при этом используется только существующий
        враг. 5 реплик — в допустимом диапазоне.
      enemy: Гоблин-вор выбран как враг ранга 1 из списка enemies; он тематически
        подходит для попытки отнять добытый ресурс.
    resource_to_deliver:
      amount: Количество 8 задает ощутимую, но посильную цель для персонажа 1 уровня
        без брони, не требующую доступа к более высокоранговым зонам.
      character: 'Выбран Гаррик Кузнец, так как он уже существует и принимает Уголь
        (min_instrument_rank: 1), что соответствует инструменту игрока (Деревянная
        кирка ранга 1).'
      dialogs: Диалоги от Гаррика Кузнеца (существующий персонаж в Королевской столице)
        задают мотивацию и направляют игрока к месту добычи, не вводя новых сущностей
        и опираясь на дефицит ресурса, который он действительно принимает (Уголь).
        Количество реплик 6 — в допустимом диапазоне.
      resource: Уголь — ресурс руды, присутствует в мире и доступен при min_instrument_rank
        1, что строго соответствует текущей кирке игрока.
  objective_description: Добыть 8 единиц ресурса «Уголь» на Одуванчиковой Поляне и
    доставить его Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты принёс уголь? Отлично. У меня настойки требуют ровного жара.
        speaker: Лира Лекарь
      - remark: Гаррик часто забывает, что не один в поселении нуждается в огне.
        speaker: Лира Лекарь
      - remark: С этим углем я смогу прогреть отвар без копоти и резкого дыма.
        speaker: Лира Лекарь
      - remark: 'Передай кузнецу: в следующий раз пусть предупреждает заранее.'
        speaker: Лира Лекарь
      - remark: А тебе — спасибо. Руки у тебя, похоже, на месте.
        speaker: Лира Лекарь
      - remark: Держи награду. Пригодится, если снова полезешь в сырость и камни.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о, мешочек с черным камнем! Это теперь МОЕ!
        speaker: Гоблин-вор
      - remark: Отдай уголь — и уйдешь целым!
        speaker: Гоблин-вор
      - remark: Я быстрый! Ты даже не заметишь, как останешься с пустыми руками!
        speaker: Гоблин-вор
      - remark: Ну что, герой? Попробуй меня догони!
        speaker: Гоблин-вор
      - remark: Ладно-ладно! Только не бей! Но уголь я все равно хотел!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новенький. В кузнице закончился уголь — горн еле тлеет.
        speaker: Гаррик Кузнец
      - remark: Мне нужен свежий Уголь, иначе я не смогу держать заказ для столицы.
        speaker: Гаррик Кузнец
      - remark: Сходи на Одуванчиковую Поляну — там рядом выходы черного камня.
        speaker: Гаррик Кузнец
      - remark: Набери аккуратно, без примесей. Мне важно качество, а не куча мусора.
        speaker: Гаррик Кузнец
      - remark: Доставишь уголь — я отмечу тебя как надежного помощника.
        speaker: Гаррик Кузнец
      - remark: 'И не тяни: к вечеру горн должен работать.'
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
