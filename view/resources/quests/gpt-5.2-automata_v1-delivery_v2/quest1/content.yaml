quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, потому что она существует в мире,
        находится в Деревне Речных Лугов и логично связана с потребностью в тепле
        для настоев; при этом она отличается от персонажа-выдавателя (Гаррик Кузнец),
        как требуется.
      dialogs: Диалоги с Лирой Лекарем подтверждают, что ресурс доставлен по просьбе
        Гаррика, фиксируют приём угля и выдачу награды, не вводя новых сущностей вне
        мира.
    enemy_to_face:
      amount: 1 противник — безопасный и честный бой для персонажа без брони и со
        стартовым оружием, не нарушающий баланс.
      dialogs: Реплики «Гоблина-вора» тематически связаны с засадой после добычи и
        попыткой отобрать мешок с углём, подчёркивая риск именно на обратном пути.
      enemy: Выбран «Гоблин-вор», потому что это противник ранга 1 (соответствует
        стартовому уровню игрока) и он присутствует в списке врагов мира.
    resource_to_deliver:
      amount: Количество 6 — умеренный объём для персонажа 1 уровня и стартового инструмента;
        достаточно, чтобы квест ощущался как полноценная доставка, но без несоразмерного
        гринда.
      character: Выбран Гаррик Кузнец, потому что он существует в мире, находится
        в Королевской столице и принимает/оперирует ресурсами ранга 1, включая «Уголь».
      dialogs: Диалоги от Гаррика Кузнеца (Королевская столица) задают мотивацию доставки,
        уточняют, что нужен именно ресурс «Уголь», указывают подходящую точку добычи
        (Одуванчиковая Поляна) и сразу задают маршрут доставки к другому NPC — Лире
        Лекарю.
      resource: 'Выбран «Уголь», так как это ресурс руды с min_instrument_rank: 1;
        у игрока есть Деревянная кирка ранга 1, значит добыча строго возможна.'
  objective_description: Добыть 6 угля в Одуванчиковой Поляне и доставить его Лире
    Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты весь в пыли… Ты из столицы?
        speaker: Лира Лекарь
      - remark: 'Если это уголь от Гаррика, то ты пришёл вовремя: без жара мои настои
          не вытянуть.'
        speaker: Лира Лекарь
      - remark: Дай посмотрю… да, уголь хороший, сухой. Ровно то, что нужно.
        speaker: Лира Лекарь
      - remark: 'Передай Гаррику: долг я помню. А тебе — награда за дорогу и хлопоты.'
        speaker: Лира Лекарь
      - remark: 'И запомни: если по пути снова попадутся воришки — держи добычу крепче,
          чем оружие.'
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Шур-шур… Уголь блестит! Давай сюда мешок!
        speaker: Гоблин-вор
      - remark: Ты с киркой? Значит, в карманах есть что утащить!
        speaker: Гоблин-вор
      - remark: Тихо возьму — и никто не узнает… кроме тебя.
        speaker: Гоблин-вор
      - remark: Эй! Не геройствуй, отдай добычу — и разойдёмся!
        speaker: Гоблин-вор
      - remark: Ладно, ладно… но я не один такой на дорогах!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новобранец. В кузнице жару не хватает — уголь уходит быстрее,
          чем его привозят.
        speaker: Гаррик Кузнец
      - remark: Сможешь сходить в Одуванчиковую Поляну и добыть уголь? Твоей деревянной
          кирки для этого достаточно.
        speaker: Гаррик Кузнец
      - remark: Мне много не надо — принеси ровно 6 кусков, чтобы я успел закрыть
          срочные заказы.
        speaker: Гаррик Кузнец
      - remark: 'Не перепутай: нужен именно уголь, не железо и не камни.'
        speaker: Гаррик Кузнец
      - remark: С углём иди не ко мне, а в Деревню Речных Лугов — Лире Лекарю. Ей
          нужен жар для настоя.
        speaker: Гаррик Кузнец
      - remark: Скажи, что это от Гаррика из Королевской столицы. Тогда она отдаст
          тебе плату, а я останусь ей должен.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
