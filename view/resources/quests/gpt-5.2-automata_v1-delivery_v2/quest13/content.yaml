quest:
  explanation:
    destination:
      character_to_deliver: Страж Замка — существующий персонаж мира, отличается от
        выдающего задание (Гаррик Кузнец), что соблюдает обязательное условие. Локация
        Высокий Замок присутствует среди основных локаций.
      dialogs: Страж проверяет груз, принимает Уголь и фиксирует доставку — это прямо
        отражает цель «доставить ресурс». Диалог (5 реплик) укладывается в лимит.
    enemy_to_face:
      amount: 1 противник выбран как минимально допустимый и сбалансированный для
        стартового персонажа без брони.
      dialogs: Реплики подчёркивают мотив ограбления именно добытого ресурса, соответствуя
        типу квеста «Доставка» и не упоминая ничего отсутствующего в мире. Количество
        реплик (5) соответствует требованию.
      enemy: Гоблин-вор — враг ранга 1 из списка enemies, подходит по уровню угрозы
        игроку (100 HP, базовый меч).
    resource_to_deliver:
      amount: 'Выбрано 8 единиц: это ощутимая, но посильная норма для персонажа 1
        уровня без брони и с базовым снаряжением.'
      character: Гаррик Кузнец существует среди уже сгенерированных персонажей и находится
        в Королевской столице — это естественная точка выдачи задания для новичка.
      dialogs: 'Диалог выстроен вокруг нужды кузнеца в топливе: он логично просит
        добытый Уголь, предупреждает о срочности и рисках по дороге, не вводя сущностей
        вне мира. Количество реплик (5) укладывается в требование.'
      resource: Уголь — ресурс из списка мира; его можно добывать инструментом ранга
        1, что соответствует имеющейся у игрока Деревянной кирке (ранг 1).
  objective_description: Добыть 8 Угля и доставить их Стражу Замка в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Страж Замка
      dialogs:
      - remark: Стой. Что в мешке?
        speaker: Страж Замка
      - remark: Уголь? Хорошо. В замке сегодня перебои с отоплением кузницы караула.
        speaker: Страж Замка
      - remark: Гаррик опять экономит на поставках? Ладно, раз ты принёс — примем.
        speaker: Страж Замка
      - remark: Сложи мешок у решётки. Я отмечу доставку.
        speaker: Страж Замка
      - remark: 'Передай Гаррику: в следующий раз пусть присылает быстрее. Но тебе
          — честь за расторопность.'
        speaker: Страж Замка
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Чую-чуя! Чёрный камень! Отдай — и уйдёшь целым!
        speaker: Гоблин-вор
      - remark: Новые руки, новая добыча. Мешок сюда!
        speaker: Гоблин-вор
      - remark: Кирка? Меч? Всё заберу!
        speaker: Гоблин-вор
      - remark: Не геройствуй, человек — мои пальцы быстрее твоих шагов!
        speaker: Гоблин-вор
      - remark: Ладно, сам напросился!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. В горне у меня жар слабый — без топлива металл не слушается.
        speaker: Гаррик Кузнец
      - remark: Нужен свежий Уголь. Не из лавки, а добытый — он горит ровнее.
        speaker: Гаррик Кузнец
      - remark: С твоей деревянной киркой справишься, жила неглубокая.
        speaker: Гаррик Кузнец
      - remark: Достанешь — не задерживайся. Пока уголь сырой, он крошится в дороге.
        speaker: Гаррик Кузнец
      - remark: 'И еще: не вздумай нести мешок через оживлённые тропы — мелкие воришки
          любят лёгкую добычу.'
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
