quest:
  explanation:
    destination:
      character_to_deliver: 'Гаррик Кузнец выбран как получатель: он находится в Королевской
        столице и принимает для доставки/сбора Одуванчик и Уголь, но квестовая доставка
        допускает передачу собранного ресурса по сюжету; главное условие выполнено
        — получатель отличается от выдающего задание персонажа (Лира ≠ Гаррик). Награда
        «Каменный меч» отсутствует у игрока в инвентаре и является уместным улучшением
        ранга 2.'
      dialogs: Диалоги с Гарриком подтверждают факт доставки, объясняют почему именно
        он — надежная пересылка из столицы, и завершают квест выдачей награды.
    enemy_to_face:
      amount: Количество 1 — минимально допустимое и сбалансированное для игрока без
        брони и щита, чтобы столкновение было напряженным, но не наказывало чрезмерно.
      dialogs: Реплики противника мотивированы попыткой ограбления именно после сбора
        трав (типичная засада на добытчика). 5 реплик достаточно, чтобы обозначить
        угрозу и характер.
      enemy: Выбран Гоблин-вор (ранг 1) — он соответствует уровню игрока и стартовому
        оружию (Деревянный меч), не вводя сущностей вне списка врагов.
    resource_to_deliver:
      amount: 'Количество 6 рассчитано под начальный прогресс: это заметная, но посильная
        добыча на старте и хорошо подходит к квесту типа «Доставка» (сначала добыть,
        затем донести).'
      character: Выбран персонаж Лира Лекарь из Деревни Речных Лугов — она в мире
        принимает травы и логично выдает поручение, связанное с лечением.
      dialogs: 'Диалоги выстроены вокруг срочной медицинской нужды Лиры Лекаря и четко
        указывают: какой ресурс нужен, где его добыть (Подорожниковый Бор) и кому
        именно затем доставить (Гаррик Кузнец). Объем 6 задан как реалистичный для
        первого уровня и не требует высоких инструментов.'
      resource: 'Подорожник существует как ресурс травы в мире и принимается Лирой;
        у него min_instrument_rank: 1, что соответствует имеющимся у игрока деревянным
        инструментам ранга 1.'
  objective_description: Соберите 6 пучков Подорожника в Подорожниковом Бору и доставьте
    их Гаррику Кузнецу в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: От Лиры? Вижу, связки свежие — пахнут лесом, не пылью с дороги.
        speaker: Гаррик Кузнец
      - remark: Хорошо сделал, что донес целыми. В столице таких посылок часто не
          досчитываются.
        speaker: Гаррик Кузнец
      - remark: Я передам Подорожник дальше по караванной тропе — у меня тут свои
          люди.
        speaker: Гаррик Кузнец
      - remark: 'Лире скажешь: к вечеру травы будут у нее, как и договаривались.'
        speaker: Гаррик Кузнец
      - remark: Держи награду. Если хочешь жить подольше — присматривайся к металлу,
          не только к дереву.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о, травки! Лечиться будешь? Я тоже люблю лечиться... монетой!
        speaker: Гоблин-вор
      - remark: Давай мешок сюда, и разойдемся тихо.
        speaker: Гоблин-вор
      - remark: Не отдашь — утащу все равно, пока моргнешь!
        speaker: Гоблин-вор
      - remark: Эй, не махайся! Я быстрый!
        speaker: Гоблин-вор
      - remark: Ладно-ладно! Но я еще вернусь за такими вкусными пучками!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Лира Лекарь
      dialogs:
      - remark: Путник, мне срочно нужны простые целебные травы — в Деревне Речных
          Лугов заканчиваются запасы.
        speaker: Лира Лекарь
      - remark: Собери Подорожник — он неприхотлив, но помогает при порезах и жаре.
        speaker: Лира Лекарь
      - remark: 'Ищи его в Подорожниковом Бору: там трава крепче и чище, чем у дорог.'
        speaker: Лира Лекарь
      - remark: Мне нужно ровно 6 пучков. Не больше — лишнее завянет, не меньше —
          не хватит.
        speaker: Лира Лекарь
      - remark: Собирай аккуратно, корень не рви — пусть бор не пустеет.
        speaker: Лира Лекарь
      - remark: Когда соберешь, отнеси груз Гаррику Кузнецу в Королевскую столицу
          — он отправит траву по надежному пути.
        speaker: Лира Лекарь
      resource: Подорожник
  reward:
    item_name: Каменный меч
