quest:
  explanation:
    destination:
      character_to_deliver: Получатель отличается от выдающего задание персонажа (не
        Гаррик, а Лира), оба существуют в мире и находятся в разных локациях, что
        делает доставку осмысленным маршрутом.
      dialogs: Лира Лекарь логично использует уголь для сушильни трав; диалог подтверждает
        успешную доставку и связывает действие с потребностями поселения.
    enemy_to_face:
      amount: 1 противник — минимально безопасная встреча для игрока без брони и со
        стартовым уроном, сохраняя риск, но не превращая квест в бойню.
      dialogs: Реплики подчёркивают, что противник охотится за добычей на дороге после
        сбора ресурса; это создаёт короткую напряжённую сцену между добычей и доставкой,
        не вмешиваясь в описание цели квеста.
      enemy: Гоблин-вор выбран как противник ранга 1 из списка врагов, подходящий
        новичку с деревянным мечом.
    resource_to_deliver:
      amount: Количество 6 — ощутимая, но посильная норма для персонажа 1 уровня без
        брони; достаточно, чтобы квест воспринимался как полноценная доставка, а не
        мгновенное действие.
      character: 'Выбран Гаррик Кузнец из Королевской столицы: он принимает/заказывает
        Уголь и тематически связан с добычей топлива.'
      dialogs: Диалог выстроен вокруг бытовой нужды кузнеца в топливе и логично направляет
        игрока к подходящей локации с угольной рудой; упомянута проверка инструмента,
        чтобы игрок понимал, что его деревянной кирки достаточно.
      resource: 'Уголь присутствует в мире как руда с min_instrument_rank: 1, что
        соответствует имеющейся у игрока деревянной кирке (ранг 1).'
  objective_description: Добыть 6 кусков угля на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты принёс уголь? Отлично, сушильня сегодня должна работать без остановки.
        speaker: Лира Лекарь
      - remark: Травы нельзя пересушить и нельзя недосушить — нужен ровный жар.
        speaker: Лира Лекарь
      - remark: 'Гаррик сделал правильно, что отправил тебя: заодно проверишь дорогу.'
        speaker: Лира Лекарь
      - remark: С такими поставками мы переживём любой сезон болезней.
        speaker: Лира Лекарь
      - remark: Держи награду. Возвращайся, если захочешь более серьёзной работы.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: У-у, блестящие камешки в мешке! Отдай — мои!
        speaker: Гоблин-вор
      - remark: Ты думаешь, тебя не видно на тропе? Я всегда вижу добычу.
        speaker: Гоблин-вор
      - remark: 'Поделимся по-хорошему: ты отдаёшь всё, а я ухожу!'
        speaker: Гоблин-вор
      - remark: Не хочешь? Тогда я заберу силой!
        speaker: Гоблин-вор
      - remark: Гы! После драки я и меч твой утащу!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новенький. В горне жар слабый — уголь почти вышел.
        speaker: Гаррик Кузнец
      - remark: Мне нужен свежий уголь, иначе клинки получаются мягкими, как сырое
          дерево.
        speaker: Гаррик Кузнец
      - remark: Сходи на Одуванчиковую Поляну — там рядом есть выходы угольной жилы.
        speaker: Гаррик Кузнец
      - remark: Твоя деревянная кирка сгодится, ранг подходит.
        speaker: Гаррик Кузнец
      - remark: Набери ровно 6 кусков. Лишнее оставь себе или обменяешь потом.
        speaker: Гаррик Кузнец
      - remark: Когда добудешь — неси уголь Лире Лекарю в Деревню Речных Лугов. Она
          просила топливо для сушильни трав.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
