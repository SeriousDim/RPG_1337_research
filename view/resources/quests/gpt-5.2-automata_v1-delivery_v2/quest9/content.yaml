quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, потому что она принимает
        Уголь в своём списке приемки, при этом отличается от персонажа-выдавшего задание
        (Гаррик). Это соблюдает требование, что отправитель и получатель не должны
        совпадать.
      dialogs: Диалоги Лиры Лекаря подтверждают приём угля и логически связывают доставку
        с её нуждами (подогреть настой), завершая квест. Также звучит обратная связь
        о правильном выполнении доставки.
    enemy_to_face:
      amount: 1 противник выбран, чтобы не перегрузить игрока без брони и щита и сохранить
        квест в формате доставки, а не боевого испытания.
      dialogs: 'Речь Гоблина-вора тематически привязана к моменту после добычи: он
        пытается отнять мешок с углём, создавая напряжение на обратном пути. Фразы
        короткие и «воровские», чтобы читалось как засадная встреча.'
      enemy: Гоблин-вор выбран из списка врагов ранга 1 — это безопасный противник
        для новичка с 100 HP и деревянным мечом.
    resource_to_deliver:
      amount: 'Количество 8 задано как ощутимый, но посильный объём для персонажа
        1 уровня: достаточно, чтобы квест ощущался как работа по добыче и доставке,
        но не требует недоступных ресурсов.'
      character: Гаррик Кузнец выбран как стартовый заказчик, потому что он находится
        в Королевской столице и принимает к доставке Уголь (ресурс присутствует в
        его списке приемки).
      dialogs: Диалоги от Гаррика Кузнеца задают мотивацию (остывает горн), объясняют
        где добывать ресурс (Одуванчиковая Поляна) и почему игрок справится текущим
        инструментом (деревянная кирка ранга 1). Количество оговорено явно, чтобы
        цель была измеримой.
      resource: 'Уголь выбран, потому что это руда с min_instrument_rank: 1 — соответствует
        имеющейся у игрока Деревянной кирке ранга 1.'
  objective_description: Добыть 8 кусков угля в Одуванчиковой Поляне и доставить их
    Лире Лекарю из Деревни Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Стой-стой, не подходи так резко. Ты весь в пыли и саже.
        speaker: Лира Лекарь
      - remark: Уголь принёс? Отлично. Мне нужно подогреть настой — без жара он бесполезен.
        speaker: Лира Лекарь
      - remark: Гаррик умеет ковать, но лечить — нет. Я передам ему, что горн можно
          снова разжечь.
        speaker: Лира Лекарь
      - remark: 'Хорошая работа для первого пути: собрать, донести, не потерять.'
        speaker: Лира Лекарь
      - remark: Возьми это — пригодится, если снова придётся идти дальше, чем кажется.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хи-хи… блестит чёрное! Это моё!
        speaker: Гоблин-вор
      - remark: Человек тащит камушки — значит, кошель тоже есть!
        speaker: Гоблин-вор
      - remark: Отдай мешок, и я уйду тихо-тихо!
        speaker: Гоблин-вор
      - remark: Не отдашь — я сам возьму! Быстро-быстро!
        speaker: Гоблин-вор
      - remark: Гр-р… думал, лёгкая добыча!
        speaker: Гоблин-вор
      - remark: Ладно! Но я запомню твою рожу!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новобранец. В кузнечном дворе нынче холодно — горн еле тянет.
        speaker: Гаррик Кузнец
      - remark: Мне нужен свежий уголь, а подмастерья разбрелись кто куда.
        speaker: Гаррик Кузнец
      - remark: Сходи в Одуванчиковую Поляну — там уголь близко к поверхности, справишься
          даже с деревянной киркой.
        speaker: Гаррик Кузнец
      - remark: Собери мне 8 кусков угля. Не меньше — иначе плавка встанет.
        speaker: Гаррик Кузнец
      - remark: 'И не тяни: пока горн остывает, весь двор без работы.'
        speaker: Гаррик Кузнец
      - remark: Принесёшь — я рассчитаюсь честно. Мне нужны руки, а не разговоры.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
