quest:
  explanation:
    destination:
      character_to_deliver: Кузнец Роган выбран как отличающийся NPC от Гаррика (требование
        соблюдено) и как персонаж в Королевской столице, что логично для финальной
        сдачи груза в кузницы.
      dialogs: 'Диалог (5 реплик) подтверждает факт доставки и встроен в столичный
        контекст: проверка у ворот/в кузницах и предупреждение о ворах.'
    enemy_to_face:
      amount: 1 противник выбран как минимально обязательная и безопасная для старта
        схватка при текущем снаряжении (деревянный меч, отсутствие брони).
      dialogs: 'Диалог (5 реплик) от лица противника завязан на логике квеста доставки:
        после добычи появляется грабитель, которому нужен именно переносимый ресурс.'
      enemy: Гоблин-вор — противник ранга 1 из списка врагов мира; он тематически
        подходит для попытки отобрать добытый груз у начинающего игрока.
    resource_to_deliver:
      amount: Количество 8 выбрано как ощутимая, но посильная норма для персонажа
        1 уровня и базовых инструментов, при этом не требует доступа к более высоким
        ресурсам.
      character: Выбран Гаррик Кузнец, потому что он находится в Королевской столице
        и принимает к доставке/сбору Уголь (ресурс ранга 1 с min_instrument_rank 1),
        что соответствует инструментам игрока.
      dialogs: 'Диалог (6 реплик) выдаёт понятную мотивацию доставки: у Гаррика заканчивается
        топливо для горна; также прямо указывает на доступную игроку локацию с углём
        и подтверждает, что деревянной кирки ранга 1 достаточно.'
      resource: Уголь существует в мире как руда, доступная при min_instrument_rank
        1; у игрока есть Деревянная кирка ранга 1, значит добыча возможна.
  objective_description: Добыть 8 угля на Одуванчиковой Поляне и доставить его в Королевскую
    столицу Кузнецу Рогану.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Стой. У ворот столицы всё, что пахнет шахтой, проверяют дважды. Что
          несёшь?
        speaker: Кузнец Роган
      - remark: Уголь? Хороший. Гаррик опять жмётся и гоняет новичков по поручениям.
        speaker: Кузнец Роган
      - remark: Ладно, если ты не растряс по дороге — оставляй здесь, я передам в
          кузницы.
        speaker: Кузнец Роган
      - remark: В следующий раз бери сумку крепче. Воры вокруг столицы стали наглее.
        speaker: Кузнец Роган
      - remark: Работа выполнена. Возьми награду — пригодится, когда на тебя кто-то
          выскочит из кустов.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о, мешок чёрных камешков! Это моё!
        speaker: Гоблин-вор
      - remark: Тяжёлый груз — тяжёлые ноги. Давай сюда, и разойдёмся мирно.
        speaker: Гоблин-вор
      - remark: Не отдашь — я позову своих... хотя и один справлюсь!
        speaker: Гоблин-вор
      - remark: Шаг в сторону — и я вырву мешок прямо из рук!
        speaker: Гоблин-вор
      - remark: Ха! Люди всегда думают, что донести легче, чем добыть!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. Горн в столице не должен остывать, а уголь у меня на
          исходе.
        speaker: Гаррик Кузнец
      - remark: Сходи на Одуванчиковую Поляну — там рядом есть жила угля, бери сколько
          сможешь.
        speaker: Гаррик Кузнец
      - remark: Мне нужно ровно 8 кусков. Не больше — лишнее заберёшь себе, не меньше
          — работа встанет.
        speaker: Гаррик Кузнец
      - remark: Кирка у тебя деревянная? Сгодится. Уголь мягче железа, справишься.
        speaker: Гаррик Кузнец
      - remark: 'И не тяни: к вечеру мне ковать заказ для дворцовой стражи.'
        speaker: Гаррик Кузнец
      - remark: Принесёшь — отблагодарю так, чтобы тебе стало легче ходить по дорогам.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
