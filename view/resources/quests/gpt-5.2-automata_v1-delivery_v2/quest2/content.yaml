quest:
  explanation:
    destination:
      character_to_deliver: Выбран Кузнец Роган — существующий персонаж в Королевской
        столице; он отличается от персонажа, выдавшего задание (Гаррик Кузнец), что
        строго соблюдает требование различия.
      dialogs: Диалоги выданы персонажем-получателем и подтверждают факт доставки
        угля; они не вводят новых персонажей/локаций и происходят в логичном контексте
        Королевской столицы.
    enemy_to_face:
      amount: Указано 1, так как в требованиях минимум 1; одиночная встреча сбалансирована
        для стартовой экипировки игрока без брони.
      dialogs: Диалоги принадлежат ровно тому противнику, который указан в поле enemy,
        без добавления несуществующих сущностей; реплики логично привязаны к попытке
        отобрать добытый уголь.
      enemy: Выбран Гоблин-вор (ранг 1) — противник из списка enemies, подходящий
        по сложности новичку с Деревянным мечом.
    resource_to_deliver:
      amount: Количество 8 задано как заметная, но посильная партия для игрока 1 уровня
        с базовыми инструментами; формат количества соответствует структуре квеста.
      character: Выбран Гаррик Кузнец, потому что он принимает к доставке/сбору Уголь
        (мин. ранг инструмента 1) — это соответствует наличию у игрока Деревянной
        кирки ранга 1.
      dialogs: Диалоги выданы от Гаррика Кузнеца (существующий персонаж в Королевской
        столице) и мотивируют именно добычу+доставку ресурса, указывая подходящее
        место добычи из списка локаций (Одуванчиковая Поляна) и не выходя за рамки
        сеттинга.
      resource: Уголь выбран из доступных ресурсов мира и списка принимаемых Гарриком;
        ресурс также привязан к Одуванчиковой Поляне как ore_resource.
  objective_description: Добыть 8 единиц ресурса «Уголь» в Одуванчиковой Поляне и
    доставить их Кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Постой. Что за суета у ворот столицы?
        speaker: Кузнец Роган
      - remark: Уголь? Идёт на кузницы? Хорошо. Я прослежу, чтобы он дошёл куда надо.
        speaker: Кузнец Роган
      - remark: Гаррик вечно экономит на поставщиках, но без топлива всем туго.
        speaker: Кузнец Роган
      - remark: 'Передай ему: в следующий раз пусть оформляет всё через меня — меньше
          потерь по дороге.'
        speaker: Кузнец Роган
      - remark: Держи награду. За аккуратную доставку и то, что не разболтал груз
          по пути.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о! Чёрные камушки! Дай-ка сюда, человек!
        speaker: Гоблин-вор
      - remark: Ты копал — я заберу. Так честно!
        speaker: Гоблин-вор
      - remark: Не дергайся, и я оставлю тебе... один!
        speaker: Гоблин-вор
      - remark: Ха! Меч деревянный? Тогда и добыча моя!
        speaker: Гоблин-вор
      - remark: Ладно, хватит болтовни. Клади мешок!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новенький. Горн в столице не любит пустоту — угля осталось на
          донышке.
        speaker: Гаррик Кузнец
      - remark: Нужен свежий Уголь. Не для роскоши — для работы. Без него не куется
          даже гвоздь.
        speaker: Гаррик Кузнец
      - remark: 'Тебе по силам: кирка у тебя есть, и ранг подходит. Достанешь — и
          сразу ко мне.'
        speaker: Гаррик Кузнец
      - remark: Возьми ровно столько, сколько скажу. Перетаскивать лишнее — пустая
          трата времени.
        speaker: Гаррик Кузнец
      - remark: Добывай в Одуванчиковой Поляне — там угольная жила близко к поверхности.
        speaker: Гаррик Кузнец
      - remark: Старайся не задерживаться. В округе крутятся мелкие воришки.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
