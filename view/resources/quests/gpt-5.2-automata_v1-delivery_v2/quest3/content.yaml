quest:
  explanation:
    destination:
      character_to_deliver: 'Выбран Кузнец Роган: он существует в мире, расположен
        в Королевской столице и отличается от персонажа-выдавателя (Гаррик Кузнец),
        что выполняет требование квеста на доставку.'
      dialogs: Диалог подтверждает приёмку ресурса и логически связывает двух кузнецов
        (Гаррик отправил — Роган принял), создавая ощущение ремесленной сети в столице.
    enemy_to_face:
      amount: Указан минимум 1 противник, чтобы столкновение было обязательным, но
        посильным для персонажа без брони и щита.
      dialogs: Реплики подчёркивают попытку ограбления сразу после добычи ресурса
        — типичная засада на обратном пути, усиливающая напряжение, но без введения
        несуществующих сущностей.
      enemy: Выбран Гоблин-вор ранга 1, так как игрок 1 уровня с Деревянным мечом
        ранга 1 способен пережить бой, а противник строго присутствует в списке врагов
        мира.
    resource_to_deliver:
      amount: 'Количество 8 подобрано как понятный стартовый объём для игрока 1 уровня
        без брони: достаточно, чтобы ощущалась задача доставки, но без чрезмерного
        гринда.'
      character: Выбран Гаррик Кузнец, потому что он существует в мире, находится
        в Королевской столице и принимает к доставке/сбору Уголь с требованием min_instrument_rank
        1.
      dialogs: Диалог выдаёт контекст ремесленной нужды (уголь для горна), прямо называет
        подходящую локацию (Одуванчиковая Поляна) и фиксирует точное количество ресурса,
        чтобы цель была однозначной.
      resource: Выбран Уголь, так как это руда с min_instrument_rank 1, а у игрока
        есть Деревянная кирка ранга 1, что позволяет добычу без нарушения ограничений.
  objective_description: Добудьте 8 Угля в Одуванчиковой Поляне и доставьте их Кузнецу
    Рогану в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Запах угля чувствую ещё от ворот. Ты не с пустыми руками?
        speaker: Кузнец Роган
      - remark: Гаррик всё ещё экономит на поставках… значит, прислал тебя.
        speaker: Кузнец Роган
      - remark: Покажи уголь. Мне важна сухая порода — без мусора.
        speaker: Кузнец Роган
      - remark: Хорошо. Передам, что долг закрыт, а ты умеешь держать слово.
        speaker: Кузнец Роган
      - remark: Держи награду. С таким в руках дорога станет короче.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о, чёрные камушки! Отдай, пока цел!
        speaker: Гоблин-вор
      - remark: Твои карманы звенят — значит, мне повезло!
        speaker: Гоблин-вор
      - remark: Я быстрый! Ты медленный! Уголь — мой!
        speaker: Гоблин-вор
      - remark: Шаг назад — и забудем друг друга!
        speaker: Гоблин-вор
      - remark: Ладно, сам напросился!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. В горне пусто — без угля металл не поёт.
        speaker: Гаррик Кузнец
      - remark: 'Сходи в Одуванчиковую Поляну: там рядом жила с Углём, добыча лёгкая.'
        speaker: Гаррик Кузнец
      - remark: Мне нужно ровно 8 кусков Угля — не больше и не меньше, чтобы рассчитать
          плавку.
        speaker: Гаррик Кузнец
      - remark: Добудешь — не задерживайся. К вечеру стража сменится, а дороги станут
          шумнее.
        speaker: Гаррик Кузнец
      - remark: Принесёшь уголь — я отплачу делом, не словами.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
