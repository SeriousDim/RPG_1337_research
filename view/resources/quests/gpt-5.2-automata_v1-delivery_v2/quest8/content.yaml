quest:
  explanation:
    destination:
      character_to_deliver: Получатель — 'Лира Лекарь' из 'Деревни Речных Лугов'.
        Она отличается от выдающего персонажа (Гаррик Кузнец), как требуется, и является
        существующим персонажем мира.
      dialogs: Диалог (5 реплик) подтверждает прием ровно 8 единиц угля, замыкает
        связь между Гарриком и Лирой и выдает награду, сохраняя фокус части на доставке.
    enemy_to_face:
      amount: Количество 1 задано минимальным, чтобы бой был посильным для старта
        без брони и без щита.
      dialogs: 'Диалог (5 реплик) от лица противника объясняет засаду после добычи:
        гоблин пытается украсть именно уголь, что тематически связано с квестовым
        ресурсом и не вводит новых сущностей.'
      enemy: Выбран 'Гоблин-вор' ранга 1, потому что игрок 1 уровня без брони и с
        деревянным мечом (урон 2) должен сталкиваться с противником начального ранга,
        существующим в списке врагов.
    resource_to_deliver:
      amount: 'Количество 8 выбрано как понятная стартовая норма для игрока 1 уровня:
        это заметная, но не чрезмерная добыча, не требующая инструментов выше ранга
        1.'
      character: Гаррик Кузнец выбран как выдающий квест персонаж, потому что он находится
        в 'Королевской столице' и в его списке принимаемых ресурсов присутствует 'Уголь'.
      dialogs: 'Диалог (6 реплик) задает мотивацию в рамках мира: кузнецу нужен уголь
        для горна, а также логично связывает доставку с Лирой Лекарем, которая использует
        уголь для сушильни трав. Указано, что деревянной кирки ранга 1 достаточно,
        что соответствует ограничениям ресурса ''Уголь'' (min_instrument_rank: 1).'
      resource: Выбран ресурс 'Уголь', так как он существует в мире, доступен при
        min_instrument_rank 1 и соответствует имеющейся у игрока 'Деревянной кирке'
        ранга 1.
  objective_description: Добыть 8 кусков угля на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов (задание выдал Гаррик Кузнец в Королевской
    столице).
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты от Гаррика? Пахнешь рудником… значит, принес то, что нужно.
        speaker: Лира Лекарь
      - remark: Уголь мне не для кузни — сушильня для трав без жара не работает, а
          сегодня люди ждут припарки.
        speaker: Лира Лекарь
      - remark: Давай сюда мешок. Пересчитаю… раз, два… хорошо, ровно 8.
        speaker: Лира Лекарь
      - remark: 'Передай Гаррику: долг закрыт. Он снова сможет брать у меня сборы
          без задержек.'
        speaker: Лира Лекарь
      - remark: 'А тебе — награда. Возьми и держи клинок крепче: дороги вокруг лугов
          неспокойные.'
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Шшш! Черный камешек блестит — значит мой!
        speaker: Гоблин-вор
      - remark: Отдай мешок, человек, и уйдешь целым!
        speaker: Гоблин-вор
      - remark: Я видел, как ты бил по жиле. Теперь это моя добыча!
        speaker: Гоблин-вор
      - remark: Не спорь! Я быстро режу и быстро бегу!
        speaker: Гоблин-вор
      - remark: Ладно, сам виноват. Заберу уголь с твоего пояса!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новобранец. В столице уголь на вес золота — горны не должны остывать
          ни на минуту.
        speaker: Гаррик Кузнец
      - remark: 'Сходи на Одуванчиковую Поляну: там рядом с травой попадается хороший
          уголь.'
        speaker: Гаррик Кузнец
      - remark: Мне нужно ровно 8 кусков. Не больше и не меньше — я веду учет для
          мастерской.
        speaker: Гаррик Кузнец
      - remark: Кирка у тебя деревянная? Сойдет. Только работай аккуратно, камень
          там крошится.
        speaker: Гаррик Кузнец
      - remark: Добудешь — отнеси уголь Лире Лекарю в Деревню Речных Лугов. У нее
          закончились запасы для сушильни трав.
        speaker: Гаррик Кузнец
      - remark: Скажешь, что от меня. Я закрою долг перед ее лавкой, а ты получишь
          заслуженное.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
