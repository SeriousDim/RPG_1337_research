quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь — существующий персонаж в Деревне
        Речных Лугов; она отличается от выдающего квест Гаррика, как требуется, и
        логически подходит как получатель ресурса для лечебных нужд.
      dialogs: Лира подтверждает получение и пересчитывает доставку, связывает квест
        с просьбой Гаррика, завершает сцену выдачей награды; 5 реплик — в допустимом
        диапазоне.
    enemy_to_face:
      amount: Установлено 1, чтобы столкновение было посильным на старте при отсутствии
        брони и щита.
      dialogs: Противник подаётся как попытка ограбления после добычи ресурса, что
        тематически связано с переноской ценного мешка угля; 5 реплик — в допустимом
        диапазоне, без упоминания несуществующих сущностей.
      enemy: Выбран Гоблин-вор — он существует в списке врагов и имеет ранг 1, что
        соответствует стартовому уровню игрока и его деревянному мечу.
    resource_to_deliver:
      amount: 'Количество 8 выбрано как умеренная цель для игрока 1 уровня с базовыми
        инструментами, без выхода за рамки доступности ресурса (min_instrument_rank:
        1).'
      character: 'Выбран Гаррик Кузнец — он существует среди уже сгенерированных персонажей
        и принимает к доставке/сбору Уголь (min_instrument_rank: 1), что соответствует
        кирке игрока ранга 1.'
      dialogs: 'Диалоги выстроены вокруг логичной причины доставки: Гаррик занят кузней
        в Королевской столице и направляет игрока добыть уголь и передать его Лире;
        упомянута Одуванчиковая Поляна как доступная буферная локация с ресурсом Уголь;
        добавлена проверка на инструмент (деревянная кирка подходит). Количество реплик
        7 — в допустимом диапазоне.'
      resource: Ресурс Уголь существует в мире (руда) и доступен в локации Одуванчиковая
        Поляна; также он указан в списках принимаемых ресурсов у Гаррика.
  objective_description: Добудьте 8 кусков Угля на Одуванчиковой Поляне и доставьте
    их Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты от Гаррика? Запах угля чувствую ещё с порога.
        speaker: Лира Лекарь
      - remark: Мне нужен ровный жар — я сушу травы и грею воду для повязок.
        speaker: Лира Лекарь
      - remark: 'Давай мешок сюда. Считаю: раз… два… отлично.'
        speaker: Лира Лекарь
      - remark: Передай Гаррику, что его слово крепче стали — выручил вовремя.
        speaker: Лира Лекарь
      - remark: А тебе — награда за расторопность. Продолжай так же, и вырастешь в
          деле.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ого! Чёрные камушки! Блестят! Моё!
        speaker: Гоблин-вор
      - remark: Покажи мешок! Я только одним глазком… и лапой!
        speaker: Гоблин-вор
      - remark: Сейчас быстро-быстро заберу — и ты даже не заметишь!
        speaker: Гоблин-вор
      - remark: Если побежишь — я побегу быстрее!
        speaker: Гоблин-вор
      - remark: Отдай уголь, и я, может, забуду твоё лицо!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новобранец. Горн в столице не любит сырой огонь — нужен чистый
          уголь.
        speaker: Гаррик Кузнец
      - remark: 'Сходи на Одуванчиковую Поляну: там в породе попадается хороший уголь.'
        speaker: Гаррик Кузнец
      - remark: Добудь мне 8 кусков Угля. Твоя деревянная кирка как раз сгодится.
        speaker: Гаррик Кузнец
      - remark: Сложи всё в мешок и не рассыпай по дороге — мне важен каждый кусок.
        speaker: Гаррик Кузнец
      - remark: Когда вернёшься, неси уголь прямо к Лире Лекарю в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Она просила жар для настоев и повязок — я обещал помочь, да руки заняты.
        speaker: Гаррик Кузнец
      - remark: 'Скажи ей, что это от Гаррика. И не тяни: уголь должен быть сухим.'
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
