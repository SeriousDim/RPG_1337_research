quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь — существующий персонаж из Деревни
        Речных Лугов. Она отличается от персонажа, выдавшего задание (Гаррик Кузнец),
        как требуется правилами.
      dialogs: Лира объясняет, зачем уголь нужен лекарне, подтверждает качество ресурса
        и закрывает квест вручением награды; также поддерживается связь между локациями
        и персонажами (послание Гаррику).
    enemy_to_face:
      amount: Количество 1 — минимально допустимое и адекватное для раннего персонажа
        без брони, чтобы не создавать резкий скачок сложности.
      dialogs: 'Противник появляется логично после добычи: вор пытается отнять собранный
        ресурс. Реплики короткие и характерные, не вводят новых сущностей и подчёркивают
        конфликт вокруг угля.'
      enemy: Выбран «Гоблин-вор» — враг ранга 1 из списка мира, соответствует стартовой
        сложности игрока (100 здоровья, деревянный меч).
    resource_to_deliver:
      amount: Количество 6 — посильная цель для игрока 1 уровня без брони и с базовыми
        инструментами; достаточно, чтобы квест ощущался как полноценная доставка,
        но не превращался в длительный гринд.
      character: Выбран Гаррик Кузнец — он существует в мире, находится в Королевской
        столице и принимает для заданий ресурс «Уголь» с min_instrument_rank 1, что
        подходит игроку.
      dialogs: 'Диалоги выстроены вокруг потребности кузнеца в топливе и дают игроку
        ясные инструкции: где добывать (Одуванчиковая Поляна) и почему ресурс нужно
        доставить не ему, а другому персонажу. Указание про деревянную кирку согласовано
        с инвентарём игрока и минимальным рангом добычи угля.'
      resource: Выбран ресурс «Уголь» — он существует в мире, доступен в Одуванчиковой
        Поляне, и требует инструмент ранга 1 (у игрока есть деревянная кирка ранга
        1).
  objective_description: Добыть 6 единиц ресурса «Уголь» в Одуванчиковой Поляне и
    доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты от Гаррика? Пахнешь кузней… и дорогой.
        speaker: Лира Лекарь
      - remark: Уголь нам нужен не для огня. Я истолку его в порошок — он вытягивает
          скверну из ран.
        speaker: Лира Лекарь
      - remark: Дай-ка взглянуть… да, чистый. Такой не забивает повязки.
        speaker: Лира Лекарь
      - remark: Хорошая работа. Чем меньше боли у людей — тем крепче держатся наши
          земли.
        speaker: Лира Лекарь
      - remark: 'Передай Гаррику: лекарня в долгу не останется. А тебе — вот что пригодится
          в дороге.'
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ш-шахтёр? Нет. Добытчик? Да! Отдай чёрные камушки — блестят, греют!
        speaker: Гоблин-вор
      - remark: Я видел, как ты складывал уголь. Значит, он уже мой.
        speaker: Гоблин-вор
      - remark: Не кричи! Я тихий… пока ты не упрямишься.
        speaker: Гоблин-вор
      - remark: Покажи мешок. Я возьму чуть-чуть. Большую половину!
        speaker: Гоблин-вор
      - remark: Если побежишь — я догоню. Я быстрый!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок. В столице кузня не простаивает ни на миг — а уголь кончается
          быстрее, чем я успеваю точить клинки.
        speaker: Гаррик Кузнец
      - remark: Мне нужно топливо без примесей, иначе металл «ведёт» и клинки выходят
          мягкими.
        speaker: Гаррик Кузнец
      - remark: Сходи в Одуванчиковую Поляну — там рядом залежи угля, добыча простая.
        speaker: Гаррик Кузнец
      - remark: Собери 6 кусков угля. Твоя деревянная кирка с этим справится.
        speaker: Гаррик Кузнец
      - remark: 'Но не таскай его сюда: лекарям он нужнее — пусть в Деревне Речных
          Лугов приготовят порошок для повязок.'
        speaker: Гаррик Кузнец
      - remark: Принесёшь — и я отмечу тебя у ремесленников. Услуги станут доступнее.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
