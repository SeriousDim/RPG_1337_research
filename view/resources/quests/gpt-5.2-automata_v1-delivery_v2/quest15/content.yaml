quest:
  explanation:
    destination:
      character_to_deliver: Получатель — Кузнец Роган (существует в Королевской столице).
        Он отличается от выдающего квест Гаррика Кузнеца, как требуется правилами,
        и логично выступает как второй кузнец, принимающий партию угля.
      dialogs: Диалог у получателя подтверждает факт доставки угля и связывает его
        с заказом кузнецов, не добавляя новых предметов или персонажей. 5 реплик соблюдают
        требование.
    enemy_to_face:
      amount: Количество врагов 1 — минимально допустимое и сбалансированное для игрока
        с Деревянным мечом и без брони, чтобы схватка не превращалась в затяжное испытание.
      dialogs: Реплики противника подчёркивают попытку ограбления после добычи ресурса,
        не вводя новых сущностей. 5 реплик соблюдают ограничение 5–10.
      enemy: Выбран «Гоблин-вор» ранга 1 — он присутствует в списке врагов и подходит
        начинающему игроку (без брони, базовое оружие).
    resource_to_deliver:
      amount: Количество 8 задано как заметная, но выполнимая цель для персонажа 1
        уровня, чтобы квест был содержательным и ощущался как настоящая доставка партии
        ресурса.
      character: 'Выбран Гаррик Кузнец — он уже существует в Королевской столице и
        принимает к доставке/сбору уголь (min_instrument_rank: 1), что совпадает с
        уровнем инструментов игрока.'
      dialogs: 'Диалог построен как простое поручение от ремесленника: Гаррик Кузнец
        просит именно ресурс «Уголь», который существует в мире, и мотивирует игрока
        срочностью работы горна. Количество реплик (5) соответствует требованиям.'
      resource: 'Уголь выбран из доступных ресурсов мира и из списка ресурсов, которые
        Гаррик может принять. Это также соответствует инструменту игрока: у него есть
        Деревянная кирка ранга 1, а уголь требует min_instrument_rank 1.'
  objective_description: Добыть 8 единиц ресурса «Уголь» и доставить их Кузнецу Рогану
    в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: Стой. Что за дымный запах? Уголь несёшь?
        speaker: Кузнец Роган
      - remark: Гаррик опять спешит и гонит учеников по поручениям, да?
        speaker: Кузнец Роган
      - remark: 'Ладно. Давай сюда: мне важно, чтобы уголь был сухой и без примесей.'
        speaker: Кузнец Роган
      - remark: Хороший. Такой горит ровно — металл не капризничает.
        speaker: Кузнец Роган
      - remark: 'Передай Гаррику: долг учтён. А тебе — награда за расторопность.'
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-о! Чёрные камушки! Это моё!
        speaker: Гоблин-вор
      - remark: Человек тащит уголь — значит, кошель рядом!
        speaker: Гоблин-вор
      - remark: Давай сюда мешок, и я тебя не укушу. Может быть.
        speaker: Гоблин-вор
      - remark: Писк-писк! Я быстрый, ты медленный!
        speaker: Гоблин-вор
      - remark: Если не отдашь — вырву из рук!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новенький. В кузнице холодно — горн еле тянет.
        speaker: Гаррик Кузнец
      - remark: Мне нужен свежий уголь, без сырости. Такой, что шипит и держит жар.
        speaker: Гаррик Кузнец
      - remark: 'Тебе по силам: уголь рядом, в местах где камень черный и ломкий.'
        speaker: Гаррик Кузнец
      - remark: Добывай киркой, береги руки и не мешкай — в столице заказов хватает.
        speaker: Гаррик Кузнец
      - remark: Принесёшь уголь — я скажу добрые слова о тебе в нужных местах.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
