quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — существующий персонаж в Деревне Речных Лугов;
        она отличается от Гаррика Кузнеца, как требуется, и также принимает к доставке/сбору
        ресурсы (в т.ч. травы/руды), что делает её валидным адресатом доставки.
      dialogs: Диалог у получателя объясняет альтернативное использование угля (лечебные
        припарки), делает доставку сюжетно осмысленной и фиксирует факт передачи ресурса.
    enemy_to_face:
      amount: 1 противник — минимальная и безопасная для новичка встреча с учётом
        отсутствия брони у игрока.
      dialogs: Реплики подчёркивают засаду после добычи (вор охотится за добычей),
        создавая напряжение, но без добавления несуществующих сущностей.
      enemy: Гоблин-вор — враг ранга 1 из списка enemies, соответствует уровню игрока
        и его базовому оружию.
    resource_to_deliver:
      amount: Количество 6 — умеренный объём для персонажа 1 уровня, чтобы квест был
        выполнимым без затяжного гринда.
      character: Выбран Гаррик Кузнец — он существует среди уже сгенерированных персонажей
        и принимает к доставке/сбору Уголь.
      dialogs: Диалоги выстроены вокруг логичной причины заказа (топливо для горна)
        и мягко направляют игрока к нужной локации (Одуванчиковая Поляна), при этом
        учитывают, что у игрока есть Деревянная кирка (ранг 1) и он может добывать
        Уголь с min_instrument_rank 1.
      resource: Уголь — ресурс из мира, доступный в Одуванчиковой Поляне и принимаемый
        некоторыми NPC; подходит игроку по рангу инструмента (деревянная кирка, ранг
        1).
  objective_description: Добыть 6 единиц ресурса «Уголь» в Одуванчиковой Поляне и
    доставить их Лире Лекарю в Деревне Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Пахнет копотью… Ты не заходил в дымный сарай, надеюсь?
        speaker: Лира Лекарь
      - remark: О, уголь. Он нужен не только кузнецам — я делаю на нём очищающие припарки.
        speaker: Лира Лекарь
      - remark: 'Гаррик попросил? Тогда ты вовремя: в деревне снова грязная вода после
          дождей.'
        speaker: Лира Лекарь
      - remark: Положи мешочек сюда, аккуратно — чтобы не рассыпать по травам.
        speaker: Лира Лекарь
      - remark: Я отмечу твою помощь. Возвращайся в Речные Луга, если захочешь учиться
          выживать дальше.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ш-шахтный мешок! Чёрный камень — мой!
        speaker: Гоблин-вор
      - remark: Тащишь уголь? Значит, есть чем поживиться!
        speaker: Гоблин-вор
      - remark: Отдай добычу, и я, может, не порежу тебе сумку!
        speaker: Гоблин-вор
      - remark: Ха! Деревянный меч? Тем смешнее будет!
        speaker: Гоблин-вор
      - remark: Ребята, окружай! Быстро-быстро!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новенький. В горне вот-вот погаснет жар — без топлива работа встанет.
        speaker: Гаррик Кузнец
      - remark: 'Мне нужен уголь, обычный, но свежий: не крошево и не сырой.'
        speaker: Гаррик Кузнец
      - remark: Добыть сможешь в Одуванчиковой Поляне — там жила угольная прожилка
          рядом с тропой.
        speaker: Гаррик Кузнец
      - remark: Кирка у тебя деревянная? Сгодится, уголь мягкий — только не бей по
          камню впустую.
        speaker: Гаррик Кузнец
      - remark: Принесёшь — дам вещь, которая тебе пригодится в дороге. И не тяни,
          пока сталь тёплая.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
