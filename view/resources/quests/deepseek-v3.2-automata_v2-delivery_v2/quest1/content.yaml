quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана, так как она также находится в локации
        начального уровня (Деревня Речных Лугов) и может принимать уголь (согласно
        её списку). Она отличается от Гаррика, что соответствует требованию. Её роль
        лекаря, использующего уголь, нарративно обоснована.
      dialogs: Лира Лекарь подтверждает, что ждала доставку, хвалит ресурс и объясняет,
        зачем он ей нужен, замыкая логическую цепочку (кузнец -> лекарь). Диалог завершается
        вручением награды.
    enemy_to_face:
      amount: Два гоблина создают вызов для игрока с его текущим оружием (2 урона
        за ход), требуя нескольких раундов боя и потенциально нанося урон (6 за ход
        от обоих), что учит игрока механике боя и важности тактики.
      dialogs: Диалог построен вокруг попытки гоблинов отобрать добытый уголь. Это
        добавляет нарративный конфликт и объясняет внезапное нападение. Вмешательство
        игрока логично, так как он защищает груз.
      enemy: Гоблин-вор выбран, так как это противник ранга 1, соответствующий уровню
        игрока (уровень 1, деревянный меч, 2 урона за ход). С его здоровьем (24) и
        уроном (3) игрок в теории может справиться с двумя, что создаёт умеренно сложный,
        но проходимый бой для новичка.
    objective_description: Описание чётко указывает, что нужно сделать (добыть, отнести)
      и с какими NPC взаимодействовать, без спойлеров о встрече с врагами, чтобы она
      стала сюрпризом.
    resource_to_deliver:
      amount: 5 единиц — разумное начальное количество для квеста на сбор, не слишком
        утомительное, но дающее понимание механики.
      character: Гаррик Кузнец выбран, так как он является одним из двух персонажей,
        принимающих уголь (ранг 1), и находится в стартовой локации. Он — логичная
        первая точка контакта для новичка.
      dialogs: Гаррик Кузнец — идеальный стартовый персонаж. Он находится в стартовой
        локации (Королевская столица). Он может принимать уголь (ранг 1), который
        игрок способен добыть своей деревянной киркой (ранг 1). Диалог объясняет задачу,
        указывает на локацию добычи и вводит второго персонажа для цепочки доставки.
      resource: Уголь выбран, так как это ресурс ранга 1. Для его добычи требуется
        инструмент ранга 1 (деревянная кирка), который уже есть у игрока.
    reward: Железная лопата (ранг 2) является значимым и полезным для игрока апгрейдом
      по сравнению с его текущей деревянной лопатой (ранг 1). Её ещё нет в инвентаре
      игрока, что соответствует требованию. Это мотивирует к дальнейшему сбору ресурсов
      более высокого ранга.
  objective_description: Кузнец Гаррик в Королевской столице просит добыть уголь на
    Одуванчиковой Поляне и отнести его Лекарю Лире в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, путник! Ты от Гаррика? Я уже ждала тебя. Он говорил, что пришлёт
          помощника с углём.
        speaker: Лира Лекарь
      - remark: Да, да, отличный уголь. Видно, что свежедобытый. Именно такой хорошо
          разгорается и даёт ровный жар.
        speaker: Лира Лекарь
      - remark: Спасибо тебе огромное. Без этого угля мне пришлось бы приостановить
          приготовление многих снадобий и мазей.
        speaker: Лира Лекарь
      - remark: Гаррик — старый друг. Он всегда знает, кому и что нужно. А ты оказался
          надёжным исполнителем.
        speaker: Лира Лекарь
      - remark: Вот, возьми это в благодарность. Простая, но прочная лопата. В твоих
          путешествиях она ещё не раз пригодится для разных дел.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хи-хи! Чего это ты несёшь? Пахнет чем-то полезным для костра!
        speaker: Гоблин-вор
      - remark: Дай сюда свой мешок! Или мы его сами возьмём!
        speaker: Гоблин-вор
      - remark: Наши лапы давно не хватали таких блестящих камешков! Они наши!
        speaker: Гоблин-вор
      - remark: Этот уголь нужен не вам. Уходите!
        speaker: Игрок
      - remark: Ага, щас! Бей его, братва! Заберём всё!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, ты не из здешних мастеров. Моя кузница
          всегда в работе, а вот угля для горнов стало не хватать.
        speaker: Гаррик Кузнец
      - remark: Старые поставщики с дороги сбились. Не мог бы ты помочь? Нужно добыть
          немного угля. Он залегает неглубоко, на Одуванчиковой Поляне.
        speaker: Гаррик Кузнец
      - remark: У тебя же есть деревянная кирка? Ей как раз и можно добывать уголь.
          Пять кусков мне хватит, чтобы продержаться до новых поставок.
        speaker: Гаррик Кузнец
      - remark: Добышь уголь — принеси его моему другу, Лире Лекарю, в Деревню Речных
          Лугов. Она использует уголь для приготовления лечебных мазей и углей для
          своих тиглей.
        speaker: Гаррик Кузнец
      - remark: Дорога туда недолгая, но будь осторожен. Лесные тропинки в последнее
          время небезопасны. Удачи тебе!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
