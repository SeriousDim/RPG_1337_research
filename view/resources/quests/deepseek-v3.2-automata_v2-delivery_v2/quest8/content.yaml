quest:
  explanation:
    destination:
      character_to_deliver: Гном Брок отличается от начального персонажа (Гаррик Кузнец).
        Он находится в Гномьи Копи, другой локации, что создает путешествие. В его
        списке items_can_give_after_quest_finished есть железная кирка rank 2, которая
        является подходящей наградой и у игрока её ещё нет.
      dialogs: 'Диалог с гномом Броком логически продолжает квест: он принимает ресурс,
        объясняет его использование, и дает награду. У Брока в списке items_can_be_accepted_for_delivery_or_collection
        есть Уголь и Железо, что делает его логичным приемщиком угля. Диалог содержит
        8 реплик, соответствует требованиям.'
    enemy_to_face:
      amount: 1 враг — минимальное количество, подходящее для первого квеста и уровня
        игрока. Это не перегрузит игрока и позволит ему получить опыт боя.
      dialogs: 'Диалог для врага создан как реакция на приближение игрока. Пещерная
        крыса — слабый враг rank 1 (damage_per_turn: 2, health: 20), который соответствует
        уровню игрока (1 уровень, деревянный меч damage_per_enemy: 2). Бой будет балансным
        и не слишком сложным. Диалог содержит 6 реплик, соответствует требованиям.'
      enemy: 'Пещерная крыса — враг rank 1, самый слабый из списка. Игрок без брони
        и с деревянным мечом сможет одолеть его (игроку нужно сделать 10 ударов, врагу
        50 ударов для убития игрока — враг слаб). Это соответствует логике: на локации
        Одуванчиковая Поляна может встречаться мелкая опасность.'
    resource_to_deliver:
      amount: 3 единицы — небольшое, но значимое количество для стартового квеста,
        чтобы игрок почувствовал процесс добычи, но не изнурял себя.
      character: Выбран Гаррик Кузнец, так как он находится в Королевской столице
        (возможная стартовоя точка), и в его списке items_can_be_accepted_for_delivery_or_collection
        есть Уголь rank 1, который игрок может добыть своим инструментом.
      dialogs: 'Диалог построен вокруг логики мира: кузнец в столице нуждается в базовом
        ресурсе для работы. Он дает конкретное задание, ссылается на локацию (Одуванчиковая
        Поляна), инструмент игрока (у него есть деревянная кирка rank 1, что соответствует
        min_instrument_rank угля), и указывает конечную цель доставки другому персонажу.
        Диалог содержит 8 реплик, соответствует требованиям.'
      resource: 'Уголь — ресурс rank 1. Для его добычи требуется инструмент rank 1
        (min_instrument_rank: 1). У игрока есть деревянная кирка rank 1, что делает
        задание выполнимым.'
  objective_description: Добыть 3 единицы угля в Одуванчиковой Поляне и доставить
    его Гному Броку в Гномьи Копи.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: О, кто это? Человек с грузом? Не часто вижу ваших в наших копях.
        speaker: Гном Брок
      - remark: Гаррик сказал, что отправляет уголь? Хорошо. У нас здесь свои запасы,
          но дополнительный всегда полезен.
        speaker: Гном Брок
      - remark: Давай посмотрим... Уголь первого ранга. Подходит для базовой плавки.
          Как и ожидалось от Поляны.
        speaker: Гном Брок
      - remark: Ты добыл это сам? С деревянной киркой? Значит, ты уже немного знаком
          с трудом горняка.
        speaker: Гном Брок
      - remark: Спасибо за доставку. Гаррик прав — хранить уголь нужно в сухих глубоких
          штольнях, чтобы он не отсырел.
        speaker: Гном Брок
      - remark: В качестве благодарности я дам тебе эту железную кирку. Она прочнее
          деревянной и позволит добывать более твердые руды.
        speaker: Гном Брок
      - remark: Теперь ты сможешь собирать железо и олово. Может, в будущем ты снова
          поможешь нам с поставками.
        speaker: Гном Брок
      - remark: Береги инструмент. И будь осторожен в копях — здесь не только полезные
          ископаемые, но и опасности.
        speaker: Гном Брок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Шипит и скалит мелкие зубы*'
        speaker: Пещерная крыса
      - remark: '*Забегает вокруг, пытаясь найти слабое место*'
        speaker: Пещерная крыса
      - remark: '*Агрессивно визжит, защищая свою территорию*'
        speaker: Пещерная крыса
      - remark: '*Пытается укусить за ногу*'
        speaker: Пещерная крыса
      - remark: '*Отступает после удара, но готовится к новому нападению*'
        speaker: Пещерная крыса
      - remark: '*Издает последний жалобный писк перед тем, как пасть*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, странник! Работа в мастерской не прекращается, но поставки
          угля из копей задерживаются.
        speaker: Гаррик Кузнец
      - remark: Без угля я не могу поддерживать огонь в горнах. Плавильные печи начинают
          остывать.
        speaker: Гаррик Кузнец
      - remark: Недавно видел, что в Одуванчиковой Поляне можно найти небольшие залежи
          угля прямо под цветами.
        speaker: Гаррик Кузнец
      - remark: Если у тебя есть деревянная кирка, ты сможешь добыть хоть немного.
          Мне нужны всего 3 единицы.
        speaker: Гаррик Кузнец
      - remark: Добытый уголь нужно будет передать Броку в Гномьи Копи. Он знает,
          как его правильно хранить и распределить между кузницами.
        speaker: Гаррик Кузнец
      - remark: Брок обычно работает в нижних галереях копей. Найди его и передай
          уголь. Он будет тебе благодарен.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен на пути. В окрестностях Поляны иногда рыскают мелкие
          вредители, но с деревянным мечом ты справишься.
        speaker: Гаррик Кузнец
      - remark: Выполни эту работу, и я буду считать, что ты доказал свою полезность
          для столицы.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная кирка
