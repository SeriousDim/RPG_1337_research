quest:
  explanation:
    destination:
      character_to_deliver: Мастер Ювелир выбран как конечный персонаж, отличающийся
        от Гаррика Кузнеца. Он также находится в Королевской столице, что удобно для
        логистики квеста. Его список принимаемых ресурсов включает рубин (ранг 6),
        который не соответствует рангу игрока, но описание даёт причину, почему он
        принимает уголь (специальные свойства для полировки).
      dialogs: Диалог с Мастером Ювелиром написан с учётом его расположения (также
        Королевская столица) и его списка принимаемых ресурсов (рубин). Ювелир использует
        уголь для полировки, что создает логичную цепочку доставки. Диалог объясняет
        связь между персонажами и вводит награду.
    enemy_to_face:
      amount: '2 гоблина выбраны как балансное количество: игрок с текущим оружием
        может поражать только 1 врага за ход, но имея 100 HP и отсутствие брони, он
        может выдержать несколько ходов от двух таких врагов, если будет действовать
        стратегически.'
      dialogs: Диалог с Гоблином-вором (ранг 1) соответствует минимальному рангу врага,
        доступному для игрока. Его характеристики (24 HP, 3 урона за ход) сопоставимы
        с уроном игрока (2 за ход). В диалоге объясняется, почему враги появились
        на заброшенной поляне и почему они конфликтуют с игроком.
      enemy: Гоблин-вор выбран как враг ранга 1, что соответствует текущему уровню
        игрока (1) и его слабому оружию. Это допустимый противник по данным игрового
        мира.
    resource_to_deliver:
      amount: 3 единицы угля выбраны как небольшое, но значимое количество для новичка,
        чтобы задача была выполнима и не слишком долгой.
      character: Гаррик Кузнец выбран как начальный персонаж, потому что его условия
        (уголь, ранга 1) соответствуют инструментам и рангу игрока. Он находится в
        Королевской столице, предполагаемой стартовой локации.
      dialogs: Диалог с Гарриком Кузнецом написан с учётом его расположения в Королевской
        столице и его списка принимаемых ресурсов (уголь, одуванчик). Уголь – это
        ресурс ранга 1, который можно добыть деревянной киркой (ранг 1), имеющейся
        у игрока. Диалог объясняет причину задания и даёт контекст – Одуванчиковая
        Поляна, заброшенное место.
      resource: Уголь – ресурс ранга 1, требующий кирку ранга 1. У игрока есть деревянная
        кирка ранга 1, что делает сбор возможным.
  objective_description: Кузнец Гаррик в Королевской столице нуждается в угле для
    своих работ. Он просит вас добыть уголь на заброшенной Одуванчиковой Поляне и
    доставить его Мастеру Ювелиру, который использует этот уголь для полировки драгоценных
    камней.
  parts:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs:
      - remark: Кузнец Гаррик? Да, я знаю его. Он часто закупает уголь для печей.
          Но что привело тебя к моей лавке?
        speaker: Мастер Ювелир
      - remark: О! Он направил тебя с углем именно ко мне? Интересно... Я сейчас работаю
          над тонкой огранкой рубинов, и уголь мне нужен для специальной полировки.
        speaker: Мастер Ювелир
      - remark: Уголь из Одуванчиковой Поляны имеет особый состав – он мягкий и не
          повреждает драгоценные камни. Гаррик всегда знает, где найти нужные материалы.
        speaker: Мастер Ювелир
      - remark: Принимаю уголь. Твоя работа выполнена, и ты даже справился с гоблинскими
          разбойниками? Неплохо для новичка.
        speaker: Мастер Ювелир
      - remark: За такую доставку я должен дать тебе что-то ценное... Но у меня под
          рукой только инструменты для камней. А тебе нужна защита.
        speaker: Мастер Ювелир
      - remark: Я передам тебе вот это – деревянный щит. Он поможет тебе устоять против
          ударов, пока ты не найдёшь лучшую броню.
        speaker: Мастер Ювелир
      - remark: Береги его. И передай Гаррику, что я благодарен за уголь. Когда ты
          станешь опытнее, мы сможем заняться более серьёзными делами.
        speaker: Мастер Ювелир
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Кх-кх! Чего шаришь тут, человек? Это наши угли! Отдай всё и уходи!
        speaker: Гоблин-вор
      - remark: Мы охраняем эту поляну уже неделю! Никто не уходит с нашими богатствами!
        speaker: Гоблин-вор
      - remark: Уголь нужен кузнецу Гаррику в столице. Я не могу просто отдать его
          вам.
        speaker: Игрок
      - remark: Гаррик? Знаем этого старика! Он платит плохо! А мы продадим уголь
          дороже на рынке!
        speaker: Гоблин-вор
      - remark: Не уйдёшь! Придётся драться!
        speaker: Гоблин-вор
      - remark: Ага! Мы видели твой деревянный меч! Настоящий боец таким не ходит!
        speaker: Гоблин-вор
      - remark: Сейчас мы его отберём и добавим к нашей коллекции!
        speaker: Гоблин-вор
      - remark: Вперед, товарищи! Покажем этому крестьянину, где воры правят!
        speaker: Гоблин-вор
      - remark: Ты уже собрал уголь? Отлично... он станет нашей добычей!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, путешественник. Вижу, у тебя уже есть инструменты, но
          твой меч едва годится для защиты. Я могу предоставить тебе более надёжное
          оружие, но для этого мне нужны материалы.
        speaker: Гаррик Кузнец
      - remark: На окраинах Королевской столицы есть старая Одуванчиковая Поляна.
          Раньше там пасли скот, и остались залежи угля прямо под почвой.
        speaker: Гаррик Кузнец
      - remark: Мне нужен уголь для очистки металла и подготовки ковки. Собери для
          меня немного угля – это поможет мне разжечь печь для будущих работ.
        speaker: Гаррик Кузнец
      - remark: Твоя деревянная кирка вполне подойдёт для добычи угля там. Но будь
          осторожен – поляна давно заброшена, и там могут бродить дикие существа из
          леса.
        speaker: Гаррик Кузнец
      - remark: Добый уголь и вернись ко мне. Если всё сделаешь хорошо, я вознагражу
          тебя более крепким оружием. Чего-чего, а справедливость я всегда соблюдаю.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
