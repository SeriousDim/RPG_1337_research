quest:
  explanation:
    destination:
      character_to_deliver: Гном Брок выбран потому что он отличается от Гаррика Кузнеца
        (другой персонаж) и находится в другой локации (Гномьи Копи). Он также имеет
        в списке предметов, которые может дать после квеста, деревянный меч, который
        соответствует рангу игрока.
      dialogs: Гном Брок находится в Гномьих Копиях. Он принимает уголь и дает награду.
        Диалог объясняет передачу, упоминает встречу с врагами и поясняет награду
        (новый деревянный меч).
    enemy_to_face:
      amount: 2 гоблина создают умеренный вызов для новичка, но не чрезмерный. Игрок
        может победить их своим мечом (2 урона за ход), потребуется около 12 ударов
        на каждого, в сумме 24 удара - приемлемое время битвы.
      dialogs: 'После добычи ресурса игрок встречает Гоблина-воров (ранг 1). Их характеристики
        (урон 3, здоровье 24) сбалансированы для игрока с деревянным мечом (урон 2).
        Диалог объясняет конфликт: гоблины хотят отобрать уголь.'
      enemy: Гоблин-вор выбран как враг ранга 1. Он самый подходящий для уровня игрока
        (первый уровень, деревянный меч). Его урон (3) и здоровье (24) позволяют игроку
        победить двух таких врагов, возможно получая некоторый урон (6-8 за ход),
        но не смертельный при 100 HP.
    resource_to_deliver:
      amount: 3 единицы - достаточное количество для первого квеста, не слишком длительное,
        но дает ощущение задачи.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в стартовом
        городе (Королевская столица), его запросы соответствуют рангу игрока (игрок
        имеет деревянную кирку для угля ранга 1).
      dialogs: Гаррик Кузнец - первый доступный персонаж в Королевской столице. Он
        просит уголь (ранг 1), который игрок может добыть своей деревянной киркой
        (ранг 1). Диалог объясняет задачу, локацию (Одуванчиковая Поляна), цель и
        следующий шаг.
      resource: Уголь выбран потому что его минимальный требуемый ранг инструмента
        (1) соответствует имеющейся у игрока деревянной кирке (ранг 1). Это единственный
        ресурс ранга 1, который игрок может добыть прямо сейчас.
  objective_description: Добыть 3 единицы угля на Одуванчиковой Поляне и доставить
    его гному Броку в Гномьи Копи.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: О, это ты? Гаррик сказал, что ты принесет уголь.
        speaker: Гном Брок
      - remark: Давай посмотрим... Уголь хорошего качества. Как и обещал.
        speaker: Гном Брок
      - remark: Гоблины? Да, они часто шныряют вокруг поляны. Хорошо, что ты справился.
        speaker: Гном Брок
      - remark: Гаррик просил передать тебе это в качестве оплаты. Деревянный меч
          лучше того, что ты носил.
        speaker: Гном Брок
      - remark: Он немного прочнее и нанесет чуть больше урона. Для начала это хорошее
          улучшение.
        speaker: Гном Брок
      - remark: Теперь у тебя есть два одинаковых меча? Не проблема. Можно продать
          один или просто иметь запасной.
        speaker: Гном Брок
      - remark: Если нужна еще работа – приходи. У нас всегда есть дела.
        speaker: Гном Брок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ага! Человек с углем! Это наш уголь!
        speaker: Гоблин-вор
      - remark: Мы тут все ресурсы сторожим! Отдай его и уходи!
        speaker: Гоблин-вор
      - remark: А если не отдашь... Мы сами его заберем!
        speaker: Гоблин-вор
      - remark: Ты один, а нас два! Не стоит сопротивляться!
        speaker: Гоблин-вор
      - remark: Говорили же вам люди не ходить тут!
        speaker: Гоблин-вор
      - remark: Хватай его!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок! Ты выглядишь крепким. Мне нужно немного угля для кузницы,
          но я не могу отлучиться сейчас.
        speaker: Гаррик Кузнец
      - remark: Уголь можно найти на Одуванчиковой Поляне. Это недалеко от столицы.
        speaker: Гаррик Кузнец
      - remark: Просто добыть 3 куска угля с помощью своей кирки. Деревянная кирка
          подойдет, уголь - самый простой материал.
        speaker: Гаррик Кузнец
      - remark: После того как соберешь уголь, отнеси его моему помощнику Броку в
          Гномьи Копи.
        speaker: Гаррик Кузнец
      - remark: Брок знает, как правильно его хранить. Вот его точное местонахождение.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен в пути. Лесные тропы не всегда безопасны.
        speaker: Гаррик Кузнец
      - remark: Если выполнишь работу хорошо, я дам тебе что–то полезное для будущих
          заданий.
        speaker: Гаррик Кузнец
      - remark: Ну что, берешься?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный меч
