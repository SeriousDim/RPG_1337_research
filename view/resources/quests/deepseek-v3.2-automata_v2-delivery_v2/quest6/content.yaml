quest:
  explanation:
    destination:
      character_to_deliver: Мастер Ювелир — другой персонаж в Королевской столице.
        Он логично связан с углем (нужен для печи), и отличается от дающего задание
        персонажа (Гаррик), что соответствует требованию к типу квеста 'Доставка'.
      dialogs: Диалог завершает цикл доставки, объясняет причину передачи угля другому
        персонажу (Мастеру Ювелиру), дает контекст и объявляет награду. Содержит 8
        реплик, поддерживая связность и завершенность истории.
    enemy_to_face:
      amount: Два противника добавляют элемент риска и требуют от игрока стратегии
        (использовать урон по одному врагу за ход), но не делают бой невозможным.
      dialogs: После добычи ресурса игрок встречает группу низкоранговых врагов. Диалог
        объясняет их мотив (грабеж) и создает напряжение. Наличие нескольких врагов
        делает бой чуть сложнее, но игрок с деревянным мечом (урон 2) против двух
        Гоблинов-воров (24 HP каждый) сможет победить, рассчитано на несколько ударов
        каждого.
      enemy: Гоблин-вор имеет ранг 1, урон (3) и здоровье (24). Это самый подходящий
        противник для игрока уровня 1 с текущим уроном и отсутствием брони.
    resource_to_deliver:
      amount: 3 единицы — небольшое, но значимое количество для первого квеста, соответствует
        низкой сложности и времени добычи новичка.
      character: Гаррик Кузнец — начальный персонаж из Королевской столицы, его список
        доступных ресурсов включает уголь (ранг 1). Это идеальный дающий задание для
        1 уровня.
      dialogs: Диалог задает простую, логичную задачу для новичка. Гаррик Кузнец как
        стартовый персонаж (низкие требуемые ресурсы) естественно дает задание на
        уголь (ранг 1). Место добычи (Одуванчиковая Поляна) и количество (3) соответствуют
        рангу инструмента игрока (ранг 1 кирки) и его уровню.
      resource: Уголь имеет ранг 1 и требует инструмент ранга 1. У игрока есть деревянная
        кирка ранга 1, что позволяет ему выполнить задание.
  objective_description: Собрать 3 единицы угля на Одуванчиковой Поляне и доставить
    их Мастеру Ювелиру в Королевской столице.
  parts:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs:
      - remark: О, ты уже вернулся! Гаррик сказал, что ты поможешь.
        speaker: Мастер Ювелир
      - remark: Ага, вижу уголь. Прекрасно, мне нужно разогреть печь для обработки
          рубинов.
        speaker: Мастер Ювелир
      - remark: Спасибо! Такие простые ресурсы, как уголь, часто недооценивают.
        speaker: Мастер Ювелир
      - remark: Но без них даже самые изысканные камни не раскроют свой блеск.
        speaker: Мастер Ювелир
      - remark: За твою помощь я хочу дать тебе это. Не самый дорогой инструмент,
          но надежный.
        speaker: Мастер Ювелир
      - remark: Позолоченный меч. Он уже намного лучше твоего деревянного.
        speaker: Мастер Ювелир
      - remark: 'Пользуйся им с умом. И помни: даже обычный уголь может привести к
          великим свершениям.'
        speaker: Мастер Ювелир
      - remark: Возвращайся, если нужна будет помощь с другими материалами. Удачи!
        speaker: Мастер Ювелир
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй! Чего здесь шаришься? Это наши угольные копилки!
        speaker: Гоблин-вор
      - remark: Не думал, что найду тут добычу. Давай всё, что собрал!
        speaker: Гоблин-вор
      - remark: Мы, гоблины, тоже любим тепло, но забирать его у других нам больше
          нравится.
        speaker: Гоблин-вор
      - remark: Не отдашь добровольно? Тогда придется драться!
        speaker: Гоблин-вор
      - remark: Твоя деревяшка против нас — это смешно. Мы вас таких постоянно грабим!
        speaker: Гоблин-вор
      - remark: Ага, только одного? Думаешь, мы тут по одному ходим? Жди остальных!
        speaker: Гоблин-вор
      - remark: Эй, братва! Здесь одинокий угледобытчик с полной сумкой!
        speaker: Гоблин-вор
      - remark: Хватит болтать! Отбиваем его добычу!
        speaker: Гоблинвор
      - remark: Разбежимся!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, друг! У меня тут небольшая проблема со свежей рудой.
        speaker: Гаррик Кузнец
      - remark: Для новых заказов нужен уголь, но мои подвозчики сегодня заняты.
        speaker: Гаррик Кузнец
      - remark: Если бы ты мог собрать немного угля на Одуванчиковой Поляне и передать
          его моему коллеге, Мастеру Ювелиру...
        speaker: Гаррик Кузнец
      - remark: Ему уголь тоже нужен для подогрева инструментов, и он находится прямо
          здесь, в Королевской столице.
        speaker: Гаррик Кузнец
      - remark: Собери 3 куска угля. Твоя деревянная кирка для этого как раз подойдет.
        speaker: Гаррик Кузнец
      - remark: Мастер Ювелир даст тебе что-то полезное в благодарность. Справишься?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Позолоченный меч
