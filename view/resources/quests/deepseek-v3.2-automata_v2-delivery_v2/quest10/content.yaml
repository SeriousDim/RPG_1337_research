quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревня Речных Лугов выбрана как конечная
        точка доставки. Она отличается от начального персонажа (Гаррик Кузнец), что
        соответствует требованию разных персонажей для начала и завершения квеста.
        В ее 'items_can_be_accepted_for_delivery_or_collection' также есть уголь (ранг
        1), что логично для завершения квеста по доставке этого ресурса.
      dialogs: 'Диалог с Лирой Лекарь дает логическое завершение квеста: уголь нужен
        не только кузнецу, но и лекарю для приготовления лекарств. Это создает связь
        между двумя персонажами и показывает взаимозависимость в мире.'
    enemy_to_face:
      amount: 2 пещерные крысы выбраны для создания небольшого, но ощутимого испытания
        после добычи ресурса. С двумя крысами игрок получит опыт боя с несколькими
        врагами одновременно, оставаясь в относительно безопасных рамках.
      dialogs: 'Диалог с пещерными крысами создает контекст для конфликта: они защищают
        свои угольные запасы. Диалог соответствует фэнтезийному сеттингу и характеру
        монстров низкого уровня.'
      enemy: 'Пещерная крыса выбрана, потому что это враг ранга 1 (for_this_item:
        1). У игрока деревянный меч (damage_per_enemy: 2, enemies_to_hit: 1) и здоровье
        100. У пещерной крысы здоровье 20 и damage_per_turn 2. Игрок теоретически
        может убить крысу за 10 ударов, а крыса убить игрока за 50 ударов - это безопасный
        баланс для первого квеста с возможностью обучения боевой системе.'
    objective_description: Описание цели не упоминает конкретно врагов (пещерных крыс),
      чтобы сохранить элемент неожиданности для игрока, но четко указывает на сбор
      и доставку ресурса.
    resource_to_deliver:
      amount: Требуется 3 единицы угля. Это умеренное количество для первого квеста,
        чтобы не быть слишком грандиозным, но достаточное для ощущения выполнения
        задачи.
      character: Гаррик Кузнец выбран как персонаж из столицы, который может дать
        начальный квест. Он присутствует в списке и его 'items_can_be_accepted_for_delivery_or_collection'
        включает уголь (ранг 1), что соответствует инструментам игрока.
      dialogs: 'Диалог с Гарриком Кузнецом объясняет логическую причину квеста (нужда
        в угле для печи), дает направление (Одуванчиковая Поляна) и предупреждает
        о возможной опасности. Учитывается, что игрок имеет деревянную кирку ранга
        1, которая соответствует минимальному требуемому рангу инструмента для добычи
        угля (min_instrument_rank: 1).'
      resource: Уголь выбран потому, что это ресурс ранга 1 (максимально доступный
        для инструментов игрока ранга 1). Его можно добыть в локации 'Одуванчиковая
        Поляна' (из буферных локаций), которая содержит этот ресурс.
    reward: Каменный меч (ранг 2) выбран как награда, потому что игрок его не имеет
      в инвентаре (у него только деревянный меч ранга 1). Это логичное улучшение оружия
      после первого квеста, которое мотивирует игрока к дальнейшему развитию. Награда
      соответствует списку 'items_can_give_after_quest_finished' Лиры Лекарь.
  objective_description: Добыть уголь для нужд местных мастеров и доставить его нужному
    специалисту.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты принес уголь? Это прекрасно!
        speaker: Лира Лекарь
      - remark: Гаррик мне сообщил, что ты собираешься помочь ему с печью.
        speaker: Лира Лекарь
      - remark: Но я тоже испытываю потребность в хорошем угольном жаре для приготовления
          своих лечебных трав.
        speaker: Лира Лекарь
      - remark: Моя печь в Деревне Речных Лугов требует равномерного и долгого жара,
          который дает именно уголь.
        speaker: Лира Лекарь
      - remark: Если ты передашь мне уголь, который добыл, я смогу приготовить более
          эффективные лекарства.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Шшш! Кто-то приближается к нашей норке!
        speaker: Пещерная крыса
      - remark: Эти угольные запасы наши! Мы охраняем их!
        speaker: Пещерная крыса
      - remark: Не думай, что ты сможешь просто взять и уйти!
        speaker: Пещерная крыса
      - remark: Приготовься к защите, маленький человечек!
        speaker: Пещерная крыса
      - remark: Мы защитим наш дом от любых грабителей!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, дружище! Вижу, ты новенький в столице. У меня тут небольшая
          проблема.
        speaker: Гаррик Кузнец
      - remark: Пламя в моей главной печи начало слабеть, нужно больше угля для поддержания
          температуры.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что на Одуванчиковой Поляне есть небольшие залежи угля рядом
          с горным краем.
        speaker: Гаррик Кузнец
      - remark: Если ты сможешь добыть для меня немного угля, это сильно поможет.
          Деревянная кирка у тебя в руках подойдет.
        speaker: Гаррик Кузнец
      - remark: Но будь осторожен на пути туда - дорога через поляну не всегда безопасна.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
