quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта отличается от Гаррика Кузнеца, выполняя
        правило уникальности персонажей. Она находится в Деревня Речных Лугов, что
        создает элементарную логику перемещения между локациями для новичка.
      dialogs: Диалог с Травницей Мартой (персонаж из Деревня Речных Лугов) завершает
        квест, объясняет цель доставки угля для её работы, подтверждает логику мира
        (она принимает железо и подорожник, может дать каменный меч). Диалог содержит
        10 вхождений, подводит итог.
    enemy_to_face:
      amount: '2 врага выбраны для создания умеренного риска. С одним врагом задача
        слишком легка, с 3+ — слишком опасна для новичка без брони и с простым мечом.
        Это усиливает логику мира: разбойники действуют небольшими группами.'
      dialogs: 'Диалог с Лесным разбойником (ранг 1) отражает типичное поведение низкоранговых
        врагов — грабеж, дерзость. Угроза соответствует логике мира: они грабят возвращающихся
        с ресурсами. Диалог содержит 10 вхождений, включая безмолвные действия.'
      enemy: Лесный разбойник — подходящий враг ранга 1. У игрока деревянный меч (урон
        2), у разбойника здоровье 28 и урон 4. Два разбойника — умеренная угроза для
        игрока с полным здоровьем 100, но возможная для победы при стратегии (у игрока
        нет брони).
    resource_to_deliver:
      amount: 5 единиц — балансирует между простотой добычи (один ресурс имеет низкий
        ранг) и достаточным объёмом для ощущения задачи. Не требует чрезмерного времени.
      character: Гаррик Кузнец — идеальный стартовый персонаж для квеста доставки.
        Он находится в Королевской столице, даёт простые задания и награды, что соответствует
        уровню игрока 1.
      dialogs: 'Диалог с Гарриком Кузнецом (персонаж из Королевской столицы) объясняет
        задание, использует игровую логику: он принимает уголь и одуванчик, но дает
        деревянные инструменты и меч. У игрока есть деревянная кирка (ранг 1), которая
        может добывать уголь (мин. ранг инструмента 1). Ресурс Уголь доступен на локации
        Одуванчиковая Поляна. Количество 5 выбрано как небольшая, но значимая задача
        для новичка, соответствует ранг ресурса 1.'
      resource: Уголь — ресурс ранга 1, который игрок может добыть своей деревянной
        киркой (ранг 1). Сущность соответствует игровому миру.
  objective_description: Доставить 5 единиц угля от кузнеца Гаррика травнице Марте
    в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: О, ты пришел! Гаррик обещал прислать помощь. У тебя уголь?
        speaker: Травница Марта
      - remark: Превосходно! Я готовлю лекарства, но без постоянного огня это невозможно.
        speaker: Травница Марта
      - remark: Лесные разбойники стали настоящей проблемой. Они грабят всех, кто
          идет из столицы к нам.
        speaker: Травница Марта
      - remark: Спасибо, что доставил уголь рискуя собой. Надеюсь, ты не встретил
          их?
        speaker: Травница Марта
      - remark: Если встретил — ты настоящий храбрец. Эта маленькая победа поможет
          нашей деревне.
        speaker: Травница Марта
      - remark: Как награду я могу дать тебе что-то полезное. В моих запасах есть
          каменный меч...
        speaker: Травница Марта
      - remark: Он лучше деревянного. Подойдет для защиты от таких же разбойников
          в будущем.
        speaker: Травница Марта
      - remark: Прими его и будь осторожен в следующих путешествиях.
        speaker: Травница Марта
      - remark: Если Гаррик нуждается в других ресурсах — скажи ему, что я всегда
          рада помочь.
        speaker: Травница Марта
      - remark: Благодарю за службу нашей деревне. Возвращайся к кузнецу — он будет
          ждать.
        speaker: Травница Марта
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй, куда спешишь с таким тяжелым мешком? Это выглядит ценным...
        speaker: Лесной разбойник
      - remark: Мы наблюдали, как ты копал уголь на поляне. Теперь он принадлежит
          нам!
        speaker: Лесный разбойник
      - remark: Отдай уголь добровольно, или мы заберем его силой. У тебя только деревянный
          меч — не серьезный противник.
        speaker: Лесный разбойник
      - remark: Мы не привыкли уступать. Твоя жизнь или ресурсы — выбирай.
        speaker: Лесный разбойник
      - remark: Ха! Попробуй нас победить, если думаешь, что сможешь.
        speaker: Лесный разбойник
      - remark: Такие новички обычно быстро падают. Не трать время на сопротивление.
        speaker: Лесный разбойник
      - remark: Последний шанс отдать уголь. Мы уже взяли в плен нескольких поставщиков.
        speaker: Лесный разбойник
      - remark: (Разбойники перекрывают путь, обнажая свои простые клинки.)
        speaker: ''
      - remark: (Они явно привыкли грабить слабых и не ожидают серьёзного сопротивления.)
        speaker: ''
      - remark: (Бой неизбежен — придется защищать груз.)
        speaker: ''
      enemy: Лесный разбойник
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Добро пожаловать, молодой герой! Вижу, ты уже вооружён деревянным
          мечом — хорошее начало.
        speaker: Гаррик Кузнец
      - remark: 'Моя работа в столице важна: я снабжаю мастеров и стражников качественными
          инструментами.'
        speaker: Гаррик Кузнец
      - remark: Но последние поставки угля из шахт прекратились. Разбойники перекрыли
          дороги к рудникам.
        speaker: Гаррик Кузнец
      - remark: Мне нужен хотя бы небольшой запас, чтобы продолжить работу. Можешь
          помочь?
        speaker: Гаррик Кузнец
      - remark: Добыть уголь можно на Одуванчиковой Поляне. Это безопасное место для
          новичка.
        speaker: Гаррик Кузнец
      - remark: Принеси мне 5 единиц угля. У тебя есть деревянная кирка — она подходит
          для этой задачи.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен на обратной дороге. Лесные разбойники иногда грабят
          возвращающихся с ресурсами.
        speaker: Гаррик Кузнец
      - remark: Если выполнишь заказ, я смогу отправить уголь нашему союзнику, Травнице
          Марте. Она лечит больных травой, но ей тоже нужен уголь для огня в лаборатории.
        speaker: Гаррик Кузнец
      - remark: Договорились? Возьми кирку и отправляйся на поляну.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
