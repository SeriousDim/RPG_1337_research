quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбран потому, что она отличается от Гаррика
        Кузнеца, соответствует требованию. Она может дать награду, которую у игрока
        нет в инвентаре — железную лопату (ранг 2). Это улучшение его текущей деревянной
        лопаты и соответствует её списку возможных наград.
      dialogs: 'Выбран NPC Лира Лекарь, находящийся в Деревне Речных Лугов. Но для
        упрощения первого квеста и избегания необходимости путешествия между локациями,
        диалог адаптирован: Лира находится сейчас в Королевской столице (она может
        быть там по делам, это допустимо в рамках мира). Диалог объясняет связь между
        Гарриком и Лирой, создает логичную цепочку доставки (уголь для кузнеца в деревне).
        Диалог содержит 5 реплик, завершает цикл квеста и приводит к награде.'
    enemy_to_face:
      amount: 2 противника — достаточное количество для создания небольшого боевого
        испытания для новичка с его текущим оружием. Один враг был бы слишком простым,
        три могли быть слишком сложными при учете урона врагов (12 суммарно в ход
        против 100 HP игрока без брони). 2 — балансный выбор.
      dialogs: 'Диалог имитирует голос Лешего и прямую речь Лесного разбойника для
        атмосферности. Лесные разбойники — враги ранга 1, с уроном 4 и здоровьем 28.
        Игрок имеет деревянный меч (урон 2 на одного врага). Расчет: игрок сможет
        убить одного разбойника за 14 ударов (28 HP / 2 урона). При двух врагах это
        будет сложная, но выполнимая битва для новичка (общий урон врагов в ход: 8).
        Соответствует логике, что после добычи ресурса игрок может быть атакован.'
      enemy: Лесной разбойник выбран потому, что это враг ранга 1, самый слабый из
        списка, что соответствует уровню игрока (1) и его слабому оружию. Его можно
        встретить в лесах рядом с Одуванчиковой Поляной (логично).
    resource_to_deliver:
      amount: 5 единиц — умеренное количество для первого квеста, требующее нескольких
        циклов добычи, но не чрезмерное. Это создает небольшую задачу без перегруза.
      character: Гаррик Кузнец выбран потому, что он находится в Королевской столице
        (вероятная стартовая точка), принимает уголь (ранг 1), и его награды (деревянные
        инструменты/меч) не уникальны для игрока (он уже имеет деревянный меч, кирку
        и лопату, но не железную лопату — потенциальная награда у другого NPC).
      dialogs: Выбран начальный NPC Гаррик Кузнец, находящийся в Королевской столице,
        что соответствует стартовой локации игрока (у него нет указания текущей позиции,
        но логично начать там). Он может принимать уголь (ранг 1). Диалог объясняет
        потребность в ресурсе низкого ранга (уголь, ранг 1), который игрок может добыть
        своей деревянной киркой (ранг инструмента = 1, соответствует min_instrument_rank
        угля). Указана локация добычи (Одуванчиковая Поляна), где есть этот ресурс.
        Диалог дает 5 реплик, предупреждает об опасности и соответствует атмосфере
        мира.
      resource: Уголь выбран потому, что его ранг (1) соответствует рангу инструмента
        игрока (деревянная кирка, ранг 1). Min_instrument_rank угля равен 1. Это самый
        базовый ресурс, подходящий для новичка.
  objective_description: Кузнец Гаррик в Королевской столице нуждается в угле для
    своей работы. Собери 5 единиц угля на Одуванчиковой Поляне и доставь их Лире Лекарю
    в столице для дальнейшей отправки в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Я видел, как ты говорил с Гарриком. Он просил меня взять
          уголь, если ты его добудешь.
        speaker: Лира Лекарь
      - remark: Мой супруг, кузнец из Речных Лугов, тоже нуждается в угле для своей
          маленькой мастерской.
        speaker: Лира Лекарь
      - remark: По дороге к ним я могу передать эти угли. Это будет большим подспорьем
          для деревни.
        speaker: Лира Лекарь
      - remark: Гаррик сказал, что ты можешь быть доверенным человеком. Пожалуйста,
          передай мне уголь, который ты собрал.
        speaker: Лира Лекарь
      - remark: Отлично! Все пять кусков здесь. Я немедленно отправлю их. В знак благодарности
          я дам тебе то, что поможет тебе в дальних путешествиях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Кто шагает по нашей земле? Эти угли принадлежат лесным духам!
        speaker: Леший голос из чащи
      - remark: Ха! Слабак с деревянной палкой и киркой? Оставь свои находки и беги,
          пока цел!
        speaker: Лесной разбойник
      - remark: Мы, Лесные Разбойники, охраняем эти залежи. Никто не уйдет с добычей
          бесплатно!
        speaker: Лесной разбойник
      - remark: Попробуй отнять её у нас! Мы покажем, кто здесь главный!
        speaker: Лесной разбойник
      - remark: Готовься к битве, жалкий собиратель!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, странник. Вижу, ты новичок в этих краях. У меня есть небольшое
          дело для тебя.
        speaker: Гаррик Кузнец
      - remark: В моей кузнице недавно закончился уголь. Без него я не могу разогреть
          горн для работы.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне, недалеко от столицы, есть небольшие залежи
          угля. Они не глубокие, твоя деревянная кирка вполне справится.
        speaker: Гаррик Кузнец
      - remark: Собери для меня пять кусков угля. Это поможет мне продолжить работу
          и выполнить заказы для городской стражи.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен на пути. Лес вокруг поляны иногда бывает небезопасным.
          Держи свой деревянный меч наготове.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
