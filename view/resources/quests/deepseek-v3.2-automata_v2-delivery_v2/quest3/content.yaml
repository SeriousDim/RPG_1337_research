quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, находящийся в другой
        локации (Деревня Речных Лугов), что соответствует типу квеста 'Доставка'.
        Она может принимать уголь (согласно её списку), и её роль лекаря создаёт логичную
        причину для получения топлива (для обогрева или стерилизации инструментов).
        Персонажи отправитель и получатель различны, как того требует условие.
      dialogs: Диалог должен подтвердить успешное завершение доставки, связать сюжетно
        отправителя и получателя, а также плавно подвести к выдаче награды. Получатель
        раскрывает причину, по которой ждал ресурс.
    enemy_to_face:
      amount: 1 противник. Для первого квеста и первого боя в сессии это оптимальная
        сложность. Игрок ещё не имеет брони и слабого оружия, поэтому несколько противников
        могли бы сделать квест невыполнимым.
      dialogs: Диалог должен создать ситуацию конфликта из-за добытого ресурса, добавить
        нарративный вес простой задаче доставки и обосновать боевое столкновение.
        Противник пытается ограбить игрока.
      enemy: Лесной разбойник выбран как противник ранга 1 с уроном 4 и здоровьем
        28. С учётом оружия игрока (урон 2) и его полного здоровья (100), бой будет
        напряжённым, но проходимым для новичка. Это соответствует уровню сложности,
        подходящему для игрока 1 уровня.
    objective_description: Описание составлено ясно, указывает на цель (доставку),
      ресурс, его количество, место добычи и конечного NPC. Оно не раскрывает наличие
      врага на пути, чтобы сохранить элемент неожиданности.
    resource_to_deliver:
      amount: 3 единицы — небольшое, но значимое количество, которое заставит игрока
        потратить некоторое время на добычу, но не вызовет чрезмерного гринда на старте
        игры.
      character: Гаррик Кузнец выбран как отправитель квеста, потому что он находится
        в стартовой локации, принимает ресурсы ранга 1, и его тематика (кузнец) логично
        связана с добычей руды (угля).
      dialogs: Диалог должен познакомить игрока с заданием, объяснить причину сбора
        ресурса и дать информацию о месте добычи. Выбран Гаррик Кузнец, так как он
        находится в начальной локации (Королевская столица) и принимает уголь (ранг
        1), который игрок может добыть своей деревянной киркой (ранг инструмента 1).
        Количество (3) — достижимая цель для первого квеста.
      resource: Уголь выбран, потому что это ресурс ранга 1, для добычи которого у
        игрока есть соответствующий инструмент (деревянная кирка с рангом 1). Это
        соответствует текущему уровню игрока.
    reward: Железная лопата (ранг 2) выбрана в качестве награды. Это улучшение по
      сравнению с текущей деревянной лопатой игрока (ранг 1). Данного предмета нет
      в инвентаре игрока, что соответствует требованию. Это полезная награда, которая
      улучшит эффективность добычи трав в будущем, не нарушая баланс ранних уровней.
  objective_description: Доставьте три единицы угля из Одуванчиковой Поляны Лире Лекарю
    в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй. Ты чем-то озабочен?
        speaker: Лира Лекарь
      - remark: Меня попросили передать вам этот уголь от кузнеца Гаррика.
        speaker: Игрок
      - remark: От Гаррика? Интересно... А, понимаю! Зимой у меня в хижине сквозняк,
          а он обещал помочь с печкой.
        speaker: Лира Лекарь
      - remark: Значит, вы ждали эту посылку?
        speaker: Игрок
      - remark: Ждала, хоть он и не предупредил, что пришлёт с посыльным. Большое
          спасибо. Держи, это тебе за труды.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой! Что за ноша у тебя?
        speaker: Лесной разбойник
      - remark: Простой уголь. Пропусти меня.
        speaker: Игрок
      - remark: Уголь? На рынке хоть грош стоит. Отдавай мешок, если жизнь дорога!
        speaker: Лесной разбойник
      - remark: Не отдам. Этим углём кузнец кормит семью.
        speaker: Игрок
      - remark: Ну что ж, тогда заберу его с твоего холодного тела!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Ты выглядишь крепким. Не поможешь ли в простом деле?
        speaker: Гаррик Кузнец
      - remark: В чём дело, мастер?
        speaker: Игрок
      - remark: Мои запасы угля на исходе. Без него не разжечь горн, а заказы копятся.
        speaker: Гаррик Кузнец
      - remark: Где мне его найти?
        speaker: Игрок
      - remark: На Одуванчиковой Поляне, что к востоку от города, есть обнажения старой
          породы. Там и копай.
        speaker: Гаррик Кузнец
      - remark: Принеси три куска. Славно погреюсь у горна да и для тебя монетку сыщу.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я отправляюсь.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Железная лопата
