quest:
  explanation:
    destination:
      character_to_deliver: Гном Брок отличается от Гаррика Кузнеца, что соответствует
        требованию. Он находится в Гномьи Копи, его items_can_be_accepted_for_delivery_or_collection
        включают Железо и Олово (ранг 2 и 3), но логично, что он может принимать и
        более простые ресурсы для подготовки. Он также может дать Железную кирку как
        награду, что соответствует его профилю.
      dialogs: Диалоги с Гномом Броком отражают передачу ресурса от одного персонажа
        другому. Брок находится в Гномьи Копи, другой локации, что делает квест целостным
        (доставка между пунктами). Диалоги подтверждают выполнение задания, задают
        вопрос об испытании (враги) и объясняют награду.
    enemy_to_face:
      amount: 2 врага - оптимальное количество для первого квеста, создаёт небольшое
        препятствие, но не делает задачу непосильной. Это соответствует логике охраны
        ресурсной локации.
      dialogs: Диалоги соответствуют низкоранговому врагу Пещерная крыса (ранг 1).
        Они короткие, агрессивные и соответствуют слабому монстру. Указано, что они
        охраняют поляну, что связывает врага с местом добычи ресурса.
      enemy: Пещерная крыса имеет rank 1, damage_per_turn 2 и health 20. У игрока
        деревянный меч (damage 2). При встрече с 2 крысами игрок сможет одолеть их
        (его урон 2 на одного врага, итого 4 урона за ход против двух крыс с общим
        здоровьем 40). Без брони он получит 4 урона за ход от двух крыс, что допустимо
        при его здоровье 100. Враг соответствует рангу игрока и ресурса.
    resource_to_deliver:
      amount: 5 единиц - умеренное количество для первого квеста, не слишком сложное
        и не слишком простое, соответствует рангу ресурса и инструмента.
      character: Выбран Гаррик Кузнец, так как он является одним из первых доступных
        персонажей в списке, его location - Королевская столица (первичная локация).
        Он может просить ресурсы ранга 1 (Одуванчик), что соответствует инструментам
        игрока.
      dialogs: Диалоги построены на адекватной для новичка задаче. Персонаж Гаррик
        Кузнец находится в Королевской столице, доступен игроку с самого начала. Он
        может просить Одуванчик (ранг 1), который игрок может добыть своей Деревянной
        лопатой (ранг 1). Указано точное количество (5), которое не является чрезмерным
        для первого задания. Диалоги объясняют задачу, предупреждают о опасности и
        указывают на конечного получателя.
      resource: Одуванчик имеет rank 1 и требует min_instrument_rank 1. У игрока есть
        Деревянная лопата rank 1, которая подходит для добычи этого ресурса. Это логичный
        первый ресурс для квеста доставки.
    reward:
      item_name: Железная кирка имеет rank 2. У игрока в инвентаре уже есть Деревянная
        кирка rank 1, поэтому улучшение инструмента является логичной и полезной наградой,
        не повторяющей текущий инвентарь и не нарушающей запрет. Это предмет, который
        персонаж Гном Брок может дать после квеста (он указан в его items_can_give_after_quest_finished).
  objective_description: Добыть 5 Одуванчиков на Одуванчиковой Поляне и доставить
    их Гному Броку в Гномьи Копи
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: О! Ты от Гаррика? Он всегда отправляет новичков с такой работой.
        speaker: Гном Брок
      - remark: Покажи, что ты собрал... Одуванчики, да. Хорошо, они не потревожены,
          листья целы.
        speaker: Гном Брок
      - remark: Интересно, как ты добрался через крыс? Они обычно очень агрессивны
          при виде сборщиков.
        speaker: Гном Брок
      - remark: Вижу, ты справился. Для первого задания это неплохо. Гаррик будет
          доволен.
        speaker: Гном Брок
      - remark: Вот, возьми это в качестве благодарности. Железная кирка. Она прочнее
          деревянной и поможет тебе в будущих сборах.
        speaker: Гном Брок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Шшш... Человек! Отдай свою траву!
        speaker: Пещерная крыса
      - remark: Мы охраняем эту поляну! Ничего не получишь!
        speaker: Пещерная крыса
      - remark: Умри и оставь зелье нам!
        speaker: Пещерная крыса
      - remark: Не думал, что встретишь здесь нас? Теперь это твой последний день!
        speaker: Пещерная крыса
      - remark: Грызь! Грызь его!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: 'Эй, путник! Вижу, ты только начинаешь свой путь. У меня тут небольшая
          проблема: для закалки нового клинка мне нужна особая трава, которая растёт
          только на Одуванчиковой Поляне.'
        speaker: Гаррик Кузнец
      - remark: Но будь осторожен, местность вокруг поляны небезопасна. Там рыскают
          мелкие твари, которые не любят нарушителей.
        speaker: Гаррик Кузнец
      - remark: Мне нужно пять стеблей одуванчика. Их огонь даёт чистый жар, идеальный
          для обработки железа.
        speaker: Гаррик Кузнец
      - remark: Собрать их сможет любой, даже с простой деревянной лопатой. У тебя
          она есть, я видел.
        speaker: Гаррик Кузнец
      - remark: После того как соберешь, отнеси траву моему брату, Броку, в Гномьи
          Копи. Он знает, как её правильно подготовить для моей работы.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Железная кирка
