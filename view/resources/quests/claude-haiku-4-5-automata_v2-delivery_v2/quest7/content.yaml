quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана потому что
        она отличается от Гаррика Кузнеца и находится в другой локации. Она может
        давать задания и награды первого уровня. Её выбор как получательницы ресурса
        создаёт логическую цепь доставки между разными локациями.
      dialogs: Лира Лекарь поздравляет игрока с успехом и выражает благодарность.
        5 фраз позволяют показать её характер как доброго персонажа и обосновать награду
        (лопата полезна для добычи ресурсов).
    enemy_to_face:
      amount: 2 крысы создают сбалансированный вызов - игрок получит немного урона,
        но сможет выжить, так как его здоровье в 5 раз больше, чем урон одного врага
        за ход.
      dialogs: Диалоги пещерной крысы создают конфликт и напряжение. 5 реплик отражают
        натуру слабого врага - злого, но не очень опасного существа. Диалоги помогают
        игроку понять, почему враг защищает ресурс.
      enemy: Пещерная крыса выбрана как враг ранга 1 с 20 HP и 2 урона в ход. Игрок
        с 100 HP и деревянным мечом (2 урона) сможет победить её, но будет сложновато.
        Это создаёт необходимый вызов для первого квеста.
    resource_to_deliver:
      amount: Количество 3 единиц выбрано как оптимальное для начального уровня -
        достаточно вызывающее, но не чрезмерное для игрока уровня 1.
      character: Гаррик Кузнец выбран как персонаж первого уровня, находится в Королевской
        столице. Он может давать задания на добычу ресурсов ранга 1 (уголь и одуванчик),
        что соответствует уровню игрока.
      dialogs: Диалоги Гаррика Кузнеца разворачивают мотивацию персонажа, рассказывают
        о необходимости угля для кузницы. Диалоги содержат 5 фраз, достаточно для
        установления контекста квеста и указания на место добычи ресурса.
      resource: Уголь выбран как ресурс ранга 1, требующий кирку ранга 1 для добычи.
        У игрока есть деревянная кирка, что позволяет выполнить это задание.
  objective_description: Гаррик Кузнец из Королевской столицы просит тебя добыть уголь
    и доставить его Лире Лекарь в Деревню Речных Лугов. Отправляйся на Одуванчиковую
    Поляну и собери необходимое количество угля.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добрый странник! Какой в тебе огонь и отвага!
        speaker: Лира Лекарь
      - remark: Это правда уголь? Откуда же ты его добыл?
        speaker: Лира Лекарь
      - remark: Спасибо тебе за помощь! Теперь я смогу помочь раненым.
        speaker: Лира Лекарь
      - remark: На мой взгляд, ты достоин лучшего оружия, чем то, что у тебя есть.
        speaker: Лира Лекарь
      - remark: Прими эту лопату в знак моей благодарности!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Фррр! Это мой уголь! Никому не отдам!
        speaker: Пещерная крыса
      - remark: Уходи отсюда, путник, или почувствуешь мой гнев!
        speaker: Пещерная крыса
      - remark: Я охраняю эту территорию уже много лет!
        speaker: Пещерная крыса
      - remark: Сражайся, если смеешь!
        speaker: Пещерная крыса
      - remark: Твой деревянный меч бесполезен против меня!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, молодой боец! Мне срочно нужен уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без угля я не смогу ковать новое оружие для защитников королевства.
        speaker: Гаррик Кузнец
      - remark: Принеси мне хотя бы немного угля, и я щедро награжу тебя.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне можно найти и уголь, и одуванчики одновременно.
        speaker: Гаррик Кузнец
      - remark: Поторопись, мне нужен уголь как можно скорее!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
