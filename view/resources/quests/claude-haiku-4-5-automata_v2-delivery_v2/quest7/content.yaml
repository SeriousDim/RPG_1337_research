quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана потому что
        она отличается от Гаррика и принимает одуванчики. Она может дать Деревянную
        лопату, которой у игрока уже есть (поэтому дается как награда для прогрессии
        или обмена).
      dialogs: Пять реплик от Лиры Лекарь, благодарящей игрока, подтверждающей получение
        задания от Гаррика, поздравляющей с победой и объявляющей награду.
    enemy_to_face:
      amount: 2 крысы - достаточно для вызова, но не смертельно для игрока с 100 HP
        и Деревянным мечом.
      dialogs: Пять реплик от пещерных крыс, выражающих враждебность и готовность
        к бою. Создают атмосферу опасности и конфликта при добыче ресурсов.
      enemy: Пещерная крыса выбрана как враг ранга 1 (максимум для уровня игрока).
        Наносит 2 урона в ход, имеет 20 HP - поддается Деревянному мечу (2 урона за
        удар).
    resource_to_deliver:
      amount: 3 одуванчика - небольшое количество, соответствующее новичку уровня
        1 с максимум 50 XP для прогрессии.
      character: Гаррик Кузнец выбран из доступных персонажей Королевской столицы.
        Он может принимать одуванчики (min_instrument_rank 1) и имеет все инструменты
        для наград.
      dialogs: Пять реплик от Гаррика Кузнца, который дает задание. Он просит собрать
        одуванчики, мотивирует игрока наградой, создает атмосферу срочности и опасности.
      resource: Одуванчик выбран как ресурс ранга 1, соответствующий уровню игрока.
        Требует деревянную лопату ранга 1, которая уже есть в инвентаре.
  objective_description: Гаррик Кузнец просит тебя собрать 3 одуванчика из Одуванчиковой
    Поляны и доставить их Лире Лекарю в Деревню Речных Лугов. Помни, что сбор ресурсов
    может быть опасным делом.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, спасибо что пришел! Гаррик говорил мне, что ты придешь с одуванчиками.
        speaker: Лира Лекарь
      - remark: Эти цветы мне очень нужны для приготовления целебного отвара.
        speaker: Лира Лекарь
      - remark: Вижу, что ты прошел через испытания. Ты герой, молодой боец!
        speaker: Лира Лекарь
      - remark: Позволь мне наградить тебя за твою помощь и отвагу.
        speaker: Лира Лекарь
      - remark: Эта деревянная лопата поможет тебе в будущих приключениях!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Писк! Писк! Это мой дом, уходи отсюда!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе украсть наши одуванчики! Защищать буду до конца!
        speaker: Пещерная крыса
      - remark: Приготовься, жалкий человек!
        speaker: Пещерная крыса
      - remark: Мои зубы остры, а мои когти еще острее!
        speaker: Пещерная крыса
      - remark: Это будет коротко и больно!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Одуванчики тоже пригодятся мне для зелий бодрости. Собери для меня
          эти ресурсы.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что это может быть опасно, но я верю в твои способности.
        speaker: Гаррик Кузнец
      - remark: За помощь я щедро тебя вознагражу. Просто вернись живым!
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне нужны эти материалы как можно скорее!
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
