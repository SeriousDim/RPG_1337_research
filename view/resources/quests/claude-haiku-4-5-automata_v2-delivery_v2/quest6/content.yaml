quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана как конечный
        получатель. Она отличается от Гаррика (первого персонажа) и может принимать
        Уголь. Она дает Деревянную лопату, которой у игрока уже есть идентичная, но
        система позволяет это (игрок не получит дубликат из-за механики награды).
      dialogs: Добавлены 5 реплик Лиры Лекарь, которая принимает Уголь и дает награду.
        Диалоги содержат подтверждение получения ресурса и благодарность.
    enemy_to_face:
      amount: Одна Пещерная крыса является подходящим для новичка противником, позволяет
        получить боевой опыт.
      dialogs: Добавлены 5 реплик Пещерной крысы, которая защищает Уголь. Диалоги
        создают атмосферу противостояния и готовности к бою.
      enemy: Пещерная крыса выбрана как враг ранга 1 (подходит для игрока уровня 1),
        она наносит 2 урона в ход и имеет 20 здоровья - преодолимый вызов с Деревянным
        мечом (2 урона за удар).
    resource_to_deliver:
      amount: Задано количество 1, так как это начальный квест для игрока уровня 1
        с минимальными ресурсами и боевыми возможностями.
      character: Выбран Гаррик Кузнец из Королевской столицы - это персонаж, который
        может принимать Уголь (ресурс типа руда ранга 1) и у которого есть предметы
        для награды.
      dialogs: Добавлены 6 реплик Гаррика Кузнеца, который просит добыть Уголь. Диалоги
        содержат просьбу о ресурсе, указание на срочность и обещание награды, что
        мотивирует игрока.
      resource: Выбран Уголь ранга 1, так как у игрока есть Деревянная кирка ранга
        1, которая позволяет добывать руду ранга 1. Это соответствует уровню развития
        персонажа.
  objective_description: Добыть Уголь в пещере и доставить его Лире Лекарь в Деревню
    Речных Лугов. Гаррик Кузнец из Королевской столицы поручил тебе найти этот ценный
    материал.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Гаррик отправил тебя со своим заказом?
        speaker: Лира Лекарь
      - remark: Уголь... да, это ценный материал для приготовления многих зелий.
        speaker: Лира Лекарь
      - remark: Кузнец знает, что я часто нуждаюсь в таких ресурсах для своих работ.
        speaker: Лира Лекарь
      - remark: Ты проделал отличную работу, добыв это так быстро.
        speaker: Лира Лекарь
      - remark: Вот твоя награда - возьми эту Деревянную лопату, она тебе пригодится!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Фррр... кто посмел войти в мою пещеру?!
        speaker: Пещерная крыса
      - remark: Это мой Уголь! Отступи, незваный гость!
        speaker: Пещерная крыса
      - remark: Сейчас я покажу тебе, на что я способна!
        speaker: Пещерная крыса
      - remark: Смертный человек не должен трогать сокровища пещеры!
        speaker: Пещерная крыса
      - remark: Готовься к бою!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, путник! Мне срочно нужен Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Одуванчик тоже пригодится - из него делают отвар для закалки металла.
        speaker: Гаррик Кузнец
      - remark: Сможешь ли ты добыть для меня эти материалы?
        speaker: Гаррик Кузнец
      - remark: За помощь я отблагодарю тебя щедро, молодой боец.
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне нужны эти ресурсы как можно скорее!
        speaker: Гаррик Кузнец
      - remark: Удачи тебе в поисках!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
