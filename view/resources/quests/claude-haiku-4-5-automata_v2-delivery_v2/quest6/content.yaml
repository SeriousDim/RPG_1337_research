quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как персонаж, отличный от Гаррика,
        и расположенная в другой локации. Она принимает именно Уголь ранга 1 и предоставляет
        Железную лопату, которой нет в инвентаре игрока и которая поможет добывать
        ресурсы ранга 2.
      dialogs: Диалоги от Лиры Лекаря из Деревни Речных Лугов - персонажа, который
        принимает Уголь ранга 1 и может дать новый предмет. 5 реплик обогащают нарратив
        и устанавливают связь между персонажами.
    enemy_to_face:
      amount: 2 Пещерные крысы - достаточно для небольшого боевого испытания, которое
        логично встречается при добыче ресурсов в пещере.
      dialogs: Диалоги от лица Пещерной крысы - врага ранга 1, соответствующего уровню
        игрока. 5 реплик создают атмосферу противостояния и добавляют сюжетный элемент
        в квест.
      enemy: Пещерная крыса выбрана как враг ранга 1 с 20 HP и 2 урона в ход - боевой
        вызов для игрока с деревянным мечом (2 урона за удар), требующий тактики.
    resource_to_deliver:
      amount: 3 единицы Угля - разумное количество для первого квеста, не слишком
        сложное, но требующее некоторых усилий.
      character: Гаррик Кузнец выбран как идеальный персонаж для начального квеста
        - он находится в Королевской столице, принимает Уголь ранга 1 (соответствует
        уровню игрока) и предлагает базовое оружие в качестве награды.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который находится в Королевской
        столице. Он просит игрока принести ему Уголь - ресурс ранга 1, соответствующий
        уровню игрока. Диалоги содержат 5 реплик, мотивируя игрока и объясняя суть
        задания.
      resource: Уголь ранга 1 выбран как доступный для игрока уровня 1 ресурс, добываемый
        на Одуванчиковой Поляне с помощью базовых инструментов.
  objective_description: Собрать 3 куска Угля на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов. Уголь можно добыть с помощью деревянной
    киркой или деревянной лопатой.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты добился успеха! Отлично, именно то, что мне нужно.
        speaker: Лира Лекарь
      - remark: Уголь поможет мне в приготовлении целебных снадобий для больных.
        speaker: Лира Лекарь
      - remark: Гаррик хороший друг, часто помогает мне с поставками.
        speaker: Лира Лекарь
      - remark: Вот, держи - Железная лопата. Тебе она пригодится в шахтах.
        speaker: Лира Лекарь
      - remark: Спасибо за помощь, боец. Приходи ещё!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Фффссс! Кто посмел вторгнуться на нашу территорию?
        speaker: Пещерная крыса
      - remark: Это мой Уголь! Уходи отсюда, смертный!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе украсть мои запасы!
        speaker: Пещерная крыса
      - remark: Готовься к бою!
        speaker: Пещерная крыса
      - remark: Ты не сможешь победить нас всех!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без этого ресурса я не смогу выковать новое оружие для защитников
          столицы.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там добывают Уголь.
        speaker: Гаррик Кузнец
      - remark: Принеси мне хотя бы 3 куска Угля, и я щедро вознагражу тебя.
        speaker: Гаррик Кузнец
      - remark: Поспешай, время не ждёт!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
