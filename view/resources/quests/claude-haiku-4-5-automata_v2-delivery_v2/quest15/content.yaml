quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана как получатель,
        отличная от Гаррика. Она логически продолжает цепь и может предложить следующие
        квесты, так как работает с травами и рудой.
      dialogs: Лира Лекарь благодарит игрока и выражает удовлетворение выполненным
        заданием. 5 реплик показывают её признание и готовность к дальнейшему сотрудничеству.
    enemy_to_face:
      amount: '2 крысы создают умеренный вызов без перегрузки: Деревянный меч наносит
        2 урона одному врагу, а игрок имеет 100 HP, что достаточно для победы.'
      dialogs: Диалоги отражают естественное поведение Пещерной крысы - издавание
        звуков, защита территории, призыв подкрепления. Содержит 5 реплик, описывающих
        боевую ситуацию.
      enemy: Пещерная крыса выбрана как враг ранга 1, соответствующий уровню игрока.
        Она имеет 20 HP и 2 урона в ход, что совместимо с Деревянным мечом (2 урона
        за врага).
    resource_to_deliver:
      amount: 3 единицы - оптимальное количество для начинающего игрока уровня 1,
        не слишком обременительное, но достаточное для ощущения прогресса.
      character: Гаррик Кузнец выбран как стартовый персонаж из локации Королевской
        столицы, логично расположен в начале цепочки квестов и подходит для просящего
        уголь.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который объясняет задачу
        и мотивирует игрока. Содержит 6 реплик, информирует о характере задания и
        направляет игрока к следующему этапу.
      resource: Уголь выбран потому что у игрока есть Деревянная кирка (ранг 1), а
        Уголь добывается киркой ранга 1, что соответствует уровню игрока.
  objective_description: Добыть 3 единицы Угля из Одуванчиковой Поляны, используя
    деревянную кирку, а затем доставить ресурсы Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, вот и помощник! Спасибо, что принёс мне эти ресурсы.
        speaker: Лира Лекарь
      - remark: Уголь очень нужен мне для приготовления зелий и лекарств.
        speaker: Лира Лекарь
      - remark: Ты отлично справился с доставкой, несмотря на все опасности в пути.
        speaker: Лира Лекарь
      - remark: Вот, возьми это в награду за твою помощь и мужество!
        speaker: Лира Лекарь
      - remark: Надеюсь, мы ещё будем сотрудничать с тобой в будущем!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук раздаётся из темноты...
        speaker: Пещерная крыса
      - remark: Крыса набросилась, защищая своё логово!
        speaker: Пещерная крыса
      - remark: Она крутится и кусает воздух в попытке добраться до тебя!
        speaker: Пещерная крыса
      - remark: Враг издаёт пронзительный визг, призывая подкрепление!
        speaker: Пещерная крыса
      - remark: Ещё одна крыса выползает из щели в стене!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, молодой боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без этого ресурса я не смогу создавать новое оружие для защитников
          королевства.
        speaker: Гаррик Кузнец
      - remark: Добудь для меня 3 единицы Угля из Одуванчиковой Поляны.
        speaker: Гаррик Кузнец
      - remark: Деревянная кирка у тебя уже есть? Отлично, она подойдёт для добычи.
        speaker: Гаррик Кузнец
      - remark: После добычи отправляйся к Лире Лекарю в Деревню Речных Лугов. Она
          заберёт ресурсы.
        speaker: Гаррик Кузнец
      - remark: Помни, по пути туда тебе придётся преодолеть несколько препятствий.
          Будь готов к встречам!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
