quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому что она находится в Деревне
        Речных Лугов (другое место, нежели Гаррик), имеет разнообразные награды и
        может принимать различные ресурсы. Это создаёт логичную цепочку доставки.
      dialogs: Пять реплик Лиры Лекарь, которая принимает ресурсы и объясняет, почему
        Гаррик отправил его именно к ней. Она благодарит и предоставляет награду.
    enemy_to_face:
      amount: Два врага выбраны, чтобы создать небольшой вызов без излишней сложности
        для новичка уровня 1.
      dialogs: Шесть реплик Пещерной крысы, которые демонстрируют её агрессию и охрану
        ресурсов. Персонаж мотивирован и угрожает игроку.
      enemy: Пещерная крыса выбрана из списка врагов ранга 1, имеет 20 HP и 2 урона
        в ход. Это сбалансировано для игрока с 100 HP и Деревянным мечом (2 урона).
    resource_to_deliver:
      amount: Количество 2 установлено как баланс между необходимостью некоторых усилий
        и разумностью для новичка уровня 1.
      character: Гаррик Кузнец выбран, так как он находится в Королевской столице
        и может давать задания на добычу ресурсов ранга 1 (Уголь). Это идеально для
        уровня 1 игрока.
      dialogs: Пять диалоговых реплик от Гаррика Кузнеца, который объясняет задачу,
        причины, почему ему нужен Уголь, и где его найти. Диалоги остаются в пределах
        5-10 вхождений для части.
      resource: Уголь выбран потому что он доступен для добычи на Одуванчиковой Поляне,
        требует лопату ранга 1 (у игрока есть Деревянная лопата), и соответствует
        рангу 1 игрока.
  objective_description: Добыть два куска Угля в Одуванчиковой Поляне и доставить
    их Лире Лекарь в Деревню Речных Лугов. Гаррик Кузнец попросил помощь в поиске
    ресурсов, но есть согласованность между торговцами.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это из мастерской Гаррика! Спасибо, что доставил уголь.
        speaker: Лира Лекарь
      - remark: Он передал мне весточку, что попросит тебя привести ресурсы именно
          ко мне.
        speaker: Лира Лекарь
      - remark: Это хороший способ проверить преданность помощников. Ты прошёл испытание!
        speaker: Лира Лекарь
      - remark: Возьми это в качестве награды за честное выполнение работы.
        speaker: Лира Лекарь
      - remark: Я всегда готова помочь тем, кто помогает нашему дружественному сообществу.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пиик-пиик! Это мой Уголь!
        speaker: Пещерная крыса
      - remark: Ты не пройдёшь отсюда живым, незваный гость!
        speaker: Пещерная крыса
      - remark: Я буду защищать свои сокровища до последнего!
        speaker: Пещерная крыса
      - remark: Ищешь беду, малыш? Вот она!
        speaker: Пещерная крыса
      - remark: Готовься встретить мою ярость!
        speaker: Пещерная крыса
      - remark: Это было глупо прийти сюда одному!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой путник! Мне срочно нужен Уголь для работы
          в кузне.
        speaker: Гаррик Кузнец
      - remark: Без угля я не смогу разжечь печь и создать новое оружие для защитников
          города.
        speaker: Гаррик Кузнец
      - remark: Слышал, что Уголь можно найти в Одуванчиковой Поляне. Принеси мне
          два куска угля!
        speaker: Гаррик Кузнец
      - remark: За это я щедро вознагражу тебя. Спешу!
        speaker: Гаррик Кузнец
      - remark: Надеюсь, ты справишься с этой задачей быстро.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
