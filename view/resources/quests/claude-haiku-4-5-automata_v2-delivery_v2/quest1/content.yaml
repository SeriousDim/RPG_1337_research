quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана из условия, что она должна отличаться
        от Гаррика Кузнеца. Она находится в отдельной локации (Деревня Речных Лугов)
        и может принимать Одуванчик согласно своему профилю. Она дает Железную лопату
        (ранг 2) в качестве награды, которой нет в инвентаре игрока.
      dialogs: 'Диалоги написаны от лица Лиры Лекари, которая логично принимает Одуванчик
        согласно её профилю (min_instrument_rank: 1 для Одуванчика). Содержат 6 реплик,
        соответствующие требованиям к формату диалогов.'
    enemy_to_face:
      amount: Два врага - это справедливый вызов для игрока уровня 1 с текущим оружием.
      dialogs: Диалоги написаны от лица враждебной Пещерной крысы, которая логично
        может встретиться при сборе ресурсов в пещере или подземных местах. Содержит
        4 реплики, соответствующие требованиям к диалогам.
      enemy: Пещерная крыса выбрана как враг ранга 1 с низкими характеристиками (2
        урона в ход, 20 здоровья), что соответствует боевой мощи игрока с Деревянным
        мечом (2 урона).
    resource_to_deliver:
      amount: Три одуванчика - это малое количество, подходящее для квеста первого
        уровня, не перегружающее игрока.
      character: Гаррик Кузнец выбран потому, что он находится в доступной локации
        (Королевская столица) и может давать задания на добычу Одуванчика и Угля согласно
        его профилю.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который является одним из
        доступных персонажей в Королевской столице. Диалоги содержат ровно 6 реплик,
        что соответствует требованию 5-10 вхождений. Они логично объясняют суть задания
        и мотивируют игрока.
      resource: Одуванчик выбран как самый базовый ресурс (ранг 1) в игре, соответствующий
        уровню 1 игрока. Он требует инструмент ранга 1, который уже есть в инвентаре
        игрока (Деревянная лопата).
  objective_description: Соберите три одуванчика на Одуванчиковой Поляне по просьбе
    Гаррика Кузнеца из Королевской столицы, а затем доставьте их целительнице Лире
    в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Добро пожаловать в мою лавку в Деревне Речных Лугов.
        speaker: Лира Лекарь
      - remark: Гаррик Кузнец отправил меня к вам с одуванчиками.
        speaker: Игрок
      - remark: Отлично! Эти цветы мне очень нужны для моих зелий.
        speaker: Лира Лекарь
      - remark: Спасибо за помощь, ты поступил честно и мужественно.
        speaker: Лира Лекарь
      - remark: Вот твоя награда за доставку!
        speaker: Лира Лекарь
      - remark: Большое спасибо, целительница!
        speaker: Игрок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащие звуки издавала крыса, замечая вторжение в её территорию.
        speaker: Пещерная крыса
      - remark: Это мое место, уходи отсюда!
        speaker: Пещерная крыса
      - remark: Мне нужно пройти дальше, крыса!
        speaker: Игрок
      - remark: Тогда готовься к бою, незваный гость!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне нужна помощь с ресурсами.
        speaker: Гаррик Кузнец
      - remark: Какие ресурсы вам нужны, мастер?
        speaker: Игрок
      - remark: Мне требуется три одуванчика для моих ремесленных нужд.
        speaker: Гаррик Кузнец
      - remark: Они растут на Одуванчиковой Поляне, не так уж далеко отсюда.
        speaker: Гаррик Кузнец
      - remark: Сможешь ли ты принести мне эти цветы?
        speaker: Гаррик Кузнец
      - remark: Конечно, я справлюсь с этой задачей!
        speaker: Игрок
      resource: Одуванчик
  reward:
    item_name: Железная лопата
