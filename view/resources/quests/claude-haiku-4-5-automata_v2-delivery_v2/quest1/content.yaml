quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому что она отличается от Гаррика
        Кузнеца, имеет ранг 1 требования к инструментам, находится в Деревне Речных
        Лугов и может принять ресурсы ранга 1. Логично дополняет цепь квеста.
      dialogs: Пять реплик от Лиры Лекарю, которая принимает ресурсы и объясняет благодарность.
        Естественный диалог благодарности и выдачи награды.
    enemy_to_face:
      amount: Количество 2 врага выбрано чтобы дать реальный вызов игроку с 100 HP
        и деревянным мечом (2 урона за удар).
      dialogs: Три реплики от Пещерной крысы, которая угрожает и готовится к бою.
        Драматизируют встречу.
      enemy: Пещерная крыса выбрана так как имеет ранг 1 (соответствует уровню игрока),
        низкую защиту (20 HP) и наносит минимальный урон (2 за ход), что позволит
        новичку выиграть боевое столкновение с его деревянным мечом.
    resource_to_deliver:
      amount: Количество 2 выбрано как задача средней сложности для новичка, требующая
        целенаправленного поиска.
      character: Гаррик Кузнец выбран потому что он первый персонаж в списке и имеет
        низкий ранг требований (принимает Одуванчик и Уголь ранга 1), что соответствует
        уровню игрока.
      dialogs: Пять реплик от Гаррика Кузнеца, который дает начальное задание на добычу
        ресурса. Диалоги натурально объясняют причину просьбы и цель доставки.
      resource: Одуванчик выбран так как имеет минимальный ранг инструмента (1), что
        соответствует деревянной лопате игрока. Доступен в Одуванчиковой Поляне.
  objective_description: Добыть 2 одуванчика в Одуванчиковой Поляне, затем доставить
    ресурсы сначала Гаррику Кузнецу в Королевскую столицу, после чего передать их
    Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, спасибо что пришел! Гаррик рассказал мне о твоем приходе.
        speaker: Лира Лекарь
      - remark: Эти одуванчики просто необходимы мне для приготовления зелий.
        speaker: Лира Лекарь
      - remark: Уголь тоже пригодится для моей печи.
        speaker: Лира Лекарь
      - remark: Вот твоя награда - новая деревянная лопата!
        speaker: Лира Лекарь
      - remark: Она поможет тебе добывать траву быстрее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Писк! Писк! Это моя территория!
        speaker: Пещерная крыса
      - remark: Ты не пройдешь мимо без боя!
        speaker: Пещерная крыса
      - remark: Готовься к нападению, путник!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой боец! Мне срочно нужен уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Одуванчик тоже пригодится - его цветы помогают мне концентрироваться
          при ковке.
        speaker: Гаррик Кузнец
      - remark: Сумеешь ли ты добыть для меня эти материалы?
        speaker: Гаррик Кузнец
      - remark: Нужно два одуванчика и два куска угля.
        speaker: Гаррик Кузнец
      - remark: После того как соберешь ресурсы, отнеси их Лире Лекарю в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
