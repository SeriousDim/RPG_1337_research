quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана получателем
        ресурса. Она отличается от Гаррика Кузнеца (выполняя требование разных персонажей
        в части 1 и 3). Она принимает Уголь и может выдать Железную лопату, которой
        у игрока нет в инвентаре.
      dialogs: Диалог состоит из 5 реплик Лиры Лекарь, которая принимает ресурс, благодарит
        игрока и выдаёт награду. Реплики показывают её удовлетворение, цель использования
        ресурса и приветливое отношение.
    enemy_to_face:
      amount: 2 Пещерные крысы выбраны чтобы создать небольшую, но реальную угрозу.
        Двум врагам игрок может потребоваться 10-20 ходов боя, что приемлемо для новичка.
      dialogs: Диалог состоит из 3 реплик Пещерной крысы, которые описывают враждебное
        поведение и опасность противника. Реплики передают атмосферу подземного столкновения
        и угрозу.
      enemy: Пещерная крыса ранга 1 выбрана как враг уровня 1 (совпадает с уровнем
        игрока). Враг имеет 20 HP и наносит 2 урона за ход, что позволит игроку с
        деревянным мечом (2 урона) победить её, но со сложностью.
    resource_to_deliver:
      amount: 3 единицы Угля выбраны как умеренное количество для первого квеста,
        не перегружающее новичка, но требующее определённого времени на сбор.
      character: Гаррик Кузнец выбран как персонаж, дающий задание, так как он находится
        в Королевской столице и имеет достаточный уровень авторитета для первого квеста
        новичка (уровень 1).
      dialogs: Диалог состоит из 5 реплик Гаррика Кузнеца, который инициирует квест.
        Персонаж последовательно объясняет задачу, указывает на местонахождение ресурса,
        называет точное количество и упоминает получателя. Каждая реплика раскрывает
        новый элемент квеста.
      resource: Уголь ранга 1 выбран потому, что это ресурс самого низкого уровня,
        доступный игроку с Деревянной киркой ранга 1. Местонахождение - Одуванчиковая
        Поляна, которая содержит Уголь.
  objective_description: Добыть 3 куска Угля в шахтах и доставить их от Гаррика Кузнеца
    к Лире Лекарь в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, наконец-то ты пришёл! Где мой Уголь?
        speaker: Лира Лекарь
      - remark: Отлично! Именно то количество, которое мне было нужно. Ты молод, но
          надёжен.
        speaker: Лира Лекарь
      - remark: Такие ресурсы помогают мне готовить целебные смеси для раненых путников.
        speaker: Лира Лекарь
      - remark: Вот твоя награда - Деревянная лопата. Она пригодится тебе в дальнейших
          приключениях.
        speaker: Лира Лекарь
      - remark: Спасибо за доставку. Вернись, если понадобишься помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук раздаётся из темноты подземелья.
        speaker: Пещерная крыса
      - remark: Грызун стремительно атакует, защищая свою территорию от вторжения!
        speaker: Пещерная крыса
      - remark: Острые зубы блеснули в свете факела. Опасный противник!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, молодой боец! Мне срочно нужен Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: В Одуванчиковой Поляне ты найдёшь всё необходимое. Возьми деревянную
          кирку и приступай!
        speaker: Гаррик Кузнец
      - remark: Не забудь, мне нужно ровно 3 куска Угля. Это не так уж и много для
          начинающего.
        speaker: Гаррик Кузнец
      - remark: После того как соберёшь ресурс, отправляйся в Деревню Речных Лугов
          к Лире Лекарь.
        speaker: Гаррик Кузнец
      - remark: Она ждёт этот Уголь давно. Поспеши, её нетерпение растёт с каждым
          днём!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
