quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана как альтернативный
        персонаж (отличается от Гаррика). Она дает железную лопату ранга 2, которой
        нет у игрока, обеспечивая прогрессию.
      dialogs: 'Диалоги с Лирой Лекарь создают интересную деталь мира: уголь не нужен
        ей напрямую, но она находит применение. Это добавляет глубину игровому миру.
        Использовано 5 реплик.'
    enemy_to_face:
      amount: 1 враг выбран, так как это первый квест, и одного противника достаточно
        для создания ощущения опасности без перегрузки.
      dialogs: Диалоги с врагом создают напряженную атмосферу боевого столкновения.
        Пещерная крыса объясняет свою мотивацию охраны территории, что делает встречу
        логичной в игровом мире. Использовано 5 реплик.
      enemy: Пещерная крыса выбрана как враг ранга 1 с 20 HP и 2 урона в ход, что
        соответствует начальному уровню игрока (100 HP, меч с 2 урона). Это справедливый
        противник для новичка.
    resource_to_deliver:
      amount: 'Количество 2 выбрано как баланс сложности: достаточно для первого квеста,
        но не перегруженная цель.'
      character: Гаррик Кузнец выбран как персонаж уровня 1, находящийся в Королевской
        столице. Он дает базовое оружие и инструменты, что подходит для первого квеста.
      dialogs: 'Диалоги составлены так, чтобы погрузить игрока в атмосферу: Гаррик
        как мастер кузнец объясняет причину своей просьбы, создает срочность и обещает
        награду. Использовано 6 реплик для развития сюжета.'
      resource: Уголь выбран как ресурс ранга 1, требующий лопату ранга 1 (которая
        уже есть у игрока). Это базовый ресурс для начинающего игрока.
  objective_description: Гаррик Кузнец из Королевской столицы просит добыть два куска
    угля с Одуванчиковой Поляны и доставить их лекарке Лире в Деревню Речных Лугов.
    Это простое задание для начинающего авантюриста, которое поможет тебе заработать
    свою первую настоящую награду.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добро пожаловать в нашу деревню Речных Лугов, странник!
        speaker: Лира Лекарь
      - remark: Гаррик прислал тебя? Хм, это интересно.
        speaker: Лира Лекарь
      - remark: Так, уголь... Нет, мне нужны совсем другие ресурсы для моих зелий.
        speaker: Лира Лекарь
      - remark: Но я знаю, что можно с этим углем сделать. Возьму его с благодарностью!
        speaker: Лира Лекарь
      - remark: Вот, держи - эта железная лопата пригодится тебе в дальнейших приключениях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Кррррик! Это МОЙ уголь, чужак!
        speaker: Пещерная крыса
      - remark: Я охраняю эту поляну много лет и не позволю тебе забрать сокровища!
        speaker: Пещерная крыса
      - remark: Мне нужен этот уголь для добрых целей!
        speaker: Игрок
      - remark: Неважно! Я тебя не пущу отсюда живым!
        speaker: Пещерная крыса
      - remark: Защищай свою жизнь, путник!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без угля я не смогу выковать новое оружие для защитников столицы.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там ты найдешь уголь.
        speaker: Гаррик Кузнец
      - remark: Добудь мне два куска угля и верни их мне в столицу.
        speaker: Гаррик Кузнец
      - remark: За это я щедро награжу тебя деревянной лопатой для добычи ресурсов!
        speaker: Гаррик Кузнец
      - remark: Я помогу тебе, Гаррик! Отправляюсь на поляну.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Железная лопата
