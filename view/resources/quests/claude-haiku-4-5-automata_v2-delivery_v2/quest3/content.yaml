quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как альтернативный персонаж уровня
        1 из другого региона (Деревня Речных Лугов). Это создает мини-путешествие
        и логически имеет смысл - кузнец и лекарь сотрудничают, обмениваясь ресурсами.
      dialogs: Добавлены 5 реплик Лиры Лекарь, которая принимает ресурс. Диалоги показывают
        её благодарность и одобрение работы игрока.
    enemy_to_face:
      amount: Одна крыса - минимально сбалансированный вызов для новичка, не перегружающий
        первый контакт с боевой системой.
      dialogs: Добавлены 5 реплик Пещерной крысы, показывающие её враждебный характер
        и территориальность. Диалоги создают атмосферу встречи с монстром.
      enemy: 'Пещерная крыса ранга 1 выбрана как идеальный противник для уровня 1
        игрока: имеет 20 HP и наносит 2 урона в ход, что полностью преодолимо Деревянным
        мечом (2 урона за удар, потребуется 10 ударов).'
    resource_to_deliver:
      amount: Количество 1 соответствует начальному уровню игрока и не требует длительного
        фарма ресурсов.
      character: Гаррик Кузнец выбран как стартовый персонаж уровня 1, находящийся
        в Королевской столице. Он дает базовые ресурсы в качестве награды и логично
        принимает простые материалы.
      dialogs: Добавлены 5 реплик персонажа Гаррика Кузнеца, который дает задание.
        Диалоги натуральны и подходят для начального уровня игрока, показывают его
        роль кузнеца, нуждающегося в материалах.
      resource: Уголь ранга 1 выбран как базовый ресурс, доступный с деревянной лопатой
        ранга 1, которая есть у игрока. Это минимальный уровень сложности для персонажа
        уровня 1.
  objective_description: Добыть Уголь и доставить его от Гаррика Кузнеца в Королевской
    столице к Лире Лекарь в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Гаррик говорил мне, что пришлёт помощника.
        speaker: Лира Лекарь
      - remark: Принёс ли ты Уголь от кузнеца?
        speaker: Лира Лекарь
      - remark: Превосходно! Именно то, что мне было нужно для приготовления зелий.
        speaker: Лира Лекарь
      - remark: Ты хорошо поработал, юный герой.
        speaker: Лира Лекарь
      - remark: Вот награда за твою верность и труд!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Писк!
        speaker: Пещерная крыса
      - remark: Ты вторгаешься на мою территорию!
        speaker: Пещерная крыса
      - remark: Не пройдёшь дальше, незваный гость!
        speaker: Пещерная крыса
      - remark: Защищу своё логово!
        speaker: Пещерная крыса
      - remark: Подготовься к встречу со смертью!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен Уголь для моей кузни.
        speaker: Гаррик Кузнец
      - remark: Одуванчик тоже пригодится - из него я готовлю настойку для закаливания
          металла.
        speaker: Гаррик Кузнец
      - remark: Сможешь ли ты добыть для меня эти материалы?
        speaker: Гаррик Кузнец
      - remark: Я щедро вознагражу тебя за помощь, боец!
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне нужны эти ресурсы как можно скорее!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
