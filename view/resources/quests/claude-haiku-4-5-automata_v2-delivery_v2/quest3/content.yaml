quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как конечный получатель ресурсов,
        потому что она находится в другой локации (Деревня Речных Лугов), что требует
        путешествия, и она отличается от Гаррика. Она может принимать Одуванчик (min_instrument_rank
        1).
      dialogs: Диалоги с Лирой Лекарью содержат 6 реплик, дружелюбный тон, благодарность
        за работу и мотивация продолжать. Она заранее знает о прибытии игрока.
    enemy_to_face:
      amount: 1 враг - минимальное количество, так как это первый квест и игрок еще
        слаб (только деревянный меч с уроном 2).
      dialogs: Диалоги с Пещерной крысой содержат 6 реплик, атмосферные и угрожающие,
        но не пугающие. Враг говорит как типичный дикий зверь.
      enemy: Пещерная крыса выбрана потому что имеет ранг 1 (как и игрок), небольшое
        здоровье (20 HP), и наносит умеренный урон (2 за ход), что позволит игроку
        выжить даже без брони.
    resource_to_deliver:
      amount: 2 единицы Одуванчика - небольшое количество, подходящее для первого
        квеста, учитывая боевые способности игрока.
      character: Гаррик Кузнец выбран как инициатор квеста, так как он находится в
        Королевской столице и имеет минимальный ранг 1, соответствующий уровню игрока.
      dialogs: Диалоги написаны с учетом того, что это первый квест для игрока. Гаррик
        как персонаж выбран из доступных в локации Королевская столица. Тон дружеский
        и мотивирующий, содержит 5 реплик.
      resource: Одуванчик выбран, так как это самый базовый ресурс (ранг 1) в игре,
        требующий инструмента ранга 1, который есть у игрока (деревянная кирка).
  objective_description: Добыть 2 Одуванчика на Одуванчиковой Поляне и доставить их
    Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Гаррик предупредил, что ты придешь.
        speaker: Лира Лекарь
      - remark: Одуванчики? Отлично! Они мне крайне необходимы для моих зелий.
        speaker: Лира Лекарь
      - remark: Вот они. Гаррик просил передать их вам.
        speaker: Игрок
      - remark: Работа сделана отменно. Я очень довольна твоей помощью.
        speaker: Лира Лекарь
      - remark: Вот, прими награду за честный труд. Удачи тебе на пути!
        speaker: Лира Лекарь
      - remark: Приходи еще, если потребуется помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ищу добычу на поляне... Вижу, ты не отступишь!
        speaker: Пещерная крыса
      - remark: Попробуй добыть свои ресурсы, если сможешь!
        speaker: Пещерная крыса
      - remark: Я справлюсь с тобой!
        speaker: Игрок
      - remark: Боишься? Поздно для отступления!
        speaker: Пещерная крыса
      - remark: Позови подмогу, если нужно!
        speaker: Пещерная крыса
      - remark: Сражайся достойно, путник!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, боец! Мне срочно нужен Одуванчик для моих дел.
        speaker: Гаррик Кузнец
      - remark: Одуванчик можно найти на Одуванчиковой Поляне. Ты справишься?
        speaker: Гаррик Кузнец
      - remark: Я найду этот Одуванчик для вас.
        speaker: Игрок
      - remark: Спеши! Мне нужно 2 штуки. После этого отнеси их Лире Лекарю в Деревню
          Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Лира позаботится о доставке. Она моя верная помощница в торговле ресурсами.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
