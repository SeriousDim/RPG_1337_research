quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана, так как она отличается от Гаррика
        Кузнеца, находится в другой локации (Деревня Речных Лугов) и может принимать
        Одуванчик (rank 1).
      dialogs: Пять фраз от Лиры Лекаря, которая получает ресурсы. Она выражает благодарность
        и подтверждает сотрудничество с Гарриком.
    enemy_to_face:
      amount: Одна крыса выбрана как справедливое испытание для начинающего игрока
        со слабым оружием.
      dialogs: Пять фраз от Пещерной крысы, которая встречает игрока при попытке собрать
        ресурсы. Враг проявляет агрессию и вызывает на бой.
      enemy: Пещерная крыса выбрана как враг rank 1 с 20 HP и 2 урона в ход. Соответствует
        уровню игрока с его Деревянным мечом (2 урона в ход, 1 враг).
    resource_to_deliver:
      amount: Количество 3 выбрано как умеренное для первого уровня, требующее несколько
        попыток добычи.
      character: Гаррик Кузнец выбран как персонаж, дающий задание. Он находится в
        Королевской столице и может принимать Одуванчик (rank 1).
      dialogs: Пять фраз от Гаррика Кузнеца, который просит ресурс. Диалоги содержат
        информацию о месте добычи и инструменте, который потребуется.
      resource: Одуванчик выбран как ресурс rank 1, соответствующий уровню игрока
        (level 1) и его инструменту (Деревянная лопата rank 1).
  objective_description: Гаррик Кузнец просит тебя добыть три Одуванчика на Одуванчиковой
    Поляне и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это Одуванчики! Они мне крайне необходимы для зелий.
        speaker: Лира Лекарь
      - remark: Спасибо, что доставил их в целости и сохранности.
        speaker: Лира Лекарь
      - remark: Гаррик и я долго сотрудничаем, и твоя помощь ценна для обоих.
        speaker: Лира Лекарь
      - remark: Вот твоя награда за верную службу!
        speaker: Лира Лекарь
      - remark: Приходи ещё, когда понадобится помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Кто смеет вторгаться в мои владения?
        speaker: Пещерная крыса
      - remark: Я не позволю тебе уйти с этими растениями!
        speaker: Пещерная крыса
      - remark: Приготовься к бою, чужак!
        speaker: Пещерная крыса
      - remark: Мой укус не менее опасен, чем мой взгляд.
        speaker: Пещерная крыса
      - remark: Это будет твоим последним днём!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, боец! Мне срочно нужен Одуванчик для моих работ.
        speaker: Гаррик Кузнец
      - remark: Я слышал, что Одуванчики растут на Одуванчиковой Поляне.
        speaker: Гаррик Кузнец
      - remark: Принеси мне три штуки, и я щедро вознагражу тебя.
        speaker: Гаррик Кузнец
      - remark: Твоя деревянная лопата подойдёт для этого дела.
        speaker: Гаррик Кузнец
      - remark: Жду не дождусь, когда ты вернёшься с ресурсом!
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная кирка
