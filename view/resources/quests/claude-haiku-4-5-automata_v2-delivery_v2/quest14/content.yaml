quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана как получатель
        квеста. Она отличается от Гаррика и принимает Уголь ранга 1, как указано в
        её параметрах.
      dialogs: Лира Лекарь благодарит игрока за уголь и объясняет его применение в
        медицине и зельях. 5 реплик раскрывают её характер и мотивацию. Она дарует
        награду как благодарность.
    enemy_to_face:
      amount: 2 крысы выбраны для обеспечения небольшого боевого испытания, достаточного
        для новичка, но не смертельного. Игрок может победить их, нанося по 10 ударов
        в каждую.
      dialogs: Диалоги от Пещерной крысы добавляют атмосфиватику и драматизм. Враг
        издает характерные звуки и объясняет свою позицию. 3 реплики создают натуральный
        конфликт.
      enemy: Пещерная крыса выбрана как враг ранга 1, соответствующий уровню игрока.
        Имеет 20 HP и 2 урона в ход, что позволяет победить её деревянным мечом (2
        урона) без особых трудностей.
    resource_to_deliver:
      amount: Количество 3 выбрано как баланс между простотой и значимостью задачи
        для новичка. Это достаточно для ощущения прогресса, но не перегружает.
      character: Гаррик Кузнец выбран как персонаж, который дает начальное задание.
        Он принимает Уголь ранга 1, что соответствует уровню игрока (level 1).
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, персонажа 1-го уровня, живущего
        в Королевской столице. Он объясняет игроку, почему ему нужен уголь, и просит
        его добыть ресурс. Всего 5 реплик в диапазоне от 5 до 10.
      resource: Уголь ранга 1 выбран потому, что это базовый ресурс, доступный игроку
        с деревянной киркой на начальном уровне. Он находится в Одуванчиковой Поляне.
  objective_description: Добыть 3 единицы угля и доставить их Лире Лекарю в Деревню
    Речных Лугов. Уголь можно найти в Одуванчиковой Поляне.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, спасибо, что ты здесь! Гаррик рассказал мне о тебе.
        speaker: Лира Лекарь
      - remark: Уголь - важный компонент для моих лечебных снадобий и зелий.
        speaker: Лира Лекарь
      - remark: С его помощью я смогу помочь больным и раненым в нашей деревне.
        speaker: Лира Лекарь
      - remark: Вот, возьми эту лопату - она пригодится тебе в дальнейших путешествиях!
        speaker: Лира Лекарь
      - remark: Спасибо тебе за помощь, благородный путник. Удачи в твоих странствиях!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук... кто осмелился забрать нашу пищу?
        speaker: Пещерная крыса
      - remark: Уходи отсюда, странник, иначе почувствуешь острые зубы!
        speaker: Пещерная крыса
      - remark: Это наша территория, и мы защищаем её до последнего!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, юный воин! Мне срочно нужен уголь для работы.
        speaker: Гаррик Кузнец
      - remark: Без него я не смогу разжечь горн и продолжить ковку оружия.
        speaker: Гаррик Кузнец
      - remark: Сможешь ли ты добыть для меня уголь из Одуванчиковой Поляны?
        speaker: Гаррик Кузнец
      - remark: Награда за помощь щедра - я дам тебе качественный инструмент.
        speaker: Гаррик Кузнец
      - remark: Поспешь, ведь время не ждёт, а заказчики требуют оружие!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
