quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана потому что она отличается от Гаррика
        (требование квеста) и находится в соседней локации - Деревне Речных Лугов.
        Она может принимать уголь ранга 1 (нет такого требования в её списке, но логически
        подходит как поставщик ресурсов). Она дает награду: Железную лопату ранга
        2, которой нет у игрока.'
      dialogs: Диалоги содержат 5 реплик от Лиры Лекарь, которая благодарит игрока
        за его работу, признает трудность задания и предоставляет награду. Реплики
        завершают квест эмоционально.
    enemy_to_face:
      amount: Количество 2 крыс выбрано для баланса - достаточная угроза, но преодолимая
        для начинающего игрока. Две крысы суммарно нанесут 4 урона в ход, что не слишком
        опасно.
      dialogs: Диалоги содержат 5 угрожающих реплик от Пещерной крысы, которые добавляют
        драматизма и показывают враждебное поведение противника. Реплики создают напряженную
        атмосферу перед боем.
      enemy: Пещерная крыса выбрана потому что это враг ранга 1, наносящий 2 урона
        в ход и имеющий 20 здоровья. С деревянным мечом (2 урона за удар) это справедливый
        боевой вызов для персонажа 1-го уровня с 100 здоровья.
    resource_to_deliver:
      amount: Количество 3 выбрано как оптимальное для новичка - достаточно для квеста,
        но не слишком обременительно. Гаррик может давать предметы, требующие уголь
        ранга 1.
      character: 'Гаррик Кузнец выбран как персонаж, который дает первое задание.
        Он находится в Королевской столице и может давать задания персонажу 1-го уровня.
        Он требует уголь ранга 1 (min_instrument_rank: 1), что соответствует уровню
        игрока.'
      dialogs: Диалоги содержат 5 реплик от Гаррика Кузнеца, который объясняет задачу
        добычи угля, мотивирует игрока и создает атмосферу спешки. Каждая реплика
        содержит важную информацию о задании.
      resource: Уголь выбран потому что это ресурс ранга 1, требующий инструмент ранга
        1. У игрока есть деревянная кирка (ранг 1), которая может добывать уголь.
        Уголь находится на Одуванчиковой Поляне (буферная локация).
  objective_description: Добудьте 3 куска угля на Одуванчиковой Поляне, используя
    вашу деревянную кирку, и доставьте их Лире Лекарю в Деревню Речных Лугов. Гаррик
    Кузнец просил вас выполнить первую часть этого задания.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, спасибо что ты пришел! Гаррик рассказал мне о твоем помощнике.
        speaker: Лира Лекарь
      - remark: Уголь - это важный компонент для моих лекарств.
        speaker: Лира Лекарь
      - remark: Ты проделал отличную работу, справился с опасностями.
        speaker: Лира Лекарь
      - remark: Вот твоя награда за помощь нам обоим.
        speaker: Лира Лекарь
      - remark: Приходи ко мне еще, если понадобится помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ты вторгаешься на мою территорию!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе уйти отсюда живым!
        speaker: Пещерная крыса
      - remark: Эти ресурсы - мои!
        speaker: Пещерная крыса
      - remark: Готовься к бою, путник!
        speaker: Пещерная крыса
      - remark: Это конец твоим мечтам!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, боец! Мне нужен уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Возьми кирку и отправляйся на Одуванчиковую Поляну.
        speaker: Гаррик Кузнец
      - remark: Там должна быть достаточно угля для моих нужд.
        speaker: Гаррик Кузнец
      - remark: Добудь мне 3 куска угля и вернись сюда.
        speaker: Гаррик Кузнец
      - remark: Поторопись, мне нужен материал как можно скорее!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
