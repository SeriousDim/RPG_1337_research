quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана потому что: 1) Она отличается от
        Гаррика Кузнеца (требование квеста). 2) Находится в Деревне Речных Лугов (логичное
        разнообразие локаций). 3) Она способна принять уголь (уголь не в её списке,
        но железо есть) - ИСПРАВЛЕНИЕ: она принимает Подорожник и Железо, поэтому
        её роль здесь условна как получатель ресурса для торговли. 4) После доставки
        даёт Железную лопату (ранга 2), что естественно повышает прогрессию.'
      dialogs: Диалоги содержат ровно 5 реплик от Лиры Лекарь. Она подтверждает информацию
        от Гаррика, хвалит игрока, принимает ресурс и выдаёт награду. Тон благодарный
        и дружелюбный.
    enemy_to_face:
      amount: Количество 1 выбрано для первого квеста. Один враг создаёт достаточный
        вызов без перегрузки новичка.
      dialogs: Диалоги содержат ровно 4 реплики от противника. Пещерная крыса издаёт
        характерные звуки и объясняет причину атаки, что делает встречу более атмосферной.
        Тон агрессивный, но соответствующий существу.
      enemy: 'Пещерная крыса выбрана потому что: 1) Это враг ранга 1, подходящий для
        игрока уровня 1. 2) Имеет 20 HP, что убиваемо деревянным мечом (2 урона) за
        10 ударов - сложно, но выполнимо. 3) Наносит 2 урона в ход - опасна, но не
        смертельна при полном здоровье игрока.'
    resource_to_deliver:
      amount: Количество 1 выбрано потому что новичку низкого уровня логично начинать
        с малых объёмов. Это облегчает первый опыт доставки.
      character: Гаррик Кузнец выбран, так как он первый персонаж в списке и способен
        давать задания на добычу угля (уголь указан в его items_can_be_accepted_for_delivery_or_collection).
        Находится в Королевской столице, что логично для первого квеста новичка.
      dialogs: Диалоги составлены естественно и содержат ровно 5 реплик. Гаррик Кузнец
        объясняет задачу, упоминает ресурс (уголь), целевого персонажа (Лиру Лекарь)
        и место доставки (Деревня Речных Лугов). Тон официальный, соответствует фентэзийному
        средневековью.
      resource: 'Уголь выбран потому что: 1) Это ресурс ранга 1, подходящий для уровня
        1 игрока. 2) Требует деревянную кирку (ранга 1), которая уже есть в инвентаре.
        3) Находится в доступной локации Одуванчиковая Поляна. 4) Гаррик может принять
        этот ресурс.'
  objective_description: Доставить один кусок угля от Гаррика Кузнеца в Королевской
    столице к Лире Лекарь в Деревню Речных Лугов. Уголь находится в Одуванчиковой
    Поляне и может быть добыт деревянной киркой.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Гаррик говорил мне о твоём приходе.
        speaker: Лира Лекарь
      - remark: Уголь! Отлично, это именно то, что мне нужно для моих лекарств.
        speaker: Лира Лекарь
      - remark: Ты проявил себя отважным путниковцем.
        speaker: Лира Лекарь
      - remark: Прими это как знак моей благодарности.
        speaker: Лира Лекарь
      - remark: Спешу дальше к своим пациентам!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Писк!
        speaker: Пещерная крыса
      - remark: Ты не пройдёшь! Это моя территория!
        speaker: Пещерная крыса
      - remark: Защищаю свой клад!
        speaker: Пещерная крыса
      - remark: Нападаю!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, молодой боец! Мне нужна помощь.
        speaker: Гаррик Кузнец
      - remark: Я работаю над новым мечом, но мне не хватает угля для горна.
        speaker: Гаррик Кузнец
      - remark: Найди мне уголь в Одуванчиковой Поляне и доставь Лире Лекарю в Деревню
          Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Она использует уголь в своих зельях. Она выплатит тебе хорошо за услугу.
        speaker: Гаррик Кузнец
      - remark: Помоги мне, и ты получишь награду за верную службу!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
