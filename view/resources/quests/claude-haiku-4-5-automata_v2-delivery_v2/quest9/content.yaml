quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана как персонаж из Деревни Речных Лугов,
        отличный от Гаррика Кузнеца. В её списке принимаемых ресурсов есть Уголь (min_instrument_rank:
        1, rank: 1), что позволяет ей логично принять этот ресурс. Она находится в
        другой локации, что создает правильную структуру квеста ''Доставка''.'
      dialogs: Диалоги от лица Лиры Лекаря благодарно принимают доставленный ресурс
        и объясняют, зачем ей нужен уголь. Всего 5 реплик, завершающих квест и переходящих
        к выдаче награды. Диалоги подтверждают, что ресурс получен и квест выполнен.
    enemy_to_face:
      amount: Количество 2 выбрано для создания небольшого вызова. Игрок с текущим
        оружием справится за несколько ходов боя, но будет ощущать реальную угрозу,
        учитывая, что у него нет брони и его максимум здоровья составляет 100 HP.
      dialogs: Диалоги написаны от лица Пещерной крысы - враждебного существа, которое
        встречается в пещерах и подземельях. Всего 5 реплик, показывающих агрессию
        и готовность к бою. Диалоги создают атмосферу опасности.
      enemy: 'Пещерная крыса выбрана потому, что это враг ранга 1 (max_possible: 10,
        for_this_item: 1) с 20 HP и 2 урона в ход. Игрок с деревянным мечом (2 урона
        за врага) может одолеть такого противника. Это уместный враг для начальника
        уровня 1.'
    resource_to_deliver:
      amount: Количество 3 выбрано как разумный баланс для новичка - достаточно, чтобы
        потребовать несколько боёв, но не переусложнено. Игрок должен иметь возможность
        добыть это количество за несколько попыток.
      character: 'Гаррик Кузнец выбран, поскольку у него есть Уголь в списке ресурсов
        для сбора (min_instrument_rank: 1, rank: 1), и он находится в Королевской
        столице. Он является первым персонажем в цепочке квестов, который может выдать
        задание новичку.'
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который работает в Королевской
        столице. Он объясняет игроку, что ему нужен Уголь, указывает на локацию его
        добычи (Одуванчиковая Поляна) и дает указание доставить ресурс Лире Лекарю.
        Всего 5 диалогических реплик, что находится в пределах требования 5-10 вхождений.
      resource: Уголь выбран потому, что это ресурс ранга 1, доступный для игрока
        уровня 1 с деревянной киркой ранга 1. Он добывается в Одуванчиковой Поляне
        и находится в списке ресурсов, которые Гаррик может принимать.
  objective_description: Собери 3 куска Угля в Одуванчиковой Поляне и доставь их Лире
    Лекарю в Деревню Речных Лугов. По пути будь осторожен с опасностями, которые могут
    встретиться на твоем пути.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты принес мне уголь? Отлично! Это именно то, что мне было нужно.
        speaker: Лира Лекарь
      - remark: Уголь поможет мне приготовить целебные настои и зелья.
        speaker: Лира Лекарь
      - remark: Ты отлично справился с этой задачей, молодец!
        speaker: Лира Лекарь
      - remark: Твое упорство достойно награды. Возьми эту лопату.
        speaker: Лира Лекарь
      - remark: Она послужит тебе верно в будущих приключениях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук... Кто смеет вторгаться в мои владения?
        speaker: Пещерная крыса
      - remark: Я защищаю эти земли! Не пройдешь отсюда!
        speaker: Пещерная крыса
      - remark: Приготовься к бою, путник!
        speaker: Пещерная крыса
      - remark: Мой укус будет твоим концом!
        speaker: Пещерная крыса
      - remark: Аррррр!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без угля я не смогу плавить металл. Принеси мне 3 куска Угля.
        speaker: Гаррик Кузнец
      - remark: Уголь можно найти в Одуванчиковой Поляне. Там его много.
        speaker: Гаррик Кузнец
      - remark: Когда соберешь уголь, отнеси его Лире Лекарю в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Спеши! Мне нужен уголь как можно скорее для работы.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
