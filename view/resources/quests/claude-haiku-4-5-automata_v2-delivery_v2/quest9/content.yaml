quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как персонаж ранга 2, расположенный
        в Деревне Речных Лугов. Она может принимать Уголь (руда ранга 1) и отличается
        от Гаррика, соответствуя требованию о разных персонажах в начале и конце квеста.
        Она предоставляет логичную мотивацию для получения Угля.
      dialogs: Пять реплик Лиры Лекарь, которые подтверждают связь между Гаррико и
        ней, объясняют, почему ей нужен Уголь, и благодарят игрока за помощь. Диалоги
        создают связную цепь квеста.
    enemy_to_face:
      amount: Одна Пещерная крыса - достаточно для игрока уровня 1, чтобы создать
        вызов без чрезмерного риска смерти (игрок имеет 100 HP).
      dialogs: Пять реплик Пещерной крысы, которые создают атмосферу встречи с врагом,
        выражают враждебность и готовность к бою. Диалоги мотивируют интенсивность
        конфликта.
      enemy: Пещерная крыса выбрана как враг ранга 1 (соответствует уровню игрока).
        Она имеет 20 HP и наносит 2 урона за ход, что соответствует начальному уровню
        сложности и деревянному мечу игрока (2 урона).
    resource_to_deliver:
      amount: Количество 2 куска Угля выбрано как простое, но не тривиальное для игрока
        уровня 1, чтобы потребовать некоторые усилия.
      character: Гаррик Кузнец выбран как персонаж уровня 1, что соответствует уровню
        игрока. Он расположен в Королевской столице и может принимать Уголь (руда
        ранга 1).
      dialogs: Пять реплик Гаррика Кузнеца, которые устанавливают контекст квеста,
        просят помощь и мотивируют игрока выполнить задание. Диалоги содержат информацию
        о месте добычи (Одуванчиковая Поляна) и количестве ресурса.
      resource: Уголь выбран, так как это ресурс ранга 1, требующий инструмент ранга
        1 (деревянную киркую, которая есть у игрока). Он доступен в Одуванчиковой
        Поляне.
  objective_description: Гаррик Кузнец просит тебя добыть 2 куска Угля в Одуванчиковой
    Поляне, а затем доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, рад видеть тебя! Слышал, ты добыл Уголь в Одуванчиковой Поляне?
        speaker: Лира Лекарь
      - remark: Гаррик отправил тебя ко мне? Отлично, нужен мне этот материал.
        speaker: Лира Лекарь
      - remark: Уголь - отличный компонент для моих целебных снадобий и припарок.
        speaker: Лира Лекарь
      - remark: За такую помощь я вознагражу тебя по достоинству.
        speaker: Лира Лекарь
      - remark: Вот, возьми эту лопату - она пригодится тебе в будущих путешествиях!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Пищащий звук! Ты вторгаешься на мою территорию?
        speaker: Пещерная крыса
      - remark: Я не позволю тебе спокойно добывать ресурсы!
        speaker: Пещерная крыса
      - remark: Готовься к бою, незваный гость!
        speaker: Пещерная крыса
      - remark: Это будет твоим последним днём здесь!
        speaker: Пещерная крыса
      - remark: Атакую!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, путник! Мне срочно нужен Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Я слышал, что Уголь можно найти в Одуванчиковой Поляне. Доставь мне
          2 куска Угля!
        speaker: Гаррик Кузнец
      - remark: Это не сложная задача для молодого воина вроде тебя.
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне нужно завершить заказ к концу дня.
        speaker: Гаррик Кузнец
      - remark: Возьми мой совет - будь осторожен в пути!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
