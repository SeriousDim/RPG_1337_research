quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель ресурса, так как она
        отличается от Гаррика Кузнеца, находится в Деревне Речных Лугов (логичная
        локация), и принимает Уголь (ранг 1) в соответствии с её профилем персонажа.
      dialogs: Диалоги содержат ровно 5 реплик от Лиры Лекарей. Они подтверждают получение
        задания от Гаррика, объясняют назначение ресурса, благодарят игрока и предлагают
        награду.
    enemy_to_face:
      amount: Количество 2 противников выбрано как балансированный вызов для игрока
        на уровне 1 с имеющимся оружием (требуется 10 ударов на одного врага, всего
        20 ударов, игрок выживет).
      dialogs: Диалоги содержат ровно 5 реплик от Пещерной крысы. Они описывают действия
        и поведение противника, создавая атмосферу опасности и предчувствия боя.
      enemy: Пещерная крыса (ранг 1, 20 HP, 2 урона в ход) выбрана как противник,
        соответствующий уровню 1 игрока с Деревянным мечом (2 урона). Она находится
        в логичной локации для добычи Угля.
    resource_to_deliver:
      amount: Количество 2 единицы Угля выбрано как оптимальный объём для игрока уровня
        1, который может добыть ресурс и пройти боевой контент квеста.
      character: Гаррик Кузнец выбран как отправитель квеста, так как он находится
        в Королевской столице и принимает Уголь (ранг 1) в качестве ресурса. Он подходит
        новичку уровня 1.
      dialogs: Диалоги содержат ровно 5 реплик от Гаррика Кузнеца. Они создают атмосферу
        срочности, объясняют задачу, указывают на местоположение ресурсов и дают практический
        совет о деревянной кирке. Это соответствует требованиям квеста доставки уровня
        1.
      resource: Уголь (ранг 1) выбран, так как он доступен в локации Одуванчиковая
        Поляна при помощи Деревянной кирки (ранг 1), которая уже есть в инвентаре
        игрока.
  objective_description: Гаррик Кузнец попросил тебя добыть 2 единицы Угля из Одуванчиковой
    Поляны и доставить их Лире Лекарю в Деревню Речных Лугов. Используй свою Деревянную
    кирку для добычи ресурса.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Рада видеть тебя! Гаррик отправил тебя ко мне?
        speaker: Лира Лекарь
      - remark: Уголь очень нужен мне для приготовления зелий.
        speaker: Лира Лекарь
      - remark: Ты проделал опасный путь, спасибо тебе за помощь.
        speaker: Лира Лекарь
      - remark: Твоя помощь позволит мне лечить больных людей в деревне.
        speaker: Лира Лекарь
      - remark: Вот, возьми это в награду за твоё мужество!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук раздаётся из темноты пещеры!
        speaker: Пещерная крыса
      - remark: Крыса бросается на тебя с безумным взглядом в глазах!
        speaker: Пещерная крыса
      - remark: Маленькое, но опасное создание преграждает тебе путь к углю!
        speaker: Пещерная крыса
      - remark: Её острые зубы блеснули в свете факела!
        speaker: Пещерная крыса
      - remark: Крыса издаёт рычащие звуки, защищая свою территорию!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Одуванчиковая Поляна находится недалеко отсюда. Там ты найдёшь оба
          ресурса.
        speaker: Гаррик Кузнец
      - remark: Принеси мне Уголь, и я смогу продолжить свою работу.
        speaker: Гаррик Кузнец
      - remark: Деревянной киркой ты сможешь добыть руду без проблем.
        speaker: Гаррик Кузнец
      - remark: Торопись! Мне нужен этот ресурс как можно скорее!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
