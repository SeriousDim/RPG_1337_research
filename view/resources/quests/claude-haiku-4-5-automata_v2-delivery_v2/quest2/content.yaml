quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь находится в Деревне Речных Лугов и отличается
        от Гаррика. Она может принять Подорожник (ранг 2) и Железо (ранг 2), также
        входящие в её список принимаемых ресурсов. Выбрана как получатель Одуванчика
        для разнообразия.
      dialogs: Диалоги Лиры Лекарь благодарны и радостны. Она признаёт роль Гаррика
        и объясняет использование ресурса. Всего 5 реплик, в диапазоне требуемого.
    enemy_to_face:
      amount: 2 крысы - небольшой отряд, соответствующий уровню новичка и не требующий
        броню для выживания.
      dialogs: Диалоги от Пещерной крысы создают атмосферу встречи с противником.
        Это враг ранга 1, подходящий для уровня 1 игрока. Всего 5 реплик врага.
      enemy: Пещерная крыса выбрана как враг ранга 1 (соответствует уровню игрока),
        имеет 20 HP и 2 урона за ход. С Деревянным мечом (2 урона) игрок может одолеть
        её без серьёзного риска.
    resource_to_deliver:
      amount: 3 Одуванчика - небольшое количество, соответствующее уровню новичка
        и его текущему прогрессу.
      character: Гаррик Кузнец выбран потому, что он находится в списке уже сгенерированных
        персонажей и готов принять Одуванчик (ранг 1) и Уголь (ранг 1).
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который находится в Королевской
        столице. Он объясняет игроку суть задания - найти Одуванчики. Всего 5 реплик
        в диапазоне требуемых 5-10.
      resource: Одуванчик выбран как ресурс ранга 1, соответствующий уровню игрока
        (уровень 1). Его можно добыть деревянной лопатой на Одуванчиковой Поляне.
  objective_description: Собери 3 Одуванчика на Одуванчиковой Поляне и доставь их
    Лире Лекарю в Деревню Речных Лугов. Гаррик Кузнец из Королевской столицы передал
    тебе это поручение.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты принёс мне Одуванчик! Как замечательно!
        speaker: Лира Лекарь
      - remark: Гаррик просил тебя это доставить? Мудрый выбор с его стороны.
        speaker: Лира Лекарь
      - remark: Эти растения очень помогают мне в приготовлении целебных зелий.
        speaker: Лира Лекарь
      - remark: Спасибо тебе за помощь! Держи мою благодарность.
        speaker: Лира Лекарь
      - remark: Приходи ко мне ещё, если нужна помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ты осмелился войти в наши владения?
        speaker: Пещерная крыса
      - remark: Не пройдёшь! Это наша территория!
        speaker: Пещерная крыса
      - remark: Готовься к бою, чужак!
        speaker: Пещерная крыса
      - remark: Ты пожалеешь, что пришёл сюда!
        speaker: Пещерная крыса
      - remark: Атакуй!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен Одуванчик для моих
          работ.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну и собери для меня это растение.
        speaker: Гаррик Кузнец
      - remark: Я знаю, это может быть опасно, но я верю в тебя!
        speaker: Гаррик Кузнец
      - remark: Принеси мне ровно 3 Одуванчика, и я щедро вознагражу твой труд.
        speaker: Гаррик Кузнец
      - remark: Поспеши! Мне это нужно как можно скорее.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
