quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана из уже сгенерированных персонажей
        (отличается от Гаррика). Находится в Деревне Речных Лугов. Может принять Уголь
        (min_instrument_rank: 1, ранг ресурса 1 доступен для неё). Логично, что лекарь
        нуждается в углях для своих зелий.'
      dialogs: Диалоги содержат 5 реплик от Лиры Лекарь, включая приветствие, вопрос
        о происхождении ресурса, благодарность и предложение награды. Показывают её
        интерес к углю для лечебных целей.
    enemy_to_face:
      amount: 2 крысы представляют небольшой вызов для игрока уровня 1, соответствуя
        его боевым возможностям и уровню здоровья (100 HP). Не должны привести к смерти
        игрока, но создают реальную угрозу.
      dialogs: Диалоги содержат 5 реплик от Пещерной крысы, выражающих её угрозу и
        защиту территории. Создают атмосферу конфликта между игроком и монстром за
        ресурс.
      enemy: 'Пещерная крыса выбрана как враг ранга 1 (max_possible: 10). Имеет 20
        HP и 2 урона за ход, что соответствует новичку с деревянным мечом (2 урона
        за удар). Находится логично в месте добычи руды.'
    resource_to_deliver:
      amount: 3 единицы угля - справедливое количество для начинающего игрока уровня
        1, требующее нескольких попыток добычи на начальной локации.
      character: 'Гаррик Кузнец выбран из уже сгенерированных персонажей. Он находится
        в Королевской столице и может принять Уголь по своему профилю (min_instrument_rank:
        1).'
      dialogs: Диалоги содержат 5 реплик от Гаррика Кузнеца, включая приветствие,
        просьбу о помощи, подсказку о локации и обещание награды. Объясняют причину
        квеста и мотивируют игрока.
      resource: Уголь выбран как ресурс ранга 1 (руда), соответствующий уровню игрока
        (уровень 1). Требует инструмент ранга 1, а у игрока есть деревянная лопата
        именно этого ранга.
  objective_description: Соберите 3 единицы Угля в Одуванчиковой Поляне и доставьте
    их Лире Лекарь в Деревню Речных Лугов. Гаррик Кузнец просил вас помочь с этой
    важной задачей.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добро пожаловать в мою лавку! Что тебе нужно?
        speaker: Лира Лекарь
      - remark: Уголь? Интересно, откуда ты его взял?
        speaker: Лира Лекарь
      - remark: Спасибо, это очень полезно для моих зелий и припарок!
        speaker: Лира Лекарь
      - remark: Ты помог мне больше, чем ты думаешь, доверху путник.
        speaker: Лира Лекарь
      - remark: Прими это в качестве благодарности за твой труд!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Писк-писк! Кто смеет входить в мою территорию?!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе забрать уголь! Это мое!
        speaker: Пещерная крыса
      - remark: Защищай себя, путник!
        speaker: Пещерная крыса
      - remark: Мои когти остры, а зубы еще острее!
        speaker: Пещерная крыса
      - remark: Уходи или встретишь свой конец!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Мне срочно нужен Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Сможешь ли ты добыть для меня хотя бы немного угля?
        speaker: Гаррик Кузнец
      - remark: Я слышал, что уголь можно найти в Одуванчиковой Поляне. Проверь там!
        speaker: Гаррик Кузнец
      - remark: За помощь я щедро вознагражу тебя, не беспокойся.
        speaker: Гаррик Кузнец
      - remark: Жду твоего возвращения, молодой боец!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
