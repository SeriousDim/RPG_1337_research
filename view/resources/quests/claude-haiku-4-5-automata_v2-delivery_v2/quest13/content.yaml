quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь - персонаж уровня 1 из Деревни Речных Лугов,
        отличается от Гаррика. Находится в одном из первичных локаций, доступна для
        игрока.
      dialogs: Пять реплик от Лиры Лекарь, которая являяется получателем ресурса.
        Она признает игрока, упоминает Гаррика и выдает награду.
    enemy_to_face:
      amount: Одна крыса - адекватный вызов для новичка, не перегружает и не скучает.
      dialogs: Пять реплик от Пещерной крысы, демонстрирующие её агрессию и охрану
        ресурсов. Стиль речи подходит невысокому интеллекту существа.
      enemy: Пещерная крыса - враг ранга 1 с 20 HP и 2 урона за ход. Легко побеждается
        деревянным мечом игрока (2 урона), требует 10 ударов. Соответствует уровню
        1 игрока.
    resource_to_deliver:
      amount: Количество 1 соответствует начальному уровню сложности и не перегружает
        новичка.
      character: Гаррик Кузнец - персонаж первого уровня из Королевской столицы, находится
        в начале цепочки персонажей. Подходит для новичка уровня 1.
      dialogs: Пять строк диалога от Гаррика Кузнеца, который выступает в роли квестодателя.
        Он объясняет срочность задачи, указывает локацию (Одуванчиковая Поляна) и
        убеждает игрока помочь ему.
      resource: Уголь - руда ранга 1, которую можно добыть деревянной киркой (ранг
        1) на Одуванчиковой Поляне. Совпадает с инструментом игрока.
  objective_description: Гаррик Кузнец просит тебя добыть один кусок Угля с Одуванчиковой
    Поляны и доставить его Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, я вижу, что ты прошел испытание на Одуванчиковой Поляне.
        speaker: Лира Лекарь
      - remark: Гаррик послал тебя ко мне? Он хороший товарищ.
        speaker: Лира Лекарь
      - remark: Этот уголь будет использован для чего-то важного, я уверена.
        speaker: Лира Лекарь
      - remark: Вот твоя награда за верную службу!
        speaker: Лира Лекарь
      - remark: Приходи еще, если понадобится моя помощь.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Кь-кь-кь! Ты осмелился вторгнуться в мои владения?
        speaker: Пещерная крыса
      - remark: Это мои ресурсы, грязный искатель приключений!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе забрать хотя бы песчинку!
        speaker: Пещерная крыса
      - remark: Приготовься к худшему, захватчик!
        speaker: Пещерная крыса
      - remark: Моя острая шерсть рассекает плоть, подумай дважды!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что это нелегко, но ты ведь крепкий парень?
        speaker: Гаррик Кузнец
      - remark: Одуванчиковая Поляна полна угля. Принеси мне хотя бы один кусок.
        speaker: Гаррик Кузнец
      - remark: Это важно для моей работы, я не могу без него продолжать.
        speaker: Гаррик Кузнец
      - remark: Вернись с ресурсом, и я тебя вознагражу!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
