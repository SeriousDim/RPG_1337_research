quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов выбрана как получательница
        ресурса. Она отличается от Гаррика Кузнеца, что соответствует требованиям
        квеста. Она находится на соседней локации, что логично для доставки.
      dialogs: 5 реплик от Лиры Лекаря показывают её благодарность и узнаваемость
        характера. Она признаёт опасности, которые преодолел игрок, и одобряет его
        помощь.
    enemy_to_face:
      amount: 2 крысы - приемлемое количество противников для игрока с 100 HP и деревянным
        мечом. Боевой баланс позволяет игроку победить, но требует стратегии.
      dialogs: 5 реплик Пещерной крысы показывают её агрессивное отношение к вторжению
        на её территорию. Диалоги создают атмосферу напряжения перед боем.
      enemy: Пещерная крыса - враг ранга 1 (максимум 10) с 20 HP и 2 урона в ход.
        Деревянный меч игрока (2 урона за удар) подходит для боя против неё. Враг
        расположен логически - на Одуванчиковой Поляне.
    resource_to_deliver:
      amount: 3 одуванчика - небольшое количество, подходящее для игрока уровня 1,
        который только начинает свой путь.
      character: Гаррик Кузнец из Королевской столицы выбран как отправитель квеста.
        Это персонаж первого уровня, подходящий для начинающего игрока уровня 1.
      dialogs: Диалоги с Гаррик Кузнецом содержат ровно 5 реплик, в которых он объясняет
        задачу, упоминает локацию добычи ресурса и количество необходимых одуванчиков.
        Тон дружелюбный и поддерживающий.
      resource: Одуванчик - это ресурс ранга 1, который можно добывать деревянной
        лопатой (ранг 1). Игрок уже имеет этот инструмент в инвентаре.
  objective_description: Собери 3 одуванчика на Одуванчиковой Поляне для Гаррика Кузнеца,
    а затем доставь их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты вернулся! Гаррик говорил мне о тебе.
        speaker: Лира Лекарь
      - remark: Одуванчики! Именно то, что мне нужно для моих лечебных зелий.
        speaker: Лира Лекарь
      - remark: Ты справился с дорогой? Видимо, на поляне встречаются опасности.
        speaker: Лира Лекарь
      - remark: Я благодарна тебе за помощь, боец.
        speaker: Лира Лекарь
      - remark: Вот, прими эту деревянную лопату - она лучше твоей!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ищешь что-то на моей территории?
        speaker: Пещерная крыса
      - remark: Одуванчики здесь - мой урожай!
        speaker: Пещерная крыса
      - remark: Не дам я тебе ничего просто так.
        speaker: Пещерная крыса
      - remark: Готовься к боевому столкновению, странник!
        speaker: Пещерная крыса
      - remark: Мы не позволим тебе спокойно отойти с нашей поляны.
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой боец! Мне нужны одуванчики для моих зелий.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне их предостаточно. Сможешь ли ты собрать мне
          несколько?
        speaker: Гаррик Кузнец
      - remark: Принеси мне 3 одуванчика, и я дам тебе неплохую награду.
        speaker: Гаррик Кузнец
      - remark: У тебя уже есть деревянная лопата, так что ты справишься с добычей.
        speaker: Гаррик Кузнец
      - remark: Поторопись, мне нужны они к концу дня!
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Железная лопата
