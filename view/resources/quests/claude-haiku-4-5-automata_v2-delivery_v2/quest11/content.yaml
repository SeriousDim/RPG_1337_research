quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана из уже существующих персонажей в Деревне
        Речных Лугов. Она отличается от Гаррика Кузнеца и может принимать уголь как
        ресурс ранга 1 согласно своему списку принимаемых ресурсов.
      dialogs: Выбраны 5 реплик Лиры Лекаря, которые подтверждают получение ресурса
        и объясняют логику награды.
    enemy_to_face:
      amount: 2 пещерные крысы создают умеренный боевой вызов для игрока со 100 HP
        и деревянным мечом.
      dialogs: Выбраны 5 реплик Пещерной крысы, которые создают атмосферу противостояния
        и объясняют причину конфликта за ресурсы подземелья.
      enemy: Пещерная крыса выбрана как враг ранга 1 с 20 HP и 2 уроном в ход. Это
        соответствует уровню игрока и его оружию (деревянный меч с 2 урона за врага).
        Количество 2 противника дает достаточно сложности без перегрузки.
    resource_to_deliver:
      amount: Количество 3 единицы угля выбрано как умеренное для начинающего игрока
        уровня 1.
      character: Гаррик Кузнец выбран из уже существующих персонажей. Он находится
        в Королевской столице и может давать задания на добычу ресурсов ранга 1.
      dialogs: Выбраны 5 реплик Гаррика Кузнеца, которые описывают задачу и мотивацию
        персонажа. Диалоги содержат информацию о нужном ресурсе, количестве и месте
        доставки.
      resource: Уголь выбран как ресурс ранга 1, который доступен игроку с его текущими
        инструментами (деревянная кирка имеет ранг 1 и может добывать уголь ранга
        1).
  objective_description: Добудьте 3 единицы угля на Одуванчиковой Поляне и доставьте
    их Лире Лекарю в Деревню Речных Лугов. Помогите кузнецу Гаррику обеспечить лекаря
    необходимым топливом.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, уголь! Как своевременно ты приносишь его мне.
        speaker: Лира Лекарь
      - remark: Мне необходимо топливо для приготовления целебных зелий.
        speaker: Лира Лекарь
      - remark: Ты смог добыть ровно столько, сколько мне нужно!
        speaker: Лира Лекарь
      - remark: За такую помощь я дарую тебе деревянную лопату.
        speaker: Лира Лекарь
      - remark: Она пригодится тебе в добыче ресурсов для будущих заданий.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Кр-кр-кр! Это мой уголь, ты не пройдешь!
        speaker: Пещерная крыса
      - remark: Я охраняю эти подземелья уже долгие годы!
        speaker: Пещерная крыса
      - remark: Попробуй забрать уголь, если осмелишься!
        speaker: Пещерная крыса
      - remark: Встань на мой пути, и пожалеешь об этом!
        speaker: Пещерная крыса
      - remark: Кр-р-р, нападаю!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне требуется уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без угля я не смогу создавать оружие для защитников королевства.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там можно найти уголь.
        speaker: Гаррик Кузнец
      - remark: Добудь для меня 3 единицы угля и доставь их Лире Лекарю в Деревню
          Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Она нуждается в топливе для своего очага. Согласен ли ты помочь?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
