quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь находится в Деревне Речных Лугов (отличается
        от Королевской столицы, где Гаррик). Она может принимать Одуванчик (min_instrument_rank:
        1). В награду даёт Каменный меч ранга 2, который игрок ещё не имеет - это
        логичное улучшение.'
      dialogs: Диалоги Лиры Лекарья выражают благодарность, признание хорошей работы
        и предоставление награды. 5 реплик, заканчивающихся получением вознаграждения.
    enemy_to_face:
      amount: 1 враг - соответствует новичку, не перегружает игрока.
      dialogs: Диалоги с Пещерной крысой демонстрируют её агрессию и защиту территории.
        Включены реплики крысы и игрока. 5 реплик в диапазоне 5-10.
      enemy: Пещерная крыса выбрана как враг ранга 1 (соответствует уровню игрока).
        Имеет 20 HP и 2 урона в ход. Деревянный меч игрока (2 урона за удар) справится
        с ней за 10 ударов, что реально для уровня 1.
    resource_to_deliver:
      amount: 1 единица - минимальное количество, соответствующее уровню игрока (1
        уровень, базовый ресурс).
      character: 'Гаррик Кузнец выбран из списка персонажей игрового мира. Он находится
        в Королевской столице и может принимать Одуванчик (min_instrument_rank: 1,
        ресурс ранга 1).'
      dialogs: Диалоги показывают мотивацию Гаррика (нужны материалы), инструкции
        для игрока (где добыть, что делать, куда везти) и согласие игрока. 7 реплик
        в диапазоне 5-10.
      resource: Одуванчик - ресурс ранга 1, добывается лопатой ранга 1, находится
        в Одуванчиковой Поляне. Игрок имеет Деревянную лопату ранга 1, поэтому может
        его добыть.
  objective_description: Добыть Одуванчик в Одуванчиковой Поляне и доставить его Лире
    Лекарю в Деревню Речных Лугов
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это помощник Гаррика! Рада видеть тебя в нашей деревне.
        speaker: Лира Лекарь
      - remark: Одуванчик? Отлично, это именно то, что мне нужно для зелий здоровья.
        speaker: Лира Лекарь
      - remark: Гаррик никогда не подводит, и ты тоже молодец!
        speaker: Лира Лекарь
      - remark: Вот, возьми эту награду за верную службу. Ты заслужил лучшее оружие!
        speaker: Лира Лекарь
      - remark: Спасибо за помощь и награду!
        speaker: Игрок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Этот ресурс мой!
        speaker: Пещерная крыса
      - remark: Не пройдёшь дальше, странник!
        speaker: Пещерная крыса
      - remark: Придётся сражаться!
        speaker: Игрок
      - remark: Я защищу своё гнездо!
        speaker: Пещерная крыса
      - remark: Писк-писк-писк!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, боец! Мне срочно нужен Одуванчик для моих работ.
        speaker: Гаррик Кузнец
      - remark: В Одуванчиковой Поляне его полно. Возьми свою лопату и добудь для
          меня хотя бы один.
        speaker: Гаррик Кузнец
      - remark: Когда соберёшь ресурс, отнеси его Лире Лекарю в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Не задерживайся! Время бежит, а мне нужны материалы.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я справлюсь с этой задачей.
        speaker: Игрок
      resource: Одуванчик
  reward:
    item_name: Каменный меч
