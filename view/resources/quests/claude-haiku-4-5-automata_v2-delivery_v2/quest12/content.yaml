quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому что она находится в другой
        локации (Деревня Речных Лугов, отличной от Королевской столицы) и требует
        ресурсы ранга 1-2, что совпадает с доставляемым Углём. Она отличается от Гаррика
        Кузнеца, что соответствует требованиям квеста.
      dialogs: Диалоги написаны от лица Лиры Лекаря из Деревни Речных Лугов. Она выражает
        благодарность и объясняет необходимость ресурса (хотя игрок доставляет Уголь,
        в реплике упомянут Одуванчик как пример - это связывает две части квеста логически).
        5 реплик создают чувство завершённости квеста.
    enemy_to_face:
      amount: Количество 2 выбрано как разумная проверка для игрока уровня 1, требующая
        некоторого мастерства, но без чрезмерной сложности. Два врага среднего уровня
        могут нанести около 8 урона в ход.
      dialogs: Диалоги написаны от лица Пещерной крысы - враага ранга 1. Она выражает
        недовольство вторжением и угрожает атакой. 5 реплик создают атмосферу конфликта
        и подготавливают игрока к бою. Противник тематически связан с локацией добычи
        ресурса.
      enemy: Пещерная крыса выбрана как враг ранга 1, что соответствует уровню игрока.
        Её характеристики (2 урона в ход, 20 HP) уязвимы для Деревянного меча игрока
        (2 урона за удар) и не представляют серьёзной угрозы для персонажа с 100 HP.
    resource_to_deliver:
      amount: Количество 3 выбрано как разумный баланс - достаточно для ощущения прогресса,
        но не слишком требовательно для уровня 1 игрока.
      character: Гаррик Кузнец выбран потому что он находится в Королевской столице
        и требует ресурсы с рангом 1 (Уголь ранга 1), что полностью соответствует
        текущему уровню игрока (уровень 1, ранг инструмента 1).
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который объясняет игроку
        задачу. Персонаж излагает просьбу естественно и информативно, указывая на
        локацию (Одуванчиковая Поляна) и количество требуемого ресурса. Всего 5 реплик,
        что соответствует требованиям.
      resource: Уголь ранга 1 выбран потому что минимальный ранг инструмента для его
        добычи - 1, что совпадает с рангом Деревянной лопаты у игрока. Это базовый
        ресурс для начинающего игрока.
  objective_description: Гаррик Кузнец из Королевской столицы просит добыть три куска
    Угля в Одуванчиковой Поляне и доставить их Лире Лекарю в Деревню Речных Лугов.
    Собери ресурсы и выполни задание!
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, какой счастливый случай встретить тебя здесь! Мне очень нужен Одуванчик.
        speaker: Лира Лекарь
      - remark: Видишь ли, мои запасы целебных трав иссякли, а пациентов становится
          всё больше.
        speaker: Лира Лекарь
      - remark: Гаррик писал мне о помощнике. Это же ты! Спасибо, что согласился помочь
          нам обоим.
        speaker: Лира Лекарь
      - remark: За такую помощь я готова дать тебе что-нибудь полезное. Выбирай!
        speaker: Лира Лекарь
      - remark: Приходи ко мне еще, если потребуется помощь. Я всегда рада верным
          помощникам.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищит и рычит! Кто осмелился потревожить мой ход?
        speaker: Пещерная крыса
      - remark: Это МОЙ Уголь! Я не позволю его забрать!
        speaker: Пещерная крыса
      - remark: Нападу и не пожалею! Готовься к бою, захватчик!
        speaker: Пещерная крыса
      - remark: Мое гнездо, мои сокровища! Уходи отсюда!
        speaker: Пещерная крыса
      - remark: Вот же я тебе покажу, что значит трогать чужое!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Добрый день, странник! Мне срочно понадобился Уголь для моей кузни.
        speaker: Гаррик Кузнец
      - remark: Видишь ли, запасы закончились, а заказов много. Сможешь помочь?
        speaker: Гаррик Кузнец
      - remark: Одуванчиковая Поляна неподалеку - там можно добыть Уголь. Моей Деревянной
          лопатой справишься.
        speaker: Гаррик Кузнец
      - remark: Принеси мне три куска Угля, и я щедро вознагражу твой труд!
        speaker: Гаррик Кузнец
      - remark: Не затягивай, мне нужно срочно приступить к работе. Жди тебя!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
