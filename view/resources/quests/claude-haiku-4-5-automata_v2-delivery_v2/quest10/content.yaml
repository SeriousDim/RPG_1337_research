quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов - отличается от Гаррика
        (из Королевской столицы), находится в другом месте. Может принимать Одуванчик
        и выдавать новичкам награды.
      dialogs: Лира Лекарь произносит 5 реплик, принимая ресурс, хвалит игрока и объясняет
        применение награды. Диалоги создают ощущение завершения квеста и признания.
    enemy_to_face:
      amount: 1 враг - соответствует боевому уровню новичка, не должен быть кривым
        испытанием, но требует тактики.
      dialogs: Пещерная крыса произносит 5 реплик-угроз перед боем, создавая атмосферу
        опасности и напряженности в сюжете.
      enemy: Пещерная крыса ранга 1 с 20 HP и 2 урона в ход - идеальный противник
        для игрока уровня 1 с Деревянным мечом (2 урона). Может быть встречена при
        добыче ресурсов.
    resource_to_deliver:
      amount: Количество 1 - соответствует новичку уровня 1, не перегружает игрока
        сложностью задачи.
      character: Гаррик Кузнец выбран как персонаж, способный принять Одуванчик (ранг
        траву 1) и выступающий в качестве инициатора квеста из Королевской столицы.
      dialogs: Диалоги с Гаррик Кузнецом содержат 5 реплик, достаточно для погружения
        в сюжет. Персонаж мотивирует игрока и напоминает о необходимом инструменте
        (Деревянной лопате), который уже есть в инвентаре.
      resource: Одуванчик ранга 1 - идеально соответствует уровню 1 игрока. Требует
        Деревянную лопату ранга 1, которая уже есть у игрока в инвентаре.
  objective_description: Гаррик Кузнец просит тебя добыть один Одуванчик с Одуванчиковой
    Поляны и доставить его Лире Лекарю в Деревню Речных Лугов. Используй свою Деревянную
    лопату для добычи травы.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, привет! Гаррик прислал тебя со своим заказом?
        speaker: Лира Лекарь
      - remark: Одуванчик... отличный выбор! Он мне очень пригодится для моих зелий.
        speaker: Лира Лекарь
      - remark: Твоя работа проделана отменно, молодец!
        speaker: Лира Лекарь
      - remark: Вот, возьми Деревянную лопату в качестве благодарности. Она пригодится
          тебе для дальнейших заготовок.
        speaker: Лира Лекарь
      - remark: Приходи ещё, если понадобишься помощь или ещё какие-то товары!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Пищащий звук... Кто посмел войти в мою территорию?
        speaker: Пещерная крыса
      - remark: Я не позволю тебе так просто пройти отсюда!
        speaker: Пещерная крыса
      - remark: Защищай себя, жалкий человечище!
        speaker: Пещерная крыса
      - remark: Моя территория, мои правила!
        speaker: Пещерная крыса
      - remark: Готовься к бою!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, молодой боец! Мне срочно нужен Одуванчик для моих работ.
        speaker: Гаррик Кузнец
      - remark: Одуванчики растут на Одуванчиковой Поляне. Возьми свою лопату и отправляйся
          туда.
        speaker: Гаррик Кузнец
      - remark: Принеси мне один Одуванчик, и я щедро вознагрежу тебя!
        speaker: Гаррик Кузнец
      - remark: Поторопись, мне нужен этот ресурс побыстрее. Мои заказчики ждут.
        speaker: Гаррик Кузнец
      - remark: Не забудь, что тебе понадобится лопата для добычи травы. К счастью,
          у тебя уже есть деревянная лопата!
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
