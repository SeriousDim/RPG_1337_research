quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь (Деревня Речных Лугов) выбрана потому что:
        (1) она отличается от Гаррика Кузнеца, как требуется по условиям; (2) она
        может получать Уголь (ранг 1 в её списке принимаемых ресурсов); (3) персонажи
        находятся в разных локациях, что создает маршрут для игрока.'
      dialogs: 5 реплик от Лиры Лекарь раскрывают сюжет, создают поворот - оказывается,
        Лира, а не Гаррик, нуждается в Угле. Это добавляет интереса и создает логику
        для системы квестов.
    enemy_to_face:
      amount: 2 крысы обеспечивают боевой челлендж без избыточной сложности. Две крысы
        = 40 HP и 4 урона в ход совместно - преодолимо для персонажа уровня 1.
      dialogs: 5 реплик от Пещерной крысы создают напряжение и враждебность. Крыса
        угрожает, защищает территорию, что логично для врага. Диалоги написаны в стиле
        фентэзи-существа, добавляя атмосфере жути.
      enemy: 'Пещерная крыса (ранг 1) выбрана потому что: (1) располагается в Одуванчиковой
        Поляне - той же локации, где добывается Уголь; (2) имеет 20 HP и 2 урона в
        ход - доступна для игрока с Деревянным мечом (2 урона в ход, требует 10 ходов,
        но у игрока 100 HP - легко выживает); (3) ранг 1 соответствует уровню игрока.'
    resource_to_deliver:
      amount: 3 единицы - малое количество для новичка, обеспечивает быстрое прохождение
        квеста и не требует длительного фарма.
      character: Гаррик Кузнец выбран как персонаж, который может получать Уголь (ранг
        1) и давать награды. Он расположен в Королевской столице - основной локации,
        доступной с самого начала.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца (персонажа 1-го уровня из
        Королевской столицы). Содержат 5 реплик, которые естественно объясняют задачу
        и создают атмосферу квеста. Кузнец просит Уголь - ресурс ранга 1, соответствующий
        уровню игрока.
      resource: 'Уголь (ранг 1) выбран потому что: (1) это ресурс из буфферизированной
        локации Одуванчиковая Поляна, доступный с рангом кирки 1; (2) соответствует
        уровню игрока (Level 1); (3) игрок имеет Деревянную кирку ранга 1, подходящую
        для добычи.'
  objective_description: Добудьте 3 куска Угля в Одуванчиковой Поляне и доставьте
    их Лире Лекарь в Деревню Речных Лугов. Гаррик Кузнец из Королевской столицы просил
    вас об этом.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, здравствуй! Я слышала от Гаррика, что ты мог бы мне помочь.
        speaker: Лира Лекарь
      - remark: На самом деле, он ошибся - это мне нужен Уголь для приготовления лекарств!
        speaker: Лира Лекарь
      - remark: Угольная пыль просто незаменима для моих целебных зелий.
        speaker: Лира Лекарь
      - remark: Спасибо тебе за помощь, боец. Твой поступок поможет многим больным.
        speaker: Лира Лекарь
      - remark: Вот, возьми это в награду за службу!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Кшшшш! Кто это посмел вторгнуться в наши земли?!
        speaker: Пещерная крыса
      - remark: Уходи отсюда, путник, или встретишь острые зубы!
        speaker: Пещерная крыса
      - remark: Я защищаю это место и не дам тебе добыть ресурсы так просто!
        speaker: Пещерная крыса
      - remark: Кшшшш! Сражайся, незваный гость!
        speaker: Пещерная крыса
      - remark: Мое логово, мои правила, мой Уголь!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен Уголь для работы
          в кузне.
        speaker: Гаррик Кузнец
      - remark: Слышал, что Уголь можно найти в Одуванчиковой Поляне. Там его полно!
        speaker: Гаррик Кузнец
      - remark: Принеси мне хотя бы 3 куска Угля, и я щедро тебя награжу.
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне нужно срочно закончить заказ для королевского двора.
        speaker: Гаррик Кузнец
      - remark: Не забудь, в тех местах можно встретить опасных существ. Будь осторожен!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
