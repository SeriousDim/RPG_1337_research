quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана из списка персонажей мира и находится
        в Деревне Речных Лугов. Она отличается от Гаррика Кузнеца и способна принимать
        ресурсы (Подорожник и Железо в её accepted items), что логично вписывает её
        в экосистему квеста как вторичного получателя.
      dialogs: Пять диалоговых реплик Лиры Лекаря, которая принимает ресурс. Реплики
        показывают благодарность, объясняют ценность ресурса и поощряют игрока к дальнейшим
        приключениям.
    enemy_to_face:
      amount: Одна Пещерная крыса выбрана как сбалансированный враг для новичка. Она
        не слишком слабая и не слишком сильная.
      dialogs: Три диалоговых реплики Пещерной крысы, которая защищает ресурс. Реплики
        показывают территориальное поведение и создают драматизм встречи.
      enemy: Пещерная крыса - враг ранга 1 с 20 HP и 2 урона в ход. Это идеальный
        противник для игрока уровня 1 с деревянным мечом (2 урона). При 1 крысе игрок
        потребует примерно 10 ударов для победы при нулевой броне, что является справедливым
        челленджем.
    resource_to_deliver:
      amount: Количество 2 выбрано как умеренное для уровня 1 игрока. Это достаточно
        для челленджа, но не перегружает новичка.
      character: Гаррик Кузнец выбран из списка персонажей мира. Он находится в Королевской
        столице и требует ресурсы (Уголь и Уголь указаны в его accepted items). Это
        подходящий NPC для начала квеста.
      dialogs: Пять диалоговых реплик Гаррика Кузнеца, который дает задание добыть
        Уголь. Реплики создают атмосферу срочности и показывают мотивацию персонажа.
        Текст варьируется от просьбы к благодарности.
      resource: Уголь выбран как базовый ресурс ранга 1, требующий инструмент ранга
        1 (деревянная кирка). У игрока уже есть деревянная кирка в инвентаре, что
        позволяет ему выполнить задание. Уголь доступен на Одуванчиковой Поляне.
  objective_description: Добудь два куска Угля на Одуванчиковой Поляне с помощью деревянной
    кирки и доставь ресурсы сначала Гаррику Кузнецу в Королевскую столицу, затем отнеси
    их Лире Лекарь в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, приветствую тебя! Гаррик рассказал мне о твоих делах.
        speaker: Лира Лекарь
      - remark: Уголь поможет мне приготовить лекарства. Спасибо за помощь!
        speaker: Лира Лекарь
      - remark: Вот, возьми это в знак моей благодарности. Это пригодится тебе в грядущих
          испытаниях.
        speaker: Лира Лекарь
      - remark: Ты проявил себя достойным помощником. Вернись ко мне, если понадобишься.
        speaker: Лира Лекарь
      - remark: Удачи в твоих скитаниях, герой!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Пищащий звук... Ты посмел вторгнуться на мою территорию!
        speaker: Пещерная крыса
      - remark: Это мой уголь! Я буду защищать его!
        speaker: Пещерная крыса
      - remark: Готовься к боли, незваный гость!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Я слышал, что на Одуванчиковой Поляне можно найти этот ценный ресурс.
        speaker: Гаррик Кузнец
      - remark: Добудь мне два куска Угля деревянной киркой, и я щедро вознагражу
          тебя.
        speaker: Гаррик Кузнец
      - remark: Верни мне ресурсы, и я дам тебе то, что тебе понадобится в пути.
        speaker: Гаррик Кузнец
      - remark: Не подведи меня, странник! Мне нужен этот уголь как можно скорее.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
