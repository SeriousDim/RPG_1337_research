quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому что она находится в Деревне
        Речных Лугов (отличается от Королевской столицы, где Гаррик), принимает Уголь
        в качестве ресурса для доставки и может дать Деревянную лопату в награду,
        которой нет в инвентаре игрока.
      dialogs: Диалог из 5 реплик между игроком и Лирой Лекарем. Она благодарит за
        доставку и обещает награду. Диалог естественен и завершает квест.
    enemy_to_face:
      amount: Количество 2 врагов выбрано для небольшого повышения сложности, но остаётся
        преодолимым для начинающего игрока.
      dialogs: Диалог из 4 реплик создаёт конфликт между игроком и враг. Враг защищает
        ресурс, что оправдывает необходимость боя перед сбором материалов.
      enemy: Пещерная крыса выбрана потому что это враг ранга 1 с 20 HP и 2 урона
        в ход. С Деревянным мечом (2 урона) игрок победит за 10 ходов, что соответствует
        его уровню.
    resource_to_deliver:
      amount: Количество 2 выбрано как разумное для новичка - не слишком сложно, но
        достаточно для ощущения прогресса.
      character: Гаррик Кузнец выбран как персонаж, так как он находится в Королевской
        столице и принимает Уголь (ранг 1) в качестве ресурса для доставки, что соответствует
        уровню игрока 1.
      dialogs: Диалог состоит из 5 реплик между игроком и Гаррик Кузнецом. Кузнец
        объясняет необходимость Угля для своей работы и просит игрока добыть ресурс.
        Диалог естественен и мотивирует игрока к выполнению задания.
      resource: Уголь выбран потому что это руда ранга 1, доступная для добычи деревянной
        киркой ранга 1, которая есть в инвентаре игрока.
  objective_description: Гаррик Кузнец из Королевской столицы просит тебя добыть 2
    куска Угля. После этого доставь ресурсы Лире Лекарю в Деревню Речных Лугов. Она
    ждёт этот материал для важного проекта.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это Гаррик присылал тебя? Рада видеть молодого помощника!
        speaker: Лира Лекарь
      - remark: Уголь? Да, он попросил меня помочь с одним проектом.
        speaker: Лира Лекарь
      - remark: Спасибо за доставку! Это именно то, что нам было нужно.
        speaker: Лира Лекарь
      - remark: За твою помощь я дам тебе это. Может пригодиться!
        speaker: Лира Лекарь
      - remark: Приходи ещё, если понадобится помощь в будущем.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Шшшшшш! Этот уголь - мой! Ты не пройдёшь!
        speaker: Пещерная крыса
      - remark: Посмотрим, кто здесь хозяин этих копей!
        speaker: Пещерная крыса
      - remark: Мне нужен этот уголь для кузнеца. Уходи с дороги!
        speaker: Игрок
      - remark: Никогда! Готовься к боевому испытанию, мелкий!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой боец! Мне нужна твоя помощь с одним делом.
        speaker: Гаррик Кузнец
      - remark: Видишь ли, я работаю над новым мечом, но мне не хватает материалов.
        speaker: Гаррик Кузнец
      - remark: Мне срочно нужен Уголь для плавки. Ты сможешь добыть для меня?
        speaker: Гаррик Кузнец
      - remark: Считаю, что ты справишься с этой задачей. Принеси мне 2 куска Угля.
        speaker: Гаррик Кузнец
      - remark: Удачи в поисках, боец! Жду твоего возвращения.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
