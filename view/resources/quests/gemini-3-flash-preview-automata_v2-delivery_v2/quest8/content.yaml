quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как он по лору принимает
        уголь и находится в другой локации (Высокий Замок).
      dialogs: Диалоги завершают сюжетную арку доставки, подчеркивая статус получателя
        и ценность выполненной работы.
    enemy_to_face:
      amount: 1 противник достаточен для первой боевой проверки игрока без брони.
      dialogs: Диалоги отражают классическую угрозу на дороге, где слабый, но дерзкий
        противник пытается забрать добычу.
      enemy: Гоблин-вор (24 HP, 3 DMG) выбран как подходящий противник для игрока
        1 уровня с деревянным мечом.
    resource_to_deliver:
      amount: Количество 5 является оптимальным для начального квеста по сбору ресурсов.
      character: Гаррик Кузнец выбран в качестве квестодателя, так как он находится
        в столице и работает с углем.
      dialogs: Диалоги построены как формальное поручение от ремесленника к новичку,
        вводя игрока в курс дела и указывая цель.
      resource: 'Уголь выбран, так как он соответствует 1 рангу и игрок может его
        добыть своей деревянной киркой (min_instrument_rank: 1).'
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок для обеспечения его нужд.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Ваше Сиятельство, я прибыл с грузом от кузнеца Гаррика. Вот обещанное
          топливо.
        speaker: Игрок
      - remark: А, наконец-то. Я уже начал сомневаться, что Гаррик найдет надежного
          курьера.
        speaker: Лорд Дрейк
      - remark: Пришлось столкнуться с некоторыми трудностями по пути, но уголь в
          полной сохранности.
        speaker: Игрок
      - remark: Вижу следы схватки на твоей одежде. Уголь действительно качественный,
          он мне пригодится.
        speaker: Лорд Дрейк
      - remark: За твою верность делу и отвагу в защите груза, прими эту деталь доспеха.
          Она тебе нужнее.
        speaker: Лорд Дрейк
      - remark: Благодарю, милорд. Это достойная награда за проделанный путь.
        speaker: Игрок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, ты! Стой! Что это так вкусно пахнет дымом и наживой в твоей сумке?
        speaker: Гоблин-вор
      - remark: Прочь с дороги, мелкий воришка. У меня важное поручение от столичного
          кузнеца.
        speaker: Игрок
      - remark: Уголь! Это же черный камень! Он блестит, значит, он мой! Отдавай по-хорошему!
        speaker: Гоблин-вор
      - remark: Этот уголь принадлежит Лорду Дрейку. Хочешь забрать его — попробуй
          сразиться.
        speaker: Игрок
      - remark: Хе-хе, твои пожитки станут моими, а твои кости — игрушками для моих
          братьев!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть кирка, а значит, есть и работа
          для сильных рук.
        speaker: Гаррик Кузнец
      - remark: Что требуется сделать, мастер? Мой клинок и инструмент к вашим услугам.
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка требует свежее топливо для своих личных
          покоев.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты добыл 5 единиц угля на Одуванчиковой Поляне.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь всё, отправляйся прямиком к Лорду в Высокий Замок.
          Он не любит ждать.
        speaker: Гаррик Кузнец
      - remark: Я всё сделаю. Одуванчиковая Поляна недалеко, скоро уголь будет у заказчика.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
