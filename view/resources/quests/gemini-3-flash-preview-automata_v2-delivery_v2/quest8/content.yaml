quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана, так как она официально принимает
        Железо согласно игровым данным и находится в другой локации.
      dialogs: Диалоги завершают сюжетную арку доставки, подчеркивая важность принесенного
        ресурса для мирных жителей.
    enemy_to_face:
      amount: Двое противников создают умеренную сложность, позволяя игроку применить
        оружие по нескольким целям.
      dialogs: 'Диалоги отражают классический конфликт: воры пытаются перехватить
        ценный ресурс, который игрок несет лекарю.'
      enemy: Гоблин-вор выбран как противник 1 ранга, что соответствует текущему уровню
        игрока и его снаряжению.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для первого квеста по сбору ресурсов.
      character: Гаррик Кузнец выбран как отправная точка, так как он находится в
        начальной локации (Столица) и связан с металлургией.
      dialogs: Диалоги построены на взаимодействии с кузнецом из столицы, который
        дает логичное задание на сбор металла для профессиональных нужд.
      resource: Железо выбрано, так как для его добычи требуется кирка 1 ранга, которая
        уже есть у игрока 1 уровня.
  objective_description: Соберите 5 единиц железной руды в локации Подорожниковый
    Бор и доставьте их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, наконец-то! Я уже начала опасаться, что поставка из столицы задержится.
        speaker: Лира Лекарь
      - remark: Мастер Гаррик просил передать вам это железо. Вот, все пять кусков.
        speaker: Игрок
      - remark: Благодарю тебя! Теперь я смогу изготовить новые ланцеты для операций.
        speaker: Лира Лекарь
      - remark: Ты выглядишь запыхавшимся. В пути возникли какие-то трудности?
        speaker: Лира Лекарь
      - remark: На меня напала банда гоблинов-воров, но им не удалось отобрать груз.
        speaker: Игрок
      - remark: Твой деревянный меч едва держится. В награду за храбрость возьми этот
          — он гораздо крепче.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой, человечишка! Твой мешок подозрительно тяжело звенит!
        speaker: Гоблин-вор
      - remark: Отойди, это всего лишь руда для деревенского лекаря.
        speaker: Игрок
      - remark: Всего лишь руда? Ха! Железо на черном рынке стоит кучу золотых монет!
        speaker: Гоблин-вор
      - remark: Я не позволю вам забрать груз. Приготовьтесь к честному бою!
        speaker: Игрок
      - remark: Хватай его, парни! Железо сегодня будет нашим, а он пойдет на корм
          крысам!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Мне прислали срочную весточку из Деревни Речных
          Лугов.
        speaker: Гаррик Кузнец
      - remark: Что-то случилось, мастер Гаррик? Нужна моя помощь?
        speaker: Игрок
      - remark: Местному лекарю Лире не хватает сырья для ковки новых медицинских
          инструментов.
        speaker: Гаррик Кузнец
      - remark: Отправляйся в Подорожниковый Бор и добывай там железо. Его нужно немедленно
          доставить ей.
        speaker: Гаррик Кузнец
      - remark: Я справлюсь. Сколько руды потребуется для работы?
        speaker: Игрок
      - remark: Пяти кусков железной руды будет достаточно. Поспеши, от этого зависят
          жизни!
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
