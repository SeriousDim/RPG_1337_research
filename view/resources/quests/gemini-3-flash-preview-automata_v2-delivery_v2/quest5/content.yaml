quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как он (согласно
        миру) принимает уголь и находится в другой локации (Высокий Замок).
      dialogs: 7 реплик. Лорд Дрейк подтверждает получение товара и отмечает заслуги
        игрока.
    enemy_to_face:
      amount: 1 противник, чтобы не перегружать игрока без брони на первом уровне.
      dialogs: 5 реплик, создающих конфликт. Гоблин-вор мотивирован кражей добытого
        ресурса.
      enemy: Гоблин-вор выбран как противник ранга 1, с которым игрок 1 уровня может
        справиться текущим оружием.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста на сбор.
      character: Гаррик Кузнец выбран как квестодатель, так как он принимает уголь
        и находится в стартовой локации.
      dialogs: 7 реплик, вводящих игрока в курс дела. Гаррик Кузнец (согласно миру)
        находится в столице и работает с углем.
      resource: Выбран Уголь (ресурс ранга 1), так как у игрока Деревянная кирка (инструмент
        ранга 1).
  objective_description: Добыть 5 единиц ресурса Уголь на локации Одуванчиковая Поляна
    и доставить их Лорду Дрейку в Высокий Замок по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто посмел нарушить мой покой в Высоком Замке?
        speaker: Лорд Дрейк
      - remark: Я прибыл от Гаррика Кузнеца. Вот обещанный Уголь для ваших каминов.
        speaker: Игрок
      - remark: Наконец-то! Мои покои совсем остыли из-за задержек в поставках.
        speaker: Лорд Дрейк
      - remark: Дорога была опасной. На меня напал Гоблин-вор, пытаясь отобрать груз.
        speaker: Игрок
      - remark: Вижу, ты не только добытчик, но и умелый боец, раз смог защитить товар.
        speaker: Лорд Дрейк
      - remark: Королевству нужны такие ответственные люди. Ты заслужил достойную
          плату.
        speaker: Лорд Дрейк
      - remark: Прими этот подарок. Твоя одежда совсем не защищает от ударов, это
          нужно исправить.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас тут? Тяжелый мешок у коротышки?
        speaker: Гоблин-вор
      - remark: Уйди с дороги. Этот Уголь принадлежит Лорду Дрейку.
        speaker: Игрок
      - remark: Уголь? Для меня это черное золото! Я заберу его и продам своим сородичам!
        speaker: Гоблин-вор
      - remark: Отдавай мешок по-хорошему, иначе я применю свой нож!
        speaker: Гоблин-вор
      - remark: Мой Деревянный меч быстро отучит тебя зариться на чужое добро!
        speaker: Игрок
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, путник! Вижу, твоя Деревянная кирка еще совсем новая и
          жаждет дела.
        speaker: Гаррик Кузнец
      - remark: Она готова к работе. Есть ли в Королевской столице поручения для меня?
        speaker: Игрок
      - remark: В столице всегда не хватает топлива. Мне нужно подготовить партию
          товара для Высокого Замка.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там есть залежи отличного ресурса.
        speaker: Гаррик Кузнец
      - remark: Добудь 5 единиц ресурса Уголь. Этого должно хватить для первой поставки.
        speaker: Гаррик Кузнец
      - remark: Но не неси его мне. Доставь груз сразу Лорду Дрейку, он ждет его для
          своих каминов.
        speaker: Гаррик Кузнец
      - remark: Я все понял, Гаррик. 5 единиц угля будут доставлены в Высокий Замок.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
