quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как конечная точка маршрута, так как
        он принимает уголь согласно данным игрового мира.
      dialogs: 6 реплик логически завершают историю, подтверждают выполнение цели
        и обосновывают выдачу брони в качестве награды.
    enemy_to_face:
      amount: 1 противник выбран из-за характеристики меча игрока, который может поражать
        только одну цель за удар.
      dialogs: 5 реплик создают конфликтную ситуацию и обосновывают неизбежность сражения
        с агрессивным существом.
      enemy: Гоблин-вор является противником 1-го ранга, что соответствует уровню
        игрока и его снаряжению.
    resource_to_deliver:
      amount: Количество в 5 единиц является сбалансированным для первого квеста уровня
        1.
      character: Гаррик Кузнец выбран в качестве начального NPC, так как он находится
        в стартовой локации и работает с ресурсами.
      dialogs: Диалоги из 7 реплик вводят игрока в сюжет, объясняют связь между Кузнецом
        и Лордом, а также дают четкие инструкции по добыче.
      resource: Уголь выбран потому, что это ресурс 1-го ранга, который игрок может
        добыть имеющейся у него деревянной киркой.
  objective_description: Соберите 5 единиц угля на Одуванчиковой Поляне и доставьте
    его Лорду Дрейку в Высокий Замок для обогрева его покоев.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто это ломится в мои ворота? Ты от кузнеца Гаррика?
        speaker: Лорд Дрейк
      - remark: Да, милорд. Дорога была опасной, но я доставил ваш уголь.
        speaker: Игрок
      - remark: Пять кусков угля... Да, качество отменное, огонь в тронном зале будет
          жарким.
        speaker: Лорд Дрейк
      - remark: Гаррик упоминал, что вы не оставите исполнителя без вознаграждения.
        speaker: Игрок
      - remark: Разумеется. Раз ты ходишь по диким тропам, тебе не помешает защита
          получше.
        speaker: Лорд Дрейк
      - remark: Забирай этот нагрудник. Он сослужит тебе добрую службу в твоих странствиях.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Тяжелая сумка, много черных блестящих камней!
        speaker: Гоблин-вор
      - remark: Отойди, мелкий воришка, этот груз принадлежит Лорду Высокого Замка.
        speaker: Игрок
      - remark: Лорд далеко, а гоблин близко! Мои камни! Моя прелесть!
        speaker: Гоблин-вор
      - remark: Мой меч быстро тебя переубедит. Уходи, пока цел.
        speaker: Игрок
      - remark: Твоя палка против моих когтей? Гоблин заберет всё! Р-р-ра!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, у тебя есть кирка и желание подзаработать.
        speaker: Гаррик Кузнец
      - remark: Верно, мастер Гаррик. Есть ли сейчас достойное поручение для меня?
        speaker: Игрок
      - remark: Лорд Дрейк прислал весточку из Высокого Замка. Ему срочно требуется
          качественное топливо для каминов.
        speaker: Гаррик Кузнец
      - remark: Где мне раздобыть его в этих краях? Я еще не слишком опытен в поиске
          редких жил.
        speaker: Игрок
      - remark: На Одуванчиковой Поляне неподалеку полно выходов отличного угля. Тебе
          нужно добыть всего пять кусков.
        speaker: Гаррик Кузнец
      - remark: Пять единиц угля. А что мне делать после того, как сумка наполнится?
        speaker: Игрок
      - remark: Доставь их лично Лорду Дрейку. Он щедро платит тем, кто не боится
          испачкать руки в саже.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
