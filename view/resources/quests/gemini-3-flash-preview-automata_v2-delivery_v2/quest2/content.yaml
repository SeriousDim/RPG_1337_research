quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как он принимает
        уголь согласно базе данных и находится в другой локации (Высокий Замок).
      dialogs: Восемь реплик завершают сюжетную арку, подчеркивая статус получателя
        (Лорда) и ценность выполненной работы.
    enemy_to_face:
      amount: Один противник достаточен для создания угрозы на начальном уровне без
        риска гибели игрока.
      dialogs: Пять реплик создают конфликтную ситуацию, типичную для фэнтезийного
        средневековья, мотивируя игрока на бой.
      enemy: Гоблин-вор выбран как противник 1 ранга. С его уроном в 3 единицы и 24
        HP он является проходимым испытанием для игрока с 100 HP и мечом на 2 урона.
    resource_to_deliver:
      amount: 10 единиц — стандартное количество для стартового квеста, требующее
        времени, но не переутомляющее игрока.
      character: Гаррик Кузнец выбран как квестодатель, так как он находится в столице
        и работает с углем.
      dialogs: Шесть реплик вводят игрока в курс дела, объясняя потребность NPC в
        ресурсе и указывая направление движения.
      resource: Уголь выбран потому, что у игрока есть деревянная кирка 1 ранга, необходимая
        для его добычи.
  objective_description: Добыть 10 единиц угля на Одуванчиковой Поляне и доставить
    его Лорду Дрейку в Высокий Замок по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто посмел отвлечь меня от государственных дел?
        speaker: Лорд Дрейк
      - remark: Я прибыл от Гаррика Кузнеца с важным грузом.
        speaker: Игрок
      - remark: Ах, мой заказ на топливо. Вижу, ты весь в саже.
        speaker: Лорд Дрейк
      - remark: По пути на меня напал Гоблин-вор, но я сохранил груз.
        speaker: Игрок
      - remark: Твоя преданность делу впечатляет. В наше время сложно найти надежного
          курьера.
        speaker: Лорд Дрейк
      - remark: Я лишь выполнял свое задание, милорд.
        speaker: Игрок
      - remark: Скромность украшает воина. Твой Уголь как раз вовремя для каминов
          замка.
        speaker: Лорд Дрейк
      - remark: В качестве благодарности я прикажу выдать тебе снаряжение из королевских
          запасов.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй! Что это у тебя в мешке? Блестит или просто пачкается?
        speaker: Гоблин-вор
      - remark: Это просто уголь. Отойди, он принадлежит Лорду.
        speaker: Игрок
      - remark: Уголь? Уголь — это огонь! Огонь — это мясо! Отдавай сумку!
        speaker: Гоблин-вор
      - remark: Я не намерен делиться ресурсами с ворами.
        speaker: Игрок
      - remark: Тогда мы заберем его вместе с твоими пальцами!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Мои запасы топлива на исходе, а работа не ждет.
        speaker: Гаррик Кузнец
      - remark: Чем я могу помочь мастеру твоего уровня?
        speaker: Игрок
      - remark: Мне нужно срочно передать партию качественного угля Лорду Дрейку для
          его личных нужд.
        speaker: Гаррик Кузнец
      - remark: Где мне найти этот ресурс?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну, там есть выходы пластов. Добудь
          уголь своей киркой.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь достаточно, сразу неси его в Высокий Замок.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
