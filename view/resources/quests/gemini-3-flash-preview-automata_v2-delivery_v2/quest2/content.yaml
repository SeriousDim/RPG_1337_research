quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана для того, чтобы игрок совершил путешествие
        из Столицы в Деревню Речных Лугов.
      dialogs: 6 реплик Лиры Лекаря завершают сюжетную линию с поставкой медикаментов
        и обосновывают награду.
    enemy_to_face:
      amount: 1 противник, так как у игрока на данный момент нет никакой брони.
      dialogs: 5 реплик Гоблина-вора создают угрозу и объясняют причину нападения
        (кража ресурсов).
      enemy: Гоблин-вор выбран как противник 1-го ранга с уроном 3, что позволяет
        игроку 1-го уровня выжить в бою.
    resource_to_deliver:
      amount: 5 единиц — сбалансированное количество для стартового ознакомительного
        квеста.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он логично связан
        с добычей угля и находится в столице.
      dialogs: Представлено 6 реплик, которые задают мотивацию (помощь лекарям) и
        четко указывают место добычи.
      resource: Уголь выбран потому, что игрок имеет Деревянную кирку 1-го ранга,
        необходимую для его добычи.
  objective_description: Добыть 5 единиц угля на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, путник. Ты от Гаррика из столицы? Я уже начала волноваться.
        speaker: Лира Лекарь
      - remark: Прекрасно, этот уголь как раз того качества, что нужно для моих жаровен.
        speaker: Лира Лекарь
      - remark: Без него я не смогла бы правильно обработать подорожник для мазей.
        speaker: Лира Лекарь
      - remark: Ты выглядишь запыхавшимся. На тебя кто-то напал в пути через рощу?
        speaker: Лира Лекарь
      - remark: Гоблины в этих краях совсем распоясались, нужно быть очень осторожным.
        speaker: Лира Лекарь
      - remark: Вот твоя награда, Гаррик просил передать это самому смелому курьеру.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой, человечишка! Что это так звонко стучит в твоей сумке?
        speaker: Гоблин-вор
      - remark: Уголь? О, это очень ценные черные камни для нашего костра!
        speaker: Гоблин-вор
      - remark: Отдавай мешок по-хорошему, иначе мы заберем его по-плохому!
        speaker: Гоблин-вор
      - remark: Твоя деревянная палка тебя не спасет от моих острых зубов!
        speaker: Гоблин-вор
      - remark: Парни, окружаем его! Сегодня в пещере будет тепло!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть кирка, но нет серьезного дела для твоих
          рук.
        speaker: Гаррик Кузнец
      - remark: Мне нужно срочно передать партию угля в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Лира Лекарь ждет его, чтобы поддерживать огонь в своих печах для варки
          снадобий.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне как раз есть выходы пластов угля, которые
          нам нужны.
        speaker: Гаррик Кузнец
      - remark: Добудь 5 единиц угля и отнеси их Лире. Она уже заждалась поставки.
        speaker: Гаррик Кузнец
      - remark: И не задерживайся, раненым в деревне помощь нужна прямо сейчас!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
