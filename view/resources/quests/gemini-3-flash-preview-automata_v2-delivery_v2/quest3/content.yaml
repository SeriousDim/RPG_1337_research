quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как в его данных
        указана возможность приема угля.
      dialogs: Диалоги отражают статусную разницу между игроком и Лордом, завершая
        логическую цепочку доставки.
    enemy_to_face:
      amount: 1 противник достаточен для ознакомительного боя на 1-м уровне.
      dialogs: Диалоги передают атмосферу внезапного нападения дикого зверя во время
        добычи.
      enemy: Пещерная крыса выбрана как противник 1-го ранга с 20 HP, что позволяет
        игроку 1-го уровня с уроном 2 победить её.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для первого уровня игрока.
      character: Гаррик Кузнец выбран как квестодатель, так как он находится в столице
        и связан с металлургией.
      dialogs: Диалоги построены на взаимодействии профессионального кузнеца и новичка,
        объясняют логистическую связь между столицей и замком.
      resource: Уголь выбран, так как игрок имеет Деревянную кирку 1-го ранга, способную
        добывать ресурсы 1-го уровня.
  objective_description: Добыть 5 единиц угля на Одуванчиковой Поляне и доставить
    их Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Ты стоишь перед правителем Высокого Замка. Зачем ты прибыл?
        speaker: Лорд Дрейк
      - remark: Я принес уголь, который заказывал Гаррик Кузнец для вашей кузни.
        speaker: Игрок
      - remark: Наконец-то. Мои мастера уже заждались поставок топлива.
        speaker: Лорд Дрейк
      - remark: Путь был непростым, мне пришлось столкнуться с вредителями в шахтах.
        speaker: Игрок
      - remark: Служба короне всегда сопряжена с риском. Дай мне взглянуть на ресурс.
        speaker: Лорд Дрейк
      - remark: Вот, ровно пять единиц отличного угля.
        speaker: Игрок
      - remark: Хорошая работа. Возьми эту награду за верность делу.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Злобное попискивание и скрежет зубов*'
        speaker: Пещерная крыса
      - remark: Что это за звук? Кто-то прячется в тени залежей угля.
        speaker: Игрок
      - remark: '*Прыгает из темноты, сверкая красными глазами*'
        speaker: Пещерная крыса
      - remark: Огромная крыса! Она явно не хочет, чтобы я забирал этот уголь.
        speaker: Игрок
      - remark: Придется пустить в ход меч, иначе мне не закончить работу.
        speaker: Игрок
      - remark: '*Готовится к очередному броску*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть кирка. Мне нужна помощь с одним важным
          заказом для знати.
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать, Гаррик?
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка требует свежий уголь для своей личной
          кузни, а я не успеваю.
        speaker: Гаррик Кузнец
      - remark: Где мне его найти?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну, там в залежах полно качественного
          топлива.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я добуду уголь и отнесу его Лорду.
        speaker: Игрок
      - remark: Поторопись, лорды не любят ждать. Добудь 5 кусков.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
