quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран в качестве получателя, так как он принимает
        уголь согласно лору игры.
      dialogs: Лорд Дрейк завершает квестовую цепочку, подчеркивая важность вклада
        игрока в оборону замка.
    enemy_to_face:
      amount: Два противника создают минимальный вызов, не угрожая жизни игрока при
        текущем запасе здоровья.
      dialogs: Диалоги описывают внезапное нападение, типичное для процесса сбора
        ресурсов в фэнтези.
      enemy: Пещерная крыса — противник 1 ранга, идеально подходящий для игрока 1
        уровня с деревянным мечом.
    resource_to_deliver:
      amount: Количество 10 штук является стандартным для квеста начального уровня.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он находится в столице
        и работает с углем.
      dialogs: Гаррик Кузнец вводит игрока в курс дела, создавая логическую связь
        между столицей и потребностями лорда.
      resource: Уголь выбран потому, что это ресурс 1 ранга, который игрок может добыть
        имеющейся деревянной киркой.
  objective_description: Добудьте 10 единиц угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок для нужд королевской кузницы.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Я вижу тяжелую ношу на твоих плечах. Это то, что обещал Гаррик?
        speaker: Лорд Дрейк
      - remark: Превосходно, этот уголь пойдет на раздувку замковых горнов.
        speaker: Лорд Дрейк
      - remark: Безопасность Высокого Замка зависит от того, насколько быстро кузнецы
          закончат работу.
        speaker: Лорд Дрейк
      - remark: Ты проделал долгий путь от столицы и даже столкнулся с опасностями
          в шахтах.
        speaker: Лорд Дрейк
      - remark: Королевство нуждается в таких исполнительных и смелых людях, как ты.
        speaker: Лорд Дрейк
      - remark: В качестве награды я дарую тебе элемент доспехов из наших запасов.
        speaker: Лорд Дрейк
      - remark: Этот нагрудник защитит твое сердце в грядущих сражениях. Носи его
          с честью.
        speaker: Лорд Дрейк
      - remark: Теперь иди, у меня еще много дел по управлению этими землями.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Как только последний кусок угля оказался в твоем мешке, из тени пещеры
          раздался писк.
        speaker: Система
      - remark: Две огромные пещерные крысы преградили тебе путь, учуяв запах съестного
          в твоих запасах.
        speaker: Система
      - remark: Их глаза светятся красным в темноте, а зубы готовы вцепиться в твои
          лодыжки.
        speaker: Система
      - remark: Для начинающего героя даже такие вредители могут стать серьезным испытанием.
        speaker: Система
      - remark: Хватай свой деревянный меч и расчисти себе путь к выходу!
        speaker: Система
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя в руках кирка, а значит, есть работа.
        speaker: Гаррик Кузнец
      - remark: Мне поступил срочный заказ из Высокого Замка на ковку новых мечей
          для гвардии.
        speaker: Гаррик Кузнец
      - remark: Однако мои запасы угля полностью иссякли, а без жара в горне я бессилен.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там в скалах есть богатые угольные
          жилы.
        speaker: Гаррик Кузнец
      - remark: Добудь десять кусков угля и доставь их прямиком Лорду Дрейку.
        speaker: Гаррик Кузнец
      - remark: Он лично курирует этот заказ и ждет поставку материалов в своем замке.
        speaker: Гаррик Кузнец
      - remark: Поторопись, кузнечный молот не должен простаивать без дела!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
