quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана адресатом, так как она официально
        принимает Подорожник согласно данным мира.
      dialogs: Лира Лекарь подтверждает получение ресурса и логически обосновывает
        выдачу награды.
    enemy_to_face:
      amount: Один противник оптимален для игрока с деревянным мечом и без брони.
      dialogs: Диалоги отражают мотивацию противника — кража ценного ресурса.
      enemy: Гоблин-вор выбран как подходящий противник для 1 уровня (урон 3, здоровье
        24).
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для стартового квеста на сбор
        ресурсов.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он находится в столице,
        где обычно начинают игроки 1 уровня.
      dialogs: Гаррик выступает инициатором квеста, используя лорную связь между персонажами
        (просьба помочь коллеге).
      resource: Подорожник выбран потому, что для его добычи требуется лопата 1 ранга,
        которая имеется у игрока.
  objective_description: Соберите 5 единиц подорожника, используя лопату, и доставьте
    их Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ах, это ты! Гаррик прислал весточку, что отправил помощь.
        speaker: Лира Лекарь
      - remark: Да, вот ваш подорожник. Ровно 5 пучков, как и просили.
        speaker: Игрок
      - remark: Спасибо тебе огромное! Это спасет немало жизней в Деревне Речных Лугов.
        speaker: Лира Лекарь
      - remark: По пути на меня напал гоблин, но я справился.
        speaker: Игрок
      - remark: В этих краях стало небезопасно. Тебе нужна защита получше простой
          рубахи.
        speaker: Лира Лекарь
      - remark: Возьми этот деревянный нагрудник. Он остался от одного из ополченцев.
        speaker: Лира Лекарь
      - remark: Благодарю, Лира. Он мне точно пригодится.
        speaker: Игрок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас в мешке? Пахнет свежими травками!
        speaker: Гоблин-вор
      - remark: Отойди, это груз для лекаря.
        speaker: Игрок
      - remark: Лекарь подождет, а гоблинам нужно латать свои шкуры! Отдавай подорожник!
        speaker: Гоблин-вор
      - remark: Мой деревянный меч быстро переубедит тебя.
        speaker: Игрок
      - remark: Попробуй поймай, глупый человек!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, новичок. Вижу, у тебя есть деревянная лопата. Есть дело
          как раз для такого инструмента.
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать, Гаррик?
        speaker: Игрок
      - remark: Моя старая знакомая Лира из соседней деревни зашивается с ранеными.
          Ей катастрофически не хватает лекарственных трав.
        speaker: Гаррик Кузнец
      - remark: Каких именно трав? Я готов помочь.
        speaker: Игрок
      - remark: Тебе нужно собрать 5 единиц подорожника. Его много в окрестных борах.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я соберу подорожник и отнесу его Лире Лекарю.
        speaker: Игрок
      resource: Подорожник
  reward:
    item_name: Деревянный нагрудник
