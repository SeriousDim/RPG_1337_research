quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как он официально
        принимает уголь согласно списку предметов NPC.
      dialogs: Финальный диалог завершает сюжетную линию доставки, подтверждая важность
        действий игрока для правителя одной из локаций.
    enemy_to_face:
      amount: 1 противник, чтобы не перегружать игрока без брони на первом уровне.
      dialogs: Столкновение с гоблином-вором подчеркивает опасности путешествия между
        локациями и дает игроку возможность использовать оружие.
      enemy: Гоблин-вор выбран как противник ранга 1 с низким уроном (3), что безопасно
        для игрока 1 уровня с 100 HP.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста на сбор.
      character: Выбран Гаррик Кузнец, так как он находится в столице и работает с
        углем по логике мира.
      dialogs: Гаррик Кузнец выступает в роли квестодателя, связывая начальный этап
        игры с необходимостью добычи базового ресурса. Диалог вводит игрока в контекст
        мира.
      resource: Уголь выбран, так как игрок обладает деревянной киркой ранга 1, что
        соответствует минимальному рангу инструмента для добычи угля.
  objective_description: Соберите 5 единиц угля по просьбе Гаррика Кузнеца и доставьте
    их Лорду Дрейку в Высокий Замок, чтобы обеспечить замок топливом.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Наконец-то. Ты принес то, что обещал Гаррик?
        speaker: Лорд Дрейк
      - remark: Да, милорд. Путь был опасным, на меня напали в лесу.
        speaker: Игрок
      - remark: Разбойники и гоблины совсем распоясались. Но уголь цел?
        speaker: Лорд Дрейк
      - remark: Вот 5 кусков угля, как и заказывали.
        speaker: Игрок
      - remark: Прекрасно. Мои кузнецы теперь смогут раздуть горны. Ты сослужил хорошую
          службу.
        speaker: Лорд Дрейк
      - remark: Всегда рад помочь Королевству.
        speaker: Игрок
      - remark: В качестве благодарности возьми этот нагрудник. Тебе он нужнее, чем
          моим гвардейцам.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой! Твоя сумка... она выглядит тяжелой. Наверняка там золото!
        speaker: Гоблин-вор
      - remark: Тут только уголь для Лорда. Уйди с дороги, мелкий пакостник.
        speaker: Игрок
      - remark: Уголь тоже блестит! Гоблины любят блестящее! Отдавай!
        speaker: Гоблин-вор
      - remark: Я предупреждал. Придется проучить тебя.
        speaker: Игрок
      - remark: Хи-хи! Мои зубы острее твоего деревянного меча!
        speaker: Гоблин-вор
      - remark: Проверим это в бою!
        speaker: Игрок
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок! У меня есть работа как раз для твоего уровня. Ты ведь
          умеешь махать киркой?
        speaker: Гаррик Кузнец
      - remark: Да, мастер Гаррик. Что нужно сделать?
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка прислал гонца. Им срочно нужен качественный
          уголь для обогрева залов.
        speaker: Гаррик Кузнец
      - remark: Я готов отправиться на добычу. Сколько ресурсов требуется?
        speaker: Игрок
      - remark: Добудь 5 единиц угля. Этого должно хватить на первое время. Поторопись,
          морозы близко.
        speaker: Гаррик Кузнец
      - remark: Уже иду. Ожидайте меня с новостями.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
