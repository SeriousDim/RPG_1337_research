quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк — персонаж из Высокого Замка, который по лору
        мира принимает Уголь.
      dialogs: 8 диалоговых вхождений завершают сюжетную линию доставкой груза Лорду
        Дрейку и получением награды.
    enemy_to_face:
      amount: 2 противника создают умеренную угрозу для новичка.
      dialogs: 5 диалоговых вхождений описывают столкновение с агрессивной фауной
        во время выполнения задания.
      enemy: Пещерная крыса выбрана как противник 1-го ранга, с которым игрок 1-го
        уровня может справиться без брони.
    resource_to_deliver:
      amount: 5 единиц — стандартное количество для вводного квеста на сбор.
      character: Гаррик Кузнец выбран как квестодатель, находящийся в стартовой локации.
      dialogs: 'Диалоги (7 вхождений) задают экспозицию: Гаррик в Королевской столице
        просит добыть Уголь, доступный игроку 1 уровня.'
      resource: Уголь — ресурс 1-го ранга, который игрок может добыть имеющейся Деревянной
        киркой.
  objective_description: Добудьте 5 единиц Угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Кто осмелился беспокоить меня в Высоком Замке?
        speaker: Лорд Дрейк
      - remark: Милорд, я принес Уголь от мастера Гаррика из столицы.
        speaker: Игрок
      - remark: А, долгожданное топливо. Мои залы уже начали остывать.
        speaker: Лорд Дрейк
      - remark: Дорога была опасной, на меня напали дикие крысы.
        speaker: Игрок
      - remark: В наше время даже короткое путешествие требует отваги. Проверим товар.
        speaker: Лорд Дрейк
      - remark: Уголь отменного качества. Ты заслужил достойную оплату.
        speaker: Лорд Дрейк
      - remark: Благодарю за щедрость, Лорд Дрейк.
        speaker: Игрок
      - remark: Возьми этот доспех. Путешествовать без защиты в этих землях — безумие.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Злобный и голодный писк*'
        speaker: Пещерная крыса
      - remark: Похоже, запах еды в моем мешке привлек местных вредителей.
        speaker: Игрок
      - remark: '*Бросается на игрока, обнажив мелкие зубы*'
        speaker: Пещерная крыса
      - remark: Придется защищать груз. Деревянный меч мне в помощь!
        speaker: Игрок
      - remark: Убирайтесь обратно в свои норы, твари!
        speaker: Игрок
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Горны Королевской столицы почти остыли, а заказы
          копятся.
        speaker: Гаррик Кузнец
      - remark: Я ищу работу. Могу ли я чем-то помочь кузнице?
        speaker: Игрок
      - remark: Мне нужна партия свежего топлива. Лорд Дрейк из Высокого Замка ожидает
          поставку угля для своих каминов.
        speaker: Гаррик Кузнец
      - remark: Где мне лучше всего искать руду?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну. Там есть выходы породы, с которыми
          справится твоя Деревянная кирка.
        speaker: Гаррик Кузнец
      - remark: Собери 5 единиц угля и доставь их лично Лорду. Он хорошо платит за
          пунктуальность.
        speaker: Гаррик Кузнец
      - remark: Я всё сделаю. Скоро Уголь будет в замке.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
