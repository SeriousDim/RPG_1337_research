quest:
  explanation:
    destination:
      character_to_deliver: Торговец Нарек выбран получателем, так как он находится
        в другой локации (Торговый Город) и принимает данный тип ресурса.
      dialogs: Диалог из 7 реплик завершает логическую цепочку доставки и раскрывает
        детали мира.
    enemy_to_face:
      amount: Один противник достаточен для игрока без брони и с базовым оружием.
      dialogs: Диалог из 5 реплик создает конфликтную ситуацию при транспортировке
        груза.
      enemy: Гоблин-вор выбран как противник 1 ранга, что соответствует текущему уровню
        и снаряжению игрока.
    resource_to_deliver:
      amount: Количество 5 штук является оптимальным для стартового квеста.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в Королевской
        столице и работает с ресурсами 1 ранга.
      dialogs: Диалог из 8 реплик знакомит игрока с Гарриком Кузнецом и обосновывает
        задачу по сбору ресурса.
      resource: Одуванчик выбран, так как игрок на 1 уровне имеет деревянную лопату
        (rank 1), необходимую для его добычи.
  objective_description: Соберите 5 одуванчиков на Одуванчиковой Поляне с помощью
    деревянной лопаты и доставьте их Торговцу Нареку в Торговый Город по поручению
    Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Торговец Нарек
      dialogs:
      - remark: Вы Торговец Нарек? У меня посылка от Гаррика из Столицы.
        speaker: Игрок
      - remark: Наконец-то! Я уже заждался этой поставки. Одуванчики целы?
        speaker: Торговец Нарек
      - remark: Да, пришлось отбиться от вороватого гоблина, но ресурс в сохранности.
        speaker: Игрок
      - remark: Гоблины в этих краях совсем обнаглели. Дай-ка взгляну на товар...
        speaker: Торговец Нарек
      - remark: Превосходно. Свежие, сочные. Как раз для моего секретного рецепта
          мази.
        speaker: Торговец Нарек
      - remark: Гаррик говорил, что это для кузнечных дел...
        speaker: Игрок
      - remark: Старый ворчун вечно всё путает. Вот твоя награда, ты её заслужил.
        speaker: Торговец Нарек
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас тут? Желтые цветочки в мешке?
        speaker: Гоблин-вор
      - remark: Отойди с дороги. Эти ресурсы зарезервированы для гильдии торговцев.
        speaker: Игрок
      - remark: Резерв? Я люблю резервы! Особенно те, что можно съесть или продать!
        speaker: Гоблин-вор
      - remark: Ты не хочешь этого делать. Мой меч хоть и деревянный, но острый.
        speaker: Игрок
      - remark: Меньше слов, блестящий человечишка! Отдавай сумку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть деревянная лопата. Не хочешь подзаработать?
        speaker: Гаррик Кузнец
      - remark: Смотря что нужно сделать, Гаррик. Работа по специальности?
        speaker: Игрок
      - remark: Почти. Мне нужна партия свежих одуванчиков. Только не спрашивай, зачем
          они кузнецу.
        speaker: Гаррик Кузнец
      - remark: Одуванчики? Это звучит довольно просто.
        speaker: Игрок
      - remark: Просто, если руки не из того места. Мне нужно ровно 5 штук самого
          высокого качества.
        speaker: Гаррик Кузнец
      - remark: Где мне их найти?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну. Как соберешь — неси их прямиком
          в Торговый Город.
        speaker: Гаррик Кузнец
      - remark: Договорились, я приступлю к сбору.
        speaker: Игрок
      resource: Одуванчик
  reward:
    item_name: Деревянный нагрудник
