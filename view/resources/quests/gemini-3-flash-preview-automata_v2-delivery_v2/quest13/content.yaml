quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец выбран получателем, так как он принимает
        уголь согласно характеристикам игрового мира и логически связан с ремеслом.
      dialogs: Диалог завершения (6 реплик) подтверждает получение ресурса и логически
        подводит к выдаче награды за защиту груза.
    enemy_to_face:
      amount: 1 противник выбран, чтобы гарантировать выживание игрока без брони,
        учитывая его текущее здоровье (100 HP).
      dialogs: Диалог с Гоблином-вором (6 реплик) создает конфликт интересов и обосновывает
        нападение на игрока из-за ценности груза.
      enemy: Гоблин-вор выбран как противник 1-го ранга с уроном 3 и 24 HP, что сбалансировано
        для игрока 1-го уровня с деревянным мечом.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста, требующее времени
        на добычу, но не перегружающее инвентарь.
      character: Лира Лекарь выбрана как квестодатель, так как она находится в Деревне
        Речных Лугов и взаимодействует с игроком 1-го уровня.
      dialogs: Диалог с Лирой Лекарем (6 реплик) обосновывает необходимость доставки
        ресурса между двумя локациями для укрепления связей в мире.
      resource: Уголь выбран, так как игрок имеет Деревянную кирку 1-го ранга, способную
        добывать ресурс 1-го ранга.
  objective_description: Добыть 5 единиц угля с помощью кирки и доставить их Гаррику
    Кузнецу в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Наконец-то! Я уже начал думать, что сегодня моя наковальня останется
          холодной.
        speaker: Гаррик Кузнец
      - remark: Лира Лекарь просила передать тебе этот уголь. Ровно 5 единиц.
        speaker: Игрок
      - remark: Отличная работа, парень. Качество угля отменное, как раз для новой
          стали.
        speaker: Гаррик Кузнец
      - remark: Вижу, твой вид оставляет желать лучшего. Гоблины на дороге совсем
          распоясались?
        speaker: Гаррик Кузнец
      - remark: Пришлось отбиваться, один из них пытался стащить мешок прямо у меня
          из рук.
        speaker: Игрок
      - remark: Ты хорошо справился. В качестве благодарности возьми этот нагрудник,
          он тебе нужнее.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой! Что это в твоей сумке так вкусно пахнет гарью?
        speaker: Гоблин-вор
      - remark: Это просто уголь. Уходи с дороги, пока я не пустил в ход меч.
        speaker: Игрок
      - remark: Уголь — это огонь! Гоблины любят жарить мясо на огне!
        speaker: Гоблин-вор
      - remark: Отдавай камни по-хорошему, или мы заберем их с твоего остывающего
          тела!
        speaker: Гоблин-вор
      - remark: Попробуй отобрать, ворюга. Я не собираюсь отдавать ресурс монстрам.
        speaker: Игрок
      - remark: В атаку, братья! Хватай его за ноги!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Лира Лекарь
      dialogs:
      - remark: Приветствую, путник. Мне нужна твоя помощь в одном важном деле для
          города.
        speaker: Лира Лекарь
      - remark: Что случилось, Лира? Тебе нужны целебные травы?
        speaker: Игрок
      - remark: Не совсем. Нашему кузнецу Гаррику в столице срочно требуется топливо
          для горна.
        speaker: Лира Лекарь
      - remark: Я обещала организовать поставку, но мои запасы закончились. Нужно
          добыть уголь.
        speaker: Лира Лекарь
      - remark: Добудь 5 единиц угля и отнеси их Гаррику в Королевскую столицу. Поможешь?
        speaker: Лира Лекарь
      - remark: Да, я как раз собирался в те края. Считай, что уголь уже у него.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
