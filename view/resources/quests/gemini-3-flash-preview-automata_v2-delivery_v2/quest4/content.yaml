quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — персонаж из другой локации, что соответствует
        механике квеста типа 'Доставка'.
      dialogs: Диалог из 7 реплик завершает сюжетную линию доставки и обосновывает
        получение награды.
    enemy_to_face:
      amount: Два противника создают умеренный вызов для игрока с базовым здоровьем
        и мечом.
      dialogs: Диалог из 6 реплик подчеркивает конфликт и агрессивный настрой противника
        к игроку.
      enemy: Гоблин-вор — противник 1-го ранга, что соответствует текущему уровню
        игрока и его снаряжению.
    resource_to_deliver:
      amount: Количество 5 штук является оптимальным для стартового квеста на сбор.
      character: Гаррик Кузнец выбран как квестодатель, так как он находится в начальной
        локации и работает с углем.
      dialogs: Диалог из 8 реплик раскрывает мотивацию персонажа (нехватка топлива)
        и устанавливает связь между двумя NPC.
      resource: Уголь — ресурс 1-го ранга, для добычи которого требуется Деревянная
        кирка, имеющаяся у игрока.
  objective_description: Добыть 5 единиц угля и доставить их Лире Лекарю в Деревню
    Речных Лугов по просьбе кузнеца Гаррика.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Добро пожаловать в нашу деревню. Ты выглядишь уставшим, тебе нужна
          помощь?
        speaker: Лира Лекарь
      - remark: Нет, я здесь по поручению Гаррика Кузнеца из столицы.
        speaker: Игрок
      - remark: Ох, неужели это тот самый уголь, о котором я просила в письме?
        speaker: Лира Лекарь
      - remark: Именно так. Мастер Гаррик просил передать его вам как можно скорее.
        speaker: Игрок
      - remark: Ты просто спаситель! В лечебнице стало совсем зябко, а больным нужно
          тепло.
        speaker: Лира Лекарь
      - remark: Рад, что смог помочь. Дорога была непростой из-за гоблинов.
        speaker: Игрок
      - remark: Спасибо тебе. Вот, возьми этот нагрудник, он защитит тебя в будущих
          странствиях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй, ребята, посмотрите, какой тяжелый мешок у этого человека!
        speaker: Гоблин-вор
      - remark: Там наверняка золото или блестящие камни!
        speaker: Гоблин-вор
      - remark: Отойдите прочь, в мешке только уголь для лекаря.
        speaker: Игрок
      - remark: Уголь тоже хорошо горит! Отдавай его нам добровольно!
        speaker: Гоблин-вор
      - remark: Мне не хотелось бы применять меч, но вы не оставляете выбора.
        speaker: Игрок
      - remark: В атаку! Отберем у него всё до последней крошки!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть кирка и желание подзаработать.
        speaker: Гаррик Кузнец
      - remark: Добрый день, мастер Гаррик. У вас есть для меня работа?
        speaker: Игрок
      - remark: Мои запасы топлива на исходе, а ковка мечей не терпит промедления.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты добыл немного угля на ближайших месторождениях.
        speaker: Гаррик Кузнец
      - remark: Я справлюсь с этим, благо инструмент при мне.
        speaker: Игрок
      - remark: Отлично, но это еще не всё. Этот уголь нужно доставить Лире Лекарю.
        speaker: Гаррик Кузнец
      - remark: Она просила его для обогрева своей лечебницы в Деревне Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Понял вас, я доставлю груз в целости и сохранности.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
