quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, так как она официально
        принимает Железо согласно данным игрового мира и может выдать подходящую награду.
      dialogs: Лира Лекарь завершает сюжетную арку, объясняя практическую пользу принесенного
        ресурса и вознаграждая игрока за риск.
    enemy_to_face:
      amount: Один противник выбран для обеспечения безопасности игрока на 1 уровне,
        учитывая отсутствие у него брони.
      dialogs: Диалоги разбойника подчеркивают ценность ресурса и создают конфликтную
        ситуацию, типичную для фэнтезийного средневековья.
      enemy: Лесной разбойник — противник 1 ранга, что соответствует текущему уровню
        игрока и делает бой честным при наличии 100 HP.
    resource_to_deliver:
      amount: Количество 5 является оптимальным для начального квеста, создавая ощущение
        трудоемкости, но не перегружая игрока.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в Королевской
        столице и работает с ресурсами низкого ранга.
      dialogs: Гаррик Кузнец выступает в роли инициатора квеста, используя свою связь
        с другими NPC (Лирой), чтобы направить игрока 1 уровня.
      resource: Железо выбрано как цель, так как для его добычи требуется инструмент
        1 ранга, который уже есть у игрока (Деревянная кирка).
  objective_description: Добудьте 5 единиц Железа в Подорожниковом Бору и доставьте
    его Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, наконец-то! Я уже начала терять надежду, что Гаррик найдет кого-то
          в такое неспокойное время.
        speaker: Лира Лекарь
      - remark: Это железо... оно именно то, что нужно. Посмотри, какой чистый блеск,
          никакой лишней породы.
        speaker: Лира Лекарь
      - remark: Я вижу по твоей одежде, что ты столкнулся с опасностями по пути. Разбойники
          в бору совсем страх потеряли.
        speaker: Лира Лекарь
      - remark: Твой деревянный меч совсем зазубрился. С таким оружием долго в наших
          краях не протянешь.
        speaker: Лира Лекарь
      - remark: В благодарность за спасение моих пациентов я отдам тебе этот Каменный
          меч. Он гораздо надежнее.
        speaker: Лира Лекарь
      - remark: Береги себя, путник. Миру сейчас очень нужны такие отважные и честные
          люди.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, парень! Что это ты там в мешке прячешь? Тяжелое, небось, спину
          гнет?
        speaker: Лесной разбойник
      - remark: Железная руда? О, это стоит хороших денег на черном рынке, кузнецы
          за такое щедро платят.
        speaker: Лесной разбойник
      - remark: Бросай мешок и убирайся, пока я не решил использовать твой череп как
          кружку для эля!
        speaker: Лесной разбойник
      - remark: Ты думаешь, этот хлипкий деревянный меч тебя спасет от настоящего
          мастера клинка?
        speaker: Лесной разбойник
      - remark: Ребята, смотрите, он еще и сопротивляется! Ха-ха, ну всё, готовься
          к встрече с предками!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Слушай сюда, новичок. В Деревне Речных Лугов беда — инструменты лекаря
          совсем затупились, а новых взять негде.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты помог Лире. Она просила передать ей качественное
          железо для новых ланцетов.
        speaker: Гаррик Кузнец
      - remark: Отправляйся в Подорожниковый Бор, там как раз недавно открыли богатую
          жилу.
        speaker: Гаррик Кузнец
      - remark: Твоей деревянной кирки должно хватить, чтобы отколоть несколько хороших
          кусков руды.
        speaker: Гаррик Кузнец
      - remark: Как соберешь достаточно, сразу беги в Деревню Речных Лугов и отдай
          всё лично в руки.
        speaker: Гаррик Кузнец
      - remark: Не задерживайся, от этого зависят жизни людей, а я пока подготовлю
          чертежи.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
