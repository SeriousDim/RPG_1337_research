quest:
  explanation:
    destination:
      character_to_deliver: Целительница Алина выбрана, так как в её характеристиках
        указано, что она принимает Уголь (Coal).
      dialogs: Целительница Алина принимает товар, завершая сюжетную линию помощи
        монастырю. Содержит 6 реплик.
    enemy_to_face:
      amount: 2 противника создают умеренную угрозу, не превышая лимит выживаемости
        игрока.
      dialogs: Диалог с Гоблином-вором (6 вхождений) подчеркивает опасность дороги
        и ценность груза для врагов.
      enemy: Гоблин-вор выбран как противник 1 ранга, с которым игрок 1 уровня может
        справиться при 100 единицах здоровья.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста.
      character: Выбран Гаррик Кузнец, так как он находится в столице и работает с
        ресурсами.
      dialogs: Гаррик Кузнец выступает квестгивером в Королевской столице, мотивируя
        игрока необходимостью помощи монастырю. Диалог содержит 6 реплик.
      resource: Уголь выбран как ресурс 1 ранга, который игрок может добыть имеющейся
        Деревянной киркой 1 ранга.
  objective_description: Добудьте 5 единиц угля и доставьте их Целительнице Алине
    в Древний Монастырь.
  parts:
    destination:
      character_to_deliver: Целительница Алина
      dialogs:
      - remark: Слава небесам, ты добрался! Я уже боялась, что из-за разбойников на
          дорогах мы останемся без тепла.
        speaker: Целительница Алина
      - remark: Путь был опасен, на меня напали гоблины, но груз в полной сохранности.
        speaker: Игрок
      - remark: Бедное дитя, ты выглядишь изнуренным. Эти проклятые воришки совсем
          страх потеряли.
        speaker: Целительница Алина
      - remark: Главное, что теперь уголь у вас. Гаррик сказал, что это срочно.
        speaker: Игрок
      - remark: Да, ночи в монастыре суровы, и без огня наши больные не поправятся.
          Ты совершил доброе дело.
        speaker: Целительница Алина
      - remark: Возьми это в благодарность. Один из рыцарей оставил старую защиту,
          тебе она сослужит добрую службу.
        speaker: Целительница Алина
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой, человек! Что это так славно побрякивает в твоем мешке?
        speaker: Гоблин-вор
      - remark: Это лишь уголь для монастыря. Уйди с дороги, мне нужно идти.
        speaker: Игрок
      - remark: Уголь? Нам в норах тоже холодно! Отдавай сумку, или мы заберем её
          с твоего остывшего тела!
        speaker: Гоблин-вор
      - remark: Я не намерен отдавать то, что принадлежит другим. Мой деревянный меч
          готов к бою.
        speaker: Игрок
      - remark: Твоя палка нас не напугает! Парни, хватайте его, мешок будет нашим!
        speaker: Гоблин-вор
      - remark: Похоже, словами дело не решить. Придется прорываться силой!
        speaker: Игрок
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть кирка, но твоя грудь совсем
          не защищена от клыков зверей.
        speaker: Гаррик Кузнец
      - remark: Это верно, я только начинаю свой путь и пока не обзавелся доспехами.
        speaker: Игрок
      - remark: У меня есть работа. Целительница Алина из Древнего Монастыря прислала
          весточку — им крайне необходим уголь для обогрева палат.
        speaker: Гаррик Кузнец
      - remark: Мои подмастерья заняты ковкой мечей, так что сходишь в Одуванчиковую
          Поляну, там есть выходы жилы.
        speaker: Гаррик Кузнец
      - remark: Древний Монастырь находится не близко. Сколько именно угля нужно доставить?
        speaker: Игрок
      - remark: Добудь 5 единиц угля. Как закончишь, сразу неси его Алине, она очень
          ждет.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
