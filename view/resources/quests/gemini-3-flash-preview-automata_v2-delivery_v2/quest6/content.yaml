quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как это логически
        связывает столицу и замок в рамках одного задания.
      dialogs: 8 фраз, завершающих сюжетную линию доставки и обосновывающих получение
        награды от высокопоставленного лица.
    enemy_to_face:
      amount: 2 противника создают небольшую угрозу, не превышающую запас здоровья
        игрока (100 HP).
      dialogs: 5 фраз, создающих атмосферу внезапного столкновения с агрессивной фауной
        во время добычи.
      enemy: Пещерная крыса выбрана как наиболее слабый противник, подходящий для
        игрока 1 уровня без брони.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для первого квеста игрока.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в столице
        и связан с добычей ресурсов.
      dialogs: Диалог из 8 фраз между Гарриком и игроком, вводящий в курс дела и обосновывающий
        цель задания.
      resource: Уголь выбран, так как игрок 1 уровня обладает деревянной киркой (rank
        1), позволяющей добывать руду этого уровня.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок, чтобы спасти его от холода.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто ты такой и зачем явился в мои покои без приглашения?
        speaker: Лорд Дрейк
      - remark: Милорд, я доставил уголь от кузнеца Гаррика из столицы.
        speaker: Игрок
      - remark: Наконец-то! Сквозняки в этом замке скоро превратят меня в ледяную
          статую.
        speaker: Лорд Дрейк
      - remark: Вот, здесь ровно 5 единиц лучшего угля, как и заказывали.
        speaker: Игрок
      - remark: Твое рвение похвально. Не каждый решится на такое долгое путешествие.
        speaker: Лорд Дрейк
      - remark: Рад был помочь Королевству сохранить тепло.
        speaker: Игрок
      - remark: Ты хорошо потрудился, а твоя одежда совсем не подходит для воина.
        speaker: Лорд Дрейк
      - remark: Возьми это в награду. Нагрудник сослужит тебе добрую службу в будущем.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эта пещера на краю поляны кажется идеальным местом для добычи.
        speaker: Игрок
      - remark: '*Слышен резкий писк и скрежет острых зубов о камни*'
        speaker: Пещерная крыса
      - remark: Ох, похоже, я потревожил местных обитателей.
        speaker: Игрок
      - remark: '*Существо припадает к земле, готовясь к прыжку, и скалится*'
        speaker: Пещерная крыса
      - remark: Придется взяться за деревянный меч, прежде чем я закончу сбор угля.
        speaker: Игрок
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Мне нужна твоя помощь в одном государственном
          деле.
        speaker: Гаррик Кузнец
      - remark: Что случилось, Гаррик? Ты выглядишь обеспокоенным.
        speaker: Игрок
      - remark: В Высоком Замке почти закончилось топливо для каминов, а Лорд Дрейк
          не терпит холода.
        speaker: Гаррик Кузнец
      - remark: И ты хочешь, чтобы я добыл уголь для него?
        speaker: Игрок
      - remark: Именно. Отправляйся на Одуванчиковую Поляну, там можно найти отличные
          выходы жилы.
        speaker: Гаррик Кузнец
      - remark: Сколько ресурса мне нужно собрать?
        speaker: Игрок
      - remark: Собери 5 единиц угля. Этого хватит, чтобы поддержать огонь в главном
          зале.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я возьму свою кирку и приступлю к делу немедленно.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
