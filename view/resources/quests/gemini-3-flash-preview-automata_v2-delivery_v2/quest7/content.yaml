quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана согласно логике мира: она принимает
        подорожник и находится в Деревне Речных Лугов.'
      dialogs: Завершающий диалог связывает действия игрока с пользой для игрового
        мира (лечение больных) и обосновывает награду.
    enemy_to_face:
      amount: 2 противника создают умеренную угрозу для игрока со 100 HP и деревянным
        мечом.
      dialogs: Диалог подчеркивает конфликт интересов между игроком и мародерами-гоблинами.
      enemy: Гоблин-вор выбран как противник 1 ранга, что соответствует текущему уровню
        игрока (1) и его снаряжению.
    resource_to_deliver:
      amount: Количество 8 сбалансировано для стартового квеста, требующего времени
        на сбор, но не утомляющего.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации и
        взаимодействует с ресурсами низкого ранга.
      dialogs: Гаррик Кузнец выступает квестодателем, используя сеттинг столицы для
        отправки игрока в начальное приключение.
      resource: Выбран Подорожник, так как это ресурс 2 ранга, который игрок 1 уровня
        может добыть имеющейся у него деревянной лопатой (Rank 1).
  objective_description: Соберите 8 единиц подорожника в Подорожниковом Бору и доставьте
    их Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, ещё один раненый... Проходи, присаживайся, я осмотрю тебя.
        speaker: Лира Лекарь
      - remark: Нет, я здоров. Я пришел от Гаррика Кузнеца из столицы.
        speaker: Игрок
      - remark: От Гаррика? Неужели он нашел кого-то, кто осмелился пройти через леса?
        speaker: Лира Лекарь
      - remark: Да, я принес 8 пучков подорожника. Гоблины пытались помешать, но я
          справился.
        speaker: Игрок
      - remark: Ты настоящий спаситель! Этого хватит, чтобы изготовить мазь для всех
          пострадавших.
        speaker: Лира Лекарь
      - remark: Рад, что успел вовремя. Лира, этот путь был не из легких.
        speaker: Игрок
      - remark: Я вижу, твой деревянный меч совсем износился. Возьми этот Каменный
          меч, он сослужит тебе лучшую службу.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хе-хе! Глядите, какой важный путник! Что прячешь в сумке?
        speaker: Гоблин-вор
      - remark: Это не твое дело, гоблин. Отойди, я выполняю поручение для лекаря.
        speaker: Игрок
      - remark: Лекарства? Травы? Наш шаман дорого заплатит за такой сбор!
        speaker: Гоблин-вор
      - remark: Я не намерен отдавать груз без боя.
        speaker: Игрок
      - remark: Тогда мы заберем его с твоего холодного тела! В атаку, парни!
        speaker: Гоблин-вор
      - remark: Ваша наглость станет вашей погибелью. Защищайся!
        speaker: Игрок
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть лопата и желание подзаработать.
        speaker: Гаррик Кузнец
      - remark: Верно, Гаррик. Есть ли в Столице поручения для новичка?
        speaker: Игрок
      - remark: Моя старая знакомая Лира Лекарь из Деревни Речных Лугов просит помощи.
          У них вспышка хвори, а запасы трав иссякли.
        speaker: Гаррик Кузнец
      - remark: Я готов отправиться в путь. Что именно мне нужно найти?
        speaker: Игрок
      - remark: В Подорожниковом Бору сейчас как раз сезон. Мне нужно, чтобы ты собрал
          там Подорожник.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я соберу траву и доставлю её Лире. Сколько пучков требуется?
        speaker: Игрок
      - remark: Собери ровно 8 единиц. Поторопись, время сейчас дороже золота!
        speaker: Гаррик Кузнец
      resource: Подорожник
  reward:
    item_name: Каменный меч
