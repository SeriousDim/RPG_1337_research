quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран получателем, так как он официально принимает
        уголь согласно данным игры.
      dialogs: Диалог из 6 реплик завершает квест встречей с Лордом Дрейком в Высоком
        Замке, согласно логике мира.
    enemy_to_face:
      amount: 1 противник, чтобы не перегружать игрока без брони.
      dialogs: Диалог из 5 реплик создает классическую ситуацию засады вора на лесной
        дороге.
      enemy: Гоблин-вор выбран как противник 1 ранга, с которым игрок 1 уровня может
        справиться текущим оружием.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста на первом уровне.
      character: Выбран Гаррик Кузнец, так как он логично связан с добычей ресурсов
        и может принимать уголь.
      dialogs: Диалог из 8 реплик знакомит игрока с Гарриком, который находится в
        Королевской столице, и объясняет цель.
      resource: Уголь выбран потому, что у игрока есть деревянная кирка (ранг 1),
        позволяющая добывать этот ресурс.
  objective_description: Собрать 5 единиц угля на Одуванчиковой Поляне и доставить
    их Лорду Дрейку в Высокий Замок по просьбе кузнеца Гаррика.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Наконец-то. Ты принес то, что обещал Гаррик?
        speaker: Лорд Дрейк
      - remark: Да, милорд. Вот 5 кусков угля из шахт.
        speaker: Игрок
      - remark: В замке стало невыносимо холодно. Ты вовремя.
        speaker: Лорд Дрейк
      - remark: По пути на меня напал гоблин, пытался украсть припасы.
        speaker: Игрок
      - remark: Ха! Защитить уголь от воров — дело достойное. Ты справился лучше,
          чем я ожидал.
        speaker: Лорд Дрейк
      - remark: В награду за службу возьми этот шлем. В следующий раз гоблины не доберутся
          до твоей головы.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Гы-гы! Гляньте, что тут у нас! Человечишка с полным мешком!
        speaker: Гоблин-вор
      - remark: Прочь с дороги. Этот груз принадлежит Лорду Дрейку.
        speaker: Игрок
      - remark: Дрейк далеко, а мы близко! Мешок выглядит тяжелым, значит там золото!
        speaker: Гоблин-вор
      - remark: Там только уголь, он вам не нужен.
        speaker: Игрок
      - remark: Врешь! Мы всё равно заберем его! Парни, хватайте его!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть кирка и желание поработать.
        speaker: Гаррик Кузнец
      - remark: Приветствую, мастер Гаррик. Есть какое-то поручение?
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка прислал гонца. Ему срочно нужен уголь
          для каминов.
        speaker: Гаррик Кузнец
      - remark: Я могу заняться добычей. Где мне его искать?
        speaker: Игрок
      - remark: На Одуванчиковой Поляне есть выходы угольной жилы. Твоя деревянная
          кирка как раз подойдет.
        speaker: Гаррик Кузнец
      - remark: Сколько ресурсов мне нужно собрать?
        speaker: Игрок
      - remark: Собери 5 кусков угля. Этого должно хватить на первое время.
        speaker: Гаррик Кузнец
      - remark: Как закончишь, не возвращайся ко мне — сразу неси груз в Высокий Замок
          Лорду Дрейку.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный шлем
