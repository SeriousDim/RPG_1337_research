quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, логично связанный
        с производством лечебных средств, требующих топлива.
      dialogs: Диалоги Лиры Лекаря (5 вхождений) завершают сюжетную линию доставки,
        подтверждая важность ресурса и обосновывая награду.
    enemy_to_face:
      amount: 2 противника создают умеренную угрозу для игрока со 100 HP и деревянным
        мечом.
      dialogs: Диалоги Гоблинов-воров (5 вхождений) подчеркивают их мотивацию — кражу
        ресурсов — и акцентируют внимание на слабом снаряжении игрока.
      enemy: Выбран Гоблин-вор, так как это противник 1 ранга, что соответствует уровню
        и снаряжению игрока.
    resource_to_deliver:
      amount: Количество 5 является стандартным для стартового квеста по сбору.
      character: Выбран Гаррик Кузнец, так как он находится в Королевской столице
        и работает с углем.
      dialogs: Диалоги Гаррика Кузнеца (5 вхождений) задают контекст нехватки ресурсов
        для союзника и мотивируют игрока использовать его текущий инструмент.
      resource: 'Уголь выбран потому, что у игрока есть Деревянная кирка (ранг 1),
        позволяющая добывать ресурсы с min_instrument_rank: 1.'
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Приветствую в Деревне Речных Лугов. Ох, это тот самый уголь от Гаррика?
        speaker: Лира Лекарь
      - remark: Ты как раз вовремя, мои жаровни почти остыли, а лечебные зелья требуют
          постоянного тепла.
        speaker: Лира Лекарь
      - remark: Вид у тебя запыхавшийся... Неужели на тропе снова безобразничали мелкие
          воришки?
        speaker: Лира Лекарь
      - remark: Я знала, что Гаррик пошлет надежного человека. Спасибо за помощь,
          ты выручил всю деревню.
        speaker: Лира Лекарь
      - remark: Возьми этот нагрудник, я попросила Гаррика сделать его специально
          для того, кто доставит мне груз.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй! Слышишь, как в его сумке стучат камни?
        speaker: Гоблин-вор
      - remark: Это уголь! Он горит жарко, зимой нам он будет нужнее, чем этому человеку!
        speaker: Гоблин-вор
      - remark: Бросай мешок и беги, пока мы не решили полакомиться чем-то повкуснее
          камней!
        speaker: Гоблин-вор
      - remark: Смотри, у него всего лишь деревянный меч, он нам ничего не сделает!
        speaker: Гоблин-вор
      - remark: Хватай его! Уголь будет нашим!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, ты не боишься тяжелой работы и прихватил с собой
          кирку.
        speaker: Гаррик Кузнец
      - remark: Лира из Деревни Речных Лугов просила прислать ей качественного угля
          для ее лечебных жаровен.
        speaker: Гаррик Кузнец
      - remark: Сам я сейчас занят ковкой мечей для стражи и не могу отлучиться из
          столицы.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, добудь там 5 кусков угля.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь всё, доставь груз прямиком к ней в Деревню Речных
          Лугов.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
