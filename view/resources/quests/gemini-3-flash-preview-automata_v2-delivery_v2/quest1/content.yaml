quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как получатель, так как он по лору игры
        принимает уголь и находится в другой локации (Высокий Замок).
      dialogs: 8 реплик завершают сюжетную арку, показывая важность доставки и признание
        заслуг игрока Лордом.
    enemy_to_face:
      amount: 2 крысы обеспечат умеренный вызов (суммарно 40 HP), не убивая игрока,
        у которого 100 HP.
      dialogs: 5 реплик подчеркивают опасность момента и агрессивность противника.
      enemy: Пещерная крыса — самый слабый противник (ранг 1), подходящий для игрока
        1 уровня с деревянным мечом (2 урона).
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для вводного квеста.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он находится в столице
        и работает с рудой.
      dialogs: Диалог из 7 реплик вводит игрока в курс дела, объясняя цель (уголь)
        и место назначения (Высокий Замок).
      resource: Уголь выбран, так как для его добычи требуется инструмент 1-го ранга
        (деревянная кирка), который есть у игрока.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне с помощью
    деревянной кирки и доставьте его Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Кто идет в Высокий Замок с таким чумазым лицом?
        speaker: Страж Замка
      - remark: Я от Гаррика Кузнеца. Доставил уголь для Лорда Дрейка.
        speaker: Игрок
      - remark: Пропустите его. Я давно жду это топливо. В залах становится прохладно.
        speaker: Лорд Дрейк
      - remark: Вот ваш уголь, Лорд Дрейк. Пять отборных кусков, как и заказывали.
        speaker: Игрок
      - remark: Отлично. Кузнец не подвел, прислал расторопного малого.
        speaker: Лорд Дрейк
      - remark: Путь был не самым легким, пришлось столкнуться с вредителями в шахтах.
        speaker: Игрок
      - remark: Ты хорошо потрудился. Твоя одежда совсем износилась, возьми это для
          защиты.
        speaker: Лорд Дрейк
      - remark: Благодарю, милорд! Это значительно усилит мою защиту.
        speaker: Игрок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Фу, ну и запах... Кажется, я забрел прямо в гнездо этих тварей.
        speaker: Игрок
      - remark: '*Громкое злобное пищание и шуршание в темноте*'
        speaker: Пещерная крыса
      - remark: Только попробуйте подойти! Мой деревянный меч еще не затупился.
        speaker: Игрок
      - remark: '*Крыса обнажает зубы и готовится к прыжку*'
        speaker: Пещерная крыса
      - remark: Придется прорубать себе путь наружу вместе с добытым углем!
        speaker: Игрок
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, новичок. Вижу, у тебя есть новенькая деревянная кирка
          и желание поработать.
        speaker: Гаррик Кузнец
      - remark: Да, я ищу работу. Есть что-нибудь подходящее для меня?
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка требует свежую партию угля для своих
          каминов, а мои помощники все заняты на переплавке железа.
        speaker: Гаррик Кузнец
      - remark: Тебе нужно отправиться на Одуванчиковую Поляну — там есть выходы угольных
          пластов.
        speaker: Гаррик Кузнец
      - remark: Это звучит несложно. Сколько угля нужно добыть?
        speaker: Игрок
      - remark: Добудь 5 единиц угля. Этого должно хватить Лорду на первое время.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я займусь этим и доставлю уголь в Высокий Замок.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
