quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран как конечная цель, так как он является
        значимым персонажем в мире и может принять данный ресурс.
      dialogs: 6 вхождений. Завершают сюжетную линию доставки и обосновывают получение
        награды.
    enemy_to_face:
      amount: 1 противник, чтобы игрок гарантированно выжил, учитывая отсутствие брони.
      dialogs: 5 вхождений. Описывают внезапное нападение и попытку кражи добытого
        ресурса.
      enemy: Гоблин-вор (ранг 1) — подходящий противник для игрока 1 уровня с 100
        HP и деревянным мечом.
    resource_to_deliver:
      amount: Количество 3 является оптимальным для начального квеста 1 уровня.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в Королевской
        столице и связан с добычей руды.
      dialogs: Диалоги включают 8 вхождений, раскрывают мотивацию персонажа (нехватка
        топлива для заказа) и дают четкие инструкции игроку.
      resource: Уголь выбран, так как игрок обладает деревянной киркой 1 ранга, что
        позволяет добывать этот ресурс.
  objective_description: Добудьте 3 единицы угля на Одуванчиковой Поляне с помощью
    кирки и доставьте их Лорду Дрейку в Высокий Замок по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Высокий Замок закрыт для бродяг. Зачем явился?
        speaker: Страж Замка
      - remark: Я принес уголь от кузнеца Гаррика по личному поручению.
        speaker: Игрок
      - remark: Пропустите его! Я заждался вестей от столичного мастера.
        speaker: Лорд Дрейк
      - remark: Милорд, вот ваш уголь. Кузнец просил передать его лично вам.
        speaker: Игрок
      - remark: Отлично. Качество угля достойное. Ты справился с задачей, несмотря
          на опасности дорог.
        speaker: Лорд Дрейк
      - remark: Возьми это в награду. Путешествовать без защиты в наше время безрассудно.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас в мешке? Блестит как черное золото!
        speaker: Гоблин-вор
      - remark: Это всего лишь уголь для Лорда Дрейка. Пропусти меня.
        speaker: Игрок
      - remark: Для Лорда? Теперь это для Гоблинов! Мы любим все, что пачкает руки!
        speaker: Гоблин-вор
      - remark: Мне не хотелось бы применять меч, но ты не оставляешь выбора.
        speaker: Игрок
      - remark: Твоя деревянная палка нас не напугает! Хватай его!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть деревянная кирка, а значит,
          ты не боишься честного труда.
        speaker: Гаррик Кузнец
      - remark: Что-то случилось, мастер? Вы выглядите обеспокоенным.
        speaker: Игрок
      - remark: Лорд Дрейк из Высокого Замка ждет особый заказ, но мой запас топлива
          иссяк.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты отправился на Одуванчиковую Поляну и добыл немного
          угля.
        speaker: Гаррик Кузнец
      - remark: Сколько ресурса вам требуется для работы?
        speaker: Игрок
      - remark: Добудь 3 единицы угля. Моей силы уже не хватает на шахтерское дело,
          а ты молод и крепок.
        speaker: Гаррик Кузнец
      - remark: Я сделаю это. Где мне найти Лорда после?
        speaker: Игрок
      - remark: Отнеси уголь прямо в Высокий Замок. Лорд Дрейк сам примет ресурс для
          своего горна.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
