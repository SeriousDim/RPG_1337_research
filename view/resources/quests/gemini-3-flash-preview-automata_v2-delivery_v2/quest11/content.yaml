quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь является персонажем, который по логике мира
        принимает Железо и может выдать улучшенный инструмент.
      dialogs: Диалоги (7 вхождений) завершают сюжет, подтверждают получение предмета
        персонажем Лира Лекарь и обосновывают выдачу награды.
    enemy_to_face:
      amount: Один противник соответствует текущим характеристикам игрока, не имеющего
        брони.
      dialogs: Диалоги (6 вхождений) создают внезапную угрозу на пути следования,
        обосновывая боевое столкновение попыткой ограбления.
      enemy: Лесной разбойник выбран как противник 1 ранга, чей урон (4) и здоровье
        (28) позволяют игроку 1 уровня победить в дуэли.
    resource_to_deliver:
      amount: Количество 3 является стандартным для вводного задания по сбору ресурсов.
      character: Гаррик Кузнец выбран в качестве квестодателя, так как он находится
        в стартовой локации и работает с металлами.
      dialogs: Диалоги (7 вхождений) задают экспозицию, объясняя профессиональную
        связь между кузнецом и лекарем, и направляют игрока в нужную локацию.
      resource: 'Железо выбрано как ресурс, который игрок 1 уровня может добыть своей
        деревянной киркой (min_instrument_rank: 1).'
  objective_description: Добыть 3 единицы Железа в локации Подорожниковый Бор и доставить
    их Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Слава богам, ты пришел. Я уже не знала, как закончить работу над инструментами.
        speaker: Лира Лекарь
      - remark: Вот железо, которое просил передать Гаррик Кузнец.
        speaker: Игрок
      - remark: Великолепное качество! Оно идеально подойдет.
        speaker: Лира Лекарь
      - remark: По дороге на меня напали, но я защитил груз.
        speaker: Игрок
      - remark: Спасибо тебе за храбрость и верность долгу.
        speaker: Лира Лекарь
      - remark: Рад был помочь общему делу.
        speaker: Игрок
      - remark: В благодарность возьми эту железную лопату, она гораздо лучше твоей
          старой.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: А ну стоять! Складывай руду в этот мешок, живо!
        speaker: Лесной разбойник
      - remark: Этот груз предназначен для лекаря, я не отдам его.
        speaker: Игрок
      - remark: Мне плевать, кому он нужен. Здесь я устанавливаю правила!
        speaker: Лесной разбойник
      - remark: Тогда тебе придется сразиться со мной.
        speaker: Игрок
      - remark: Ха-ха! Твой деревянный меч тебя не спасет.
        speaker: Лесной разбойник
      - remark: Посмотрим, чья сталь или дерево окажется крепче.
        speaker: Игрок
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть кирка и желание подзаработать.
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать, мастер Гаррик?
        speaker: Игрок
      - remark: Лира Лекарь из Деревни Речных Лугов прислала запрос на качественное
          железо для новых ланцетов.
        speaker: Гаррик Кузнец
      - remark: Где мне найти подходящую руду?
        speaker: Игрок
      - remark: Отправляйся в Подорожниковый Бор, там есть богатые жилы.
        speaker: Гаррик Кузнец
      - remark: Сколько железа мне нужно добыть?
        speaker: Игрок
      - remark: Нам потребуется 3 куска. Собери их и сразу неси Лире.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Железная лопата
