quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — логичный получатель ресурсов для медицины,
        находится в отличной от стартовой локации.
      dialogs: Лира Лекарь завершает сюжетную линию, подтверждая ценность доставленного
        ресурса.
    enemy_to_face:
      amount: Один противник оптимален для первой боевой встречи в рамках квеста на
        доставку.
      dialogs: Реплики Гоблина-вора подчеркивают конфликт и указывают на слабость
        текущего снаряжения игрока.
      enemy: Гоблин-вор выбран как противник 1-го ранга, с которым игрок гарантированно
        справится при 100 HP.
    resource_to_deliver:
      amount: Количество 5 единиц сбалансировано для стартового квеста на сбор.
      character: Гаррик Кузнец — начальный персонаж, соответствующий текущему уровню
        игрока и его местонахождению.
      dialogs: Диалоги Гаррика Кузнеца создают экспозицию и объясняют логистическую
        связь между NPC.
      resource: Уголь является ресурсом 1-го ранга, который игрок может добыть своей
        деревянной киркой.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    их Лире Лекарю в Деревню Речных Лугов по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, ты наконец-то пришел! Я уже начала топить печи последними щепками.
        speaker: Лира Лекарь
      - remark: Этот уголь от Гаррика — настоящее спасение. Он горит долго и дает
          нужный жар.
        speaker: Лира Лекарь
      - remark: Теперь я смогу закончить приготовление эликсиров из подорожника.
        speaker: Лира Лекарь
      - remark: Вижу, тебе пришлось несладко в пути. На твоей одежде следы копоти
          и борьбы.
        speaker: Лира Лекарь
      - remark: Гоблины совсем распоясались на тракте. Твой деревянный меч едва справился.
        speaker: Лира Лекарь
      - remark: Возьми это в качестве награды. С этим оружием ты будешь в большей
          безопасности.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, человек! Что это у тебя так сладко пахнет дымом и шахтой?
        speaker: Гоблин-вор
      - remark: Нам в банде как раз нечем разжечь костер! Отдавай мешок с углем!
        speaker: Гоблин-вор
      - remark: Смотрите, у него всего лишь деревянная щепка вместо меча! Ха-ха!
        speaker: Гоблин-вор
      - remark: Я заберу твой груз, а потом обглодаю твои косточки!
        speaker: Гоблин-вор
      - remark: Нападаем, ребята! Уголь будет наш!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Твоя кирка выглядит надежной, хоть она и из дерева.
        speaker: Гаррик Кузнец
      - remark: Мне нужно передать партию угля моей старой знакомой, Лире Лекарю в
          Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Ей нужно поддерживать жар в печах для приготовления лечебных настоек,
          а мои запасы на исходе.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, добудь там уголь и отнеси его
          ей.
        speaker: Гаррик Кузнец
      - remark: Собери ровно 5 кусков. Этого должно хватить ей на неделю работы.
        speaker: Гаррик Кузнец
      - remark: Поспеши, путь до деревни неблизкий, а мази нужны раненым уже сегодня.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
