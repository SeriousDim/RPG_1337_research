quest:
  explanation:
    destination:
      character_to_deliver: Джонас Шахтер выбран в качестве получателя, так как его
        локация (Гномьи Копи) логически связана с использованием угля.
      dialogs: 6 реплик завершают логическую цепочку квеста и объясняют переход от
        одного NPC к другому.
    enemy_to_face:
      amount: 1 противник, чтобы не перегружать игрока на первом уровне сложности.
      dialogs: 5 реплик создают атмосферу внезапного нападения во время выполнения
        задания по доставке.
      enemy: Пещерная крыса выбрана как наиболее слабый противник (2 урона), подходящий
        для игрока без брони.
    resource_to_deliver:
      amount: 5 единиц — оптимальное стартовое количество для игрока 1 уровня.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в Столице
        и работает с углем.
      dialogs: Диалог из 8 реплик знакомит игрока с Гарриком и объясняет механику
        сбора ресурса, доступного на 1 ранге.
      resource: Уголь выбран, так как игрок имеет Деревянную кирку 1 ранга, необходимую
        для его добычи.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    его Джонасу Шахтеру в Гномьи Копи по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Джонас Шахтер
      dialogs:
      - remark: Эй! Осторожнее там, не провались в штрек! Ты кто такой?
        speaker: Джонас Шахтер
      - remark: Я от Гаррика. Принес партию угля, которую он обещал для ваших печей.
        speaker: Игрок
      - remark: А, наконец-то! Гаррик всегда присылает лучших помощников. Давай сюда
          мешок.
        speaker: Джонас Шахтер
      - remark: Путь был не самым спокойным, в копях завелись вредители.
        speaker: Игрок
      - remark: Это обычное дело, парень. Главное — работа сделана. Держи, это за
          труды.
        speaker: Джонас Шахтер
      - remark: Этот нагрудник защитит тебя лучше, чем простая рубаха.
        speaker: Джонас Шахтер
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Громкий писк и шорох в темноте среди камней*'
        speaker: Пещерная крыса
      - remark: Кто здесь? А ну выходи!
        speaker: Игрок
      - remark: '*Огромный грызун прыгает из тени, привлеченный запахом свежей добычи*'
        speaker: Пещерная крыса
      - remark: Проклятье, это всего лишь крыса, но какая огромная! Придется использовать
          меч.
        speaker: Игрок
      - remark: '*Она скалит зубы и готовится к стремительному броску*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, у тебя есть кирка, но она выглядит совсем
          новой. Хочешь подзаработать?
        speaker: Гаррик Кузнец
      - remark: Конечно, Гаррик. Какая работа найдется в столице для новичка?
        speaker: Игрок
      - remark: Моему старому другу в Гномьих Копях срочно нужна партия качественного
          топлива для плавилен.
        speaker: Гаррик Кузнец
      - remark: Нужно что-то добыть?
        speaker: Игрок
      - remark: Именно. Отправляйся на Одуванчиковую Поляну, там полно выходов угля.
        speaker: Гаррик Кузнец
      - remark: Сколько угля мне нужно собрать?
        speaker: Игрок
      - remark: Пяти увесистых кусков будет достаточно. Твоя деревянная кирка вполне
          справится с этой задачей.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь всё — неси прямиком к Джонасу. Он будет ждать.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
