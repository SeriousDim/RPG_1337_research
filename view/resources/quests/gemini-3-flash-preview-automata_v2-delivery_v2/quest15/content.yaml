quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана, так как она принимает Железо и находится
        в локации Деревня Речных Лугов.
      dialogs: 7 реплик завершают сюжетную арку, обосновывают полезность принесенного
        ресурса и выдачу награды.
    enemy_to_face:
      amount: 1 противник, чтобы игрок мог гарантированно победить, используя деревянный
        меч (2 урона).
      dialogs: 6 реплик создают атмосферу внезапной угрозы в процессе выполнения задания.
      enemy: Пещерная крыса — подходящий противник 1 ранга для игрока без брони, имеющего
        100 единиц здоровья.
    resource_to_deliver:
      amount: 5 единиц — сбалансированное количество для стартового квеста.
      character: Гаррик Кузнец выбран как начальный NPC в Королевской столице, что
        логично для игрока 1 уровня.
      dialogs: Диалоги из 7 реплик вводят игрока в курс дела, обозначают цель и конечный
        пункт доставки, соблюдая характер персонажа.
      resource: 'Железо выбрано, так как у игрока есть Деревянная кирка 1 ранга, способная
        добывать ресурсы с min_instrument_rank: 1.'
  objective_description: Добудьте 5 единиц Железа с помощью кирки и доставьте их Лире
    Лекарю в Деревню Речных Лугов по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Добрый день, путник. Ты выглядишь так, будто проделал долгий путь.
        speaker: Лира Лекарь
      - remark: Здравствуйте. Я от Гаррика из Столицы. Принес посылку, которую вы
          ждали.
        speaker: Игрок
      - remark: Ах, это должно быть Железо! Гаррик всегда присылает только лучших
          помощников.
        speaker: Лира Лекарь
      - remark: Да, вот ваши 5 единиц руды. Пришлось немного попотеть, добывая их.
        speaker: Игрок
      - remark: Прекрасно. Теперь я смогу изготовить новые скальпели и лопаты для
          деревни.
        speaker: Лира Лекарь
      - remark: Рад был помочь общему делу.
        speaker: Игрок
      - remark: Твой деревянный меч выглядит совсем ненадежным. Возьми этот, он тебе
          нужнее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Фух, кажется, это последний кусок железа в этой жиле.
        speaker: Игрок
      - remark: '*Громкий писк и шуршание в темноте пещеры*'
        speaker: Пещерная крыса
      - remark: Кто здесь? Покажись!
        speaker: Игрок
      - remark: '*Громадная крыса скалится, ее глаза сверкают в лунном свете*'
        speaker: Пещерная крыса
      - remark: Ты не получишь мою добычу, тварь! Придется испытать мой меч в деле.
        speaker: Игрок
      - remark: '*Крыса совершает яростный прыжок, целясь в ноги игрока*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок! Вижу, у тебя в руках верная деревянная кирка. Есть дело.
        speaker: Гаррик Кузнец
      - remark: Привет, Гаррик. Что за дело? Я как раз искал, где применить инструмент.
        speaker: Игрок
      - remark: Лире из Деревни Речных Лугов срочно нужны материалы для ковки новых
          инструментов.
        speaker: Гаррик Кузнец
      - remark: Я готов помочь. Что именно мне нужно найти?
        speaker: Игрок
      - remark: Добудь 5 единиц Железа. В наших краях его в достатке, если знать,
          где копать.
        speaker: Гаррик Кузнец
      - remark: Хорошо, 5 кусков Железа. А куда их потом доставить?
        speaker: Игрок
      - remark: Отправляйся прямиком в Деревню Речных Лугов и разыщи там Лиру Лекаря.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
