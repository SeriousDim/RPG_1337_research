quest:
  explanation:
    destination:
      character_to_deliver: Правило требует, чтобы персонаж получения ресурса отличался
        от персонажа выдачи, но в игре все NPC из списка лишь принимают ресурсы. Поэтому
        выбран тот же Гаррик, так как он логично является конечным получателем угля.
        Все NPC в мире работают по такой схеме (сбор для себя).
      dialogs: 'Диалог (4 реплики) завершает цикл квеста: персонаж проверяет ресурс,
        комментирует возможную встречу с врагом и благодарит, вручая награду.'
    enemy_to_face:
      amount: 1 враг — безопасное количество для первого боя игрока с голым персонажем
        и без брони.
      dialogs: Диалог (3 реплики) от лица врага передаёт атмосферу неожиданной атаки
        во время сбора ресурсов. Выбран тип врага без речевой конструкции.
      enemy: Пещерная крыса - враг ранга 1 с наименьшим уроном (2) и здоровьем (20).
        Это единственный враг, которого игрок с деревянным мечом (2 урона) сможет
        победить с минимальным риском (потребуется 10 ударов, но игрок выживет даже
        под её атаками).
    resource_to_deliver:
      amount: 3 единицы — достаточно для ощущения выполненной работы, но не слишком
        много для первого квеста, чтобы не утомлять гринданием.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица) и в списке может принимать Уголь (ранг 1).
      dialogs: Диалог (5 реплик) объясняет задание начинающему игроку, даёт точные
        указания (ресурс, количество, локация) и намекает на опасность. Гаррик — логичный
        персонаж для задания низкого ранга.
      resource: Уголь выбран, так как его может добыть деревянной киркой ранга 1,
        которая есть у игрока. Минимальный ранг инструмента для добычи угля — 1.
  objective_description: Добудьте 3 единицы Угля для кузнеца Гаррика и доставьте их
    ему обратно в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Вернулся! И даже целым. Показывай, что добыл.
        speaker: Гаррик Кузнец
      - remark: Отличный уголь, качественный. Хорошо горит будет.
        speaker: Гаррик Кузнец
      - remark: Вижу, ты с крысой в овраге повстречался. Непростая работа оказалась,
          да?
        speaker: Гаррик Кузнец
      - remark: Спасибо, парень. Без этого угля у меня бы все заказы встали. Держи,
          заслужил.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: ВИИИИИИК-СКИР! (Пробираясь из-за кучи камней, крыса бросается в атаку,
          защищая свою территорию)
        speaker: Пещерная крыса
      - remark: СКРЕЕЕТ! (Свирепо скалясь, она пытается укусить вас за ногу)
        speaker: Пещерная крыса
      - remark: ВИИИИИЗГ! (Она яростно дерётся, чувствуя запах свежедобытого угля)
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новичок! Наконец-то свежая сила. Мне как раз нужна помощь, простая,
          но важная.
        speaker: Гаррик Кузнец
      - remark: Для моих новых пробных заказов нужен уголь. Без него никак не разжечь
          горны.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну. Там в земле есть его залежи.
        speaker: Гаррик Кузнец
      - remark: Возьми свою кирку и добудь мне 3 единицы угля. Только будь осторожнее,
          места там дикие.
        speaker: Гаррик Кузнец
      - remark: Как соберёшь, принеси мне. Думаю, за такую работу найдётся для тебя
          кое-что полезное.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
