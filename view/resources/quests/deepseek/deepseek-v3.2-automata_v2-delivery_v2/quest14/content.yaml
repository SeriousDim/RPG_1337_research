quest:
  explanation:
    destination:
      character_to_deliver: Выбран Бром Топор, который находится в Лесном Посаде.
        Он присутствует в списке NPC и логично связан с кузнечным делом и добычей
        ресурсов. Это другой персонаж, отличный от того, кто дал задание (Гаррик).
      dialogs: Диалог подтверждает получение посылки, связывает с первой частью задания
        (упоминание Гаррика), коротко затрагивает событие второй части (встречу с
        врагом), и завершается вручением награды.
    enemy_to_face:
      amount: Один противник. Большее количество было бы слишком сложно для стартового
        игрока с базовым оружием и без брони.
      dialogs: Диалог объясняет появление врага как случайную, но логичную для фэнтези-мира
        встречу с разбойником на лесной дороге. Враг угрожает, требуя 'добычу' (уголь),
        что связывает его появление с выполнением первой части квеста.
      enemy: Выбран Лесной разбойник (ранг 1, урон 4, здоровье 28). Это адекватный
        противник для игрока 1 уровня с деревянным мечом (урон 2). Бой будет сложным,
        но посильным (игроку потребуется ~14 ударов, врагу ~7 ударов чтобы победить
        игрока, учитывая его полное здоровье).
    objective_description: Описание четко указывает цель (добыть и доставить), ресурс,
      его количество, требуемый инструмент (прямая подсказка для новичка) и конечную
      точку. Не упоминает противника, чтобы не спойлерить сюжетный поворот.
    resource_to_deliver:
      amount: Количество 3 установлено, чтобы задание не было тривиальным (1 штука),
        но и не требовало долгого гринда. Соответствует начальному уровню.
      character: Выбран Гаррик Кузнец, так как он находится в начальной локации (Королевская
        столица) и в его списке принимаемых ресурсов есть уголь 1 ранга.
      dialogs: Диалог построен на введении в историю (нужен уголь), объяснении задачи
        (3 угля), указании инструмента (у игрока есть подходящая деревянная кирка
        1 ранга) и места (Одуванчиковая Поляна, где водится уголь 1 ранга). Завершается
        направлением к конечному NPC.
      resource: Уголь, так как для его добычи требуется инструмент 1 ранга (кирка
        ранга 1), который у игрока есть, и добывается он в буферной локации 1 уровня
        (Одуванчиковая Поляна).
    reward: 'Предмет ''Железная кирка'' (ранг 2) выбран, потому что: 1) У игрока её
      нет в инвентаре (есть только деревянная). 2) Это логичный следующий шаг в развитии
      инструментария геймера. 3) Этот предмет числится в списке возможных наград у
      выбранного финального NPC (Бром Топор). 4) Он полезен для будущих заданий на
      добычу более сложной руды.'
  objective_description: Добыть 3 единицы угля на Одуванчиковой Поляне с помощью деревянной
    кирки и доставить их Брому Топору в Лесной Посад.
  parts:
    destination:
      character_to_deliver: Бром Топор
      dialogs:
      - remark: А, это ты. Гаррик писал, что пришлет кое-кого с углём. Ты и есть этот
          'кое-кто'?
        speaker: Бром Топор
      - remark: Давай сюда уголь. Я как раз последний кусок в горн бросил. Работы
          - горы!
        speaker: Бром Топор
      - remark: Хм, качество неплохое. Спасибо. Дорога была спокойной?
        speaker: Бром Топор
      - remark: Разбойник? Неудивительно. В последнее время их как грибов после дождя.
          Молодец, что справился.
        speaker: Бром Топор
      - remark: За службу плачу честно. Держи. Эта железная кирка в разы лучше твоей
          деревянной. Пригодится тебе.
        speaker: Бром Топор
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй ты! Стой! Что это у тебя за сверток?
        speaker: Лесной разбойник
      - remark: Пахнет чем-то... ценным. Или это просто уголь? Всё равно, отдавай
          всё, что у тебя есть!
        speaker: Лесной разбойник
      - remark: Думал, пройдешь по лесной дорожке незамеченным? Как бы не так! Это
          моя территория.
        speaker: Лесной разбойник
      - remark: Не хочешь по-хорошему? Тогда придется забрать силой!
        speaker: Лесной разбойник
      - remark: Готовься, простофиля!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, странник! Вижу, ты только начинаешь свой путь. Хочешь
          немного подзаработать и заодно помочь мне?
        speaker: Гаррик Кузнец
      - remark: Мой друг, Бром Топор из Лесного Посада, пишет, что ему срочно нужен
          уголь для кузни. Я бы сам съездил, но дел по горло невпроворот.
        speaker: Гаррик Кузнец
      - remark: Я знаю отличное место недалеко отсюда - Одуванчиковая Поляна. Там
          в земле есть залежи угля.
        speaker: Гаррик Кузнец
      - remark: Возьми свою деревянную кирку и добудь мне 3 куска угля. Это несложно
          для новичка.
        speaker: Гаррик Кузнец
      - remark: Как добудешь - отправляйся в Лесной Посад и отдай уголь Брому. Он
          тебя щедро отблагодарит. Договорились?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная кирка
