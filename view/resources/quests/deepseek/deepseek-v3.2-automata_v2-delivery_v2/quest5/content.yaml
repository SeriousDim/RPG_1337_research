quest:
  explanation:
    destination:
      character_to_deliver: Выбран Страж Замка, так как он находится в локации (Высокий
        Замок), отличной от локации заказчика (Королевская столица), что соответствует
        типу квеста 'Доставка'. Он также может принимать уголь по списку доступных
        предметов.
      dialogs: Диалог с получателем — это проверка легитимности доставки и объяснение,
        почему уголь везут в замок, а не обратно Гаррику. Финальные реплики завершают
        цикл квеста и вручают награду.
    enemy_to_face:
      amount: 2 врага создают вызов для игрока с оружием, бьющим по одному врагу,
        вынуждая тактику. Это проверка базового боевого навыка.
      dialogs: Диалог начинается с агрессии врагов, охраняющих территорию, что мотивирует
        бой. Реплики врагов соответствуют их низкому рангу (гопники), а последняя
        реплика обыгрывает слабость оружия игрока.
      enemy: Выбран Лесной разбойник (ранг 1) как самый слабый враг, соответствующей
        силе игрока (деревянный меч наносит 2 урона, для победы над двумя разбойниками
        с 28 HP потребуется 28 ударов, что сложно, но выполнимо при полном HP).
    overall: 'Квест является идеальным введением для игрока 1 уровня. Он учит трём
      основным игровым петлям: получение задания у NPC, добыча ресурсов инструментом,
      бой с врагами и доставка предметов другому NPC. Сложность пропорциональна силе
      игрока, награда полезна и отсутствует в инвентаре.'
    resource_to_deliver:
      amount: 6 единиц - достаточное количество для создания ощущения работы, но не
        чрезмерное для первого квеста. Позволяет игроку познакомиться с механикой
        добычи.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации и
        по списку может принимать уголь (ресурс ранга 1). Это логичный первый контакт
        для игрока 1 уровня.
      dialogs: Диалог построен как задание от первого встречного NPC (Гаррик Кузнец),
        который физически находится в стартовой локации (Королевская столица) и по
        данным мира может просить уголь (rank 1). Даётся указание на локацию добычи
        (Одуванчиковая Поляна) и неявный намёк на опасность. Количество ресурса (6)
        сбалансировано для новичка с деревянными инструментами.
      resource: Уголь выбран как ресурс с минимальным требуемым рангом инструмента
        (1), который есть у игрока (деревянная кирка).
    reward: В качестве награды выбран Деревянный щит (ранг 1), так как у игрока в
      инвентаре и экипировке его ещё нет. Этот предмет напрямую усиливает выживаемость
      игрока, что критически важно после первой битвы и готовит его к следующим столкновениям.
      Это значимое улучшение для новичка.
  objective_description: Доставьте 6 единиц угля из Одуванчиковой Поляны в Высокий
    Замок для кузнеца Гаррика.
  parts:
    destination:
      character_to_deliver: Страж Замка
      dialogs:
      - remark: Стой! Кто идёт? И что везешь?
        speaker: Страж Замка
      - remark: Я везу уголь для Гаррика Кузнеца. Он отправил меня в Высокий Замок.
        speaker: Игрок
      - remark: А, для Гаррика... Хороший мастер. Его уголь нам тоже пригодится -
          в казармах печи топить надо.
        speaker: Страж Замка
      - remark: Отлично, уголь как раз нужного качества. Прими мою благодарность.
          Гаррик будет доволен.
        speaker: Страж Замка
      - remark: Вот, держи. Это тебе за труды и за то, что не испугался лесных бродяг.
        speaker: Страж Замка
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй, ты! Это наши угодья! Положи то, что нашёл, и убирайся!
        speaker: Лесной разбойник
      - remark: Этот уголь нужен кузнецу из столицы.
        speaker: Игрок
      - remark: Ха! Твои дела меня не волнуют. Теперь это *наш* уголь, а ты получишь
          тумаков!
        speaker: Лесной разбойник
      - remark: В атаку, ребята! Покажем этому собирателю, кто здесь хозяин!
        speaker: Лесной разбойник
      - remark: Ай! Он деревяшкой машет! Не так страшно, как казалось...
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, странник. В моей мастерской мало рабочих рук, а заказов
          много. Особенно нужен уголь для горнов.
        speaker: Гаррик Кузнец
      - remark: Если ты не боишься испачкаться сажей, принеси мне шесть кусков угля.
          Я заплачу за труд добрым словом и одной вещью из моих запасов.
        speaker: Гаррик Кузнец
      - remark: Уголь можно найти на Одуванчиковой Поляне. Будь осторожен, там иногда
          рыскают местные хулиганы.
        speaker: Гаррик Кузнец
      - remark: Что скажешь? Готов взяться за простую, но нужную работу?
        speaker: Гаррик Кузнец
      - remark: Хорошо, я принесу уголь.
        speaker: Игрок
      - remark: Отлично! Жду тебя с нетерпением. Удачи в сборе!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
