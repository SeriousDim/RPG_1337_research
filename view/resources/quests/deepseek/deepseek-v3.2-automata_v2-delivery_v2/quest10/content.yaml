quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, так как она находится в другой локации
        (Деревня Речных Лугов), что создает путешествие. Она тоже является НПС начального
        уровня и логично связана с использованием ресурсов (уголь для порошков). Главное
        условие – character и character_to_deliver разные – соблюдено.
      dialogs: Диалог с Лирой Лекарь объясняет, почему ресурс везут именно ей (нужен
        для лекарств), связывает двух НПС (Гаррик -> Лира) и благодарит игрока. Упоминается
        награда – предмет, которого нет в инвентаре игрока.
    enemy_to_face:
      amount: Количество врагов – 1. Это соответствует логике внезапной встречи с
        одним вредителем при добыче ресурса. Справиться с одним слабым врагом – посильная
        задача для новичка.
      dialogs: Диалог противника (Пещерная крыса) состоит из нечленораздельных звуков
        и агрессивных действий, соответствующих животному низкого уровня. Это создает
        атмосферу без глубокого сюжета для столь слабого врага.
      enemy: Выбрана Пещерная крыса (ранг 1, урон 2, здоровье 20). Это самый слабый
        противник в игре, который представляет минимальную угрозу для игрока с 100
        HP и деревянным мечом (2 урона за ход). Бой будет длительным (10 ходов), но
        безопасным. Учитывая, что у игрока нет брони, более сильные враги (Гоблин,
        Разбойник) могли бы нанести критический урон.
    resource_to_deliver:
      amount: Количество 3 установлено, чтобы задание не было тривиальным, но и не
        занимало слишком много времени у новичка. Это логичный небольшой заказ для
        нужд кузницы.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица), соответствует уровню игрока (ранги 1) и его список запрашиваемых
        ресурсов включает уголь.
      dialogs: Диалог построен вокруг простого и срочного задания от первого доступного
        НПС (Гаррик) с объяснением, зачем ресурс, где его добывать и каким инструментом
        (у игрока есть деревянная кирка ранга 1, которая подходит для угля ранга 1).
        Упомянута потенциальная опасность как переход к следующей части квеста.
      resource: Уголь выбран, потому что это ресурс ранга 1. Для его добычи требуется
        инструмент (кирка) ранга 1, который у игрока есть. Это единственная руда,
        доступная игроку на текущем уровне.
  objective_description: Добудь 3 единицы угля на Одуванчиковой Поляне по просьбе
    кузнеца Гаррика и доставь их целительнице Лире в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, путник! Ты выглядишь уставшим. Чем могу помочь?
        speaker: Лира Лекарь
      - remark: Уголь для стражи? Да, я как раз жду эту партию от Гаррика. Ему нужно
          для припасов, а мне – для приготовления целебных угольных порошков.
        speaker: Лира Лекарь
      - remark: Прекрасно, все три куска на месте. Спасибо, что доставил. Дорога из
          Поляны могла быть опасной.
        speaker: Лира Лекарь
      - remark: Стража будет довольна. А я смогу помочь раненым. Ты оказал большую
          услугу и столице, и нашей деревне.
        speaker: Лира Лекарь
      - remark: В знак благодарности прими этот инструмент. Деревянная лопата тебе
          еще пригодится для сбора трав в этих краях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк-писк-писк!
        speaker: Пещерная крыса
      - remark: Пи-и-иск! (Агрессивно потрясывает носом, учуяв уголь)
        speaker: Пещерная крыса
      - remark: Кхр-кхр! (Быстро перебегает под ноги, пытаясь напугать)
        speaker: Пещерная крыса
      - remark: Пииии! (Нервно скалит мелкие зубы)
        speaker: Пещерная крыса
      - remark: Кщ-кщ! (Бросается в атаку, защищая свою территорию)
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Слышь, новичок! Королевской страже срочно нужен уголь для кузницы
          на заставе. Без него оружие не выкуют.
        speaker: Гаррик Кузнец
      - remark: Одуванчиковая Поляна усеяна угольными пластами. Возьми свою деревянную
          кирку и добудь мне 3 куска угля.
        speaker: Гаррик Кузнец
      - remark: Не ошибись – нужен именно уголь, простая черная руда. Без него наши
          кузнецы как без рук.
        speaker: Гаррик Кузнец
      - remark: Дорога на Поляну безопасна, но будь начеку. В последнее время там
          шныряют всякие твари, привлеченные ресурсами.
        speaker: Гаррик Кузнец
      - remark: Сделаешь это – будешь знать, что помог Королевству в трудную минуту.
          И кое-что для себя получишь.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
