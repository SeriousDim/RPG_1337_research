quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь. Она находится в другой локации (Деревня Речных
        Лугов), что соответствует формату квеста 'Доставка' между разными точками.
        Её статус целительницы объясняет, зачем ей может понадобиться уголь.
      dialogs: Диалог с Лирой Лекарь в Деревне Речных Лугов. Она является персонажем,
        который также принимает ресурсы (в том числе железо), и здесь выступает как
        конечный адресат доставки. Диалог логично связывает сюжет (уголь для мазей),
        благодарит игрока и вручает награду.
    enemy_to_face:
      amount: 2 противника. Учитывая низкий урон крысы (2) и возможность игрока бить
        только одного врага за ход, два противника создают умеренную тактическую сложность
        для новичка, но не являются чрезмерными.
      dialogs: Диалог представлен в виде угрожающих звуков и действий 'Пещерной крысы'
        - врага ранга 1, соответствующего уровню игрока. Крысы логично могут обитать
        возле мест добычи угля.
      enemy: Пещерная крыса. Это противник ранга 1 с наименьшими показателями здоровья
        (20) и урона (2). С деревянным мечом (урон 2) игрок сможет победить двух таких
        крыс, рискуя получить 4-8 урона, что допустимо при его 100 HP.
    resource_to_deliver:
      amount: 3 единицы. Небольшое, но не тривиальное количество, соответствующее
        сложности первого квеста. Провоцирует несколько циклов добычи.
      character: Гаррик Кузнец - идеальный стартовый квестодатель, так как он находится
        в стартовой локации игрока (Королевская столица). Он может принимать уголь
        для доставки.
      dialogs: 'Диалог с Гарриком Кузнецом, первым персонажем в списке. Он находится
        в Королевской столице, где начинает игрок, и из его списка доступных для доставки
        ресурсов выбран самый простой ''Уголь'' (rank 1). У игрока в инвентаре уже
        есть ''Деревянная кирка'' (rank 1), что соответствует минимальному рангу инструмента
        для добычи угля (min_instrument_rank: 1). Диалог объясняет причину запроса
        и направляет игрока в соответствующую локацию добычи (Одуванчиковая Поляна).'
      resource: Уголь. Это ресурс ранга 1, который игрок может добыть своей деревянной
        киркой (ранг 1). Он есть в списке ресурсов для доставки у Гаррика.
  objective_description: Кузнец Гаррик просит добыть для него 3 единицы угля и отвезти
    их в Деревню Речных Лугов целительнице Лире.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, путник. Что привело тебя в нашу деревню?
        speaker: Лира Лекарь
      - remark: Уголь от Гаррика? Да, он мне писал. Мои мази и отвары требуют равномерного,
          несильного жара. Уголь из столичных копей для этого идеален.
        speaker: Лира Лекарь
      - remark: Как раз сейчас готовлю бальзам для ран. Позволь взглянуть... Да, качество
          отменное.
        speaker: Лира Лекарь
      - remark: Спасибо за своевременную доставку. Без этого угля моя работа встала
          бы.
        speaker: Лира Лекарь
      - remark: Вот, возьми это в качестве благодарности. С таким мечом тебе будет
          легче противостоять опасностям в дороге.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Злобный писк*'
        speaker: Пещерная крыса
      - remark: '*Обнажает острые желтые зубы*'
        speaker: Пещерная крыса
      - remark: '*Быстро перебегает дорогу*'
        speaker: Пещерная крыса
      - remark: '*Шуршит в кустах, готовясь к прыжку*'
        speaker: Пещерная крыса
      - remark: '*Нападает, защищая свою территорию!*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новый лицо в столице! Вижу, снаряжение у тебя самое начальное.
          Хочешь немного заработать и помочь мне?
        speaker: Гаррик Кузнец
      - remark: Мне для моих простых поделок постоянно нужен уголь. Без него печь
          не растопить.
        speaker: Гаррик Кузнец
      - remark: Сам я загружен заказами, сбегать за уголёчком некогда.
        speaker: Гаррик Кузнец
      - remark: Ты как раз сгодишься. Осмотри окрестности Одуванчиковой Поляны. Там
          в обрывах неглубокие угольные пласты.
        speaker: Гаррик Кузнец
      - remark: Принеси мне три куска угля. За работу отблагодарю чем смогу.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
