quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как второй персонаж для квеста на
        доставку. Она находится в другой локации (Деревня Речных Лугов vs Королевская
        столица), что соответствует типу квеста 'Доставка'. Она также может быть заинтересована
        в угле (принимает ресурсы для заданий). Она предлагает награду, которой у
        игрока нет (Каменный меч), что соответствует правилам.
      dialogs: Диалог с Лирой Лекарь в Деревне Речных Лугов. Она, как лекарь, заинтересована
        в угле для приготовления снадобий. Её диалог объясняет смену конечного получателя,
        предлагает награду и содержит 5 реплик.
    enemy_to_face:
      amount: 2 врага — достаточно, чтобы бросить вызов игроку 1 уровня, но не сделать
        бой непроходимым. Это вносит элемент риска и учит игрока боевой системе.
      dialogs: Диалог с Пещерной крысой как с врагом. Крысы не разговаривают, поэтому
        реплики передают их агрессивные звуки и действия, создавая атмосферу. Это
        соответствует 5 репликам.
      enemy: Выбрана Пещерная крыса (ранг 1, здоровье 20, урон 2). С текущим деревянным
        мечом (урон 2) игрок может победить 2 таких крыс (суммарное здоровье 40) за
        несколько ходов, получив при этом урон (суммарно до 8 урона за ход обеих крыс),
        но оставаясь в живых (HP 100). Это сбалансированная и проходимая угроза для
        новичка.
    objective_description: 'Описание не раскрывает встречу с врагом, только основную
      цель: добыть и доставить ресурс из одной точки в другую. Указывает конкретные
      сущности (уголь, Одуванчиковая Поляна, житель Деревни Речных Лугов), существующие
      в мире.'
    resource_to_deliver:
      amount: 5 единиц — это выполнимая, но не тривиальная задача для начала, которая
        потребует нескольких циклов добычи и создаст предпосылки для встречи с врагом.
      character: Гаррик Кузнец выбран, потому что он находится в стартовой локации
        (Королевская столица), принимает уголь (rank 1), и у игрока есть кирка 1 ранга
        для его добычи. Это идеальный стартовый квестодатель.
      dialogs: Диалог с Гарриком Кузнецом, который находится в Королевской столице.
        Он логично, как кузнец, может просить сырьё (уголь). Его диалог объясняет
        задачу, локацию (которая существует в мире), инструмент (кирка, который есть
        у игрока) и намекает на возможную опасность. 5 реплик соответствуют требованиям.
      resource: Выбран Уголь, так как это ресурс 1 ранга. У игрока есть кирка 1 ранга,
        что позволяет его добывать. Это соответствует логике игрового мира.
    reward: Каменный меч (ранг 2, урон 4) — значимое улучшение по сравнению с деревянным
      мечом игрока (урон 2). У игрока в инвентаре такого предмета нет. Этот предмет
      присутствует в списке наград, которые может дать Лира Лекарь после квеста.
  objective_description: Добудь 5 единиц угля на Одуванчиковой Поляне и отнеси их
    нуждающемуся в них жителю Деревни Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Приветствую, странник. Ты выглядишь усталым. Я видела, как ты сражался
          с тварями на полях.
        speaker: Лира Лекарь
      - remark: Что это у тебя? Уголь? Отличная находка! Он мне крайне нужен для приготовления
          целебных мазей и бальзамов.
        speaker: Лира Лекарь
      - remark: Гаррик, наверное, просил принести ему? Он вечно всё раздает, а самому
          потом не хватает. Позволь мне выкупить его у тебя для моего ремесла.
        speaker: Лира Лекарь
      - remark: Медицина важнее насущной ковки, согласен? За эти пять кусков я щедро
          отблагодарю тебя. Думаю, ты это заслужил.
        speaker: Лира Лекарь
      - remark: Вот, возьми. Это лучше, чем твой старый меч. И спасибо. Теперь я смогу
          помочь многим больным в деревне.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Раздаётся злобный писк из-за камней*'
        speaker: Пещерная крыса
      - remark: '*Крыса выскакивает на тропу, почуяв добычу — твои свежедобытые ресурсы*'
        speaker: Пещерная крыса
      - remark: '*Она скалит острые зубы, готовясь к прыжку*'
        speaker: Пещерная крыса
      - remark: '*В её глазах горит дикая жадность, она не намерена упускать лёгкую
          поживу*'
        speaker: Пещерная крыса
      - remark: '*Она издаёт угрожающее шипение, защищая свою территорию возле залежей
          угля*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новый путник в столице! Добро пожаловать в мою кузницу. Вижу, экипировка
          у тебя пока что самая простая.
        speaker: Гаррик Кузнец
      - remark: Я как раз нуждаюсь в сырье. Для моих первых заказов требуется самый
          обычный уголь. Без него разжечь горн — целая проблема.
        speaker: Гаррик Кузнец
      - remark: Не мог бы ты помочь старому кузнецу? На Одуванчиковой Поляне, что
          сразу за городскими стенами, есть залежи. Используй свою кирку.
        speaker: Гаррик Кузнец
      - remark: Добыть нужно не так много — пять кусков. Этого хватит, чтобы начать
          работу. Будь осторожен на окраинах, там шляются всякие мелкие вредители.
        speaker: Гаррик Кузнец
      - remark: Доставь уголь мне обратно, как соберешь. За работу не останешься внакладе,
          обещаю. Деревянным мечом в наше время особо не разгуляешься.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
