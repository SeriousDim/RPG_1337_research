quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как НПС в другом населённом пункте
        (Деревня Речных Лугов), что соответствует логике квеста на доставку. Она может
        принимать Уголь (есть в её списке items_can_be_accepted_for_delivery_or_collection).
        Это другой персонаж, отличный от дающего задание (Гаррика), как и требуется.
      dialogs: Диалог объясняет логистику (почему ресурс нужно везти именно ей), подтверждает
        завершение задания и выдаёт награду с описанием её полезности.
    enemy_to_face:
      amount: Один противник - адекватная сложность для первого квеста и текущего
        снаряжения игрока.
      dialogs: Диалоги невербальные, просто звуки и поведение противника, что соответствует
        низкоуровневому врагу.
      enemy: Пещерная крыса (ранг 1) - самый слабый моб в списке (20 HP, 2 урона).
        Игрок с Деревянным мечом (2 урона за ход) может победить её за 10 ходов, получив
        всего 20 урона (макс), что не опасно при 100 HP. Это вводит боевую систему
        без излишнего риска.
    resource_to_deliver:
      amount: 5 единиц - это сбалансированное количество, не слишком большое для первого
        задания, но достаточное, чтобы познакомить с геймплеем добычи.
      character: Гаррик Кузнец выбран как стартовый NPC в столице. У него в списке
        items_can_be_accepted_for_delivery_or_collection есть Уголь (ранг 1), что
        соответствует уровню игрока.
      dialogs: Диалог объясняет задание, даёт подсказку о локации (Одуванчиковая Поляна)
        и инструменте (лопата), который есть у игрока. Уголь (ранг 1) добывается лопатой
        (ранг 1), что соответствует экипировке игрока. Количество (5) задаёт умеренную
        цель для первого квеста.
      resource: Уголь - это ресурс ранга 1, для добычи которого требуется лопата ранга
        1 (у игрока есть Деревянная лопата). Это соответствует уровню игрока (1 lvl)
        и его инвентарю.
  objective_description: Кузнец Гаррик в Королевской столице нуждается в угле. Нужно
    добыть его в Одуванчиковой Поляне и отнести целительнице Лире в Деревню Речных
    Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй. Ты от Гаррика? Да, он писал мне про уголь. Для моих мазей
          и отваров нужен хороший, жаркий уголь.
        speaker: Лира Лекарь
      - remark: Без него не приготовить целебный порошок для стражников на заставе.
          Покажи-ка, что добыл.
        speaker: Лира Лекарь
      - remark: Отличный образец! Чистый, плотный. Именно то, что нужно. Спасибо тебе,
          странник.
        speaker: Лира Лекарь
      - remark: Как и обещал Гаррик, твоё вознаграждение. Эта лопата крепче твоей
          деревянной, пригодится для более жёсткой почвы.
        speaker: Лира Лекарь
      - remark: Береги себя на дорогах. И если захочешь заработать – возвращайся,
          у меня всегда есть дела.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Пронзительный визг*'
        speaker: Пещерная крыса
      - remark: '*Шипит, загораживая выход из карьера*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новое лицо! Как раз вовремя, странник. Дела у меня куются неплохо,
          но уголь на исходе.
        speaker: Гаррик Кузнец
      - remark: Без него не разжечь горн, не выковать и гвоздя. А в Одуванчиковой
          Поляне, что на окраине столицы, его кучи.
        speaker: Гаррик Кузнец
      - remark: Только будь осторожен, место вроде тихое, но всякие твари шастают.
          Возьми свою лопату.
        speaker: Гаррик Кузнец
      - remark: Принеси мне угля, будь добр. Пять кусков хватит, чтобы дотянуть до
          новой поставки. Щедро отблагодарю.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
