quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана как получатель, отличающийся от Гаррика.
        Она находится в Деревне Речных Лугов, принимает ресурсы ранга 1-2, и в ее
        списке наград есть Каменный меч (ранг 2) — идеальное улучшение для стартового
        оружия игрока. Это создает логичный маршрут: Столица -> Ресурсная локация
        -> Деревня.'
      dialogs: Лира Лекарь — другой персонаж, который может принимать ресурсы (в ее
        списке есть Железо и Подорожник, но логично, что уголь ей тоже нужен как лекарю
        для приготовления снадобий). Диалог подтверждает связь с первым NPC, проверяет
        состояние игрока и естественным образом вручает награду, объясняя, почему
        она дает оружие (чтобы заменить слабое стартовое).
    enemy_to_face:
      amount: Две крысы создают умеренный вызов для новичка без брони, но не являются
        непреодолимым препятствием. Это вводит игрока в боевую механику, соответствует
        предупреждению Гаррика о возможных опасностях.
      dialogs: 'Диалог бессловесный (писк, визг), так как враг — животное. Он логично
        вписывается в контекст: крысы охраняют/живут рядом с месторождением, привлеченные
        шумом добычи. Диалог создает угрозу и объясняет начало боя.'
      enemy: Пещерная крыса — враг ранга 1 (урон 2, здоровье 20). Игрок с Деревянным
        мечом (урон 2 за ход) сможет убить одну крысу за 10 ходов, получая 4 урона
        за две атаки крыс (суммарно 8 урона за раунд от двух). При полном здоровье
        (100) игрок имеет запас прочности для победы, что соответствует принципу согласованности
        сложности с силой игрока.
    resource_to_deliver:
      amount: 3 единицы — достаточное количество для небольшого первого задания, не
        вызывает ощущения гринд.
      character: Гаррик Кузнец выбран, так как он первый NPC в списке, находится в
        Королевской столице, принимает ресурсы ранга 1 (Уголь), что соответствует
        стартовому рангу инструмента игрока, и дает простые стартовые задания.
      dialogs: Гаррик Кузнец — идеальный стартовый персонаж (первый в списке, расположен
        в столице). Он может принимать Уголь (ранг 1). Диалог объясняет задачу (добыть
        уголь для плавки), дает направление (Одуванчиковая Поляна сопоставлена с Углем),
        предупреждает об опасности (логичный переход к встрече с врагом) и направляет
        к конечному получателю (Лира, которая также может принимать ресурсы ранга
        1-2).
      resource: 'Уголь выбран, потому что это ресурс ранга 1, который можно добыть
        Деревянной киркой (ранг инструмента: 1), имеющейся у игрока. Герба (Одуванчик,
        ранг 1) не подошла, так как для ее добычи нужна лопата, а в награду у Лиры
        есть оружие (логичная награда для кузнеца — инструмент, для лекаря — оружие/инструмент).'
  objective_description: Добудь 3 единицы угля на Одуванчиковой Поляне и доставь их
    лекарю Лире в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, уголь! Как раз кстати. Мне нужно приготовить новые бальзамы, а
          без хороших углей не обойтись.
        speaker: Лира Лекарь
      - remark: Я слышала, тебя направил Гаррик. Он у нас хоть и ворчун, но сердце
          золотое. Все новичкам работу ищет.
        speaker: Лира Лекарь
      - remark: Ты не выглядишь раненым. Надеюсь, путь был спокойным? На полянах иногда
          шалят...
        speaker: Лира Лекарь
      - remark: Спасибо за старание. Возьми это. Твой деревянный меч немного... скромен.
          Этот будет надежнее для следующих поручений.
        speaker: Лира Лекарь
      - remark: Возвращайся, если понадобятся целебные травы. Или если захочешь помочь
          с их сбором.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Раздается злобный писк из-за куста, где вы только что добывали уголь*'
        speaker: Пещерная крыса
      - remark: '*Из норы выскакивает крупная, блестящая глазами крыса с острыми зубами*'
        speaker: Пещерная крыса
      - remark: '*(Агрессивно обнюхивает воздух, чувствуя запах свежедобытой руды)*'
        speaker: Пещерная крыса
      - remark: '*Издает пронзительный визг, призывая сородичей*'
        speaker: Пещерная крыса
      - remark: '*Резко бросается в атаку, пытаясь укусить за ногу и отобрать добычу!*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новичок! Как раз вовремя. Я затеял небольшую плавку для подков,
          да вот угля под рукой не хватает.
        speaker: Гаррик Кузнец
      - remark: Недавно слышал, на Одуванчиковой Поляне есть выходы угольного пласта.
          Место в принципе спокойное, для начала подойдет.
        speaker: Гаррик Кузнец
      - remark: Возьми свою кирку и добудь мне, скажем, 3 единицы угля. Справишься?
          Это не сложнее, чем забить гвоздь.
        speaker: Гаррик Кузнец
      - remark: Только будь осторожен. Рудники-рудники, а кто его знает, что в траве
          прячется. Местные побаиваются шорохов в кустах.
        speaker: Гаррик Кузнец
      - remark: А после добычи занеси уголь Лире, лекарю в Речных Лугах. Она постоянно
          просит уголь для своих тиглей и благовоний. Вот тебе и первая работа.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
