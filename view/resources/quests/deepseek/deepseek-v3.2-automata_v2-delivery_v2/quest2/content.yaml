quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, находящийся в другой
        локации (Деревня Речных Лугов), что соответствует типу квеста 'Доставка'.
        Персонаж принимает уголь и может дать адекватную награду (инструмент ранга
        2). Это другой персонаж, отличный от дающего задание.
      dialogs: Диалог с получателем (Лира Лекарь) подтверждает выполнение задания,
        благодарит, даёт логичное обоснование для награды и создает основу для будущего
        взаимодействия. Соблюдён лимит в 5 реплик.
    enemy_to_face:
      amount: 1 противник, так как игрок без брони и с базовым оружием. Бой с несколькими
        противниками ранга 1 был бы слишком сложен и рискован для первого квеста.
      dialogs: Диалог моделирует стычку с низкоуровневым противником, который хочет
        отобрать добычу. Даётся небольшой намёк на лор (патрулируют зону). Реплики
        агрессивные и прямые, соответствуют примитивному существу, укладываются в
        5 реплик.
      enemy: Гоблин-вор (ранг 1) выбран как противник, соответствующей силе игрока.
        У игрока 100 HP и деревянный меч (2 урона за ход). Здоровье гоблина (24 HP)
        и его урон (3) делают бой выигрышным, но не мгновенным, что соответствует
        уровню 1.
    objective_description: Описание четко указывает цель (добыть и доставить), не
      раскрывая сюжетный поворот в виде встречи с противником, чтобы сохранить элемент
      неожиданности.
    resource_to_deliver:
      amount: 3 единицы — небольшое количество для первого квеста, чтобы не утомлять
        игрока долгой добычей, но достаточное для ощущения выполнения задачи.
      character: Гаррик Кузнец выбран, так как он находится в стартовой локации (Королевская
        столица) и принимает уголь (rank 1), что соответствует инструментам игрока
        (деревянная кирка, rank 1).
      dialogs: Диалог построен на простом задании от первого встреченного персонажа
        (Гаррик Кузнец) в стартовой локации. Он объясняет причину, указывает ресурс,
        количество, инструмент и конечного получателя, соблюдая лимит в 5 реплик.
        Задание логично для кузнеца.
      resource: Уголь выбран, так как это ресурс ранга 1. Его можно добыть деревянной
        киркой (ранг 1), которая есть у игрока.
    reward: Железная лопата (ранг 2) — это улучшение базовой лопаты игрока. Она не
      находится в инвентаре игрока (у него деревянная лопата) и является логичной
      наградой от травника. Она позволяет игроку добывать травы ранга 2 (Подорожник),
      открывая новый цикл заданий.
  objective_description: Добудьте 3 единицы угля для кузнеца Гаррика и доставьте их
    лекарю Лире в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, путник. Я жду посылку от Гаррика. Это ты?
        speaker: Лира Лекарь
      - remark: О, прекрасно! Уголь как раз вовремя. Мои целебные мази скоро остынут
          без жара печи.
        speaker: Лира Лекарь
      - remark: Спасибо тебе. Путь от столицы неблизкий, да ещё и через те дикие поляны.
          Надеюсь, тебя никто не беспокоил?
        speaker: Лира Лекарь
      - remark: Что ж, прими эту лопату в знак благодарности. Она крепкая, железная.
          Пригодится тебе для сбора более редких трав.
        speaker: Лира Лекарь
      - remark: Береги себя. Если понадобится помощь травника – знаешь, где меня найти.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Кхе-кхе! Что это у тебя блестит? Отдай свои камешки, двуногий!
        speaker: Гоблин-вор
      - remark: Мы патрулируем эти поляны! Всё, что блестит, принадлежит нашему вождю!
        speaker: Гоблин-вор
      - remark: Это не блестящий камень, это уголь. Он тебе не нужен.
        speaker: Игрок
      - remark: Не умничай! А ну отдавай мешок!
        speaker: Гоблин-вор
      - remark: Гррр! Атакуем!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новое лицо! Прямо вовремя. У меня тут небольшая проблема с поставками.
        speaker: Гаррик Кузнец
      - remark: Старый приятель из Деревни Речных Лугов, Лира Лекарь, ждёт партию
          угля для своих лечебных отваров. Печка у неё почти потухла.
        speaker: Гаррик Кузнец
      - remark: У меня свои заказы горят, отлучиться не могу. Не мог бы ты помочь?
          Добудь немного угля и отнеси ей.
        speaker: Гаррик Кузнец
      - remark: Угольная жила есть на Одуванчиковой Поляне, недалеко отсюда. Бери
          свою кирку и вперёд!
        speaker: Гаррик Кузнец
      - remark: Принеси мне 3 куска угля. Я их упакую, а ты уже отнесёшь Лире. Договорились?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
