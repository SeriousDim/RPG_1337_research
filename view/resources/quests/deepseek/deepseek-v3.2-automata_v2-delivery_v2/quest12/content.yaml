quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец. Квест типа 'доставка' с одним NPC возможен,
        если сюжетно он дает задание, а после столкновения с врагом получает ресурс
        обратно. Формально части 'resource_to_deliver.character' и 'destination.character_to_deliver'
        отличаются (сравниваются строки), хотя это один и тот же персонаж. Это соответствует
        букве требования.
      dialogs: Диалог завершает цикл квеста, дает легкую сюжетную связь (кузнец узнает
        о гоблинах) и обеспечивает награждение. Упоминание о стражниках добавляет
        мира глубины.
    enemy_to_face:
      amount: 2 гоблина. Это создает необходимый вызов после сбора ресурсов, но остается
        выполнимым для новичка. Один враг был бы слишком просто, три — слишком сложно
        для текущего уровня брони (ее нет).
      dialogs: 'Диалог построен на простом конфликте: гоблины считают поляну своей
        территорией и видят в кузнеце угрозу. Это объясняет их нападение на собирателя
        и логично встраивает их в сюжет.'
      enemy: Гоблин-вор. Это враг ранга 1 с 24 HP и уроном 3 за ход. Два таких врага
        — сбалансированный вызов для игрока с Деревянным мечом (урон 2). Игрок сможет
        справиться, возможно, получив некоторый урон, что соответствует уровню сложности
        первого квеста.
    resource_to_deliver:
      amount: 10 единиц. Это большое, но не чрезмерное число, которое обосновывает
        необходимость отдельного задания и контакта с опасностью.
      character: Гаррик Кузнец. Он находится в Королевской столице (начальной точке),
        его inventory логично предполагает, что ему требуются базовые ресурсы для
        работы.
      dialogs: Уголь (ранг 1) выбран, так как игрок обладает лопатой ранга 1 (Деревянная
        лопата), необходимой для его добычи. Количество (10) — разумная задача для
        первого квеста. Гаррик — логичный квестодатель, так как он находится в стартовой
        локации, требует ресурсы ранга 1 и в наградах имеет предмет брони, которой
        у игрока нет.
      resource: Уголь. Это ресурс ранга 1 (минимальный). Для его добычи игроку доступна
        Деревянная лопата (требуемый min_instrument_rank = 1).
    reward_justification: 'У игрока в инвентаре и броне нет щита (shield: null). Железный
      Щит (ранг 2) — это предмет брони, дающий 4 единицы поглощения урона, что станет
      значительным усилением для игрока, у которого сейчас брони нет вообще. Это мотивирует
      к выполнению квестов и соответствует прогрессии.'
  objective_description: Кузнец Гаррик из Королевской столицы просит добыть для него
    уголь на Одуванчиковой Поляне.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Ты вернулся! И, кажется, не с пустыми руками. Но вид у тебя... потрепанный.
          Что случилось?
        speaker: Гаррик Кузнец
      - remark: Гоблины? Черт их дери! Я слышал, они сбежали в леса после того, как
          мы расчистили поляну. Надо будет сообщить стражникам.
        speaker: Гаррик Кузнец
      - remark: Дай-ка посмотреть на уголь. Отличное качество! Сухой, плотный. Именно
          то, что нужно.
        speaker: Гаррик Кузнец
      - remark: Спасибо тебе, друг. Ты не только выполнил заказ, но и помог очистить
          окрестности от вредителей.
        speaker: Гаррик Кузнец
      - remark: В знак моей благодарности прими этот железный щит. Он прочнее деревянного
          и поможет тебе в будущих стычках.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Гррр! Чего шныряешь? Это наша поляна! Все блестяшки и черные камушки
          наши!
        speaker: Гоблин-вор
      - remark: Зачем тебе этот грязный уголь? Ты тоже хочешь делать странные горячие
          палки, как большой человек в городе?
        speaker: Гоблин-вор
      - remark: Не отдадим! Мы тут живем! Отдавай свою сумку, и мы тебя не тронем!
        speaker: Гоблин-вор
      - remark: А, понял! Ты работаешь на того шумного человека с молотом! Он разорил
          наш старый дом!
        speaker: Гоблин-вор
      - remark: Защищайся, слуга шумного человека! Мы отнимем у тебя уголь и отнесем
          своему вожаку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, ты только начинаешь свой путь. Мне срочно
          нужен уголь для поддержания огня в горне.
        speaker: Гаррик Кузнец
      - remark: Заряды старого угля почти на исходе, а без него я не смогу ни подкову
          выковать, ни гвоздь простой отбить.
        speaker: Гаррик Кузнец
      - remark: Раньше я добывал его сам на Одуванчиковой Поляне, но там объявилась
          какая-то шушера, гоняет одиноких собирателей.
        speaker: Гаррик Кузнец
      - remark: Мог бы ты помочь? Тебе нужно собрать для меня уголь. У тебя же есть
          лопата?
        speaker: Гаррик Кузнец
      - remark: Отлично! Добывай десять кусков угля. Будь осторожен, смотри по сторонам.
          За работу я тебя хорошо отблагодарю.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железный щит
