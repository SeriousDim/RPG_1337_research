quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь в Деревне Речных Лугов. Она отличается
        от дающего задание (Гаррик), может принять Уголь (он есть в ее списке items_can_be_accepted_for_delivery_or_collection),
        и может дать подходящую по рангу награду. Это создает маршрут из столицы в
        другую локацию.
      dialogs: Диалог с Лирой Лекарем завершает логистическую цепочку. Она объясняет,
        зачем ей нужен уголь (алхимия vs кузнечное дело), подтверждает связь с Гарриком,
        проверяет груз и выдает награду. Также дает зацепку на будущие квесты. Реплик
        — ровно 6.
    enemy_to_face:
      amount: Один противник, так как игрок новичок без брони, и даже один враг представляет
        серьезную угрозу, сохраняя баланс сложности.
      dialogs: Диалог с одним Лесным разбойником создает атмосферу засады и конфликта.
        Разбойник связывает игрока с кузнецом, угрожает и провоцирует на бой. Количество
        реплик соответствует требованиям.
      enemy: Выбран Лесной разбойник (ранг 1). Его характеристики (28 HP, 4 урона
        за ход) сопоставимы с возможностями игрока (100 HP, 2 урона мечом). Бой будет
        равным, но не фатальным. Этот враг указан в списке врагов игры.
    resource_to_deliver:
      amount: Установлено количество 3. Это умеренное число, которое обосновано в
        диалоге и позволяет создать контекст для встречи с врагом, который захочет
        отобрать «ценный» груз.
      character: Выбран Гаррик Кузнец, так как он может принимать Уголь на доставку/сбор
        (прописано в его items_can_be_accepted_for_delivery_or_collection). Он находится
        в Королевской столице, скорее всего, стартовой локации игрока.
      dialogs: Диалог выстроен как обоснование заказа от кузнеца (испытывает нехватку
        ресурса), инструктаж по месту добычи (локация из game.world.buffered), использованию
        инструмента (кирка из инвентаря игрока имеет нужный ранг 1 для добычи Угля)
        и намек на опасность. Количество реплик строго в рамках требований.
      resource: 'Выбран Уголь. Его может добыть игрок, так как у него есть Деревянная
        кирка с рангом 1, что соответствует min_instrument_rank: 1 для Угля.'
  objective_description: Кузнец Гаррик просит вас добыть 3 единицы угля на Одуванчиковой
    Поляне и отвезти этот груз его знакомой, Лире Лекарю, в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Добро пожаловать в Деревню Речных Лугов. Ты выглядишь уставшим...
          и слегка помятым.
        speaker: Лира Лекарь
      - remark: Уголь? Это от Гаррика? Отлично! Он мне писал, что отправит помощника.
        speaker: Лира Лекарь
      - remark: Видишь ли, мне нужен уголь не для кузницы, а для своего алхимического
          тигля. Его чистый жар незаменим для приготовления некоторых целебных отваров.
        speaker: Лира Лекарь
      - remark: Позволь посмотреть... Да, качество хорошее. Гаррик знает толк в материалах.
        speaker: Лира Лекарь
      - remark: Спасибо тебе за доставку. Я приготовила тебе кое-что в благодарность.
          Это должно помочь тебе в твоих будущих путешествиях.
        speaker: Лира Лекарь
      - remark: Когда будешь готов к новым вызовам, возвращайся. У меня всегда есть
          работа для надежного человека.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, дружок! Что это у тебя в мешке так аппетитно позвякивает?
        speaker: Лесной разбойник
      - remark: Проходил мимо кузнеца? Значит, тащишь ему что-то ценное. Наша улица,
          наши правила.
        speaker: Лесной разбойник
      - remark: Будь умницей, брось добычу и проваливай. Можешь и со здоровьем уйти…
          если повезет.
        speaker: Лесной разбойник
      - remark: Что, решил героя из себя строить? Бедолага... Не говори потом, что
          не предупреждали!
        speaker: Лесной разбойник
      - remark: Эх, зря... Придется забрать все силой!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новый клиент! Видно, что с оружием только начинаешь путь. Ну что
          ж, каждому воину нужно с чего-то начинать, а кузнецу — уголь.
        speaker: Гаррик Кузнец
      - remark: Горны мои остыли. Недавно проезжал караван, и последний уголь ушел
          на подковы для королевской конницы.
        speaker: Гаррик Кузнец
      - remark: Недалеко от столицы, на Одуванчиковой Поляне, есть выходы угольной
          жилы. Принеси мне, скажем, 3 единицы угля.
        speaker: Гаррик Кузнец
      - remark: Возьми свою кирку. Она как раз подойдет для такой работы. Но будь
          осторожен на выезде с поляны — разбойники любят там подкарауливать одиноких
          сборщиков.
        speaker: Гаррик Кузнец
      - remark: Сделаешь это — может, и найдется для тебя что-то получше этого деревянного
          клинка. Договорились?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
