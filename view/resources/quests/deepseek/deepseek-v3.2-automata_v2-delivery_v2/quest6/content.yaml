quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбран как получатель, потому что: 1) Она
        находится в другой локации (Деревня Речных Лугов), что соответствует типу
        квеста ''Доставка''. 2) Ее список принимаемых ресурсов включает уголь (ранг
        1), что логично для лекаря (обогрев, стерилизация). 3) Она может дать награду
        (Каменный меч), которой у игрока в инвентаре НЕТ.'
      dialogs: Диалог подтверждает завершение доставки, создает логичную причину,
        почему именно Лире нужен уголь (для котлов), и благодарит игрока. Лира - другой
        персонаж, чем Гаррик, что соответствует требованию квеста на доставку между
        разными NPC.
    enemy_to_face:
      amount: 2 противника - достаточный вызов для первого квеста, чтобы познакомить
        с боем, но не убийственный. Один враг был бы слишком просто, три - уже рискованно
        при текущем уроне игрока.
      dialogs: Противник (крыса) не разговаривает осмысленно, только издаёт угрожающие
        звуки. Это создает атмосферу и оправдывает бой. Игрок намекает на неизбежность
        столкновения.
      enemy: Пещерная крыса - враг ранга 1 (здоровье 20, урон 2 за ход). С двумя такими
        врагами игрок с деревянным мечом (урон 2) справится, получив некоторый урон,
        но без критического риска (максимальный возможный урон от двух крыс за бой
        ~12-16 HP, если игрок бьет по одной). Это соответствует его уровню и снаряжению.
    objective_description: Описание ясно указывает на цель (добыть и доставить), не
      раскрывая сюжетного поворота с противниками, чтобы это стало сюрпризом для игрока
      во время прохождения.
    resource_to_deliver:
      amount: 10 единиц - разумное количество для первого квеста. Это не займет слишком
        много времени, но даст понимание механики сбора.
      character: Гаррик Кузнец выбран, так как он находится в стартовой локации (Королевская
        столица), и его список запрашиваемых ресурсов включает Уголь (ранг 1). Это
        соответствует уровню игрока (уровень 1, инструмент ранга 1).
      dialogs: Диалог должен мотивировать и объяснять задачу. Гаррик - логичный начальный
        квестодатель (столица, базовые предметы). Он просит Уголь (ранг 1), который
        игрок может добыть своей Деревянной киркой (ранг 1). Количество 10 - достаточная,
        но не запредельная цель для первого квеста, чтобы познакомить с геймплеем
        добычи.
      resource: Уголь - ресурс ранга 1. Для его добычи нужна кирка минимального ранга
        (1), которая у игрока есть. Это соответствует уровню сложности для новичка.
    reward: Каменный меч (ранг 2, урон 4) - значительное улучшение по сравнению с
      текущим Деревянным мечом игрока (урон 2). У игрока этого предмета в инвентаре
      нет, награда соответствует прогрессии и будет полезна для следующих квестов.
      Это стимулирует продолжение игры.
  objective_description: Добудь 10 единиц угля по просьбе кузнеца Гаррика и доставь
    их лекарю Лире в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Кто там? О, уголь! Наконец-то. Я уже боялась, что мои зелья испортятся
          от холода.
        speaker: Лира Лекарь
      - remark: Меня прислал Гаррик из столицы.
        speaker: Игрок
      - remark: Спасибо тебе, добрый человек. Этот уголь спасет не один целебный отвар.
          Возьми это в знак моей благодарности.
        speaker: Лира Лекарь
      - remark: Я рад был помочь.
        speaker: Игрок
      - remark: Если понадобятся еще травы или помощь - обращайся. Деревня всегда
          рада таким, как ты.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Пронзительный визг*'
        speaker: Пещерная крыса
      - remark: '*Шипит и скалится, защищая свою территорию*'
        speaker: Пещерная крыса
      - remark: Придется пробиваться силой...
        speaker: Игрок
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: О, путник! Как раз кстати. Моя печь требует угля, а на моих полках
          - пустота. Поможешь?
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать?
        speaker: Игрок
      - remark: Добудь мне немного угля из шахт на окраине. Десяти штук хватит, чтобы
          разжечь пламя.
        speaker: Гаррик Кузнец
      - remark: Не похоже на трудную задачу.
        speaker: Игрок
      - remark: Верно, задача для начинающего. Отнеси уголь потом Лире, лекарю в Деревне
          Речных Лугов. Ей постоянно нужен уголь для обогрева котлов.
        speaker: Гаррик Кузнец
      - remark: Она щедро отблагодарит тебя. Ну что, возьмешься?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
