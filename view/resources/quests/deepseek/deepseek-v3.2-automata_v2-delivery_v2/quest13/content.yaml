quest:
  explanation:
    destination:
      character_to_deliver: Выбран Гном Брок. Он отличается от дающего задание (Гаррик
        Кузнец), что соответствует требованию. Брок находится в Гномьих Копях, принимает
        Железо и может выдать соответствующую награду (Железный шлем). Это создает
        логичное путешествие между локациями (Столица -> Бор -> Копи).
      dialogs: Диалог с получателем должен выражать благодарность, замыкать сюжетную
        петлю (брат получает железо) и мотивировать награду. Брок представлен как
        несколько ворчливый, но добродушный гном, довольный помощью.
    enemy_to_face:
      amount: '1 противник. Это минимальная, но достаточная угроза для первого боевого
        квеста. Позволяет игроку освоить боевую механику без риска быть мгновенно
        убитым. Координация с количеством ресурсов (3) логична: добыл, привлек внимание,
        столкнулся с угрозой.'
      dialogs: Диалог агрессивный и прямолинейный, подчеркивающий мотив врага (грабеж)
        и их уверенность перед слабым (по их мнению) игроком. Служит для погружения
        в конфликт и оправдания боевой части квеста.
      enemy: Лесной разбойник (rank 1). Это самый слабый противник, идеально подходящий
        для игрока 1 уровня с деревянным мечом (2 урона). При правильной тактике (14
        ударов для победы) и полном здоровье (100 HP) игрок гарантированно выживет,
        даже получив несколько ударов (4 урона за ход).
    resource_to_deliver:
      amount: 3 единицы. Это небольшое, но не тривиальное количество для новичка,
        создающее ощущение работы, но не перегружающее. Позволяет быстро получить
        опыт и перейти к следующей части квеста.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица) и принимает Железо (rank 2), которое соответствует инструментам игрока
        (деревянные инструменты rank 1 могут добывать ресурсы до rank 2 включительно).
      dialogs: Диалог строится вокруг простого заказа от кузнеца, дающего стартовое
        задание. Он знакомит с миром (указывает локацию, ресурс), дает сюжетную завязку
        (помощь брату), мягко предупреждает об опасности (разбойники) и ставит четкую
        задачу.
      resource: Железо. Это ресурс rank 2, соответствующий уровню игрока (1 lvl) и
        его инструментам (лопата/кирка rank 1 могут добывать ресурсы rank 1 и 2).
        Локация для его добычи (Подорожниковый Бор) существует в мире.
  objective_description: Кузнец Гаррик просит вас добыть 3 единицы железа в Подорожниковом
    Бору и доставить их его брату, гному Броку, в Гномьи Копи.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: А? Кто там? Пришел? От Гаррика, говоришь? Давненько он ко мне не наведывался.
        speaker: Гном Брок
      - remark: О! Железо! Наконец-то! Я уж думал, братец про меня забыл со своими
          столичными заказами.
        speaker: Гном Брок
      - remark: Три куска... Отличное качество, из Подорожникового Бора, чувствуется.
          Как раз на первую плавку хватит.
        speaker: Гном Брок
      - remark: Спасибо, что доставил. Без этого железа мне бы пришлось покупать у
          перекупщиков, а они дерут втридорога. Ты очень выручил Гномьи Копи.
        speaker: Гном Брок
      - remark: Держи, это тебе от меня и Гаррика. Он там в столице обещал тебя наградить,
          а я вот добавил кое-что от себя. Будет тебе первая серьезная вещь в коллекции!
        speaker: Гном Брок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, ты! Что это у тебя так блестит в мешке? Добыча, похоже, неплохая!
        speaker: Лесной разбойник
      - remark: Не думай уходить! Отдай свою поклажу, и мы тебя целым и невредимым
          отпустим. Ну, может, только слегка поколотим для острастки.
        speaker: Лесной разбойник
      - remark: Брось свою деревяшку! С таким мечом тебе с нами не совладать. У нас
          грабеж поставлен на поток!
        speaker: Лесной разбойник
      - remark: Ребята, окружи его! Не дать уйти с добром! Железо кузнецу нужно, а
          нам за него в таверне хорошо заплатят!
        speaker: Лесной разбойник
      - remark: Ничего личного, просто бизнес. Грабеж – наше ремесло, и уж мы-то знаем
          в нем толк!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! У меня тут небольшое дело для твоего старта.
          Мой брат, гном Брок из Гномьих Копей, вечно жалуется на нехватку железа
          для своих первых заготовок.
        speaker: Гаррик Кузнец
      - remark: Местные месторождения угля хороши, а вот железа чистого вокруг Королевской
          столицы маловато. Но я знаю место. В Подорожниковом Бору можно накопать,
          если рука тверда.
        speaker: Гаррик Кузнец
      - remark: Рядом с тем бором, правда, шныряют разбойники. Мелкие воришки, лесные,
          но глаза у них быстрые, а руки длинные. Будь начеку, когда копать пойдешь.
        speaker: Гаррик Кузнец
      - remark: Набрал бы ты для братца 3 куска железа. Ему на первую партию скоб
          и гвоздей хватит. А я тебе за услугу хорошо заплачу. Ну что, справишься?
        speaker: Гаррик Кузнец
      - remark: Отлично! Возвращайся с железом ко мне, и я скажу, как его Броку передать.
          Удачи тебе в бору, и смотри, не попадись на крючок этим лихим людям.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Железный шлем
