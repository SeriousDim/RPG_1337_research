quest:
  explanation:
    destination:
      character_to_deliver: Выбрана 'Лира Лекарь', чтобы выполнялось требование о
        разных персонажах для выдачи и сдачи квеста. Она находится в другой локации
        (Деревня Речных Лугов), что соответствует логике квеста на доставку между
        поселениями.
      dialogs: Диалог с Лирой Лекарем в Деревне Речных Лугов. Она другой NPC, который
        также может принимать ресурсы (в ее списке есть Железо). Диалог объясняет,
        почему уголь везут именно ей, создавая простую связь между персонажами и завершая
        историю доставки.
    enemy_to_face:
      amount: Установлено количество 1, так как даже один противник ранга 1 представляет
        умеренную угрозу для неподготовленного игрока. Большее количество могло бы
        быть смертельно опасным.
      dialogs: Диалог с противником минимален (писк, агрессивные действия), так как
        это животное низкого уровня. Это соответствует настройке мира и не нарушает
        лимит реплик.
      enemy: Выбрана 'Пещерная крыса' (ранг 1, урон 2, здоровье 20). Это самый слабый
        противник, с которым игрок с деревянным мечом (урон 2) может справиться, потратив
        10 ходов и получив до 20 урона, что не смертельно при 100 HP и отсутствии
        брони.
    objective_description: Описание отражает суть квеста (доставка ресурса от одного
      NPC к другому), не раскрывая встречу с противником, чтобы сохранить элемент
      неожиданности.
    resource_to_deliver:
      amount: Установлено количество 5, чтобы задание не было тривиальным, но и не
        требовало чрезмерного гринда для игрока 1 уровня с базовой киркой.
      character: Выбран 'Гаррик Кузнец', так как он находится в начальной локации,
        принимает ресурс ранга 1 (Уголь), что соответствует инструментам и уровню
        игрока.
      dialogs: Диалог с Гарриком Кузнецом в Королевской столице, так как он присутствует
        в списке NPC, принимает Уголь (ранг 1), а у игрока есть Деревянная кирка (ранг
        1) для его добычи. Диалог объясняет задачу, локацию (Одуванчиковая Поляна)
        и мотивацию, укладываясь в 5-10 реплик.
      resource: Выбран 'Уголь', так как это руда ранга 1, для добычи которой требуется
        кирка ранга 1. У игрока в инвентаре есть 'Деревянная кирка' (ранг 1).
    reward:
      item_name: Выбран 'Деревянный щит' (ранг 1, поглощение урона 2). Это предмет
        из игрового мира, который дает игроку первую броню, значительно повышая его
        выживаемость. У игрока в инвентаре и экипировке щита нет, что соответствует
        требованию.
  objective_description: Кузнец Гаррик из Королевской столицы просит вас добыть немного
    угля для кузницы и отнести его Лире, лекарю из Деревни Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, странник. Ты выглядишь так, будто только что вернулся из не самого
          приятного места.
        speaker: Лира Лекарь
      - remark: Ты говоришь, Гаррик прислал тебя с углем? Интересно... Обычно он сам
          приносит его.
        speaker: Лира Лекарь
      - remark: А, понятно. Он, наверное, хочет, чтобы я научилась готовить свои отвары
          на новом горне. Старый уже дымит ужасно.
        speaker: Лира Лекарь
      - remark: Пять кусков угля? Отлично, этого как раз хватит, чтобы разжечь пламя
          и приготовить снадобья для стражей деревни.
        speaker: Лира Лекарь
      - remark: Спасибо за помощь. Гаррик выбрал надежного посыльного. Держи, это
          тебе за труды.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Громкий, агрессивный писк*'
        speaker: Пещерная крыса
      - remark: '*Крыса обнажает острые желтые зубы и бросается на вас*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, ты только начинаешь свой путь. У меня для
          тебя есть простое дело.
        speaker: Гаррик Кузнец
      - remark: Работы много, а угля в кузнице почти не осталось. Без него нет огня,
          без огня - нет металла.
        speaker: Гаррик Кузнец
      - remark: Тебе нужно отправиться на Одуванчиковую Поляну. Это недалеко от столицы.
          Там можно найти залежи угля.
        speaker: Гаррик Кузнец
      - remark: Понадобится твоя кирка. Собери для меня пять кусков угля. Он нужен
          для поддержания горна.
        speaker: Гаррик Кузнец
      - remark: Вернешься с углем - получишь хорошую награду. Будь осторожен в пути,
          места там хоть и близкие, но небезопасные.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
