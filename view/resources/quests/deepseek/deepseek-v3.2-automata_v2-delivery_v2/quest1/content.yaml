quest:
  explanation:
    destination:
      character_to_deliver: 'Выбран персонаж ''Лира Лекарь'' по следующим причинам:
        1) Он находится в той же локации, что и Марта (''Деревня Речных Лугов''),
        что логично для квеста на доставку внутри поселения. 2) Он отличается от персонажа,
        давшего задание (''Травница Марта''), как того требуют правила. 3) В его списке
        наград есть ''Каменный меч'' (ранг 2), который является значимым и уместным
        улучшением для игрока.'
      dialogs: Диалог с Лирой Лекарем объясняет, зачем нужны одуванчики, создает лор
        (нужды деревни), комментирует качество работы игрока и намекает на более широкий
        мир (болотные твари). Завершается вручением награды.
    enemy_to_face:
      amount: 2 противника. Это создает умеренную сложность для новичка. С одним противником
        бой был бы слишком легким, с тремя — рискованным без брони. Два гоблина позволяют
        продемонстрировать игроку базовую механику боя, не перегружая его.
      dialogs: Диалог короткий и агрессивный, соответствующий характеру низкоуровневых
        воров-гоблинов. Упоминается 'мешок', косвенно указывая на собранные ресурсы.
        Последняя реплика дает игроку чувство выполненного долга после победы.
      enemy: Выбран противник 'Гоблин-вор' (ранг 1). Его характеристики (урон 3, здоровье
        24) сбалансированы для игрока 1-го уровня с Деревянным мечом (урон 2). Для
        победы над двумя такими противниками игроку потребуется несколько ходов, но
        при полном здоровье (100) угроза смерти минимальна, что соответствует дизайну
        вводного квеста.
    resource_to_deliver:
      amount: 'Количество 5 единиц выбрано как сбалансированная задача для первого
        квеста: не слишком мало, чтобы быть тривиальной, и не слишком много, чтобы
        не утомлять. Это стимулирует несколько циклов сбора.'
      character: Выбран персонаж 'Травница Марта', так как 1) она находится в доступной
        для игрока 1-го уровня локации 'Деревня Речных Лугов', 2) в её списке запрашиваемых
        ресурсов есть 'Одуванчик' (ранг 1), который игрок может добыть своей Деревянной
        лопатой (ранг инструмента 1).
      dialogs: Диалог ведется с Травницей Мартой, так как она находится в той же локации
        (Деревня Речных Лугов), что и Лира Лекарь, что логично для квеста на доставку
        между жителями одной деревни. Требуемый ресурс (Одуванчик) есть в её списке
        `items_can_be_accepted_for_delivery_or_collection`. Диалог объясняет задание,
        предупреждает об опасности (создавая связь с частью 2) и указывает на необходимость
        наличия лопаты (есть у игрока).
      resource: Ресурс 'Одуванчик' выбран, потому что его ранг (1) соответствует минимальному
        рангу инструмента для добычи (1). Игрок имеет в инвентаре Деревянную лопату
        (ранг 1), которая подходит для добычи этой травы.
  objective_description: Собрать 5 единиц одуванчика на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: А, это ты. Марта сказала, что ты везешь мне одуванчики. Давай сюда,
          они нужны мне для новых целебных мазей.
        speaker: Лира Лекарь
      - remark: Ты вовремя. Мои запасы почти иссякли, а в деревне многие нуждаются
          в лечении после стычек с болотными тварями.
        speaker: Лира Лекарь
      - remark: Пять цветков... Да, хорошие, крепкие. Видно, что собраны с умением.
        speaker: Лира Лекарь
      - remark: Я слышала, тебя атаковали на дороге. Ты хорошо справился. Деревня
          Речных Лугов будет в безопасности, пока есть такие, как ты.
        speaker: Лира Лекарь
      - remark: Вот, возьми это. Каменный меч. Он надежнее твоего деревянного. Пригодится
          тебе в твоих странствиях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ссс-топ! Ч-что везешь, двуногий? Это наша поляна!
        speaker: Гоблин-вор
      - remark: Отдай мешок! Иначе мы сами его заберем... вместе с твоей жалкой жизнью!
        speaker: Гоблин-вор
      - remark: Не уйдешь! Наши ноги быстрые, а когти острые!
        speaker: Гоблин-вор
      - remark: Слишком много разговариваешь! Атакуем!
        speaker: Гоблин-вор
      - remark: Гррр... не ожидали такого отпора... бежим!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Травница Марта
      dialogs:
      - remark: Добрый день, путник. Ты выглядишь крепким и надежным. Не мог бы ты
          оказать мне услугу?
        speaker: Травница Марта
      - remark: Мне срочно нужны цветы одуванчика. Они обладают чудесными целебными
          свойствами, но у меня самой нет времени их собирать.
        speaker: Травница Марта
      - remark: Одуванчиковую Поляну недалеко от деревни облюбовали гоблины-вороны.
          Будь осторожен на обратном пути.
        speaker: Травница Марта
      - remark: Принеси мне, пожалуйста, 5 цветков одуванчика. Я щедро отблагодарю
          тебя за труды.
        speaker: Травница Марта
      - remark: Не забудь взять с собой лопату. Одуванчики нужно аккуратно выкопать
          с корнем, иначе они потеряют свою силу.
        speaker: Травница Марта
      resource: Одуванчик
  reward:
    item_name: Каменный меч
